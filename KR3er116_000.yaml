上隨時隨地找出憑據欲找憑據須在病人身上去找我常謂在家讀醫書不如醫院的看護士容易明白時時與病人不離開也中醫無醫院唯讀空書耳書再不好更無法學二十四節氣的圓運動圖中醫的醫院也大氣運動圖説附圖大氣運動圖大氣運動圖此圖的範圍即是二十四節氣的範圍同溫層是宇宙的大氣圓運動個體上方的外方有定溫層是宇宙大氣圓運動個體下方的外方均與圓運動的大氣個體無關地心熱力在有定溫層以下甚遠之處亦與圓運動的大氣個體無關大氣圓運動個體的關係只是地面上原有的陰冷與太陽射到地面上的陽熱澎壓交互不已的變動而已升此宇宙與生物生命有關係的宇宙關係云者二十四節的大氣降沉浮升的圓運動也升原文有此字考上下文當為衍文附圖大氣運動範圍圖大氣運動範圍圖説古方上篇古方上篇導言原理如字母此篇如拼法文法作文學會字母拼法文法一切作文自能尋出辦法疾病雖多方藥雖多只分內傷外感病兩門本篇引用經方共十六方前六方為整個內傷病之法後十方為整個外感病之法整個云者知道具體的乃能知道抽象的而抽象的原則即是具體的原則前六方作一整個讀後十方作一整個讀讀至爛熟之後自然發現意想不到之領悟蓋本篇如電力以下各篇如電光到眼皆是熟書少費多少腦力便得著整個的成就如讀不爛熟以下各篇便費力多成功少也因以下各篇的原則系統名辭文法皆在此篇之故著者識理中丸證治本位的意義人參即黨參白朮各二錢乾薑炙草各一錢古法煎服只煎一次分作三服今人煎藥一煎二煎三煎其害甚大只煎一次藥質所含之成分配合調勻煎二次三次藥質成分有多有少便失製方的意義與病機不符服之即生他弊亟宜煎一次分三服也此方名理中湯以此方作丸名理中丸用蜜為丸者每服三錢至六錢用水為丸者每服二錢至四錢溫開水吞送此分兩係普通常用分兩凡古方分兩用一者今用一錢便合功效古方人參即黨參治夏月寒霍亂上吐下瀉頭痛行動無力不渴者脈象虛大或微小右脈較左脈尤微小者病危此人身上下左右俱病不治上下左右只治中氣之法也人身分上下左右中五部上部之氣由右下降下部之氣由左上升中氣居中以旋轉升降整個的圓運動圓是為無病之人上部之氣不能右降則頭痛下部之氣不能左升則行動無力而實由於中氣虛寒不能運化於中所致中氣虛寒所以胃土之氣上逆而作吐脾土之氣下陷而作瀉也中軸的旋轉停頓四維的升降倒作圓運動成了不運動故上下左右俱病不渴無熱也言脾胃必稱脾土胃土者因脾胃秉造化之土氣而生脾胃病濕因土氣為濕也脾胃病寒因土氣根於相火相火少故中土寒也中土運動是為升降脾胃秉土氣故脾經病則不升胃經病則不降如只言脾胃的肉質則濕寒升降皆無根由矣夏月的大氣中上燥熱中下濕寒體氣偏於燥熱之人感觸大氣之燥熱引動了本身的燥熱於是燥熱偏勝津液被劫運動不圓遂成熱霍亂體氣偏於濕寒之人感觸大氣的濕寒引動了本身的濕寒於是濕寒偏勝熱力消減運動不圓遂成寒霍亂人身之氣乃升降運動息息皆圓之體今升降大亂中氣暴亡頃刻即死故曰霍亂霍者大也又散之速也此病土氣濕寒中氣大虛此方白朮燥中土之濕乾薑溫中土之寒參草補中氣之虛中土溫運胃經復下降之常則吐止脾經復上升之常則瀉止胃氣降則上部氣降頭自不痛脾氣升則下部氣升自能行動中氣運而整個升降復是以諸病皆愈也此土氣濕寒之下瀉小便必不利也中土濕寒運動停頓木氣不能疏泄故小便不利土敗中虛故脈微小右為土脈右脈尤小者中土之氣將亡故危陽敗中虛脈亦虛大虛大脈較微小脈病輕人身中氣如軸四維如輪軸運輪行輪運軸靈中醫之法運軸以行輪之法運輪以復軸之法軸輪並運之法而已此方運軸行輪之法認定著落為本書要訣認定土氣濕寒朮薑便有著落認定中氣大虛參草便有著落認定上逆下陷由於土氣濕寒中氣大虛本方理中便有著落余方準此麥門冬湯證治本位的意義麥門冬六錢人參三錢炙草三錢粳米三錢大棗三錢劈半夏三錢棗有大小不同故用以輕重為準不劈開煮不透故用棗必劈開治火逆咳嗽上氣咽喉不利者脈象虛而澀此治肺經金氣不降之法也平人中氣旋轉肺氣下降故不咳嗽肺降金收故火不上逆火降則氣降故不上氣氣降生津故咽喉清利言肺必稱金者因肺氣以收斂清涼下為常能收斂清涼下降則肺氣不病收斂清涼下降者造化金氣之能肺秉造化金氣而生故不收斂不清涼不下降則肺氣為病焉故治肺氣之病必用收斂之法清涼之法下降之法然後病愈只言肺病不稱金病則清涼收斂下降皆無根由矣故言肺必稱金言脾胃必稱土言肝膽必稱木等皆古中醫學之定法亦古中醫學之妙法此病由於中虛不運肺氣偏燥傷及肺液肺燥氣逆收令不行故咳嗽火逆上氣咽喉不利也方用炙草以補中氣粳米大棗人參以補中生津麥冬以潤肺燥肺氣逆者胃氣必逆故用半夏以降胃氣之逆肺降津生收斂復舊故諸病皆愈脈象虛澀澀為津液不足之象虛乃中氣虛也此病之咳嗽乃無痰之乾咳此乾咳與咽喉不利即火逆上氣的事實氣往上逆因火逆也火之上逆因肺金燥也治肺金之燥之藥只麥冬一味而中氣之藥如此之多因中氣如軸四維如輪軸運輪行本乎自然必以中氣藥輔肺金之藥肺金乃能降耳且土為金母補土以生金圓運動之力更速也此軸輪並運之法小建中湯證治本位的意義飴糖二兩調服炙草二錢大棗肉六錢桂枝錢半生薑一錢炒白芍三錢治虛勞裏急腹中痛衄手足心煩熱咽乾口燥夢中失精四肢痛者脈象浮虛或澀數此治膽經相火不降之法也虛勞者氣血皆虛勞極困乏之意裏急腹痛者膽木不降則肝木不升鬱而不舒衝擊作痛也肝膽的肉質俱在身右肝經膽經的作用則膽經作用在右肝經作用在左必膽經相火下降之氣藏於少腹然後發生肝經作用膽經作用在右降肝經作用在左升也言肝膽必稱肝木膽木者木本生火膽木降生相火肝木升生君火人身肝膽秉造化的木氣而生所以肝膽之病屬木氣之病衄者鼻中血出肺竅於鼻膽木不降相火逆行肺金被刑不能收斂也肺秉造化的金氣而生有收斂的作用金性收斂涼降火性發散熱騰造化的火氣能克金氣人身的火氣能克肺氣故曰肺金被火刑克不能收斂也手足心熱煩者甲木不降心包相火逆行故手心熱乙木不升鬱生下熱故足心熱也甲乙乃分別木氣的陰陽的符號不曰甲木乙木只曰膽木肝木亦可惟不曰膽木肝木只曰膽腑肝臟則不可只曰膽腑如何能使手心熱只曰肝臟如何能使足心熱乎手心乃心包經穴道心包屬相火故膽經相火之氣不降心包相火不降手心即能作熱足心乃腎經穴道肝木生於腎水肝木之氣不升下陷於腎水之位故足心即能作熱咽乾口燥者甲木不降風熱耗傷肺液也風者人身之動氣為木氣所發生甲木下降風氣自平甲木乃陽性之木如其不降陽性主動風氣亦動風動狂肆肺金不能收斂則肺家津液即被風木耗傷金傷不降火氣不收故燥熱也肝膽病則疏泄疏泄者木氣之作用凡動風發熱皆木氣疏泄使然故言肝膽必曰木氣惟肝膽本臟肉質有病則曰肝臟膽腑也夢中失精者甲木不降相火拔根子半陽生陽生木動經脈滯塞運動不通陽氣鬱阻故疏泄而夢中遺精也婦人帶病亦經脈滯塞甲木不降水氣不藏之故四肢痛者四肢秉氣於脾胃土困木賊津液乾枯脾胃病於內榮衛經絡瘀塞於外也榮衛詳下文桂枝湯麻黃湯木火金水俱病中氣之虛極矣中氣虛極不能運化四維故病如此此病全膽經甲木不降克傷中氣相火上逆燒灼肺液腠理瘀塞而起故方中重用芍藥以降甲木斂相火而通腠理重用飴糖以養津液並用炙草薑棗以補中氣而調榮衛甲木乙木本是一氣甲降則乙升故重用芍藥以降甲木輕用桂枝以升乙木木調土運肺降津生火降歸根中氣轉旺經氣之升降既復木不克土脾胃氣和飲食加增氣血充足故虛勞諸病皆愈腠理詳原理下篇脈象澀而數澀為津少數為中虛又為虛熱浮虛者火逆中虛故浮虛也降膽經必重用中氣藥中氣旋轉則四維升降也建中氣必降膽木四維升降則中氣旋轉中氣生於相火也此軸輪並運之法當歸生薑羊肉湯證治本位的意義當歸三錢生薑三錢羊肉半斤治寒疝脅痛裏急腹痛及産後腹痛者此病脈象虛大或細微此治肝經木氣不升之法也肝經木氣者生氣也溫暖滋潤則生氣充足條達上升而化心火如不溫暖滋潤則肝陽下陷生氣下鬱而病寒焉足厥陰肝經下絡皋丸肝木下陷陷則生寒故病寒疝疝者皋丸腫痛木氣結聚成形也膽經循右脅下降肝經循左脅上升肝家生氣鬱而不升是以脅痛肝木之氣升於左而發於右循行腹部全體生氣鬱而不舒升不上來故病裏急腹痛産後腹痛者産後血去溫氣消失肝經生氣不足木氣鬱而不舒也當歸溫補肝血羊肉溫補肝陽滋補木中生氣以助升達加生薑以行其寒滯故諸病皆愈也肺金應乎秋氣清涼則降肝木應乎春氣溫暖則升此方所治各病皆肝木純寒無一些風燥之病所以服溫暖之藥諸病皆愈脈象虛大細微皆肝經陽氣不足因而生寒之象肝經因寒不升而現寒疝等病此等病都不能食者四維不能運動中氣因以不足故也人身中氣旋轉則四維升降四維升降則中氣旋轉凡病愈的結果在四維升降而中氣復原中氣復原生命乃能復原古方之有補中藥者直接補中之法無補中藥者皆調理四維升降以復中氣之法此方當歸生薑羊肉溫補肝經使其上升即是調理四維之升降以復中氣之法四維之運動圓則生中氣是也此運輪復軸之法腎氣丸證治本位的意義乾地黃六錢薯蕷四錢山茱萸二錢粉丹皮三錢茯苓一錢澤瀉一錢桂枝一錢去皮附子二錢治虛勞消渴小便過多或小便不利裏急少腹拘急者脈虛兩尺極微此治腎經水氣不升之法也腎水者人身津液之存於下部者也津液來源在於肺金津液消耗在於肝木腎水主藏肝木主泄木氣疏泄則生風氣消渴者腎水被風消耗水氣不能養木風氣愈增且消及肺家津液也肺液被消故渴人身小便流通原賴肝木疏泄之力平人小便亦不過多亦無不利者木氣和平疏泄適宜也消渴之病水火不足不能養木木氣失根忽而疏泄太過忽而疏泄不及疏泄太過則小便太多疏泄不及則小便不利虛勞裏急少腹拘急皆水氣不足木氣失根鬱而不舒耳方用地黃潤木氣調疏泄而保水氣薯蕷補金氣助收降而生水氣茱萸斂火丹皮清熱苓澤除濕濕者木金升降不遂土氣鬱而為濕也用附子補水中之火以培木氣之根也用桂枝達木氣之鬱也水火俱足木氣得根故風平渴止小便照常諸病皆愈水中火足則生木氣水中有氣則木氣上升木氣上升則疏泄自調脈象兩尺極微腎為人身津液之主候在尺脈津液少故兩尺脈微兩尺以候腎左尺以候水右尺以候腎水中之相火此病兩尺脈微右尺必較左尺更微所以養水藥中又用附子附子大熱專補下焦相火之藥中氣為生命之主腎氣為中氣之根也消渴小便過多小便不利裏急少腹拘急此木氣成風的事實也造化之氣春木主升秋金主降木升生火火氣又隨秋金而降入水中金降生水水氣又隨春木而交入火內木升金降火水交濟四維既圓中氣自旺人與造化同氣無病之人的氣化即是一個腎氣丸病此病者服此方後病愈身安精神爽健飲食增加即是四維的升降既已復舊中氣的旋轉因而照常也此運輪復軸之法大黃黃芩黃連瀉心湯證治本位的意義大黃一錢黃連一錢黃芩一錢麻沸湯漬少頃熱服沸水多時泡如麻子細即為麻沸湯治心氣不足吐血衄血者脈洪重按不空此治心經火氣不降之法也人身水氣在下火氣在上水氣在下應往上升火氣在上應往下降火者動氣也火氣不降動而上逆則吐血衄血手之三陰其氣主降心氣不足降氣不足也法當用三黃以降心火漬而不煎取味最輕麻沸湯性輕而浮使三黃之性緩緩下行也曰瀉心者只降上脘以上之火不降及中脘之意如瀉及中脘便生大禍矣心火不降心包相火不降也心經君火不病脈象洪洪乃上盛之象浮多降少故上盛而洪重按不空故可用三黃火氣最易直上全賴金氣收而降之入於土下吐血衄血者金之降氣被火之升氣所傷金之收令不行也三黃苦寒將火降下肺金乃收運動復圓故病愈人安也病愈人安者四維升降中氣復旺也此運輪復軸之法附圖運輪復軸圖的説明將此圖合在自己身體上揣想五行整個圓運動的生理與病理與醫理揣想明白便得著整個醫學的基礎此圖君火相火均往下降君火為相火的終氣相火為君火的始氣造化之氣今年太陽直射地面的相火降入冬季水中明年由水中升至地面的天空則成君火人身之氣今日膽經的相火降入腎水之中明日由腎水中升至心房則成君火雖是五行實是六行人身一小宇宙中土旋轉於中央火金右降於南西水木左升於北東理中丸中土不運之方麥門冬湯金氣不降之方小建中湯膽經相火不降之方當歸生薑羊肉湯木氣不升之方腎氣丸水氣不升之方瀉心湯心火不降之方人身六行六氣之病與治法即以此六方為大法大法者大概以此為準之法也此六方須作整個圓運動讀方名證狀原理治法脈象備考理中丸上吐下瀉頭疼中氣虛補中燥濕微小虛大治中土不運法動無力不渴土氣濕寒溫寒麥門冬湯火逆咳嗽中氣虛補中潤肺虛澀治肺經咽喉不利上氣肺氣燥逆降肺降胃金氣不降法小建中湯虛勞裏急中虛膽逆補中氣澀數或浮虛治膽經腹中虛衄土木兩枯降膽經相火相火不降法手足心煩相火外泄潤燥通塞咽乾口燥滯寒榮衛夢中失精四肢疼痛當歸生薑寒疝腹痛脅痛肝經寒溫潤肝經虛大或細微治肝經羊肉湯産後腹痛木氣不升法腎氣丸虛勞消渴腎氣不升補氣滋肝兩尺極微治腎經小便不利除濕補火水氣不升法或小便過多裏急小腹拘急瀉心湯衄血吐血心經降氣降心氣兩尺極微治心經不足火氣不降法人身疾病多矣事實上只分內傷病外感病兩門內傷病不論何經有病仍是圓運動著的必待積年纍月形質力量損壞消滅不能運動中氣不能復生然後人死外感病六氣運動失圓之病也初則一氣偶偏繼則一氣獨勝一氣獨勝諸氣敗亡中氣消滅所以人死前六方治內傷病除理中丸證中氣暴亡其死甚速外其餘各病皆可徐徐調理將五行運動失圓之處調之使圓若外感一氣獨勝之病治救稍遲即致死亡因形質不易損滅氣則易於消散也外感病以傷寒論為宗傷寒病分榮衛表病臟腑裏病少陽經病外感風寒項強身痛惡寒發熱可發汗而愈之病為榮衛表病陰臟病寒溫補乃愈陽臟病熱攻下乃愈之病為臟腑裏病表主外裏主內也不在表不在裏不可發汗不可溫補不可攻下和解乃愈之病為少陽經病少陽經病在表裏之間也榮衛的意義宇宙間澎力壓力混合而成圓運動的大氣個體內含一開一合的作用開則疏泄合則收斂疏泄則成風收斂則成寒人身陰陽混合而成圓運動的氣體內含一開一合的作用開則疏泄合則收斂疏泄則發熱收斂則惡寒疏泄謂之榮收斂謂之衛疏泄者木火之氣收斂者金水之氣木火之氣由內向外有發榮之意故曰榮金水之氣由外向內有衛護之意故曰衛榮衛者臟腑以外整個軀體圓運動之氣之稱整個圓運動分離則疏泄偏現而榮病收斂偏現而衛病分而復合榮衛交互圓運動恢復整個則汗出病愈也榮衛為風寒所傷則榮衛分離也分離小則病輕分離大則病重桂枝湯證治本位的意義芍藥三錢炙草二錢大棗六錢生薑三錢桂枝三錢水四杯煎成二杯溫服一杯飲熱稀粥一杯覆衣取微汗如不汗再服一杯如仍不汗再煎一劑服如前法禁生冷黏滑油膩肉麵酒酪五辛臭惡之物治榮衛外感於風項強頭痛身痛發熱汗出惡風脈浮緩者此治榮衛表證偏於疏泄之病之法也風者空氣中疏泄之氣榮者人身中疏泄之氣疏泄故發熱惡風疏泄故汗出風性疏泄故脈緩緩者疏泄虛散之意榮衛行身之表榮衛病故脈浮衛傷榮鬱榮衛不和故項強頭痛身痛衛氣收斂與風異性故風不傷榮而傷衛衛被風傷病卻在榮風傷衛而榮病者衛傷則衛的收斂作用減少榮的疏泄作用加多多則鬱鬱則病也此方用芍藥收斂榮氣之疏泄以交衛氣為主用桂枝者桂枝實表陽調榮衛也榮氣偏鬱運動不圓中氣必虛故用炙草以補中氣生薑大棗助胃氣補胃液以調榮衛也芍藥斂榮氣之疏泄者降膽經也服此湯後中氣復而榮衛和故汗出而病解已經自汗傷津故飲熱粥助津液以作汗也禁生冷諸物者榮衛根於脾胃榮衛鬱則脾胃滯生冷諸物增加脾胃之滯榮衛更不能調和也榮衛詳原理下篇麻黃湯證治本位的意義麻黃三錢杏仁三錢炙草二錢桂枝二錢水五杯先煎麻黃減二杯去沫入諸藥煎二杯溫服一杯覆衣取微汗不用飲粥禁如桂枝湯法治榮衛外感寒邪項強頭痛身痛骨節疼痛無汗惡寒脈浮緊者此治榮衛表證偏於收斂之病之法也寒者空氣中收斂之氣衛者人身中收斂之氣收斂故惡寒收斂故無汗收斂故脈緊緊者收斂閉束之意榮衛行身之表榮衛病故脈浮榮傷衛鬱榮衛不和故項強頭疼身痛骨節疼痛榮氣疏泄與寒異性故寒不傷衛而傷榮榮被寒傷病卻在衛寒傷榮而衛病者榮的疏泄作用減少衛的收斂作用加多多則鬱鬱則病也此方用麻黃疏泄衛氣之收斂以交榮氣為主用桂枝者桂枝益表陽調榮衛也衛氣偏鬱運動不圓中氣必虛故用炙草以補中氣用杏仁者衛閉則肺逆作喘杏仁降肺逆也不用生薑大棗不飲熱粥者未經自汗中氣與津液未傷也服此湯後中氣復而榮衛和故汗出而病解此證項強身痛較桂枝湯證重衛氣閉束之故桂枝善實表陽桂枝湯證自汗出表陽虛桂枝與芍藥之收斂相輔而行也麻黃湯證之用桂枝麻黃發汗最虛表陽桂枝所以善麻黃之後也陰陽二氣合成的圓運動個體一開一合榮氣疏泄病在開桂枝湯以合之之法為治衛氣收斂病在合麻黃湯以開之之法為治榮衛分離中虛之故桂麻二方皆重在補中此傷寒表病之大法一切外感病發熱惡寒之法統此桂枝湯並非治外感入了身體之風風傷衛耳風並未入了人身也麻黃湯並非治外感入了人身體之寒寒傷榮耳寒並未入了人身也芍藥所以收斂榮氣非散風也麻黃所以疏泄衛氣非散寒也若果風寒入了人身豈有反用芍藥收斂而病愈之理桂枝麻黃各半湯證治本位的意義芍藥錢半桂枝錢半麻黃錢半杏仁一錢炙甘草錢半生薑一錢紅棗肉三錢治榮衛雙鬱發熱惡寒無汗項強身痛八九日不解形如瘧者脈虛此榮衛雙解之法也外感之病偏於疏泄汗出發熱偏於收斂無汗惡寒榮衛之氣如環無端單衛鬱者少單榮鬱者亦少榮衛必鬱衛鬱榮必鬱者實多不過分何方鬱的輕重耳此榮衛雙鬱多日不解既現榮衛雙鬱之證而脈轉虛虛者不偏緊不偏緩微弱之象微弱之脈病勢不盛榮衛單鬱者病重雙鬱者病輕單鬱者一方隔絶之勢雙鬱者雙方欲和之機雙方欲和而未能故用桂麻二方減輕合用以和之服後得欲似汗即解矣榮衛單鬱中氣大虛易入臟腑榮衛雙鬱雙方平衡中虛較輕故病八九日有如瘧狀仍在表也此三方為治外感表病大法榮鬱發熱偏於疏泄衛鬱惡寒偏於收斂是對待的表病不解入臟病寒入腑病熱亦是對待的榮衛病乃人身榮衛為風寒所傷而榮衛自病並非風寒入了榮衛為病入臟入腑云者亦臟腑自病並非風寒入了臟腑為病此點要緊切不可忽中氣不足故榮衛偏鬱中氣敗甚故表病入裏裏氣偏寒之人故臟病裏氣偏熱之人故腑病名曰表病入裏其實乃臟腑裏氣自病自病二字解決全部傷寒論解決一切外感病解決榮衛之氣外發則吉內陷則凶榮衛病總以早得汗而解為好汗則外發也以上榮衛表病四逆湯證治本位的意義附子三錢乾薑炙草各二錢治太陰病自利腹自痛腹滿而吐食不下脈沉而微此治太陰脾臟病之法也脾乃陰臟陰中陽足則脾經上升與胃經合成圓運動陰陽和平不病寒也病則太陰陰盛陽消滅則病濕寒寒濕偏多故自利腹滿吐而食不下水寒火滅木氣失根鬱而衝擊故腹自痛此火土兩寒中氣將脫危險極矣此方用炙草補中氣用乾薑溫中寒除濕氣用附子溫腎水以救火火土俱復陽與陰平運動復圓所以病愈此六氣運動不圓太陰濕土一氣獨勝之病病在榮衛不速汗解平日脾陽素虛之人病即由表入裏則成此病或表證才現裏證即作則成此病病成之初必面色灰黯精神短少舌胎灰潤而口淡不渴也表證裏證兼現者先溫裏後解表陰盛陽微故脈沉微表裏本是一氣表氣偏裏氣必偏所以表病不解裏病必作裏病已愈表病自愈表氣病裏氣不病者必中氣健旺之人裏氣的陰陽調和不成裏病裏病一成便成生死問題矣他臟他腑準此附子湯證治本位的意義附片白朮茯苓人參炒白芍各三錢治少陰病手足寒背惡寒蜷臥但欲寐骨節痛脈現微細此治少陰腎臟病之法也傷寒病分太陽陽明少陽太陰少陰厥陰陽腑病熱陰臟病寒少陰腎臟病則陰寒水寒克火火滅土亡危險極矣四肢秉氣於中土中土陽亡則手足寒冷陽入於陰則寐水寒無陽則蜷臥欲寐而不能寐腎主骨腎寒則背脊惡寒水寒土濕木鬱風生則骨節痛此病致死極速此方用附子溫補腎陽人參茯苓白朮補土泄濕芍藥和木息風附子溫補腎陽易動風木之氣附子與芍藥並用腎陽復而風木不動也已現骨節疼痛風已起矣故既用附子以溫水又用芍藥以息風也火土復而木氣安陽與陰平運動復圓是以病愈芍藥性寒最敗腎陽此方與附子同用附子溫補腎陽也風乃木氣非風寒之風也此六氣運動不圓少陰寒水一氣獨勝之病病在榮衛不速汗解平日腎陽不足之人病即由表入裏則成此病或表證才現裏證即作則成此病病成之初必神色黯淡惡寒氣微也水寒土敗陽微氣少故脈微細腎陽亡故腎水寒烏梅湯證治本位的意義烏梅三十枚蜀椒當歸各四錢桂枝黨參附片各六錢乾薑二錢黃連黃柏細辛各三錢共搗篩蜜為丸如梧子大服二十丸日三服稍加至三十丸烏梅先用醋浸一宿飯上蒸搗如泥和各藥為丸用時如無丸藥可減輕用分量六分之一煎服日三服隔二小時服一次治厥陰病厥熱往返消渴氣上衝心心中熱痛飢不欲食食則吐蛔心煩有時安靜靜而復煩脈虛細急數此治厥陰肝臟病之法也厥熱往返者厥為寒冷厥陰乃陰寒已極微陽初生之氣厥陰風木子氣為火母氣為水厥陰病則風動無定或見子氣而病熱或見母氣而病寒故熱後復厥厥後復熱平人之厥陰不病厥熱者中氣旺而水火交也厥陰一病風木克土中氣既敗水火分離於是火氣現而熱水氣現而厥熱多則火土復而人生厥多則火土亡而人死也消渴者風木之氣因水寒脫根而疏泄上衝疏泄傷津故渴而欲飲飲而仍渴氣上衝心心中熱痛者足厥陰肝經為風木手厥陰心包經為相火肝經木氣上衝而心包相火又因中氣虛敗不能下降故氣上衝心心中熱痛飢不欲食食則吐蛔者風動耗津故飢土氣已敗故不能食蛔乃木中陽氣所生中下既寒蛔不安居食後胃上加溫蛔避寒就溫故上行而吐出心煩者蛔乃肝家陽氣所生蛔動則陽動陽動故心煩此病水寒火熱木枯土敗方用附子蜀椒細辛溫水寒而培木氣之根黃連黃柏清火熱以保木氣的津液桂枝當歸溫養木氣以息風氣人參乾薑以溫中補土烏梅大生木液而補木氣風盛則木氣自傷惟烏梅能補木氣也水溫火清木和土復陰陽平和運動復圓是以病愈此六氣運動不圓厥陰風木一氣獨勝之病病在榮衛不速汗解平日肝陽不足之人病即由表入裏則成此病或表證才現裏證即作則成此病病成之初必氣微而躁煩不安也木氣動而耗津故脈虛細微陽拔根中氣虛極故脈急數烏梅丸為肝臟陰寒之方黃連黃柏大寒之藥乃如是之重者水寒則木鬱生風風又生熱熱又傷津津傷則風更動寒不去風不息熱不去風更不息寒溫並用木氣之個性使然此方雖寒溫並用木氣之本性使然此方雖寒溫並用仍以溫水寒為主清火熱為輔六氣中為風木復雜風木能研究徹底余皆徹底矣以上三陰臟病臟病忌發汗大承氣湯證治本位的意義大黃四錢枳實芒硝各二錢厚朴八錢治陽明病胃家實日暮潮熱六七日不大便譫語手足濈然汗出腹滿痛拒按脈大而實此治陽明腑病腸胃燥結實證之法也承氣者承中氣也中氣左旋化陽右轉化陰陰陽平均中氣乃治陰進則陽退陽盛則陰消陰陽偏勝則中氣傷而人病陰陽偏絶則中氣亡而人死三陰病陰盛陽絶大承氣湯證陽盛陰絶當此之時陰陽平均的中氣幾乎有陽無陰了日暮潮熱者陽明燥金氣旺於申酉之時燥金氣旺每日申酉加熱如潮來之有定時此時胃中陽旺故陽明病必此時熱增也譫語者胃中津液消亡心火不降燒灼神昏也手足濈然汗出六七日不大便者胃腸燥極也腹滿痛拒按者腸胃有燥屎結實也傷寒論云胃中有燥矢乃胃中食物被燥氣煉乾云耳故曰胃家實也矢古屎字陽明燥金大腸主氣胃土從化金氣以收斂為能故金燥必結故燥屎堅硬也陽明胃腑燥熱之證亦有瀉稀水放屁而潮熱譫語腹滿痛拒按者此腸中必有燥屎數枚所謂熱結旁流亦大承氣湯證也凡用下法總要以手按大腸部位名曰腹診此方大黃芒硝攻下燥屎枳實厚朴開通滯氣陽退陰復中氣承接運動復圓是以病愈此方妙處在大黃枳實性寒芒硝厚朴性熱寒熱混合則生圓運動的作用如不用芒硝厚朴之熱只用大黃枳實之寒直攻而下一定將人下死脈實而大陽熱充滿之象與三陰臟病陰盛陽微是對待的理法世謂芒硝性寒錯誤但是要用大承氣湯須先以小承氣湯試探服小承氣湯後放屁是有燥屎可用大承氣湯若不放屁是無燥屎便不可用小承氣湯大黃二錢枳實一錢厚朴二錢此六氣運動不圓陽明燥金一氣獨勝之病病在榮衛不速汗解平日胃陽偏旺之人病即由表入裏則成此病病成之初必蒸蒸發熱汗出氣盛而舌胎乾黃數日之後乃成此證不比三陰病成之速也此病表證未罷裏證續作當先解表然後下裏與三陰表證裏證兼現當先溫裏然後解表是對待的理法一氣獨勝諸氣消滅圓運動解體所以人死桃核承氣湯證治本位的意義桃仁三錢桂枝二錢炙甘草二錢大黃二錢芒硝一錢治太陽腑病其人如狂少腹急結內有蓄血小便利者脈象沉實此治太陽膀胱腑病之法也太陽之腑膀胱也膀胱位於少腹膀胱有熱大腸血瘀故小腹急結血熱必神亂故人如狂熱實故小便利熱結在裏故脈沉實此方大黃芒硝以下膀胱腑熱桃仁以下瘀血膀胱腑雖有實熱可下而胃中卻無可下之物硝黃極傷胃氣故用炙草以補胃氣用桂枝者達表氣也因大腸膀胱之經在榮衛之內膀胱本腑有熱其經氣即將榮衛之熱引入本腑而成此證故用桂枝將其經氣仍達於表也小便如不利內熱未實便不可下如血自下血去熱退不必服藥自愈此六氣運動不圓太陽腑熱之病也病在榮衛不速汗解平日血熱陽勝之人病即由表入裏表證不罷裏證即作則成此病病成之時但覺少腹急結忽然發狂也以上陽明太陽腑病腑病忌發汗小柴胡湯證治本位的意義柴胡黃芩法半夏生薑人參炙草各三錢大棗肉六錢治少陽經病寒熱往來口苦目眩耳聾咽乾胸滿脅痛默默不欲食心煩喜嘔脈象虛小弦數此和解少陽經病之法也少陽膽經居榮衛之內臟腑之間此經一病陰陽不和陰鬱則惡寒陽鬱則發熱鬱而不解故寒熱往來膽經不降相火上逆故口苦耳聾目眩咽乾膽經自頭至足循耳後下胸環胃循脅膽經不降故胸滿脅痛不食心煩喜嘔膽經與三焦經同屬少陽相火膽經相火既上逆不降三焦經相火必下陷不升上逆下陷經氣結滯故病有以上諸證三陽腑三陰臟是平列的少陽卻無腑證而有經證是平列中的不平處此方柴胡升三焦經之下陷黃芩降膽經之上逆膽經逆胃經必逆半夏生薑降胃經之逆相火上逆中氣與津液必傷薑棗炙草人參補中氣生津液中傷火逆臟陰易動故重用補中之品以防止臟陰之動也此病上逆下陷中虛此方一面升陷一面降逆一面補中以調升降此和解之法也火陷中虛故脈虛小木火結滯故脈弦數大柴胡湯證治本位的意義柴胡黃芩法半夏各三錢大黃枳實生白芍各二錢生薑三錢大棗六錢治少陽經病寒熱往來口苦目眩耳聾嘔而下利胸下痞硬脈象右實左弱此和解少陽之經兼下陽明腑熱之法也如小柴胡湯口苦目眩寒熱往來等證又兼嘔而下利胸下痞硬嘔利為膽胃二經熱滯痞硬為膽胃二經橫結下利為胃腑之熱於小柴胡湯去參草之補中加大黃枳實以清胃熱加芍藥以降膽經而舒胃經一面和解少陽之經一面下胃腑之熱也小柴胡湯證脈象虛小略兼弦數虛小者中陽虛而三焦之氣下陷弦數者木火病而膽經之氣上逆也大柴胡湯證脈象右實左弱右實者陽明胃腑熱滯左弱者木氣結而津液傷也此二證大柴胡湯證少小柴胡湯證多因中虛不運榮衛乃病中虛之家膽經相火易為上逆相火上逆中氣更虛故小柴胡湯證多胃陽盛乃病大柴胡湯證胃陽盛則中氣少有虛者中氣不虛榮衛偶病自能汗解不至入少陽經也故大柴胡湯證少也名曰入少陽經其實乃少陽經自病此六氣運動不圓榮衛表病未得汗解臟腑陰陽又不偏動病氣既不外出又不內入少陽經氣被迫而成之半表半裏之病也以上少陽經病少陽經病不可汗不可下不可溫只可和解柴胡湯和解之方也不可汗柴胡略有汗意不可下黃芩略有下意不可溫黨參炙草生薑大棗略有溫意此和解之事實也古方上篇圖的説明附圖圖的説明發熱為榮氣疏泄之病惡寒為衛氣收斂之病衛氣之收斂能交榮氣的疏泄則榮不發熱榮氣之疏泄能交衛氣之收斂則衛不惡寒榮衛相交中氣之事厥陰病為肝臟病寒之病太陰病為脾臟病寒之病少陰病為少陰腎臟腎水病寒之病非少陰心臟君火之病乃少陰腎水無陽寒水克火之病少陽之陽足能交厥陰則肝臟不病寒陽明之陽足能交太陰則脾臟不病寒太陽之陽足能交少陰則腎臟不病寒陽明病為胃腑病熱之病太陽病為膀胱腑病熱之病太陰之陰足能交陽明則胃腑不病熱少陰腎水之陰足能交太陽則膀胱腑不病熱惟少陽膽腑附肝臟而生入胃腑而下膽的本身卻無腑病只有經病少陽病之寒熱往來乃肝臟之陰與胃腑之陽之氣表裏本是一氣表氣的榮衛偏盛裏氣的臟腑即偏鬱榮衛不得復和則表氣的榮衛偏的愈甚裏氣的臟腑即愈鬱而愈偏遂成陽腑病熱陰臟病寒之病如表氣不得復和裏氣又不偏盛則成少陽經病此整個圓運動的傷寒論的原則也榮衛病乃榮衛被風寒所傷而榮衛自病並非風寒入了人身為病此點認清不惟傷寒論的原理明溫病疹病一切外感病的原理俱明矣一部傷寒論如內容六瓣之一橘榮衛如橘皮臟腑如六瓣少陽經如橘絡也讀傷寒論十方讀法五條一要先將內容六瓣之一橘的比喻明瞭一要先將榮衛臟腑少陽經病的各證狀名目分別記清再合成一個整個記清一要於記清之後默記溜熟一要於默記溜熟之後將各證狀的所以然與治法分別記清再整個默記溜熟所謂電力充足電光自明之功效於最短的期間便能得到整個成功的基礎一難經曰傷寒有五一曰中風二曰傷寒三曰溫病四曰濕溫五曰熱病傷寒有五的傷寒二字乃外感的統稱二曰傷寒的傷寒二字才是傷寒麻黃湯證的傷寒仲聖傷寒論三字的意義乃外感論意的義此點要記明白溫病本氣篇溫病本氣篇導言自來治溫病以新感與伏邪為兩大原則吳鞠通溫病條辨謂風寒傷人由皮毛而入溫病由口鼻而入初入上焦再由上焦入中焦再由中焦而入下焦直行中道云云人身由上部至下部是整個的氣化圓運動即以形質而論亦曲折重疊並無直的中道可行所謂新感溫病如虛王孟英著溫熱經緯稱仲景有伏氣溫病之文仲景伏氣溫病之文乃謂伏有何脈即有何病乃泛言各種病如此非專言溫病非謂冬月伏有寒氣至春變溫只因王叔和於傷寒雜病論首妄加序例曰冬日傷寒即病者為傷寒不即病者寒毒藏於肌膚至春變為溫病云云後人遂認為伏氣溫病此王叔和誤解內經冬傷於寒春必病溫的寒字之貽禍也內經云風寒中人使人毫毛畢直豈有寒氣伏藏於肌膚三月之人安然無恙至春變為溫病之理所謂伏氣溫病如此一唱百和不求甚解原則既差理路遂亂因就經過事實根據原理作溫病本氣篇言溫病乃人身之本氣自病非由口鼻而入非伏去年之寒變成今年的溫認為溫邪由口鼻直入中道認為伏邪變溫於是以去邪為主義遂用去邪之藥去邪之藥最傷本氣本氣受傷病必加重及至病加猶以為邪深難去比比然矣認為本氣自病自知用調和本氣之藥病去身安乃無遺誤抱本氣自病的原則以研求溫病條辨溫熱經緯所載證狀與方法自能得著適當的妙處而不為其所持原理的錯處所誤欲知病理但憑藥性世之治溫病皆以銀翹散桑菊飲為宗銀翹散桑菊飲之藥皆疏泄降肺之藥乃燥病之藥非溫病之藥燥則金氣斂結藥宜疏泄溫則木氣疏泄藥宜收斂斷無疏泄之病用疏泄之藥治之之誤也著者識溫病的意義傷寒病起於榮衛終於臟腑榮熱衛寒腑熱臟寒腑熱則實臟寒則虛脈象緊數按之明爽病人神色清明溫病起於榮衛終於氣血榮衛氣血皆熱不寒皆虛不實脈象或洪或小按之躁急模糊病人神色昏晦亦有強壯之人脈象較實者雖脈象較實仍按之模糊不似傷寒脈象之明爽特強壯之人少有病溫病者耳世謂右脈大為溫病左脈大為傷寒事實上並不儘然溫病者人身木火偏於疏泄金氣被衝而失收降之令水氣被泄而失封藏之能水不藏則相火益事飛騰金不收則風木益事泄動上焦則津液傷而熱氣衝塞下焦則相火泄而元氣空虛中焦則中氣衰敗交濟無能一年的大氣運動春升夏浮秋降冬沉春溫夏熱秋涼冬寒春生夏長秋收冬藏人身春木之氣升動生髮失其常度則溫氣病焉此乃人身本氣之病非中今年之溫由口鼻而入非伏去年之寒變為今春之溫不過雖是人身本氣自病必須感受時令偏於疏泄的大氣引動裏氣然後病成耳傷寒論云太陽病發熱而渴不惡寒者為溫病此乃借溫病以分別傷寒之言非專為溫病整個説法立言溫病的事實上常有得病一日常有發熱之中仍帶惡寒者不惡寒之發熱作渴脈象應無虛象而事實上則脈虛者甚多且多不渴者脈虛之溫病關係生死較脈不虛者迅速溫病諸書對於脈虛溫病的方法少注重者大概遵守論文而由口鼻而入伏寒變溫病的訛傳未及就六氣的事實上尋原理也溫病實證少虛證多實證易治虛證難治此篇注重虛證因正當厥陰風木之時陽氣幼稚故也如果脈實則易治矣虛證如肆用散藥涼藥必死實證的實字乃比較上的實非真正的實所以溫病的下證無承氣湯證只有黃龍湯證黃龍湯詳下文傷寒表裏之分為榮衛腑臟溫病表裏之分為榮衛氣血亦有病在腸胃者如兩感溫病則責在腎家各詳下文病在腸胃乃腸胃自病病在榮衛氣血乃榮衛氣血自病自病的意義無人講求皆王叔和誤解內經文字後人又盲從叔和之故叔和誤解內經文字詳下文傷寒易治溫病難治傷寒表裏寒熱界限分明溫病表裏皆熱界限難分此篇於難分之中求分之之法能分得出然後用藥有著落也病在榮衛溫病分純溫病兼感寒溫病初起頭疼身痛先惡寒後發熱發熱之後但熱不寒神智昏迷精神倦怠此病在榮衛也舌無胎脈洪虛躁急模糊輕按多重按少發熱大者方用烏梅白糖湯即肥烏梅五枚白糖一兩舌無苔脈虛小者方用扁鵲三豆飲即黃豆黑豆緑豆各三錢烏梅證三豆證是為不兼感寒之純溫病若脈洪虛發熱之後仍兼惡寒是為兼惡寒溫病於烏梅白糖湯中加緑薄荷一二錢若脈虛小發熱之後仍兼惡寒是為兼惡寒溫病於三豆飲中加薄荷五分至一錢惟兼惡寒之脈必不純虛必重按兼有弦緊之象弦緊乃收斂閉束之象純虛之脈只向外疏散不向內收斂閉束也病人所在地冬春無大風冬不鳴雷少純虛溫病烏梅白糖湯人身榮衛榮屬木火其性疏泄衛屬金水其性收斂主管表氣而根於裏氣節令一交木氣大氣降極而升疏泄起來中氣不足之人本身的榮氣即隨造化的木氣升動疏泄乙木為風木甲木為相火裏氣的乙木升而甲木不降則相火外泄榮氣與木火升泄故發熱熱由木火升泄故發熱不惡寒榮衛失和故頭痛身痛相火外泄的多故發熱甚大火泄中虛故神智昏迷精神倦怠也此證脈象洪盛乃木火外泄重按虛微乃木火之虛虛者木火升泄自傷本氣也病在榮衛之時外泄之相火正在浮遊尚未化生定在之熱故舌上無胎烏梅酸收降甲木安乙木斂相火而大補木氣木氣動於上必虛於下故烏梅為風木要藥收而不澀能生津液溫病尤宜白糖能補中而不橫滯與烏梅酸甘生陰最宜溫病虛證故服之病愈若發熱仍兼惡寒是感大氣之疏泄又感大氣之收斂而本身衛氣閉束不舒故加薄荷以開衛氣之閉束也脈來躁急模糊根本動搖之象扁鵲三豆飲此證外證與烏梅湯證同但脈不洪虛而虛小虛小者木氣本虛一經疏泄便無力也黃豆黑豆養木氣中平疏泄兼降膽經養津液緑豆養木養中兼清肺熱故服之而愈如右脈重按不虛加淡豆豉三錢以宣滯此方平淡和養最宜溫病如發熱之後仍兼惡寒是感大氣之疏泄又感大氣之收斂而本身衛氣閉束不舒故加薄荷以開衛氣之閉束也豆須煮成即服不可隔夜生用莫炒烏梅湯收外以安內三豆飲養內以和外皆溫病初起虛證的極效方法溫病脈實為順脈虛為逆烏梅湯證小便長者為烏梅忌用改用三豆飲加倍煎服三豆證小便短者加白飯豆三錢以利濕氣惟病人所在地冬春風少冬不鳴雷大氣中木氣不傷人身的木氣較足烏梅黃豆補木之品只宜輕用疹病亦然疹即小兒的溫病內經曰溫病虛甚者死木火之氣泄而不復故也泄而不復中氣之虛中氣不虛木火雖泄金氣能收火仍歸水木氣得根必不致死難經曰溫病之脈不知何經之動也可見其虛也三豆飲原方係紅飯豆黑豆緑豆紅飯豆即點心鋪做洗沙之紅豆能除濕氣傷津液故改用黃豆紅飯豆世誤用赤小豆有大毒黃豆養中養木養津液兼降膽經溫病疹病要藥脈氣洪虛與虛小者面色多紅面色紅者火浮於外必虛於內涼藥下咽即生變故此醫家之所忽如認面紅為內熱故意用涼藥以清內熱必一瀉而死脈虛故也傷寒論立桂枝湯以治榮病之疏泄立麻黃湯以治衛病之收斂桂枝湯之芍藥全在收斂木火烏梅三豆亦全在收斂木火惟溫病裏氣大虛故不能用芍藥之苦寒烏梅三豆並補裏氣之虛溫病表裏俱熱故不能用桂枝生薑以助熱不能用炙草紅棗以補中而烏梅三豆卻有補中之能如兼衛氣閉束而惡寒兼用薄荷以通衛閉亦傷寒論麻桂各半湯之法所變通之法不過桂枝湯麻黃湯之榮衛病有表裏之分溫病之榮衛病表裏之分不顯而全是裏虛之病耳烏梅白糖湯三豆飲治溫病下咽即能汗出病解出汗的理由詳原理下篇榮衛中用此方見效之後自能知道溫病條辨用銀翹散桑菊飲的根本全錯發熱為榮氣之疏泄惡寒為衛氣之閉斂神昏倦怠為相火離根故用烏梅三豆以平榮氣之疏泄薄荷以開衛氣之閉斂相火離根中下虛憊故用烏梅三豆平和補益木氣之品不能用其他苦寒傷中之味此中關係非比尋常況且木氣偏於疏泄都緣金氣不能收斂葉天士謂溫病首先犯肺逆傳心包葉雖不知溫病原則卻已認識肺金不可傷其謂逆傳心包因不知溫病是本身木火疏泄傷肺之病心包之臟木火自病也蔥豉湯溫病脈虛身乏身痛發熱惡寒是兼感寒溫病蔥豉湯蔥頭三五個淡豆豉五錢不加鹽煎服豆豉和木氣以治溫蔥頭散衛氣以治寒平穩之方也如不惡寒忌用蔥豉不惡寒單發熱乃純溫病黃豆一味煎服亦愈豆豉宜散亦不可用黃豆潤津液益中氣養木氣而平疏泄故效兼有衛氣閉斂之證據蔥性疏通衛閉其性平和豆豉宣滯不傷中氣取效甚宏故宜用之比薄荷穩也加減三豆飲烏梅三豆飲證如脈不模糊不洪不虛重按較輕按有力面色不浮紅昏睡不醒是兼感寒溫病病在榮衛裏熱已作此肺金收斂力大將木火疏泄之氣斂成有定在之實熱宜加減三豆飲金銀花天花粉玉竹各三錢以清熱枳實薄荷各一錢以清肺閉黑豆緑豆淡豆豉各三錢以養木氣兼清木熱而舒通胃滯也烏梅黃豆皆是補品脈不虛忌用若舌有乾黃苔加生大黃生甘草各一錢以消胃熱此證不愈即成下文病在氣分病在腸胃兩證病在氣分發熱咳嗽惡寒身痛大渴舌胎粉白脈象不洪重按有力此病在氣分也用枳實銀菊散生枳實薄荷竹葉桔梗菊花天花粉玉竹麥冬貝母知母三錢服後熱退病減過時仍舊者其脈必實生枳實加成五錢即愈粉白如鋪乾粉於舌上燥而不潤滿舌皆白滿舌粉白此為肺熱之證枳實銀菊散咳嗽口渴舌胎粉白者相火被衛氣閉束成為有定在之熱熱勝克金熱傷肺家氣分也肺氣熱逆故咳嗽氣熱津傷故口渴氣熱津凝故舌胎粉白菊花金銀花天花粉玉竹麥冬知母貝母清肺熱以顧津液薄荷竹葉桔梗枳實破肺氣的實滯故服之病愈脈重按有力是氣實之象實則不模糊也此方服俊必大汗而解汗出之先有發狂者有發戰者熱深故也亦有熱深脈伏者治溫病須先分別相火浮遊與熱有定在兩個時期病在榮衛舌上無胎為浮遊時期舌上有胎為定在時期浮遊時宜收回相火定在時宜清降定熱浮遊時用清藥火不可清也春初之火只見不足不見有餘火如被傷不能歸於水位化熱灼津上焦清虛之境神明所出之地塵敝煙熏枯乾窒塞種種昏迷煩喘氣短厄逆甚而吐血躁擾手足瘈瘲昏迷不語敗證迭出如現煩喘等證烏梅三豆兩方合用自愈不加薄荷上焦之熱愈盛下焦之火愈虛既現敗證其火更虛降火而不傷火是為治溫病之大法必熱實氣實脈實熱有定在如枳實銀菊散證乃可用清熱通氣之藥以清定在之熱枳實銀菊散不用黃連因其性大寒不惟傷火並且敗中況黃連性極乾燥最傷津液溫病初起所忌此病脈既有力仍只用清涼疏淡之品因脈之有力乃相火化熱傷津之熱非火土之氣之實相火所化之熱多一分下焦相火即少一分相火少一分中氣即虛一分倘用黃連大寒之藥火土一傷必貽後患津液再劫必增糾纏矣枳實銀菊散證小便必長而次數多或小便點滴俱無或瀉稀黃水皆氣分熱也氣分熱而木氣之疏泄更甚故小便長而次數多氣分熱而津液膠固故無小便肺與大腸相表裏氣分熱及大腸熱氣主動大腸金氣受熱不能收斂故瀉稀黃水見此證狀切不可認為小便長多為小便清利更不可認無小便為脾濕而用苓澤利尿更不可認瀉稀黃水為虛而用補澀肺氣熱清諸證自愈溫病條辨之銀翹散竹葉牛蒡桔梗等藥破肺氣傷肺液連翹除濕傷津疏散力大溫病大忌肺氣再傷收斂更減疏泄更甚肺津再傷水源枯竭上焦更不能清降相火更逆木氣更枯則病重矣烏梅湯三豆飲蔥豉湯加減三豆飲枳實銀菊散服後病愈皆自然出汗溫病忌發汗因溫病乃疏泄之病用藥發汗則疏泄而又疏泄多致於死自然出汗者榮衛復和火降中復圓運動復原也凡病出汗而愈皆自身圓運動復元之故溫病為木火上衝肺金不能收斂之病木火上衝既已熱傷肺金只宜清肺家之熱不可清木氣之溫因木火衝於上必虛於下知肺熱當清木溫當養便將溫病的根本解決溫者木氣之生氣也病在腸胃病在氣分證中加日晡潮熱譫語舌苔由白轉黃燥而且厚脈象右大而實左則弱小方用加減黃龍湯大黃枳實厚朴各一錢元明粉五分黨參二錢當歸柴胡炙草各一錢白芍二錢分三服加減黃龍湯病在氣分失於清降則熱結腸胃而成潮熱腹滿苔黃之下證自當用承氣湯下之但熱雖實胃並不實且氣血均為熱所傷耗只宜大黃等味輕劑並用參歸補益氣血炙草補益中氣柴芍疏解木氣如一服半日後放臭屁腹已不滿右脈已平無論已否得下即止後服雖未得下脈平腹不滿已不拒按是熱實已解黃苔亦將自退不能再受下藥如脈已平腹已不滿而身熱不退用三豆飲濃煎以養中滋木熱即退矣因溫病只有虛證無有實證故也如服後半日不放臭屁腹仍滿仍拒按脈仍不平再服一服得下稀糞少許即勿再服即能熱退人安養息即愈以上各方乃治溫病大法無論何證中兼見他證如烏梅湯證兼見面紅目赤三豆湯證兼見羞明咽痛枳實銀花散證兼見小便長多或無小便加減黃龍湯證兼見瀉稀黃水等皆仍用烏梅三豆等本方因病之狀態雖異病之原因則同原則既同方法亦同病在血分相火既化成有定在之熱平日氣分偏熱之人熱即入於氣分平日血分偏熱的人熱即入於血分血分既熱舌色即現絳赤脈象即轉弦數身熱不退口乾而不飲心煩夜不成寐方用加減黃連阿膠雞子黃湯阿膠生地龜板鱉甲各二錢赤芍丹皮黃連各二錢雞子黃一枚生調分二次服加減黃連阿膠雞子黃湯阿膠生地龜板鱉甲以養血而平熱赤芍丹皮以活血而清熱黃連降心火以除煩生雞子黃補中氣溫腎陽補津液以交心腎雖係熱傷血分亦由心經心包經火氣不降自現本氣火氣不降自現本氣者中氣虛而腎陽不升也故用雞子黃補中氣補腎陽以交心腎脈虛甚者加炙甘草一錢以補中如舌絳赤而有黃苔雞子黃炙甘草忌用腎陽升則心火降徒降心火不升腎陽不能成功雞子黃關係此病極大中下陽虛故身熱不退血熱而心氣不降故心煩腎陽不升故不成寐熱傷血故口乾熱甚則火衰故不能飲血被熱傷不能養木木現木氣故脈弦中氣虛故脈數生雞子黃對於此病的身熱不退夜不成寐關係極大生雞子黃大溫大補脾腎之藥也此病之不寐一方面由於心火化熱不能下降一方面由於腎陽耗泄不能上升生雞子黃與黃連配合雞子黃溫升腎陽黃連清降心火心腎相交是以能寐心腎之交責在中土雞子黃溫腎陽補津液又能溫補中土中土補起熱乃能退此方之用黃連全是與雞子黃配合的關係而阿膠又能和其燥也熱在氣分氣分熱清則榮衛和而汗出病解熱在血分非養血清熱病不解也如舌色絳紅中有黃胎者是胃間兼有熱滯須於涼血養血之中加牛蒡子檳榔各五分研末重者加枳實五分研末吞服徐徐去之然後可用生雞子黃小便短者加烏梅二枚如口渴能飲能安眠者去雞子黃此則病輕單是血熱也溫病忌用燥藥升散藥發汗藥忌下忌溫補總宜養風木斂相火保肺液保中氣如有定在之熱舌上必有胎用清涼去滯清輕之品莫傷胃氣為治兩感溫病兩感者本身木氣疏泄偏勝傷及腎家藏氣腎陽外泄腎氣空虛又感時令疏泄之氣之病也此病極危險一為腎氣丸證一為大青龍湯加附子證腎氣丸證其證微惡寒微發熱全身倦怠兩足困乏神志昏迷脈象微弱散亂方用腎氣丸六錢調服惡寒發熱乃榮衛之鬱寒熱不甚而全身倦怠則榮衛之敗也兩足困乏者腎氣微少也神志昏迷脈弱而散者腎陽外散中氣無源腎陽外散則心神失根中氣無源則脈息不振也腎氣丸附子以回腎陽桂枝以回肝陽以定木氣之根地黃滋津液養風木山萸肉斂浮陽補木氣平疏泄山藥補肺金助收斂丹皮去木滯清瘀熱苓澤扶土氣也肝腎陽復心神有根中氣有源土氣健運於中榮衛升降於外故病自愈單感時氣之疏泄腎氣能自固藏病輕既感時氣之疏泄腎氣又被拔動故易致死此等病證一服辛涼汗出腹瀉即死大青龍湯加附子證此方見湖南主席何健手抄傷寒古本其證惡寒發熱身痛如被杖頭痛如斧劈口乾欲裂煩滿而渴脈時浮時沉時數時細方用大青龍加附子湯此腎陽素虧又病感寒溫病也惡寒發熱者裏氣虧乏於內榮衛鬱阻於外也身痛如被杖者腎陽不能達於外衛氣不能外發也頭痛如斧劈者腎陽離根上衛也口乾欲裂煩滿而渴者上焦津液被衛氣閉斂之熱燒灼也脈時浮時沉時數時細者下焦無陽中氣失根不能安定也方用大青龍湯麻黃桂枝各一錢杏仁二錢以開衛閉生石膏二錢以清衛氣閉於上焦之熱炙草二錢生薑一片紅棗二錢以補中氣加附片三錢以回腎陽也此證頭痛如至如劈脈又搖搖無定腎陽拔泄並於頭上其中下之虛極矣非附子炙草不能挽回根本口乾而至煩渴上焦燥熱極矣又非石膏不能回復津液身痛如杖衛氣鬱極非麻黃桂枝不能調和榮衛溫病而用麻桂其中必兼有衛閉也此病用此方非老手確有把握不可試用可用三豆各三錢加薄荷一二錢煎湯調服腎氣丸五錢以代之薄荷可代麻桂三豆可代石膏杏仁甘草紅棗腎氣丸之山藥熟地丹皮有補津液之能山茱萸附桂可回腎肝之陽茯苓澤瀉有益中土榮衛司於肝肺根於中氣而起源於腎家注重腎家以達榮衛實為此病根本治法見效而不犯險大凡外感之病脈象微弱或洪虛原因皆是內傷如浮沉細數不定則內傷至極矣不治內傷而徒治外感之藥無不耗散傷內者內益傷病益重矣脈象浮沉細數不定為用腎氣丸的根據藥店的腎氣丸內有車前牛膝過利小便不合此病須用桂附地黃丸便合即古方的腎氣丸本篇溫病方中之烏梅三豆腎氣三方皆內傷之要法皆事實上常有前人書中所無前人書中何以無內傷治法只因王叔和將內經冬傷於寒春必病溫二句經文的冬寒的寒字認為風寒的寒字謂冬日傷了寒氣登時病作為傷寒登時不病寒毒藏於肌膚來春發作化為溫毒遂認為溫病為毒氣所以用藥皆以解毒清熱為主不知溫病全由內傷也更不知春溫的溫字乃天人的生氣也知溫病為天人的生氣為病自知設法保其生自不致將人治死也冬溫溫病若發病於冬季病勢極危因溫為木氣疏泄的本氣春溫為木氣疏泄的正病冬季寒水封藏不密木氣拔根故冬溫人死最多惟烏梅白糖湯最能挽回若冬溫上熱下寒足冷如冰速服桂附地黃丸救之冬暖必起溫病鼠疫冬至前後氣候不寒而反熱發生鼠疫發熱神昏氣微心亂兼證不一此為主證鼠疫者冬溫之死證也大氣冬時主藏寒則能藏今寒反成熱已經封藏於土下水中的陽氣發泄出來陽氣拔根遂病鼠疫鼠生活於地面之際的土中今土中無陽不能生活是以鼠死人人於此時呼吸土中無陽的大氣本身下部陽氣逆騰無不頭暈身乏者本身的中氣沿能維持圓運動之常雖身乏尚不致於病倒一經感受大氣的刺激或為飲食所傷中氣的圓運動分開遂隨陽根發泄的大氣以同病陽根發泄則下部空虛陽逆於上則上部充熱陽逆下虛所以人死此時用涼藥清熱下咽即死上部雖熱中下陽虛故也惟烏梅三豆並用烏梅一兩黃豆黑豆緑豆各五錢加白糖二兩以補中氣加杏仁泥五錢以降肺氣小便不利者加紅飯豆五錢以利小便無不特效烏梅能收斂由右逆升的陽氣降回水中三豆能清上部的熱不寒中氣陽泄化熱肺氣不降故加杏仁泥以降肺氣中虛脾濕小便不利故加飯豆以利尿惟治救遲延中氣已脫者已吐血者則來不及耳未病時日日服之亦可預防此方曾於丙辰冬綏遠鼠疫經同學實地試驗功效不虛同學並有用理中湯加天花粉治效者蓋病的名目不同病的原理則同所以綏遠鼠疫猖獗之時一降大雪遂徹底消滅降雪則大氣的陽根回復下降人身的陽根亦隨之回復下降故也著者曾用西藥之稀鹽酸葡萄糖先後服下最效鹽補中氣酸能收斂上部化熱的陽氣使之下降復其本位葡萄糖大補下部腎家陽氣並補中氣也宇宙大氣的圓運動乃大氣中的陽氣降於秋藏於冬升於春盛於夏所成人身的陽氣亦降於右藏於下升於左盛於上宇宙的冬季人身的下部陽氣皆宜順藏不可逆升冬季陽升此之謂逆陽氣逆升是為拔根由右降下的陽氣乃萬物生命之根冬季的寒字即是陽氣下藏的事實不寒反熱的熱字即是陽氣逆升的事實陽氣逆升所以熱也並非熱而後陽氣逆升也大氣的中和為生物生命的元素冬季陽氣當藏而即藏即是大氣的中和此中和的力量地面之際的土中最多鼠穴地而居向來在大氣中和的中心點生活今土中的陽氣拔根中和變成毒厲鼠感受最切失其生活之常所以鼠死人之感受在鼠之後所以鼠先死人後死惟中氣充足陽不逆升的人則不死耳雖暫時不死呼吸陽氣拔根的大氣終難免死冬不寒而反熱中和變成毒厲一降大雪熱降入地陽仍歸根毒厲仍變中和此宇宙自然的療法烏梅三豆白糖稀鹽酸葡萄糖亦宇宙的自然療法降其逆助其藏而已福建鼠疫盛時飛機飛過疫地境內常常自己墮落有疫的地方大氣的圓運運動含有鼠疫的逆性故也濕溫溫病數日午後增熱頭痛胸悶舌苔潤膩而不加渴此為濕溫病難速已方用三仁湯薏苡仁三錢苦杏仁泥三錢蒄仁一枚半夏二錢生甘草一錢白糖五錢烏梅二枚溫病乃相火浮散木敗金傷中下大虛之病數日之後而成濕溫者火在土下則生氣火在土上則生濕火浮於上至於數日之久土下無火所以濕生濕生而土更敗也熱為濕氣所纏故覺熱增其增於午後者土氣動於未時金氣動於申時五行之性虛則自動土氣動則濕起金氣動則斂結熱與濕合金又斂之故熱增於午後也方用薏苡仁健土燥濕蒄仁半夏溫運中氣杏仁降肺金開斂結以降相火濕病最傷津液薏苡杏仁皆溫潤養中不傷津液之品中氣運則相火降相火降則中氣運肺金降相火更降浮散於外使人發熱的相火既已降入中土以下的水中木氣得根能行疏泄作用濕氣自消濕消熱退頭自不痛胸自不悶土下火復是以病愈溫病條辨方中惟三仁湯最妙杏仁開金氣之結以收相火功參造化之方也治濕溫不宜燥烈之品原方厚朴刪去為妥加烏梅者補木氣以利尿收相火以退熱既有甘草又加白糖加白糖為烏梅之輔也凡發熱之病愈治愈熱皆不知熱是相火不降使然相火不降又是中虛使然肆用涼藥以傷中氣故愈治愈壞虛熱之脈其象必虛得食之後其熱必減若發熱而小便不長皆可用加減三妙湯極妙小便長而多者忌用苡仁烏梅烏梅補木氣助疏泄倘小便長多而用烏梅必小便不止氣脫而死溫病的壞病病在榮衛舌無苔脈洪虛烏梅白糖湯歸回相火補益風木恢復津液疏泄滯氣補益中氣病即自愈不壞也病在榮衛舌無苔脈虛小三豆飲補益木氣養中息風病即自愈不壞也兼感寒者加薄荷以開衛閉不壞也病在氣分舌苔如粉咳嗽作渴枳銀花散清熱去滯降肺調中病即自愈不壞也病在血分舌絳脈弦身熱不退夜不能寐加減黃連阿膠雞子黃湯養血清熱補中溫腎病即自愈不壞也病在腸胃舌苔乾黃譫語日晡潮熱腹滿拒按加減黃龍湯泄熱養胃病即自愈不壞也理路分明方法各當一經誤治或汗或下或補將分明的理路混亂不清遂成壞病壞病之中先分虛實證治列下其脈虛者則熱不退而昏迷精神微弱呼吸短促其脈實者則熱不退而煩擾潮熱譫語脈轉沉細壞病大概不過如此脈實的實宇作滯字看不可作虛實的實字看無論脈虛脈案的壞病只要大便不瀉即不致死雖遲至十餘日以至二十餘日不大便亦吉如滑瀉不止便成死證因溫病乃上盛下虛之病不滑瀉者相火雖散漫於外中氣未亡圓運動的根氣尚存只要相火下降中氣復旺旋轉升降自能復圓如滑瀉不止下焦早已空虛再加滑瀉則空而又空中氣全滅圓運動的根氣全消故死也前人謂大便瀉乃熱有出路認為佳兆此濕熱病的佳兆也非溫病所宜也前人於溫病喜用下藥亦盲從王叔和伏寒變為溫毒之故切須認清不可含糊脈虛壞病無論舌上有無黃胎先以烏梅湯酸甘相得徐徐飲之自能熱退身涼微汗而解凡用烏梅楊如脈有熱兌入清茶半杯熱退之後舌上黃胎者再以大黃末一二分作三次開水吞下以清胃滯自然胎退思食調養而愈如溫病過汗熱而神昏足冷者用西瓜汁或冬瓜汁調服腎氣丸三錢或用三豆飲調服亦可清溫並用即愈脈實壞病脈既轉沉細必脈沉細有力此為津液被熱灼傷經絡燥結而煩擾不安中氣之虛極矣先用生黨參二兩生石膏三錢煎湯熱服養中生津清潤燥結必得安眠安眠之後煩擾自止然後用枳實銀菊飲原方三分之一加柴胡厚朴大黃各五分每日申酉服之以清熱去滯再用草果檳榔片各五分每日煎汁少少飲之一日二次數日後必大瀉稀水臭糞戰栗出汗而愈瀉稀水臭糞者裹氣和而積結通也汗出者裏和而後表和戰栗者榮衛失和已久復和不易也壞病愈後調養甚難多有三四月方能復元者壞病治法最宜細心最宜靜耐因良醫治病多係接手壞病之故日久不大便者必自己欲大便方是大便之時自己不欲大便切不可妄用下大便之藥以奪中氣以傷腸胃津液自已欲大便大便不下乃肛門乾燥注射當歸水潤之或服當歸一錢大便即下如仍不得大便是肛門之間有燥糞數枚因津液缺乏不能送出非內服潤藥所能送下須用手術取出肚門燥屎余屎自下烏梅湯治脈虛壞病養津液收相火復中氣服湯得微汗內外調榮衛和也西瓜汁腎氣丸治脈虛壞病生上焦津液以清肺熱復下焦元氣以生中氣也枳實銀菊散治脈實壞病通滯氣以調升降清積熱以復津液升降與津液俱復中氣旋轉腸胃活動於內榮衛調和於外也原理甚簡不過一面服藥一面靜候自己的圓運動回復耳切不可求速而進重劑以致禍溫病係陰虛亦係陽虛人身收斂之氣能生津液陰氣也疏泄之氣最動相火陽氣也溫病之理疏泄太過收斂不足本是陰虛但陽氣疏泄於外化作邪熱裏陽愈少故係陰虛亦係陽虛仲景於溫病戒汗下者因溫病是虛證當保養陰液尤當保護陽根也有人問曰溫病既是陽虛何不用熱藥以補陽不知溫病之陽虛乃水中相火浮於水外也相火浮於水外乃木氣疏泄肺金不收養木氣平疏泄以收肺金只要肺金能收浮出水外之相火自然歸回於水內此溫病補陽之法也傷寒發熱由於膽經不降溫病發熱不止由於膽經不降且由於腎水不藏溫病若用熱藥補陽必定增加灼肺之熱並且煎枯腎氣之水肺腎之陰再傷豈不陰絶而死肺腎之陰再傷不能收藏相火相火全出外熱更加豈不陽亡而死收降相火歸於腎水此種補陽之法內傷病中用處甚多養陰液保陽根必先保中氣溫病的病源全是疏泄偏勝收斂不足疏泄偏勝最傷陰液最泄陽根蓋能收斂則氣降而液生能收斂陽根乃能下藏能收斂然後疏泄可不偏勝收斂之氣肺金主之脾胃為肺之母脾胃足肺金之收斂方足中氣在脾胃之間故治溫病之要在養陰液保陽根尤要在保中氣必津虧熱起燒著肺家始可用清涼之品以泄熱保肺必津虧絡澀氣機阻塞始可兼用去滯之品以活絡清氣必津虧熱盛傷及血分始可兼用涼血之品以養血必津虧熱盛熱積胃家始可稍用寒下之品以清胃內經曰溫病虛甚者死因不能用補藥之故也雖不能用補藥然相火下降熱回下焦津液續生藏住相火津液生而相火藏中氣自然回復即是天然補藥所以大散大寒固是錯誤大補亦非所宜補則氣機益滯中氣益難同復也溫病脈是虛象體壯的人得了溫病熱盛脈實一經清解便無余事然體壯之人得溫病者少體壯則中氣足榮衛平收斂常旺疏泄不至偏勝相火不至外泄故少得溫病即得溫病安臥片刻中氣旋轉榮衛復和自然汗解不成病也惟體虛的人中氣不足疏泄易於偏勝易得溫病其脈模糊躁急皆是陽根不固陰液虧傷木火外發金水內竭中氣不守故難經曰溫病之脈不知何經之動也亦有熱深脈伏疾數不明服清涼之藥熱退脈顯者乃是實脈溫病忌發汗何以溫病非得汗不解發汗二字誤卻醫家不少須知仲景傷寒論之麻黃桂枝湯皆發汗之方其中自有得汗之理並非麻黃湯桂枝湯將人身的汗提而出之也緣人身陰陽之氣和合則治分離則病既分離又復和合則汗出也人身氣降化水水升化氣臟腑榮衛之氣升降調和氣化水而不滯水化氣而不停一病外感臟腑之氣鬱於內榮衛之氣鬱於外氣水化生之間即停滯不通汗即停滯的水氣此為作汗之原素一也榮衛分離而又復合陰陽交通卻生津液一如夏日酷熱一旦天氣下降地氣上升陰陽氣通而降雨澤此為作汗之原素又一也具此兩種原素所以榮衛一和自然汗出而病解經方發汗實際上乃調和榮衛也此理自古至今未明於世何發之有傷寒陽明腑病忌發汗服承氣湯得大便後病人安臥而通身得微汗而病解三陰臟病忌發汗服四逆湯後亦通身微汗而病解並非承氣湯四逆湯發汗亦臟腑榮衛之氣復和之故溫病忌發汗亦與桂枝楊證忌用麻黃之理同溫病之得汗而解亦與桂技揚證用芍藥斂榮氣以與衛氣平自然得汗而解之理同不過不可用桂枝生薑大棗炙草熱性橫性之藥耳溫病出疹之關係溫病得汗而愈便不出疹不得汗則木火內鬱而出疹出疹有吉有凶由於陰液續生而血熱外達所出之疹與出汗同吉疹也疹出則病愈由於陰液內竭熱灼血乾所出之疹凶疹也疹出則病加吉疹色紅而正凶疹色赤而黑但色黑固然是凶色紅亦有凶者中氣將脫表裏分離榮衛無歸則疹出而紅疹雖已出人亦不活此色紅未可為吉也疹出而黑陰氣已絶故凶然熱極亡陰陰氣但能續復外出之疹雖黑內竭之陰已生仍可轉凶為吉其實診斷溫病之吉凶全不在出疹之關係全在腹瀉不腹瀉胸緊不胸緊如腹瀉胸緊便伏死機緣人身之氣陽位在上而根於下陰位在下而根於上腹瀉不減則陽根亡於下胸緊不減則陰根亡於上是以人死世人謂疹不出則溫邪之毒必攻心而死盡都認為溫病是外來溫邪入了人身作病與認為寒氣變溫藏於肌膚至春始發之故溫病原理非明瞭造化的圓運動不能知道又何怪乎溫病出疹乃溫病結果上的事其原因並不在於疹葉天士治溫病謂宜速速透斑透疹亦認為外來溫邪入了人身為病要趕緊把外來之邪透出耳不然則亦認為溫是內伏著去年的寒毒伏毒二字王叔和之遺禍也王叔和是搜集仲聖傷寒雜病論原文的功臣他於醫理完全是門外漢溫病汗下之過溫病全由疏泄偏勝陰液耗傷相火外泄陽根微少中氣薄弱之故如再用燥烈開泄之藥發汗而助疏泄相火益泄陰液益耗陽根益微中氣益虛是以登時病重或至於死此汗之過也寒下之藥性往下行亦能減少疏泄之氣然寒下傷中多有下後病加重者亦有下利不止以至於死者不過不似汗之登時奇變耳溫病大便瀉下前人認為熱有出路然脈虛忌瀉根本大防豈可忽諸溫病與燥病之分別溫病發熱神志昏迷脈來虛散模糊躁急向外疏泄燥病發熱神志不昏脈來弦聚不躁急模糊向內收斂溫病條辨之銀翹散一方連翹桔梗竹葉牛蒡薄荷皆疏散而大破肺氣之藥桑菊飲一方較銀翹散不大傷肺但桑葉破肺之力亦不小此二方乃肺金燥結內斂生熱之方溫病乃木火外泄肺金虛散之病如當服本篇烏梅湯三豆湯之溫病虛症服之無不熱加病重腹瀉而死者燥氣為病由外向內是實的溫氣為病由內向外是虛的實者熱實肺氣實也虛者肺氣虛木火虛中氣虛虛而用銀翹散與桑葉石膏肺氣再傷至死不知其所以然傷寒論風溫病發黃驚癇失溲直視身重息鼾語言難出無一不是肺氣傷極之壞證溫病條辨開首二方即大傷肺氣可怕北方少燥氣病金氣涼降能徹底也西南方多燥氣病金氣涼降不能徹底也北方秋涼之後愈降愈深由涼而寒由寒而冰相火之氣既收於土下即藏於水中來春開凍相火出土萬物發生不出奇病西南方秋涼之後忽又大熱已經收降入土中之相火又復逆升於土面降而復升涼而復熱涼降入土的金氣被逆升出土的火氣拒格不下遂裹速火氣而燥結於中氣之際燥病之脈不浮不沉弦結於中其故在此金氣燥結升降不通病症發作有不可以常理論者世乃稱為秋溫燥病肺氣實溫病肺氣虛金氣之病命木氣負責虛實相反所以銀翹散桑菊散治秋燥見功治春溫見過也西南方四季皆有燥病故銀翹散桑菊散四季皆宜然一遇溫而不燥之病亦復用之死矣吳鞠通的溫病條辨應改稱燥病條辨速當為束之誤溫病誤用石膏必死石膏陽明燥金之潤燥開結之藥極寒相火極敗中氣故傷寒論白虎湯用石膏必曰外無大熱石膏本以清熱既無大熱何必用之不知石膏清熱乃清內熱內果熱矣外即無大熱因人身火氣內藏病則內熱內熱則外寒火氣外散病則外熱外熱則內寒內寒則禁用石膏仲聖怕人不知此點故於用石膏之條文一則曰外無大熱者再則曰口渴心煩背微惡寒者無少陰證者外無大熱的大字因胃實的熱證內外皆熱故外無大熱外熱如大即相火外泄的多內必寒也口渴則燥熱傷津也背微惡寒者背乃胸之部燥熱灼傷胸部津液熱盛在胸則背部之陰不能交於胸中之陽故背惡寒凡熱證之惡寒皆熱盛於內陰為陽拒不能相交陰現本氣之故無少陰證無少陰內寒證也傷寒陽明燥金一氣獨勝既燥且結傷耗肺液胃液為唯一燥證故用石膏清燥開結溫病虛證外熱內虛石膏敗火寒中溫病服之無不一瀉而死石膏治燥病之實者即傷寒陽明白虎證是也溫病由內疏泄外出燥病由外收斂內入出外則虛入內則實病源各異豈可忽諸本篇枳實銀菊證之口渴可用石膏然究非陽明實證而是相火燒灼肺液之虛證用麥冬等清熱較為穩妥麥冬與石膏同性而寒中之力較輕內經經文讀法內經曰春傷於風夏必飱泄夏傷於暑秋必痎瘧秋傷於濕冬必咳嗽冬傷於寒春必病溫自王叔和編次仲景傷寒論原文自己加上傷寒例曰中而即病為傷寒不即病者寒毒藏於肌膚至春變為溫病至夏變為暑病於是後世遂謂冬日受有寒氣藏在人身至春變成溫病春日受了風氣藏在人身至春變成飧泄夏日受了暑氣藏在人身至秋變成病瘧秋日受了濕氣藏在人身至冬變成咳嗽果然如此試問如何用藥治夏日飧泄豈不要用散風的藥乎治秋日瘧病豈不要用清暑的藥乎治冬日咳病豈不要用去濕的藥乎洽春日溫病豈不要用搜寒追毒的藥乎如此用藥必定要將病治重的世人治溫病喜用大清大下之劑者其根據即在叔和冬日寒毒藏於肌膚至春變為溫病一語而且因此根據並認內經春傷於風夏生飱泄云云實係風藏在人身至夏變為飱泄云云了學中醫者容易學錯此其大概也如要學不錯必須將大氣升浮降沉中的圓運動按著春夏秋冬五行六氣的原理整個的實地體驗明白自然瞭解內經文義之所在蓋風者春木疏泄之氣也平人大便不病飱泄全在小便清通小便清通全在木氣疏泄春日損傷了風木之氣當春之時風木當令雖或被傷仍能疏泄小便清通故不病飧泄到了夏令風木氣退無力疏泄水分水分混入大腸故飱泄也所以治之之法必用疏泄助木氣之藥暑者夏火燔灼之氣也平人汗孔開通榮衛無阻不病痎瘧汗孔開通全在火氣充足夏日傷損了火氣汗孔不開當夏之時火氣雖傷汗孔雖閉大氣尚未收斂故不病瘧到了秋令火氣已退汗孔不開秋金收斂將榮衛之間所停積的污垢斂於血管之中阻礙榮衛的運行遂成瘧病瘧病的寒熱往來即榮衛阻而復通通而復阻之故也所以治之之法必用開通肺金之藥濕者土氣運化之津液也平人肺家滋潤收斂下行氣道流通不病咳嗽秋日燥金司令濕氣全收秋時傷損了濕土的津液當秋之時燥氣雖然司令白露尚未成霜肺家津液尚未枯澀肺氣下行尚能通利到了冬令陽熱歸下萬物堅實肺家津液枯澀氣降不下陽熱逆衝故病咳嗽所以治之之法必用潤脾肺助津液之藥寒者冬水封藏之氣也平人水氣能藏陽根不泄養成木氣交春陽和上升化生心火煦和暢遂不病溫也陽根者藏則為生氣不藏則化邪熱冬日傷損了水的藏氣陽根外泄化熱泄之盛者在本冬即病冬溫泄之不盛者冬時木氣未動尚未發生疏泄作用一交春令木氣疏泄將木氣本已根氣搖泄而起木氣失根故病溫病溫病都是虛證原因即在於此所以治之之法必用培養木氣之藥遂疑應為達所以內經又曰冬不藏精春必溫病凡冬時咳嗽不寐出汗勞心多欲等事皆不藏精的事人在冬令如能藏精交春令後本身的木氣根本深穩不隨時令疏泄之氣搖動起來方不病溫也叔和搜集傷寒論原文厥功大矣妄加序例其罪不小況且內經有云風寒傷人使人毫毛畢直如何能藏在人身安然無事等到來春才發作乎毒字一層惟多日陽氣甫藏即泄動出來明年歲氣根本動搖大反造化的常規這才是毒氣所以冬溫之病人死甚速且多地下無陽成了毒氣鼠先感受故鼠先死才是毒氣也內經又曰病傷寒而成溫者先夏至日為病溫後夏至日為病暑人又抓住此條認為是王叔和伏寒變溫病的鐵證其實不然也難經曰傷寒有五一曰中風二曰傷寒三曰濕溫四曰熱病五曰溫病這二曰傷寒的傷寒二字才是麻黃湯證的傷寒傷寒有五的傷寒二字乃外感的通稱內經病傷寒而成溫的傷寒二字就是同難經傷寒有五的傷寒二字是一樣意義言先夏至日病外感謂之病溫後夏至日病外感謂之病暑並非冬日病麻黃湯證的傷寒冬日不發作到夏至前變成溫到夏至後變成暑也至於溫病舌絳熱深乃本已肝腎先熱又病溫病故熱較深謂為本身伏熱則可耳經文的讀法應當如此便合圓運動的原理將冬傷於寒的寒字認定是藏字便合圓運動的原理益寒益藏乃造化自然之事也合圓運動云者合宇宙造化也喻嘉言謂內經春傷於風夏傷於暑秋傷於濕冬傷於寒獨無傷於燥之條為內經遺漏殊不知風為木氣暑乃火氣濕乃土氣寒乃水氣若是傷了都要出病性獨燥氣傷些才好因造化的圓運動春升夏浮秋降冬沉春生夏長秋收冬藏春溫夏熱秋涼冬寒秋金收降以其涼也涼則收過於燥則不收涼則降過於燥則不降惟能將燥氣損傷些秋金涼降無阻相火收於土下藏於水中四序安寧大氣的運動乃圓物體的生活乃康也傷些才好云者言秋冬萬物堅實乃金燥之功過燥則病耳傷寒論的溫病經文解釋傷寒論云太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘈瘲若火熏之一逆尚引日再逆促命期發汗已身灼熱者名曰風溫言溫病乃木氣疏泄津液已傷之病不可發汗只可平榮氣斂疏泄養津液顧中氣為治若誤發汗津液更傷疏泄更甚身熱必加至於灼手名曰風溫者溫乃木氣疏泄之病風乃木氣疏泄之氣言溫病發汗疏泄又疏泄也此風字並非外來之風就是疏泄之氣葉天士主張辛涼散風葉之誤也故其脈陰陽俱浮陽脈在上浮亦常情陰脈在下理應沉藏今陰脈亦浮而不藏可見疏泄而又疏泄之至故曰風溫自汗出身重多眠睡鼻息必鼾語言難出諸證皆風木在上疏泄傷液上焦無液氣機枯澀之象若再被下則下焦津液亦傷木氣枯竭則小便不利直視下焦相火空虛水氣離火則失溲木枯被火則發黃驚癇瘈瘲經文應當如此解釋便合原理如將風字認為是大氣的風寒的風試問未發汗以前又名甚麼溫呢如傷寒論有云汗出譫語者胃中有燥屎此為風也當下之過經可下之云云當下之下燥屎非下外來之風寒的風也汗出譫語言風木疏泄則汗出汗出傷津則胃中乾燥而譫語非言外來風寒的風也此風字即風溫的風字柯韻伯注傷寒論謂傷寒六經太陽陽明少陽太陰少陰五經是傷寒厥陰一經是溫病因厥陰一經有渴之一證也不知厥陰主方為烏梅丸方內乾薑附子桂枝川椒大隊熱藥豈有溫病用熱藥者柯氏又曰厥陰為闔夫厥陰風木之氣當春初之時此時土下水中封藏的陽氣疏泄出土造化之機靜極而動闔極而開何得謂厥陰為闔乎溫病為木氣的闔病抑係木氣的開病顯而易見淺而易知柯氏乃曰傷寒厥陰經是溫病又曰厥陰為闔後之學者喜讀來蘇集謂其書筆墨甚好筆墨愈好學理愈非如此之顯誤人多矣柯氏者被內經所誤不自知也溫熱經緯與溫病條辨的讀法溫熱經緯一書王孟英將葉天士陳平伯的論説詳細集載其經驗之深用藥之慎論列之詳可師可法吾人根據圓運動的天人一氣去研究王先生的論説便可得到應用之妙葉謂戰汗透邪法宜益胃胃氣空虛當膚冷一晝夜又謂清涼只可用到十分之六七以顧陽氣以顧津液又謂救陰猶易通陽最難又謂舌黃而渴須有底之黃或老黃色中有斷紋當下卻不用承氣湯而用檳榔青皮枳實際引數明粉生首烏等又謂淡紅無色或舌乾而不榮當是胃無化液宜用炙甘草湯不可用寒涼藥葉由經驗得來的好處亦謂溫病是虛病葉知溫病為虛證盡從經驗得來不知溫病何以虛不知天人一氣的圓運動故也所以葉又曰辛涼散風是仍認為溫病為外來的風夾溫氣而入人身為病也又曰溫病首先犯肺亦是認為外來溫氣犯肺也於人身木火疏泄金水收斂疏泄偏勝收斂必傷不知根據遂將人身自己病溫感觸大氣因而病作的要義全行抹煞後人讀其書亦遂認為時令溫邪由口鼻直入中道作病其流弊遂成了寒涼解毒的相習辦法脈虛氣弱之人一服藥後即入危險及至傷中熱更大加醫家以為病重藥輕將寒涼之藥加倍用之熱加病重腹瀉不已而死服涼藥後熱加病重因涼藥傷中下焦相火完全上逆乃謂黃連之性苦從熱化所以益用黃連益見發熱此等錯誤皆不知原理之故陳平伯謂冬傷於寒春必病溫是傷著冬令封藏的藏氣非傷著冬月風寒之寒已免蹈根本上的不是然又謂冬能藏精我身真氣內外彌給不隨升泄之令而告潰徒有客邪焉能內侵陳氏仍認溫是外來客邪並不知是本人木氣偏動金氣不收相火外泄化熱是陳氏已免蹈根本上的不是仍得不著根本上的是陳氏謂冬傷於寒非風寒之寒乃寒藏之寒見溫熱贅言溫熱經緯乃王孟英所編王亦王叔和寒毒變溫之信徒可惜哉溫熱經緯經列經文緯列葉陳的論説吾人學之只可就其病證藥性以求原理不可以所引經文為根據因王孟英先生信王叔和冬寒變溫甚篤所引經文多半強拉硬扯而來非於圓運動原理確有把握醫治溫病已有經驗後不易判斷其所引經文之合否王孟英潛齋醫書五種內有先生養陰清熱醫案用藥輕靈經驗宏畣吾人就其病狀據其藥性歸納於圓運動之中自能得到靈妙之境而可救學經方偏於溫補之弊溫病條辨一書為學治溫病人人必讀之本其指駁吳又可用達原飲三消飲峻利傷人之處甚知溫病屬虛有益後學令人敬佩惟於溫病原則上乃謂風寒傷人由皮毛而入溫病傷人由口鼻而入始入上焦繼入中焦再入下焦將整個圓運動的人身個體分成三截使學者入門便錯原則既錯全盤皆亂又捏造傷寒論經文曰不惡寒而渴者為溫病桂枝湯主之桂枝湯主之一語使學者認為古訓殺人甚多其用意在欲人先用桂枝湯見過之後再用銀翹散以眩其功也不知銀翹散溫病無效燥病乃效也至於溫熱傷肺而曰太陰病溫溫熱入胃而曰陽明病溫名實不符不可為訓太陰為濕土陽明為燥金傷寒論之稱太陰病太陰病濕寒也稱陽明病陽明病燥熱也溫病木火疏泄傷肺肺熱而已何可直曰太陰溫熱入胃胃熱而已何可直曰陽明仿傷寒之例以立溫病之言吳鞠通之罪也又溫病無用燥熱藥之陰寒證溫病條辨之溫補各方不應列入以免學者誤會王孟英之溫熱經緯吳鞠通之溫病條辨皆學溫熱應當研究之書根據原理以變通之獲益必多也自來對於溫病原理守兩大法門一為伏邪一為新感伏邪者伏去年冬時之寒新感者感今年空氣之溫於人身本氣自病的原理全不知道本篇處處是人身本氣自病事實上原來如此並非故意矯為高論民國八年太原閻百川先生以山西人民病溫病服銀翹散必加病且有服至三劑而死者以為溫病條辨乃中醫治溫病無不遵守之本銀翹散為溫病條辨第一方而不見效如此乃聘請各省大醫赴晉開辦中醫改進研究會二十年之久結果不得辦法會址改為西醫學校而罷溫病乃木氣疏泄之病由內而外的燥病為金氣斂結之病是由外而內的銀翹散乃金氣結聚之方皆大開肺氣斂結之藥疏泄之病忌之木病疏泄其脈虛散金病斂結其脈弦聚時病之宜於銀翹散者皆弦聚之脈斂結之病脈氣虛散病氣疏泄之溫病而服疏泄之銀翹散名稱與事實分別不清宜其研究不得結果而將中醫研究會改為西醫學校也烏梅白糖湯治愈溫病發熱十五案山西冀寧道署教育科高科長病溫病半月潮熱神昏日夜譫語口臭舌胎黃黑乾燥渴而腹滿不痛不拒按十日不大便身臥不自轉側病勢頗危脈沉而弱豫曰胃家津液已竭用烏梅十枚白糖二兩服後安臥一夜次早大便下半乾屎少許熱退進食而愈前言舌有苔忌服烏梅者胃熱初起不宜烏梅收斂也此病舌胎黃黑而乾又病潮熱腹滿十日不大便而用烏梅者此時之胃熱全因胃液乾枯故重用烏梅以生胃液而和木氣胃液生木氣和則運動復而諸病愈也山西陽曲縣何科長春間病外感滿身疼痛惡寒發熱神識昏迷脈象洪數重按模糊豫曰發熱昏迷脈象模糊此溫病也用烏梅白糖酸甘相得溫服一大碗汗出而愈何君曰去年亦病此病兩月乃愈云太原興榮錢局學徒某病溫病經醫先汗後下又補大熱不退牙齦皆血數日不眠小便短極而赤喘息搖肩時時譫語脈小而數豫以烏梅四枚白糖二兩濃煎盡劑是夜汗出安臥喘平天明尿利熱退索粥醫笑曰溫病用烏梅豈不將溫氣斂住燒心爛肺而死此之得愈乃萬幸云太原電報局呂君病溫病經醫用麥冬石膏等藥熱不退病反重十日神短氣微脈亦微少舌有乾黃胎不大便已十日豫曰不大便十日此病可治如大便滑瀉便難治矣用烏梅四枚白糖二兩徐徐服下滿身微汗次日熱退神清胸微脹痛不思食用大黃末一分分三次噙咽舌胎黃退能食稀粥調理半月而愈太原電報局局長陳晴波兒女數人每患溫疹皆服烏梅白糖烏梅冰糖而愈山西聞喜縣王氏子病溫病大燒熱用酸菜湯加鹽少許以代烏梅湯溫服汗出而愈北平孫姓子病疹醫進表散寒涼藥燒熱大加病熱極重就豫診治處以烏梅白糖方不敢用入西醫院診治醫用稀鹽酸服後安眠微汗熱退而愈北平治案甚多與山西治案大略相同昆明劉澄志同學糼女並王姓子病猩紅熱發熱昏倦面色汙紅小便不利大便時時欲行不得咳嗽服烏梅二大枚白糖一兩二便通利熱退而愈木氣敗則二便不能疏泄烏梅大補木氣助疏泄也昆明何姓子發熱倦怠面色青黃服烏梅二大枚白糖一兩汗出熱退而愈南寧朱姓子夏月頭生疙瘩色紅纍纍大如荸薺服烏梅白糖黑豆而愈亦平疏泄養木氣之效也南寧何姓婦有孕五月當夏季極熱之時嘔吐不止飲食不進多日身軟不能起動百治無效服烏梅四枚冰糖二兩嘔吐頓止遂進飲食此案非溫病因夏月極熱之時熱乃木氣疏泄之氣熱極則木氣疏泄失根有升無降故嘔吐百治無效烏梅平疏泄補木氣養中氣木氣得根乙木升而甲木降故嘔吐愈嘔吐者膽經不降胃經亦逆也南京清涼山一歲半小孩發熱口渴喜飲飲後仍吐大便亦瀉水小便全無醫以五苓散為治不效豫用烏梅二大枚冰糖五錢煮至極爛取湯頻頻進之不吐忽然小便通暢熱退瀉止烏梅酸收止吐宜矣小便得利者木氣復其疏泄之能也凡夏日小便不利皆木氣退化不能疏泄之過烏梅補木氣助疏泄故服後小便利木氣衰則不能疏泄或妄疏泄烏梅補起木氣疏泄復其正常故烏梅能平木氣之疏泄又能助木氣的疏泄南京燕子磯高星垣同學之戚某君病外感發熱服麥冬石膏等藥熱反加輾轉更醫不外苦寒之劑病更重熱更增有名醫王用竹葉石膏湯甚堅高某曰熱大而舌無胎此正彭先生所謂烏梅湯證非用烏梅收回相火不可乃用烏梅二大枚冰糖二兩煮爛溫服服後安臥熱睡兩小時熱退病愈思食行動照常前後如兩人高某為中央國醫館特別研究班學員蓋學圓運動學而能明瞭原理者乃遍告同學認為此病的效乃烏梅能收相火解溫熱之證於是同學乃有敢用烏梅退熱者特別研究班同學皆多年醫家皆為新感伏邪之説所深錮者新感二字的意義蓋謂今年所感受時令的溫氣既由口鼻而入腹內應該用藥散之清之升之伏氣二字的意義蓋謂今年去年冬令感受的寒氣伏藏人身交春變為溫毒更應該用藥散之清之升也原理錯誤相習不察盲從日久認為當然所以一開烏梅湯皆驚曰將溫氣斂住必燒心爛肺死也成都國醫專校同學龐存厚其弟夏日發熱不退精神不支服藥不效用烏梅白糖湯熱退而安又同學張文煥治一婦科七十餘歲夏日發熱氣短用烏梅白糖三豆飲同煎服後滿身出疹熱退而安上列數案外烏梅白糖湯治愈之溫疹發熱太多載不勝載本氣自病四字醫家應當徹底研究常謂欲學中醫先要養成能自別醫書是非的眼力方可讀醫書方不為前人所誤於此可見學溫病須先學傷寒傷寒病表裏分清病傷寒者裏氣不動必榮衛表病不得汗解裏氣乃動陰臟之氣動則病寒而用附子陽腑之氣動則病熱而用大黃榮衛表病則用桂枝湯麻黃湯以發汗理路分明易得辦法溫病表裏不分榮衛未病裏氣先病裏氣不分腑臟只分氣血皆熱不寒皆虛不實榮衛不可發汗此其難治者一也何以榮衛未病裏氣先病只因溫病之起起於本身疏泄偏盛收斂偏衰相火不藏中氣不足不感時氣之疏泄已有病了一感時令疏泄之氣遂病起來此其難消者二也有此二點故下藥甚難然按病在榮衛病在氣分病在血分病在腸胃的界限去用心認定自己總能想出辦法內傷外感臨證多後方知此篇編法之妙以上十五條病狀不同皆服烏梅白糖而愈豫常用烏梅白糖黃豆黑豆治愈風溫各證亦由原則以求病理由病理以立藥方之意也兒病本氣篇兒病本氣篇導言中醫書之錯誤最大殺人最多甘心相沿不求改錯莫如小兒方書亦因其不知小兒本氣自病之故耳其言曰小兒是純陽體出疹是胃熱出痘是胎毒將小兒脆弱之軀認為純陽胃熱胎毒於是肆用苦寒克伐之藥以治小兒之病按全國估計每年小兒麻疹之死於升麻葛根芍藥犀角黃連等藥者已不止數千萬之數此篇根據小兒身體本氣自病的原理選用功效可靠之方以二十年中同學二千人的經驗得到圓滿之結果純陽胃熱胎毒等邪説可以息矣著者識發熱小兒手心熱或頭身熱脈輕按多重按少重按比輕按無力即是中氣虛相火不降切忌寒涼藥發散消導藥誤用即成大病善養中氣即妥脈輕按少重按多重按無力亦屬中虛手厥陰心包經相火行手心人身氣化中氣如軸經氣如輪中虛而膽經相火不降故頭身熱中虛而手厥陰心包經相火不降故手心熱如手心熱頭身熱而脈重按比輕按有力便是內熱停食中虛相火不降冰糖白糖水或黃豆數十粒補中即效不可用炙草大棗橫滯之品火逆不清火只須補中膽經心包經下降熱自退去停食者淡豆豉數十粒以消食舌有黃胎口氣臭者停食較重淡豆豉加重用之不可用檳榔山楂等力大之品致傷脾胃外感發熱麻疹發熱詳下文上節為小兒脈法的提綱用藥的提綱中虛為脈法的提綱用平和之藥為用藥的提綱也小兒脈數即是中虛大小便病小兒小便忽然短少即係脾土濕中氣虛須燥濕補土補中山藥扁豆最好不可重用白朮橫烈之品因小兒經脈脆薄不能任橫烈之藥山藥又能補肺金以收水氣故為小兒燥濕補土補中妙品小兒小便短少如誤服發散消食敗火之藥即出大禍若尿少又發熱其禍更大凡治小兒百病總要先問小便長短若小便短少大便即瀉便成危險之候無論何病小便短大便瀉而發熱是為脾虛用山藥扁豆各一二錢以補中補土利尿燥濕瀉止尿利發熱自退如時行溫燥病起之時加黃豆二三十粒以清溫燥便妥倘小便短少大便又瀉發熱昏迷誤服散藥涼藥無不熱加瀉加風動而死因根本已虛又遭攻伐則根本壞也凡小兒病無不由根本虛者根本不虛雖時行病起亦不病也尿少便瀉發熱雖咳嗽不可加降肺藥尿少便瀉為中下虛陷降肺則中下更虛更陷倘因而加喘則下陷又加上逆中敗而亡只須熱退瀉止咳即自愈服山藥扁豆之脈必浮虛也如脈沉實便非虛證黃豆亦不可服脈實發熱必有停食內熱小兒大便緑色一日數次日久不愈即土敗風起風者肝木之病氣也肉桂阿膠即效或白朮阿膠亦妥有阿膠則白朮可用如無他病而大便緑色必大人乳汁不佳換食罐頭牛奶或麥粉或大米粉煮稀糊食之一二日大便即黃大便緑色者山根如現青色一麵食牛奶麵糊一麵食生阿膠一錢自愈青乃木氣失養之象阿膠善於養木大便緑色者雖應服薑附之寒證亦可加入阿膠鼻梁青色亦然小便短忌阿膠小兒大便緑色之病亦有用天花粉一錢生甘草薄荷五分而愈者此肺金熱者而肝木失養也花粉最清肺熱薄荷降肺甘草養中培土故愈鼻梁色青者多有此證熱證脈必沉而不虛寒證則中沉必較微也炒熟糯米粉或糯米稀粥亦效糯米補肺陰以平熱也比食藥穩妥小兒半夜大便最泄元氣此陰液不足不能滋養肝木半夜陽動木氣疏泄宜鴨蛋調勻蒸熟拌飯自愈鴨蛋養陰諸藥不及而無大弊多調尤佳凡六脈或沉或細而現陰虛諸病皆宜小兒的藥用錯即出禍事故鴨蛋山藥扁豆黃豆白糖淡豆豉皆是小兒至寶初學治小兒病用食物不用藥治效之後再學用藥便知用藥之危險小兒病理簡單都是藥治壞的最可惡的是認小兒是純陽體有胎毒肆用一派苦寒傷火消散傷氣的藥將小兒治成死證小兒乃稚陽體也中和之至然後成胎也小兒小便短赤非熱清長非寒尤須徹底認識短者中虛土濕木氣下陷不能疏泄故短赤者中虛土濕木火下陷故赤木火下陷中氣遂寒運動停滯上焦相火降不下來燒熱發作便成大禍世人一見尿赤便用涼藥清火誤事多矣非特小兒為然大人亦是此理其小便清長非寒者裏熱實土氣燥木氣疏泄故小便長木火不陷故小便清清潤之藥甚合機宜亦小兒大人之所同如小便清而多多食豬肝以潤補肝木肝木補足疏泄不偏小便自減或阿膠白朮土木雙補即效惟濕熱病小便短赤為熱然乃虛熱非實熱傷寒小便清為病在表小便赤為病在裏赤亦虛熱少陰寒病小便極短而清如水乃為下焦無火此病極少小便赤為實熱者必有實熱之外證如燒熱不退舌有乾黃苔口臭便祕脈沉實有力也小便不長不短微帶茶色此為身體強足之象大人亦如此至於大小便欲解即下全忍不住便是木熱中虛養中氣清木熱即愈誤認為虛寒而溫補之病必重也大便瀉下不知小便自下不覺皆中虛木熱大人亦如此小兒腹瀉有停食者有熱瀉者有脾虛者停食者糞白夾水瀉而有屁熱瀉者瀉出金黃亦有屁亦夾水停食與熱瀉瀉後神氣照常屁有短時亦有長時停食水瀉先用淡豆豉五十粒濃煎豫服如不見效再用平胃散加減蒼朮厚朴梔仁神麯麥芽生甘草白芍當歸各三分煎服小便一利水瀉即止切莫再服停食水瀉水入腸胃食滯不消蒼朮厚朴最能溫胃消滯性燥力猛水瀉特效之藥惟水瀉最傷津液蒼朮厚朴又燥烈傷津最燥木氣故加當歸白芍以養津養木水瀉則木鬱生熱熱則氣動作瀉故加梔仁以清熱瀉由停食故加麥芽神麯以消食也如只用平胃散不加當芍以養津液不加梔仁以清熱多有服後肺肝的陰液傷耗而不能食者應特別注意水瀉如連瀉不止腹響腸鳴必係停食檳榔五分烏梅一枚消食達木即愈脾虛之瀉腹不響腸不鳴稀糞無水其色灰黑一滑即下不似水瀉之射遠有屁瀉後倦怠神萎面黃不速止住其死甚速用山藥扁豆各二錢白朮五分乾薑三分炙甘草三分小便一利瀉即止住熱瀉者單用梔仁數分至一錢一服即止梔仁清熱最平穩緑豆湯亦效最好食欲精神照常射遠有聲熱瀉也如瀉稀糞夾水糞帶緑色此為肝寒宜肉桂五分阿膠二錢以溫木氣止疏泄即愈凡瀉服阿膠而愈者小便必不短也如脾虛之瀉而又兼吐原食不化中氣易亡最為危險又非山藥扁豆所能挽回土氣須用理中丸一二錢煎湯分二服乃能挽回脾虛腹瀉不可橫加溫補如可不用乾薑不用為妥小兒一吐土氣即敗為小兒病特別重要之點如所吐並非原食而是酸臭精神不憊此為停食平胃散加減食消即效切不可補單用淡豆豉五十粒濃煎多服亦效小兒病藥少之方為妥小兒停食不瀉者日久必腹脹乾燒用神麯麥芽各五分以消食當歸芍藥各五分以潤血白糖五錢以養中血潤食消則經脈通而燒熱止不可用攻破藥如日久積深非下不可者腹必脹滿按之覺痛只宜大黃三分附片一分溫下之宜緩宜妥或用溫病篇之加減黃龍湯少少服之自愈用食物燒焦以消食世稱糊藥植物燒焦者最傷脾胃不用為好宜用紅白糖以建中氣使中氣旋轉脾胃自然運化脾胃運化食物自消或用扁豆一錢藿香五分以養胃降胃亦效如其噯酸是食停不化胃逆生熱可用白糖三錢普通茶葉五分泡服即愈茶葉清熱卻不敗火茶與糖同用亦能運動胃氣以消化停食小兒脾胃萬不可傷由茶葉白糖之原則推之可見小兒病不宜多用力量大之藥也山楂等藥傷胃如可不用不用為妥參看時病篇水瀉凡大便稀溏最後有條糞先稀溏者熱滯也先條糞而最後稀溏者脾土虛寒也大人亦同最後稀溏宜補脾土誤服涼藥消藥必生危險小兒大便結燥菠菜或青菜或紅薯黑豆煎濃湯服以潤之萆麻油生蜂蜜均敗胃忌服瀉而腹痛瀉後痛減為停食瀉後仍痛為脾虛瀉後腹痛應服白朮三錢白芍三分橘皮三分煎服補土舒木為治腹痛小兒腹痛有食痛蟲痛寒痛三種停食腹痛必口有酸臭之味或發熱或不發熱不發熱者淡豆豉三五十粒濃煎服以消食發熱者加白糖以養中氣蟲痛者能食而面黃肌瘦忽痛忽止下嘴唇內有白點脈則弦細或弦洪而大小緩急不定春夏用烏梅一枚花椒五粒煎服以養蟲其痛自止秋冬用生白芍生甘草各一錢以清木熱其痛自止或使君子肉二枚以下蟲其痛乃止蟲者木熱所成秋冬陽氣歸水水中增陽木氣生熱陽多故可清之可下之若在春夏則不可下以傷肝陽寒痛最少寒痛必肢冷不食或額心冷不食附桂地黃丸一錢調服以補陽或艾葉三分煎服以溫寒可也冬至小寒之間小兒病水瀉口渴能飲小便甚長此木燥傷津疏泄偏勝不可用水瀉之方以再傷津液致生奇變宜阿膠一二錢山藥二三錢養木燥收疏泄瀉渴立止山藥收斂並補土氣治木病宜兼培土五行之氣虛則克我者愈克培土以禦木木氣乃易平也大人亦如此治法冬至小寒之間小兒病痢兼瀉黃水日數十行有時瀉出亦不自知不渴脈則左右均弱似乎無脈小便或有時利此則風木大動疏泄偏勝之病方用阿膠三錢以平木氣之疏泄白朮山藥各三錢以培土氣肉桂五分以補肝即愈補肝陽者冬至之後木氣初萌疏泄自傷本氣故一面用阿膠以平疏泄一面用肉桂以補肝陽也金匱見肝之病當先實脾故用山藥白朮以補脾服一劑即瀉減脈起再一劑全愈此病不渴故用肉桂冬至小寒之間宜注意木氣宇宙大氣的木氣動故也小兒誤服溫燥肝木之藥木燥克土多有成鼓脹者大人亦然咳嗽小兒咳嗽極關重要日久不愈便不能活若無痰乾咳或有痰而脈細沉與左脈較右脈細者可用冰糖大棗肉各二錢芍藥當歸苦杏仁枇杷葉各五分濃煎徐服自愈且不可用辛散傷津之藥咳嗽最傷肝肺血液芍歸潤血也咳嗽最傷中氣糖棗養中氣也苦杏仁枇杷葉降肺氣不傷肺液故效此病乃木氣失養上衝之咳如盡從理肺去治必傷中傷液木氣更衝致生他患小兒咳嗽最忌脈細如脈細者豬肺煮湯養肺即愈如係無痰的乾咳左脈必比右細此肺金枯燥不能生水以養肝木右脈若細肺傷更重可用山藥扁豆各一錢加生阿膠枇杷葉各五分補肺養中滋津液而降肺氣自愈凡服阿膠之咳鼻梁必青如用燥藥病必加重如鼻梁青咳而瀉緑糞者阿膠與山藥並用亦能醫治山藥重用健脾利水與阿膠之滋潤相助為理也曾見醫家用生薑治小兒咳病益治益壞太多太多因小兒臟器脆薄受不住生薑辛散之故治小兒病不用生薑任何病證都能治好一用生薑無論何病無不變生後患者治小兒病以全不用生薑為妥惟寒吐可用生薑汁少許以降胃膽肺極佳如咳聲不乾脈不沉細此為脾肺之虛可用山藥扁豆各一錢小棗二枚以補脾肺半夏杏仁桔梗陳皮各三分以降肺氣即愈小兒咳嗽其脈必虛治咳之藥必耗肺氣如以上諸咳用以上諸法治不見效可用八珍湯白朮黨參茯苓炙甘草當歸熟地川芎白芍各五分或一錢大補中土以降肺經資助血液以降膽經膽經降肺經自降其咳自止或八珍丸調服此小兒咳病之救星也用八珍之咳其脈必浮虛大人脈虛咳嗽服降肺藥不愈者亦宜此方預防肺癆之咳亦有殊效桔梗係排膿降滯之藥極傷肺氣慎用因本草有桔梗載藥上行一語後人遂重用之以載諸藥暗中傷肺都不知道排膿豈有不傷血肉之事肺金下行為順上逆為病治肺病之藥絶無上行者若小寒前後咳嗽脈微神憊此微陽升動根本搖泄小兒中氣微弱當不住大氣動搖之力故陽衝於肺而咳宜豬腰湯溫補腎家使陽不衝乃愈小兒乾咳氣緊而喘脈澀沉有力半夜交寅病必加重且煩此肝膽病熱衝塞肺家宜用四逆散柴胡白芍生枳實炙甘草各五分於子時前服下即愈且不可服麻杏石甘湯致中寒加病也柴芍清木熱舒木氣枳實炙甘草降肺家塞住之熱子醜為肝膽主氣之時寅為肺主氣之時喘乃被動之病故不可食麻黃此病如痰中帶水日輕夜重脈不沉澀而沉中兩部現弦者此乃肺燥宜用麥冬三錢花粉杏仁桔梗陳皮半夏生草各一錢細辛五分麥冬花粉清肺燥半夏桔梗等味降肺逆自愈肺燥而痰中有水者金燥則結聚將水聚於胃間也氣聚故脈弦也此二方與八珍湯的分別八珍所治的咳日重夜輕脈虛不澀不弦二方所治的咳夜重日輕脈澀或弦也麥冬一方藥性平和治肺要訣澀乃閉塞之象弦乃結聚之象此麥冬湯之咳痰有清水五味細辛乾薑之咳亦痰有清水錯服則殺人五味細辛乾薑所治之咳不分日夜就枕即咳此咳之原因在水逆麥冬湯之咳咳在下半夜咳的原因在肺燥五味細辛乾薑之咳詳古方下篇麥門冬湯證治推論的意義中小兒咳嗽無痰乾咳或有痰脈沉用麥冬紫菀炙草各二錢甚效此由麻杏石甘湯之法變通而來麥冬以代石膏紫菀以代麻黃也風病小兒發熱抽搐抽搐者津傷木燥而風動也發熱者中虛木氣疏泄相火不降也木氣稚弱故發熱即易風動養木氣顧中氣四豆飲極效黃豆二十粒黑豆緑豆白飯豆各十五粒煎服此為治小兒發熱病的第一要方切忌散風藥清熱藥養木養中自然熱退風平小兒忽然兩目上視亦風木上動四豆飲最效豆最養中養木能平疏泄收回相火小兒木氣幼稚故多木氣病四豆飲乃最善之法也凡用豆不可炒炒則偏補不能清熱並須煎成即服不可隔夜隔夜則變性白飯豆是食品非赤小豆四豆飲要水多煮爛取濃湯服尿長忌飯豆如久瀉不食而抽搐面色青黃此為木虛土敗補土調木養血顧中可望挽回一切驅風散風之藥最傷津液傷中氣均所當忌可用下文附子理中地黃湯稍加益母草神麯輕用多服可效小兒急驚風無病忽然兩目上視手足抽搐口眼歪斜為急驚急驚為熱慢驚為寒熱不可用涼藥寒不可用熱藥相火不降熱傷津液肝膽二經升降不和則成急驚可用四豆飲養中生津以和木氣熱退驚病自愈如用涼藥清熱通藥散風中氣與相火受傷必生他弊更有妄用攻藥下藥者便成生死問題矣此熱不可用涼藥之事實也寒何以不可用熱藥因慢驚之來必因病久食減木旺土虛此時肝脾津液業已枯竭腸胃腠理必有積滯燥熱之藥不能健脾反以橫肝宜用扁豆山藥各一錢以代術草用巴戟天淫羊藿各五分以代桂附歸芍各三分以養肝臟清木熱神麯厚朴橘皮各三分以去滯開胃土復木和自然病愈此寒不可用熱藥之事實也其有果因驚駭成病者可用腎氣丸五分加虎眼睛一分調服即愈或單虎眼睛因肝膽素弱然後不勝驚駭耳虎秉造化木氣眼睛又為木氣結晶其治真驚者補木氣也一切重墜鎮驚之藥皆破壞圓運動之藥千萬不可入口如無虎眼虎膠亦可前人謂虎屬金氣非是冬至後虎始交木氣動也虎嘯生風木氣動也前人治慢驚用附子理中地黃湯土木雙調功效無比木枯克土金逆火散乃成慢驚附子理中湯補火土地黃湯潤金木各適其宜交相為用亦與本書古方下篇所列理中湯加阿膠治愈各病同一意義慢驚不可用燥熱藥附子理中地黃湯則溫而潤之藥也加益母草神麯各二分以活潑氣機慢驚之法備矣附子理中地黃湯係附子理中湯與六味地黃湯二方合併用可改用附子理中丸五分六味地黃丸一錢益母草一分神麯二分煎水調服附子溫水寒地黃潤木燥山藥補金氣之虛而助收斂丹皮清木氣之熱而平疏泄茯苓澤瀉除濕扶土酸棗皮斂陽溫肝此亦腎氣丸之法乾薑白朮黨參炙草以溫運中宮益母神麯去滯使整個圓運動之氣機旋轉升降法則周密功效神速慢驚之妙方也有將此方加黃耆當歸者功效反而減少且加腫脹熱黃等現象此不可不作徹底解説縱黃耆補氣當歸補血人皆知之虛勞之病血氣皆虛治虛之法以降肺膽收相火以運中氣為主中宮建運血氣自生黃耆性升當歸性散適與肺收膽降二義相反故服後腫脹熱黃皆相火被升被散現象仲景黃耆建中湯黃耆只有芍藥六分之一仍是降多升少之法後人用黃耆分兩極重謂黃耆少則無力服後病加乃不悟黃耆偏升之過比比然也附子理中湯即古方篇理中湯加附子地黃湯即腎氣丸去桂附如冬令不聞雷聲而又寒冷之地大氣陽足附子慎用木虛木旺木枯只是一事虛生風則旺疏泄傷津則枯酸棗皮似應為萸肉面紅身癢冬春之交小兒面紅身癢冬春之交陽氣發動小兒中氣不足陽動於下遂越於外紅與癢皆陽氣外越宜補中氣以回陽氣紅自退癢自止冰糖糯米粥極效若誤認為火而用涼藥即成大禍服涼藥後若腹瀉者多發熱而死而宜涼藥之病面不紅身不癢大人亦然耳流膿小兒耳病流膿耳心痛方用桂附地黃丸五分至一錢煎服此乃腎氣虛膽經不降之故日久不愈身體即日漸虛弱也若誤服涼藥即壞耳前後腫項不活動者加益母草一分若癢者龍井茶一二分以清膽熱小兒耳內流膿或痛由於膽經不降韭菜汁滴耳內連滴數次亦愈韭菜汁溫降膽經也此病須看膿清膿稠膿清為寒濃稠為熱桂附地黃丸與韭菜汁乃膿之清者如濃稠者山藥扁豆各一錢天花粉生甘草緑薄荷各三分煎服最效清降肺膽胃之熱也雖熱亦須用山藥扁豆以補中以肺膽胃上逆乃中虛之故但用清熱為治者必小兒體氣充足大便三日一次面無浮紅之色乃可用之若大便不實面色浮紅則桂附地黃丸韭菜汁為合不僅此一病為然一切病證治法皆可類推韭菜溫補木氣藥小兒耳流膿與下文痄腮原則相同可用痄腮方亦效耳痛睡醒痛減為虛痛不減為實膽熱實也淡豆豉湯或一味黃豆湯以清膽熱為治不可用涼藥凡病睡醒病不減或稍加皆熱實病減皆中虛陽虛不止小兒耳痛如此凡病皆如此膽熱雖實亦宜用豆類膽熱上逆中亦虛也目病目珠紅痛憑脈為治脈輕按盛重按微此為中寒心熱方用乾薑五分炒梔仁五分乾薑以溫中寒梔仁以清心熱此目珠紅色必鮮明而浮若目珠紅色沉而不浮暗而不鮮其脈必輕按少重按強且現滯澀之象此為濕熱之證方用梔仁金銀花各五分至一錢薄荷荊芥各五分木通五分梔花以清熱薄荷荊芥以散滯木通以去濕服一劑而脈漸起澀漸通薄荷荊芥減半再服凡目病治法是為兩大原則醫家見紅便用涼藥不論中寒與否將目病治重皆不知有用乾薑的原則之故尋常目珠脹痛黃豆一把養木即愈此目病治法大人亦係如此如果氣實熱實脈實的熱症梔花一方多服即效且不可誤服黃連石膏致生流弊凡立夏前後目珠紅痛脈弦不舒歸芍地黃丸一錢以養木即愈時令的木氣衰退之故小兒眼角肉多先天不足倦怠凡小兒幼童當小寒大寒之間身體倦怠均宜服桂附地黃丸五分至一錢其脈必虛浮或微少模糊服散藥涼藥即壞此木氣欲動陽根不足前人春行夏補之説夏補固宜春不可行也乃王叔和伏寒變溫之説誤後人也詳溫病篇冬季不冷之年此病最多大人體虛亦多此證蒸豬腰食亦佳豬腰前人謂為性寒事實上溫補也㿗疝㿗疝者皋丸硬連少腹此肝腎陽虛不速治愈病及終身影響健康不可忽也可用五味子三分甜蓯蓉一錢清早煎服日服一次服至病消為止服至數劑硬處作癢乃陽氣回復將欲上升最佳之兆普通用小茴治疝取效一時不能斷根小茴溫散結氣無治根本之力五味散結溫補腎中水火之氣以助肝陽上升蓯蓉溫潤肝腎形質故效五味是腎家專藥世人因傷寒論小青龍湯治咳有五味子遂認為五味是治咳之藥流毒千古五味大熱肺病大忌疳病疳病外證腹大筋青大便時結時瀉身有虛熱貪食而瘦面色蒼白夜不安眠舌有黃白苔病之甚者名曰走馬牙疳走馬者言其病變之速也外證口唇部先發生小水泡外面堅硬內部破潰變為黑色遂向外面穿孔同時四周蔓延不甚疼痛顏色浮腫虛脫而死此中陽虛寒升降無力濕熱滯於上中二焦不能運動以至木鬱生蟲之病方用甘草瀉心湯加減治之炙甘草三錢乾薑二錢紅棗六枚去核黃芩一錢半夏二錢炒黃連五分乾薑草棗溫補中陽連芩清降凝滯之濕熱半夏降逆理滯按其情形加減治之徐徐而愈此方分量極重可減十分之七用之當歸烏梅亦可加入此方宜按脈隨時加減不可呆服蟲病小兒蟲病不可用下蟲之藥蟲乃人身肝木陽氣化生而成土濕木鬱然後蟲生蟲被攻下肝陽即敗造化之氣木生火長金收水藏人身生氣消滅必枯弱羸瘦不能長命只因醫家不解人身木氣自病之理見蟲即攻攻傷木氣至死不悟宜用傷寒論厥陰烏梅丸調理自愈或花椒五分烏梅二枚溫調木氣亦效有人問曰蟲病服厥陰烏梅丸蟲病遂愈蟲往何處去了要知蟲往何處去須先知蟲從何處來自有根本治法凡病皆然也蟲病外證腹痛面黃舌現紅點甚則唇之內面出現小白點脈來大小遲數不均烏梅丸治蟲的意義詳本書古方上篇世人都不知蟲理大家下蟲哀哉如蟲病口吐涎水心痛如咬脈洪大乃為當下之蟲證用金匱方甘草二錢熟白蜜四錢鉛粉一錢下之用鉛粉殺蟲須重用補中之藥也分三次服一服效止後服小兒腹痛時痛時止此為蟲病方用知柏地黃丸附桂地黃丸各一錢花椒五粒烏梅一枚煎服蟲即自下此方亦烏梅丸之法如服後仍痛可用使君子五枚下之惟偏熱之地秋後內熱生蟲小兒黃瘦可食使君子三枚下蟲一次下後常食黃豆為妥忽然發熱嘔吐有時煩躁而左脈現洪急不寧之象者亦為蟲病也或用烏梅花椒或用使君子臨時酌用烏梅花椒治蟲病之不足使君子治蟲病之有餘先用烏梅花椒不效然後使用使君子便穩妥矣殺蟲不如防蟲防蟲不如使少生蟲肺熱肝熱蟲生之原食糖食雞食蛋魚面皆能熱肺熱肝只須少食蟲便少生喉痛小兒喉痛與大人同可照本書時病篇喉症法治之小兒喉痛須留心檢查乃知如不會説話看其咽乳時必擠眼難過也留心脈象沉細多熱微虛中虛如喉痛而脈沉不細惡寒嘔吐身體覺脹四肢覺麻是為痧閉應速刮痧喉旁耳下後頸窩下兩旁扇子骨中間背脊骨兩旁兩肩用小瓷羹匙邊抹桐油或菜油刮出紅點喉痛即止外感小兒外感的原則仍是衛氣收斂榮氣疏泄但小兒榮衛薄弱麻黃芍藥均不能受只能用黃豆以養木氣平疏泄用蔥頭豆豉以舒金氣開收斂此為難多年始尋出極妥的辦法將小兒一切外感完全解決如用麻黃雖極少分量能將肺氣散傷而成喘逆危症不惟麻黃不受薄荷亦受不得感寒者鼻塞發熱身痛用蔥豉湯蔥豉散性平和又潤津液最為妙品如脈虛氣弱者豆豉改用黃豆最妥用黃豆平疏泄有功無過注意勿忽造福無量蔥頭帶須一個豆豉三十粒為最輕劑凡用蔥豉湯舌有黃苔無論潤燥均用蔥豉能消散胃滯也如外感初時惡寒後雖單發熱只要鼻塞身痛頭痛仍宜用之因鼻塞身痛頭痛係衛氣收斂之病必須鼻不塞單發熱而神昏氣微脈象不明乃屬於溫病只病疏泄不病收斂乃不用豆豉之宣通與疏泄只用黃豆之養木養中養津平熱可也蔥豉湯四季感寒鼻塞發熱均可用之猩紅熱收斂偏盛的感冒屬於傷寒疏泄偏盛的感冒是為溫病世人稱為時溫溫者木氣疏泄之病也小兒此時忽然發熱昏睡不思飲食即係時溫為病此乃木氣疏泄偏盛的感冒當用養木氣平疏泄的藥切不可隨俗附和認為時溫的邪氣入了小兒身體以內為病而用清溫逐邪的一切涼藥散藥木氣在造化為厥陰風木在人身屬肝臟之經冬季天寒封藏得令厥陰木氣根氣深固不至動泄大氣無溫病小兒亦無溫病如冬令不寒或聞雷聲大氣的風木不能養足便即泄動小兒木氣稚弱同氣相感疏泄起來如木氣強足的疏泄則發熱出汗皮肉血色並不作猩猩臉面的汙紅色木氣疏泄無力而又疏泄的疏泄面色則作猩猩臉面的汙紅色世即稱為猩紅熱力能疏泄者脈象充足面色正氣不微其熱按去有根底力不能疏泄而又疏泄者脈微小而急色紅而汙氣微神怠其熱按去無根底猩紅熱溫病之敗證也猩紅熱之病時溫病中之最虛之病疏泄偏動肺氣不收故咳嗽而作嚏肝竅於目木氣敗而又動故目紅含淚常欲閉而不開木動中虛胃氣降不下去故欲吐木動上衝故咽痛木土不和故有時作瀉木氣疏泄故雖瀉而小便仍利如此情形是木火本來不足用涼藥清熱必壞本是偏於疏泄用升散藥發表必壞病雖屬虛圓運動的道路已亂用補藥補虛必壞時溫病猩紅熱可均用四豆飲養中和木調升降收相火極平隱而有特效且皆穀食之品自病初起以至復原皆用此方有百益而無一害如小便短少是為脾濕四豆飲去黑豆緑豆飯豆單用黃豆六十粒加山藥二錢黃豆養木氣養中氣山藥扶土氣利小便白飯豆亦補土氣利小便不如山藥兼能助金氣以斂疏泄如仍不利是不只脾濕且兼腎虛宜黃豆山藥加巴戟天五分以溫補腎氣脾腎氣足木氣乃和小便乃利病乃能愈巴戟天溫補腎氣須右手脈微乃可加也大頭溫如發熱頭腫而脈浮洪者烏梅二枚白糖一勺極效木氣疏泄自傷本氣木氣無根即易上衝木衝金氣不收故頭腫烏梅酸收大補木氣之根而平疏泄之氣也如發熱頭腫氣粗作喘且喝脈象緊滯舌心有黃白厚苔者肺熱較實四豆飲加花粉竹葉枳實各五分同煎極效病狀雖異原理則同皆木氣疏泄肺金失收降之力之故皆是虛證不可誤認為瘟毒肆用涼散藥敗火寒中溫字與瘟字一經混亂溫病的真理遂失瘟乃瘟疫溫乃木氣溫病乃木氣之正病瘟乃時氣之惡病如人死最多最速之鼠疫病乃瘟疫也瘟毒病四豆飲最佳豆養木氣最能解毒木氣偏的最甚則成毒耳如頭腫而熱微足冷面色不勻鼻梁唇環清黃不思飲食脈沉微或沉按無脈必用古方篇之腎氣丸乃效木氣疏泄於上肺金不降相火外泄因而下寒腎氣丸和木氣平疏泄斂肺金溫腎水中之火以培木氣之根故愈如此證用涼散之藥必壞此證如頭上耳內發現水泡此泡不可刺破肺氣收斂自消如刺破是將木氣疏泄上來的元氣消散矣小兒當春溫之時凡感一切時氣病證但見面色不勻面紅而鼻梁唇青黃無論何病先以豬腰湯補益脾腎待青黃退後再按證施治鼻梁唇環青黃面紅為中土大敗之象倘不先顧根本一切治法皆無用處此等虛證舌心皆無黃苔也舌心如有黃苔胃家有熱鼻梁唇環不現敗象敗相者胃中陽敗無熱之象也凡溫病胃熱為順如發熱兼鼻流清涕山藥扁豆各一錢收肺養中加緑豆五十粒清肺熱以收清涕切不可表散傷肺使疏泄更加致生禍變冬春發熱為木氣偏於疏泄金氣不能收斂山藥助金氣之收斂以平木氣之疏泄故熱退暑病小兒當夏暑發生之時忽然發熱頭痛欲嘔者用藿香五分至一錢生扁豆一錢至二錢溫降胃氣即愈不可因藥只二味夾以他藥至生他病藿香扁豆治暑病的作用詳時病本氣篇暑病中如小便短而瀉且渴於藿香扁豆中加冬瓜自然汁以止喝利尿如舌有乾黃苔可加生枳實炒梔皮各三分以去積熱冬瓜蒸汁為自然汁無冬瓜用滑石一錢以代冬瓜冬瓜最妙毫無他弊西瓜亦佳黃豆一味湯治小兒暑天發熱欲吐特效小兒暑病脈在中部暑病之脈最易誤為虛脈誤為虛脈而用其他補藥必誤大事須知虛脈之虛重按無有暑脈之虛按至中部比較定些稍不留意即放過去暑病乃天的相火不降暑火不降則傷肺氣氣傷則脈虛耳用扁豆補暑脈之虛用藿香降膽胃之氣也膽胃均在中焦故暑病脈在中取總而言之無論大人小兒外感發熱總是傷寒論桂枝湯榮氣疏泄膽經不降用芍藥的原則外感惡寒身痛總是傷寒論麻黃湯衛氣閉斂肺經不降用麻黃的原則但芍藥敗火麻黃散氣小兒均不可用惟用黃豆黑豆以代芍藥用蔥頭豆豉以代麻黃豆類又能顧中功效既大流弊全無此為小兒外感最妥之法也疹病時令病的小兒病惟疹子最多疹子原因與溫病同皆木氣疏泄衝開肺金相火逆騰中下大虛之病大人溫病以汗解小兒溫病以疹解汗乃血所化疹乃血所成木氣疏泄故疹為紅色木氣疏泄分疏泄正常與疏泄不及兩證正常宜養不及宜補正常為順不及為逆正常之脈右較左盛不及之脈右較左虛或右左均微咳者金氣被木氣衝開也眼含淚者木氣疏泄也耳冷者膽經相火外泄也發熱者木氣疏泄相火不降也昏睡者木動火逆中氣虛也疏泄正常證狀為發熱甚盛面色充足小便清利大便不瀉疹出成粒色紅粒飽膝下都有病人所在地冬令寒冷冬不聞雷大氣中木氣根深來春小兒疹病發生必皆疏泄正常之證惟身體陽虛之小兒則偶有不及之證疏泄正常者方用四豆飲煎服只要發熱不論疹點已出未出始終只用此方養中和木調升降收相火自然熱平身安不生他變而愈右脈重按充足者飯豆易淡豆豉以調木宣滯飯豆除濕補土脈充足者不宜也疏泄不及證狀為發熱不盛面色痿弱昏迷不醒疹出不紅或不成粒或疹出成片或一出即回或疹悶難出小便短少若加吐瀉脈遲肢冷即易死亡病人所在地冬令鳴雷或冬至起霧水中封藏的陽氣疏泄於土面木氣失根來春必多疏泄不及的疹病發生如不到交春而發現於冬至後者則微陽大泄易成死候疏泄不及以小便短少為要證右脈微於左脈或左右兩平而虛微不旺或右尺無脈方用巴戟天四豆飲於四豆飲中加巴戟天五分至一錢以溫補肝腎和養木氣小便一長即為好轉疹出即回與疹悶難出為肝腎陽虛疏泄無力疹出成片為肝腎陽虛陽散不回故巴戟天四豆飲即愈也有用四逆湯附片乾薑炙草或用理中丸為治者不甚平穩因木氣疏泄不喜剛燥雖屬陽虛乃陰中之陽虛亦宜避去白朮乾薑炙草之剛燥傷陰巴戟天溫潤不燥溫補腎氣與豆同用又能調木氣之疏泄誠麻疹虛證之要藥桂附地黃丸亦可酌用蓋右脈微小者為火土之敗左右脈皆微小者亦脾腎陽虛故桂附地黃丸相宜如疹出已退已不發熱而面色仍是灰黯神衰食少此肝脾之陽泄而不復亦須服巴戟天四豆飲不然仍易死亡如久不復元可用加減保元湯補之保元湯詳下文疹已退熱已平已無木氣的關係故可補其氣血也葡萄乾能溫補肝腎性極和平出疹時每日服一錢最保平安七日痊愈本草綱目載葡萄北方以之補腎南方以之稀痘可以悟矣疹病乃木氣疏泄之病腎氣乃木氣之根耳預防亦宜服之麻疹愈後咳嗽困難單服白菜心一個黃豆五六十粒特效此為一切藥所不能及食品中養金養木平熱息風兼養中氣恰合機宜之方多服可也麻疹病重必吐蟲可見其為木氣之病傷寒論厥陰風木病用烏梅丸厥陰病必吐蟲也麻疹病多在春令厥陰風木之時也惟麻疹病乃宇宙與人身整個氣化根本動搖之病再經治壞根本消滅有能挽回者有不能挽回者耳惟呼吸平定中氣尚存者都能挽回本氣之病防害他經極難用藥故惟豆類和平適當此乃經過多少困難然後選得此方經驗多人無不見效然亦根據兒病本氣病的原理之功耳如以胎毒熱毒為原理為根據不能選得此方也疹病必發熱木氣疏泄相火不降也必神倦相火離根中氣大虛也必眼中含淚木氣疏泄肝液蒸動也必咳嗽乾嗆木氣疏泄傷肺金氣虛散也疹子忌發表因木氣疏泄之病不可發表再助疏泄故也疹子忌涼藥因係相火離根之病故也所以疏泄正常只須顧中宮和木氣疏泄不及則當補其根本使之遂其疏泄之氣疏泄之病誤投發表藥寒涼藥正如根空之木再拔之則死矣又如將熄之火再寒之則滅矣醫家誤認疹子是胃熱胎毒所以要將他發散出來並且要用涼藥清毒一用涼藥相火消滅即至不救疹出之後醫家病家都用掃毒藥疹出之後木火之氣疏泄已傷宜靜待其自己回復不可更用涼藥以敗脾胃更不可食白木耳魚肝油等動陽食品以動木熱而傷肺陰致熱氣入肺而成肺癰或熱氣入目而成目疾等患麻疹初起即須忌食動陽食物牛奶雞蛋更不可入口疹後如欲服掃毒藥者可服黃豆白菜心清肝肺之熱妙在平淡二字最適合木火病氣也惟小便利者忌用飯豆動陽食品詳古方下篇腎氣丸後小兒之疹子即大人溫病之汗榮衛足則出汗榮衛虛則出疹木氣中的火力多則疹子成顆粒而色紅木氣中的火力少則疹子不成顆粒色紅不足而成麻點隱隱不明麻者榮衛之敗也來復之機隨時皆有凡疹病只要不發生內傷吐瀉惡證不必食藥靜養七日自然即愈西藏地方小兒不病麻疹猩紅熱因西藏地方雪大冰厚大氣中陽氣封藏於土下水中特別充足木氣根本深固不妄動而疏泄之故凡用四豆飲脈細者津液不足者小便長者出汗者去飯豆服四豆飲後脈轉旺而病未愈者去飯豆再服服四豆飲後發煩者或大便乾燥或不大便者去飯豆再服因飯豆養中養木利水兼補土傷津之故黃豆黑豆養中養木兼降膽經補津液緑豆養中養木兼清肺熱巴戟天四豆飲如脈法不精辨證不明誤用巴戟天致將木火補起變成滿腹熱邪充塞肺家為害不小須脈微神敗色黯右尺更微乃可用之麻疹最怕熱藥也冬令不寒而又聞雷之地春木根氣傷損小兒疹病發生之時巴戟天之證乃多此點切不可忽春寒日久之地或身體虛弱之兒亦有巴戟天證也如麻疹燒熱昏迷口渴脈沉有力舌上必有乾黃苔此為胃間原有積熱用四豆飲去飯豆加生枳實生梔子仁各三五分以養木氣清胃熱為治此證如誤服巴戟必死山藥亦不可用社會習尚有服雞冠血者多燒熱而死亦與溫病誤服桂枝下咽即死之理相同小兒病猩紅熱與疹子皆兼咳嗽皆不可用桑葉竹葉橘皮杏仁等等降肺疏肺之藥以治咳嗽用之病必加重因皆木氣疏泄偏勝金氣收斂衰退之病金氣收斂衰退再遇降肺疏肺之藥肺氣更衰疏泄更加咳必更甚中氣更壞之故只須養木氣平疏泄木氣一和即不疏泄上衝肺氣自降咳自能止不可忽也如欲用藥治咳白菜心最佳養肺降衝平和之品凡麻疹燒熱日加唇焦舌乾涼藥忌服黃豆五十粒煎濃湯下咽即效因燒熱至於唇焦舌乾此上部津液乾枯之故黃豆極能滋潤上焦各部津液又能養中養木故其效無比此乃經過多少困難始選得之方最當重視凡小兒麻疹發熱乃木氣疏泄之病最忌升散之藥世人用芫荽冬筍香菌煮服以為比升麻葛根湯好不知芫荽等物散力不小服下之後更加津液乾枯涕淚俱無熱加聾啞煩躁不寧睡則警惕食則吐出脈轉細澀遂成木氣拔根熱並肺家之險症悉宜黃豆五十粒巴戟天五分濃煎溫服以救之下咽即得睡汗出津液復生熱退進食登時脈和而愈此巴戟天將木氣的根氣回復之功與黃豆潤肺養中和木之功相助為理之效也小兒出疹多先咳嗽乾咳無痰此木氣上衝金氣失斂的現象用黃豆五十粒白菜心一個煎服其咳即止疹病亦隨之不起有疹者出亦順利白菜心潤降肺氣黃豆滋養木氣也見咳即用此方省事多矣此方疹病初起以至痊愈日日服之平安之至疹病盛行之時日服一劑亦可預防凡疹後遺下目疾咳嗽等病常服此方皆可就愈皆木火之氣衝入金氣不得出來故也簡括言之疹病初起咳而發熱白菜心黃豆飲自始至終多服自愈服過發散藥寒涼藥成壞病者巴戟天黃豆飲以救之服過溫補藥成壞病者白菜心黃豆飲以救之愈後自汗大虛元氣難復者加減保元湯以補之黨參一錢黃耆白朮炙草當歸乾薑巴戟天各五分紅棗兩枚煎服麻疹的整個治法備矣無須四豆飲亦可痘病四豆飲古人以之稀痘名曰稀痘湯無黃豆並不以之治疹其實痘疹皆木氣偏於疏泄之病痘則木氣疏泄金氣大敗疹則木氣疏泄金氣雖敗未大敗耳痘病用四豆飲和木氣痘不旺者加山藥二錢以補肺如癢者此為腎虛再加巴戟天一錢以補腎痘出成片不成粒頂塌根散漿稀種種敗證皆用巴戟四豆飲或加炒黃耆當歸皆能挽回用黃耆八錢當歸一錢大補胃陽兼助榮陰亦妙前人所用黃耆黨參補益衛氣諸方皆應採用惟所用涼藥與藥雜之方則不可用痘病初起所用發散之方亦不可用初起以四豆飲去緑豆為佳疹病始終木氣之事痘病初則木氣之事繼則衛氣之事衛氣大敗收斂不能回復故痘病後期多用黃耆以補衛氣自來用升麻葛根湯治痘疹疏泄之病加升散無不服後病加誤認痘疹是胎毒所以用升葛以升提之原理認錯尚復何説王孟英於稀痘湯中重加金銀花生甘草以解毒木氣失和便是毒豆和木氣便能解毒二花甘草不可加也麻疹忌黃耆黃耆性升只宜衛敗之病不宜榮熱之病福幼篇論痘各節完全可靠最宜購閲將毒字改為病字便好天地之大德曰生生者天地中和的結晶認為胎毒真是笑話福幼篇論麻疹宜發表不妥不知原則之過也痘粒小而圓者佳一原書疑為二而脫落一橫痄腮疹子之外又有痄腮一病此病初起惡寒發熱或不惡寒發熱耳後或腮下腫而硬方用巴戟天甜蓯蓉各一錢麥冬龜板鱉甲地丁昆布海藻各五分厚朴半夏沙參橘皮各三分紅棗二枚溫服即愈惡寒發熱舌有膩苔加薄荷桑葉各五分即愈此亦春令木氣疏泄之病也木氣不足疏泄一動向上升去不能向下降來耳後腮下為膽經木氣下降之路故結聚於此而不能散巴戟甜蓯蓉補肝腎上升之陽龜板鱉甲補肺膽下降之陰地丁昆布海藻厚朴半夏橘皮降膽肺胃之氣沙參麥冬以益肺陰而助降令紅棗補中氣薄荷桑葉疏肺氣之滯也此病春令為多只經絡部位的關係故病甚輕然不知補益木氣以助其升降從事寒涼發散敗其中氣中氣更虛升降更滯以至結聚日甚弄到開刀才能了事亦醫家不慎之於始之過初起只服一味黑豆湯亦效黑豆調養木氣善降膽經也巴戟蓯蓉方並治瘰鬁初起與耳流膿耳流膿原理瘰鬁原理與痄腮同腎肝不足於左肺膽不足於右右降無力由於左升無力治法欲潤降右方必兼溫升左方又必兼補中氣古方篇酸棗仁湯欲涼藥降膽經先溫升肝經亦圓運動之意義也此病如發於秋季陽氣收斂其脈必重按不虛不似春令之脈重按虛微可不用補肝腎之藥只用花粉天冬橘皮杏仁炙草苡仁各一錢便能消散因只金氣燥結收斂不能下達的關係故潤燥開結而降肺氣兼補中氣可也如疹子發現於秋季亦用此方花粉天冬能清降金氣秋季金氣當令舒金氣以達木氣可也病在金不在木故也去天冬加黃豆亦妥黃豆亦滋潤之品較天冬不傷中氣天冬則潤肺燥開燥結要藥內熱與內虛小兒咬牙夜煩夜啼夜咳尿多大便屎爛便後下白物如熟藕粉皆屬內熱若服涼藥必生他弊方用白糖緑豆沙熱食養胃益陰其熱自平此經驗最良之方也內熱者睡著後飯後兩腮不發紅色若睡著後飯後兩腮發紅左右不勻是為內虛須服十全大補丸三五分諸證乃愈睡著與飯後兩腮發紅者睡著生相火飯後則胃中生陽相火與陽生而不能藏則浮而出現於面榮衛的氣血不足中氣又虛不能運化不能使左右的榮衛升降調和故左右的紅色偏多偏少也平日面紅亦是中虛陰虛小兒陰虛此先天稟賦使然其脈沉而不起澀而不滑面無浮紅鼻梁山根常現一線青色大便不能每日一次常於半夜哭叫半夜哭叫陰虛木燥也此病如不預防早治稍長易成虛勞宜每天食蒸鴨蛋糕一個以補陰久之血活陰生身體必可轉和並宜常服歸芍地黃丸數小粒此丸善治一切陰虛諸病比六味地黃丸活動因歸芍能滋養木氣升降肝膽二經之故此丸並統治大人陰虛諸病實證小兒亦有實證實在一部分不在全體如咽痛而兼渴喘發熱熱有根底重按仍熱只有昏睡並無煩躁或兼瀉黃沫小便或長或短是為麻杏石甘湯證用生石膏杏仁泥炙甘草麻黃絨各五分一服病愈即止此證面色必不紅脈必沉實舌根舌中必有乾黃苔為據診斷小兒病總得以看舌苔為要萬不可不看明舌苔隨便下藥小兒哭泣不肯開口務必用力拗開以求得到診斷的徹底麻疹誤服升散之藥傷損津液津傷熱起亦有病成此證者麻杏石甘湯即愈麻黃杏仁以降肺氣生石膏以清疏肺間積熱炙草以補中氣也大便結燥舌無黃苔別無熱證是為陰結陰結者陽氣不足不能化生津液也附桂地黃丸每服五分補陰中之陽陰陽合化自然津生而糞潤也此病亦有獨參湯冷服而愈者氣能生津也大人亦如此其有麻疹初病誤服溫補以至舌苔燥黃有底口臭目閉渴而能飲二便全無腹滿脈沉此為實證雖實而病原卻虛細心審查腹部如按之病人拒按是有可下之物宜大黃枳實玄明粉厚朴各五分或一錢黃豆三錢微下之如按腹部並不拒按而脈實亦可用少許以消積滯如非咽痛而發熱喘咳渴能飲水此熱必有底舌苔必有白粉或舌有黃苔其渴而能飲胃家必有可清的燥熱可用生枳實小梔仁各數分清去燥熱發熱與咳嗽與渴皆愈如脈不甚實者須兼用山藥扁豆各一錢以扶土氣方不別生流弊因小兒胃家燥熱非小兒陽明燥金能病陽燥乃汗出生津或誤服燥藥傷津所致其土氣仍是不足故也如脈象沉實或沉細有力或右脈實於左脈舌苔乾黃山藥扁豆便不可用小兒三四日不解大便卻無他病此腸中津液不充之故可用淡豆豉數分至一錢濃煎溫服以通潤之自然大便不可用大黃須有熱結實證乃可用之大黃傷中中傷便更不下曾治一七日小兒食乳甚好卻瀉稀水中夾糞點小便亦利按其脈小而沉沉而有力服大黃二分而愈其母懷孕時好食胡椒所以小兒七日而內熱如此此熱結實證也熱結旁流故瀉稀水感寒停食外治法如偶遇感寒鼻塞或停食不消不必服藥用熱手巾搓擦扇子骨中間背脊兩旁暖臥即通停食即消須用力擦至肉下作左升右降的擦法人身臟腑皆繫於脊脊骨兩旁為血管升降之總乾榮衛升降之中樞用熱手巾搓此處榮衛流通血管運行脾胃即和感寒與停食自愈或用蔥頭搗爛加麻油少許搓擦忌風亦佳老人停食不能用消食藥者熱毛巾法最宜危證小兒咳吐多日胸腹煽動頭身發熱手足厥冷昏迷不食百治不效此危證也方用燕子窩泥一塊重約三兩研細生桐油半酒杯將泥拌勻上火炒熱放地候溫先將小兒臍眼用棉花濺燒酒少許略洗用胡椒末一分放肚臍眼中人發蓋著再將桐油泥包臍上二小時後小兒掙動出汗能食而愈極驗之方也或將小兒臥於無濕氣的地上亦能得救皆以中氣救中氣之意頭身發熱手足厥冷此為外熱內寒昏迷不食此為火逆中敗咳吐而胸腹煽動中氣將離根矣胡椒大熱之性能溫內寒燕窩泥能補土氣人發助元氣桐油通氣也此方用外治之法溫下補土中氣旋轉火氣歸元升降復舊是以汗出而愈如用內服之藥不能下咽下咽亦必吐出此證病氣盛於上元氣虛於下此方全由下治由下而中由中而上全體活動靈妙極矣地面之際宇宙的中氣極旺而身受之故亦得效脈法醫生兩手將小兒兩手同時握住用手大指按小兒兩手三部輕按浮部在皮重按中部在肉再重按沉部在骨小兒出生即有脈可診除至數甚快為小兒中虛本脈外輕按浮部脈多重按中部沉部脈少為中虛輕按無脈重按脈實為內熱右脈比左脈微少為中虛左脈比右脈有力為肝熱右脈強左脈細亦為內熱右脈比左脈大卻大而虛松則中寒也小兒無論何病只中虛與內熱兩門中虛與內熱分清用藥便有依據矣至數甚快為小兒本脈小兒中氣未能充足故脈快也看指紋可作參考診脈須兼各種證狀為斷診治小兒病全憑脈診虛實之分先求中部虛者中部以下虛微實者中部以下實在也無病而脈在中沉兩部者多陽足陰虛無病而中沉兩部不足者多陽虛陽虛慎用陰潤藥陰虛慎用陽燥藥中虛慎用消散藥右脈比左脈旺些為順治小兒病一不可認為外來的邪氣入了小兒的身體為病須認定是小兒本身的本氣為病用藥乃有著落二總要憑脈乃得根據三用藥總要平和之品不可繁雜小兒病極簡單本篇各方經過甚多功效極大世之用鉤藤蟬蛻以治小兒病者甚多鉤藤苦寒極敗胃氣蟬蛻通肺破血其力不小如此之類相習不察小兒受害多矣本篇力除此弊學者經驗自知其益看指紋法三關部位歌初起風關證未央氣關紋現急需防乍臨命位成危急射甲通關病勢彰附圖三關浮沉分表裏歌指紋何故乍然浮邪在皮膚未足愁腠理不通名表證急行疏解汗之投忽爾關紋漸漸沉已知入裏病方深莫投風藥輕相試須向陽明裏證尋紅紫辨寒熱歌身安定見紅黃色紅豔多從寒裏得淡紅隱隱本虛寒莫待深紅化為熱關紋見紫熱之徵青色為風古所稱傷食紫青疫氣逆三關青黑禍難勝指紋淡淡亦堪驚總為先天賦稟輕脾胃本虛中氣弱切防攻伐損胎嬰關紋澀滯甚因由邪過陰榮衛氣留食鬱中焦風熱熾不行推蕩更何求紋形主病歌腹痛紋入掌中心彎內風寒次第侵紋向外彎痰食熱水形脾肺兩傷陰凡看指紋以我之大拇指側面推兒食指三關切不可覆指而推蓋螺紋有火克制肺金紋必變色而又只可從命關推下風關切不可由風關推出命關此紋愈推愈出其紋在先原未透關今誤推而出大損肺氣慎之戒之兒病本氣篇終時病本氣篇時病本氣篇導言時病者因時令之大氣變動所發生之病如中暑霍亂痢疾白喉瘧疾時行感冒燥氣痧症濕熱等是也病雖因於時氣病實成於本氣自來論時病者皆認為外來時邪中入人身為病於人身本氣自病全不重視學醫治病先要將認定著落四字徹底用功時令病如認定為時令之大氣中入人身為病則用藥必以驅逐時氣為著落驅逐時氣之藥即是傷耗人身本氣之藥本氣傷耗病必加重病既重矣尤以為時氣驅逐不盡又將驅逐時氣之藥繼續用之本氣更傷氣傷人死仍不解何以人死之由比比然也認定時令病乃人身本氣為病則用藥必以調和人身本氣為著落本篇各方皆調和本氣之方時令之氣之偏人身本氣自病之誘因耳調和本氣處處乃有辨法臨床經驗自有理得心安之樂王叔和書未讀通將內經冬傷於寒春必病溫的寒字認為風寒的寒字於傷寒論開首妄加序例曰寒毒傷於肌膚至春變為溫病於是本氣自病都認為伏氣為病相習不察殺人多矣荀子曰六淫之氣皆起於地與天無關內經曰在地為五行在天為六氣荀子為周秦時人內經則周秦時醫家之所言天空本無所有實際研求內經不如荀子可靠矣內經又曰天氣清淨光明者也藏德不止故不下也雲霧不精故上應白露不下雲霧乃地下水中所藏之陽氣上升於天空所成內經又合於荀子矣讀中醫書籍非先認識原理自己有了判斷能力鮮不被前人之説所擾亂者時病本氣篇之作非有意反對前人事實上原如此也一暑病中暑的意義大氣中的暑氣即太陽直射地面之相火應往下降尚未下降之氣人身中的暑氣即膽經相火尚未降入中氣以下之氣病者此火氣在地面之上薰蒸燔灼傷人肺氣所謂從口鼻而入是也一傷之後引起本身相火熏人肺金即是本身相火的暑氣自病引起之後外來暑氣即不負責中者傷也外來暑氣既是太陽射到地面的熱氣此熱氣人人都呼吸之而病暑者不過於百人之一人可見暑病乃人身的暑氣自病外來暑氣不過誘因耳少陽暑火下降則為土氣之根不降則為金氣之賊肺氣清降之人吸入暑氣肺能降之降則暑化而成生土之火肺氣不能清降之人吸入暑氣暑氣不降停在上焦引動本身相火暑氣逆傷肺家遂成暑病暑病分輕重兩證輕證暑病輕證暑病發熱熱有進退微惡寒時作時止頭痛身軟精神倦怠或欲嘔或不嘔或瀉或不瀉舌有薄苔或黃或白惡見日光脈象虛中部取之方用藿香一錢扁豆四錢煎服瀉與嘔均加厚朴一錢吳茱萸三分黃連三分頭痛甚加黑豆三錢鼻氣熱加焦梔仁二錢本身少陽暑氣散漫胃中脾胃不和故惡寒發熱病在脾胃不在榮衛病屬於虛故熱有進退時作時止膽經不降故頭疼暑氣熏肺故身軟而精神倦怠膽經逆故欲嘔暑氣擾於胃中胃不和故瀉膽胃俱逆故舌有薄苔病在胃間故脈動中部暑氣傷故脈虛膽火逆傷肺陰故頭痛甚本身暑氣浮逆故惡見日光肺熱故鼻氣熱如病已數日又加口苦脈則沉取乃得左脈較弱於右日久則病深故也左脈較右脈弱者暑傷陰也藿香降胃和胃扁豆建中調胃厚朴降膽理胃萸連降胃氣調升降黑豆養陰焦梔仁降相火此證為普通暑病不用甘藥者暑病脈在中部不宜甘性之壅滯也扁豆性平味淡最宜暑病重證暑病重證暑病惡寒發熱身重疼痛呼氣熱而手足逆冷口開而前板齒燥小便已灑灑然毛聳小有勞身即熱汗出而渴舌有薄苔脈象弦細芤遲方用竹葉石膏湯竹葉生石膏法半夏黨參粳米各三錢麥冬炙甘草各二錢本身少陽暑氣傷及肺金肺內熱故為惡寒相火逆升故發熱肺熱故身重疼痛肺熱於內陽氣不能四達故氣熱而手足逆冷肺熱則鼻難呼吸故口開金水相連肺熱故齒燥肺經與膀胱經同行皮毛小便已則氣升氣升而肺熱故毛聳相火散漫肺金不能收之故小有勞身即熱肺膽胃三經俱逆故舌有薄苔肺陰被膽經暑氣灼傷故汗出而渴氣被暑傷津液虧耗故脈象弦細暑傷肺陰故脈芤暑盛氣弱故脈遲竹葉石膏麥冬清肺熱黨參粳米炙甘草補中氣以生津液而降暑氣半夏降胃也竹葉與麥冬並用能將肺絡中燥熱清降而下將肺家陰液回復直達腎家收令行於上相火歸於下中氣有源全身的旋轉升降各復本位是以頃刻之間病愈人安有不可思議之妙凡暑病熱病溫病之重無不因肺金被傷而來蓋肺金收降則暑氣熱氣溫氣皆不致上犯之故不上犯則下降降則不病也如舌苔厚膩頭脹如蒙是兼有濕氣可加六一散扁豆皮薏苡各三錢厚朴一錢此方之炙草所以成石膏之功也此方之石膏麥冬因汗出而渴用之以救肺陰也暑瀉暑瀉者非暑邪直入胃腸為病乃肺氣為相火暑氣所傷不能收斂清降因而氣機混亂之病也緣人身大小二便調勻全賴肺氣清降收斂肺氣能收斂木氣乃能疏泄相火乃能下行中氣乃能運化水道乃能清通肺家一被暑熱所傷不能降斂於是相火散漫則發熱心煩而作渴膽胃俱逆則噁心嘔吐而中滿氣機壅遏水道閉塞木鬱不能疏泄遂成下瀉脈則右盛於左或左右小弱方用滑石竹葉荷梗佩蘭葉各二錢以清降肺氣而疏氣機神麯蔻仁各一錢以溫運中宮鬱金粉丹皮各一錢以疏木鬱自然小便清通胸膈鬆快而愈脈虛加扁豆山藥各三錢以扶中氣清暑之方最忌偏用溫補尤忌苦寒此方平淡而奏大效清涼以治金木溫運以治中宮暑月瀉利之大法也最忌溫補四字是對清暑之方的清字而言若身熱煩躁汗出不止此為內寒外熱用大蒜半個黃土一撮同搗極爛新汲井水調服蒜與黃土調中溫寒新汲井水收降相火暑氣則熱退躁平而汗收也若不省人事者新汲井水忌用改用溫開水調服大蒜通發同黃土並溫補中氣李東垣之清暑益氣湯黨參黃耆炙甘草生薑紅棗補氣蒼朮白朮澤瀉補脾當歸補血青皮神麯理滯升麻葛根升清麥冬黃柏清肺清熱五味子補腎為世行治暑有效之方若果外來暑氣入了人身為病豈可用如此大補之藥可知暑病乃人身相火之氣不降之病相火乃人身生命根本逆升不降根本氣傷故用如此衆多的補藥而見殊效人身本氣自病的原理不可忽矣此方不用升麻為穩妥此方清字的力量全在麥冬黃柏二味也暑厥暑熱之時行走暑地忽然昏倒不知人事肢厥脈不虛者此則地面的暑氣傷人肺金窒塞氣機所致法宜芳香通肺並不治暑方用蔻仁菖蒲木通滑石磁石各五分煎服肺氣通降則愈蔻仁菖蒲開竅活絡以通窒塞的氣機木通滑石磁石引氣下行也脈之不虛乃氣窒之象暑厥之脈虛脈多不虛脈少虛脈者宜白糖補中脈不虛者宜菖蒲方通滯白糖方即脈不虛者亦宜用之因厥雖是氣機不通然非中氣先虛氣機的升降焉能停止雖厥而脈不虛不虛在氣機虛在中氣重量白糖水補起中氣中氣一經旋轉氣機立即升降脈的實象立即轉虛因暑病的原則本是中虛中氣不虛偶然吸入暑氣不過頭目不清肺膽之氣仍能下降本身相火之氣仍然下行不致病厥暑厥之死死於中氣之脫非死於氣機之閉白糖立可補中氣藥則多侯時間關係亦大矣中氣先虛因病暑厥既病之後中氣更虛雖應服菖蒲方之病先服白糖方菖蒲方宜可得白糖之助白糖補中不橫不滯有功無過之方也如菖蒲方來不及大蒜黃土方甚效脈虛與不虛皆宜豆漿重約二兩加鹽不可太鹹熱水調化去渣服鹽補中氣豆漿解暑豆之解暑降膽經也可通治暑病大蒜方白糖方豆漿方取得迅速暑厥便利其有暑月乘涼裏陽被外陰所遏皮膚蒸熱惡寒無汗身痛此非受暑乃暑月外感方用藿香薄荷桑葉各一錢黑豆緑豆各三錢煎服以解外陰而安裏陽即愈如兼口渴下利加滑石三錢無以上諸證只寒熱頭疼者蔥白三個淡豆豉二錢鹽少許煎服即愈此非暑病乃暑月感寒脈必有弦緊之象弦緊者寒傷榮而衛閉也故用蔥白通之豉能通滯又能養中鹽補中氣不加鹽見效不徹底鹽味宜稍厚些但不可太鹹又有暑月熱極之時心慌意亂做臥不安面紅膚熱身軟無力不思飲食舌淨無苔或舌色滿紅此暑火不降木氣失根也方用烏梅五大枚冰糖二兩煎湯熱服酸甘相得痛飲一碗立愈凡熱極而死者皆相火不降木氣失根中下之氣皆並於上之故此亦暑病一種但非暑氣入肺窒塞氣機耳此證脈虛或洪暑月發熱烏梅白糖湯特效烏梅善收相火大補木氣暑熱極盛氣升不降之時為補益妙方如秋涼服之少腹頓脹蓋相火已降木氣業已得根不宜再事斂補也熱極之時心慌皮熱小便短赤一服烏梅湯小便清長亦相火下降肺氣清收木氣復疏泄之力也惟舌有膩苔不宜服用將濕斂住必增脹滿病有惡寒者亦不宜服用中暑大汗昏倒暑月忽然昏倒汗出如雨頭昏不能起立重量冰糖水或白糖水頻服或豆漿加鹽熱水調化去渣服大補中氣膽經相火下降即愈中暑而用補中藥以降膽經暑氣可見非外來暑氣為病黃豆一把煎服治一切暑病甚效黃豆養津養中能降上焦火氣本書好用黃豆因其功效高過他藥故多用之本書宗旨在把握原則以應萬變使學者一洗漫無系統之習也發熱欲嘔服下即愈但中虛脈虛者又不如豆漿加鹽有力與糖水有力中虛脈虛兼心慌者非服炙甘草三錢不效溫熱暑三病均無實者至於暑病則暑傷肺氣更無實者閉厥一證愈閉愈虛所以開閉之藥只合用輕清之品王孟英醫案伏暑之證吾人認為自己的伏熱便合暑熱之氣上熱下寒天人所同多有食寒飲冷腹痛瀉利小便不利者平胃散三錢一服即愈兼口渴者加六一散脈遲不渴背惡寒心躁擾者此為陰寒之病平胃散加附子二錢舌苔厚膩而脈象虛微之中兼有沉弦一線心中躁擾者是臟寒而又兼暑宜四逆湯附片乾薑炙甘草各二錢以溫臟寒加六一散三錢以清暑氣單陰寒病舌苔不厚膩也其有平日陽虛忽然病暑者不論外證如何其脈浮大無比按之空虛是為陽虛如按之空虛卻於中部現出細而兼緊或細而不緊之一線口又微苦便是陽虛兼暑陽虛兼暑宜四逆湯附片乾薑炙甘草各一二錢以治陽虛加冬瓜自然汁一兩以清暑自然能愈如無瓜汁六一散三錢或麥冬三錢以代之老人夏月多病此者人身相火的暑氣聚於胃中故脈細緊現於中部細乃肝膽之脈少陽相火膽木從化故口苦脈細溫病濕熱暑病其重要責任全在肺家肺氣能收降下行木氣升而復降即不發生溫病肺氣能收降下行汗尿通利濕不停留熱無所附即不發生濕熱病肺氣能收降下行相火不致逆騰即不發生暑病溫病外證發熱身痛神志昏迷脈象模糊暑病外證惡寒發熱熱則時進時退時退時進頭熱肢冷氣熱欲嘔脈則獨現中部虛而稍數濕熱病外證頭重胸悶口苦惡寒發熱脈象濡數須將溫熱經緯所載病證治法熟玩深思分別清楚庶幾周密少失然必歸本於本身之氣自病方合事實用藥乃有著落溫病濕熱暑病皆尋常六氣之病溫熱諸書每將瘟疫攙入學者讀之遂將理路混亂著者於疫病無實地徹底之經驗以天人圓運動之原理度之圓運動偏為時令病偏之太過則成疫耳如是則病疫亦有六氣之分不能限於溫熱也偏之太過中氣之阻是疫病乃上實下虛之病上愈實下愈虛下愈虛上愈實疫病諸書只知實不知虛誤了後人不少二霍亂霍亂的意義霍者大也升降倒作中氣將散大亂之病也夏秋之交地面上的陽熱盛滿蒸騰是為相火相火下降地上清涼地下溫暖上清下溫升降自然中氣達運不病霍亂相火不降中上則熱中下則寒人與造化同氣中上熱則病熱霍亂中下寒則病寒霍亂熱霍亂之外又有乾霍亂中積霍亂寒霍亂之外又有濕霍亂普通霍亂熱霍亂此處原書缺胸部絞痛而吐酸腐腹部絞痛而瀉惡臭大渴大煩肢體燥擾為熱霍亂此皆中上火盛之人感觸地面相火之熱將本身火氣增加阻塞氣機灼傷陰液所致脈象實數舌無苔或有苔方用新汲井水一大碗一飲而愈相火之火最喜降入下焦陰氣之中最忌散出上焦陰氣之外新汲井水涼而不寒至陰之氣清降之質服下之後將火熱之氣收藏而下於是火藏陰中升降復常津液續生氣機舒展是以諸病皆愈痛而如絞木氣阻滯氣展木舒故痛愈也乾霍亂胸腹絞痛欲吐不得欲瀉不得舌起乾黃苔渴能飲水脈沉實有力為乾霍亂亦名悶霍亂吐瀉者亦名熱霍亂用大黃黃連瀉心湯或兼用刮痧法刮痧法最效立刻病減胃間積氣刮通也刮法詳下文大黃黃連瀉心湯大黃黃連各一錢不煎開水泡微有苦味便行服下之後胸腹氣舒則愈人身氣機升降運動無一息之停胸腹絞痛者氣機聚塞不通也瀉心湯與刮痧法皆係將聚塞的氣機迅速疏通之故中積霍亂暑月之時汙積之地忽有暑積之氣由口鼻入胃而病霍亂胸腹滿痛昏迷煩悶或吐瀉或不吐瀉先用痧藥取嚏或紙撚取嚏用新取黃土一撮大蒜半個同搗溫熱水調去粗渣服黃土大蒜能滌積氣助升降此方治此病有恰好妙處虛證去滯之法霍亂無實證雖人霍亂舌有乾黃苔乃一部份暫時之實熱耳霍亂除寒霍亂外皆胃滯也寒霍亂盛夏之時太陽射地的熱盛滿蒸騰雨多之年熱氣隨雨降入地下上不病熱下不病寒雨少之年熱氣不降地面之際上熱下寒中上偏熱之人感觸熱氣增加了本身熱氣熱傷津液氣機因而阻滯遂病熱霍亂乾霍亂中下偏寒之人感觸寒氣增加了本身寒氣中寒不能旋轉升降遂病寒霍亂寒霍亂胸滿而吐吐非酸腐腹冷痛而利利非惡臭亦有腹不痛者口不渴舌無黃苔小便不利四肢無力微作寒熱氣微神清脈象虛微或虛大方用理中丸黨參白朮炙甘草乾薑各二錢蜜為丸如無丸亦可煎服中氣溫運則胃氣降而不吐脾氣升而不利此病虛寒之中又兼濕氣故升降倒行而病如此此方參草補中之虛白朮除濕乾薑溫寒故病愈也然須有變通之法因吐利之後津液大傷剛燥之藥多不能受如有當用此方而此方服下反又吐出者此乾薑白朮燥橫太過可用炒吳萸一錢以代乾薑加炒黃連二分以降胃逆用茯苓以代白朮便妥參草仍用黃連降胃逆所生之虛熱而止吐使溫中之藥得順下耳冷痛者寒甚陽微不似絞痛屬於木滯也此證如因病人服方仍吐認為熱霍亂而以熱霍亂之方治之亦如熱霍亂誤服薑朮必立見大禍以生薑嚼之不覺甚辣便是寒病寒霍亂吐瀉之後津液受傷亦有渴欲飲水者燥藥務必慎用若欲飲不止是陽氣自復矣寒霍亂用燒鹽湯亦效用食鹽燒紅調溫熱水服溫補中氣亦理中丸之意味不可鹹適口為度咸則傷陰若寒霍亂吐利而兼汗出肢冷者宜四逆湯附片二錢乾薑炙草各二錢回陽乃愈如脈微欲絶汗出外熱小便復利是陽氣虛脫於下陰氣散失於上須用通脈四逆加豬膽汁湯復陰回陽乃愈乾薑四錢炙草三錢附片二錢豬膽汁略有苦味即行重用薑草以溫補中氣而通脈附片回陽豬膽汁復陰使四逆湯能下行也此方如無豬膽汁服下必仍吐出氣脫而死濕霍亂濕霍亂吐利之後身熱汗出頭疼渴而能飲水仍吐出小便不利方用五苓散茯苓豬苓各二錢白朮澤瀉各一錢桂枝一錢研末熱開水送下多飲暖水汗出尿利即愈如無散服湯亦可濕霍亂胸腹不絞痛如吐水而胸間硬痛須加木通二錢以助五苓散之力乃愈熱汗者濕氣阻格相火不能下降也頭痛者濕氣壅遏於上也渴而能飲飲而仍吐者濕傷津液相火不降故渴而能飲飲為濕格不能下行故吐也五苓散泄去水濕相火下降故愈用桂枝者疏泄小便也五苓散證之身熱並非外感乃濕氣阻格相火不降之故霍亂病夏秋之間病者極多治法稍差動關生死王潛齋醫書五種有重訂霍亂論辨證明白方法細密為霍亂第一完備之書所列熱霍亂誤服溫補之禍一片苦心嘉惠後學讀之增人知識惟謂熱霍亂為普通時氣之病寒霍亂全為個人身體之病卻未妥當民國壬申西北夏旱雨少霍亂盛行醫見旱熱用涼藥清熱皆死醫用當歸扁豆川芎薏仁吳萸溫暖柔劑加黃連一二分者多得救活可見大氣上熱不降中下必寒人身因而上熱下寒天人一氣不可置而不問孟英先生經驗宏富我之師也天人之理則未盡解矣霍亂病除寒霍亂外凡胸腹絞痛而吐利或至手足溫腳轉筋四肢發厥者皆宜溫通胸腹滯氣用藿香葉荊芥各二錢濃煎溫服或嚼服滯氣一通諸病自愈寒霍亂忌用如病在處暑以後者白馬通一味極效詳下文燥氣霍亂中凡胸腹絞痛之霍亂一面服藿香荊芥疏氣一面用刮痧法用磁碗邊抹植物油刮背脊兩旁肩胛骨之間順刮而下不可倒刮頸項兩肩兩肘彎兩腿彎刮出紅點內外氣通則愈人身臟腑皆繫於脊即繫於肩胛骨中間之處頸項兩肩肘彎腿彎為臟腑經絡之總刮故刮之而臟腑之滯氣皆通惟胸腹不絞痛之寒霍亂則不可刮刮則氣散胸腹雖不絞痛而背脹肢麻面色漆黑者仍可刮之刮後服重量白糖水以補中氣養津液頻頻服之普通霍亂胸腹絞痛上吐下瀉舌無乾黃苔而有潤黃苔為普通霍亂重量白糖水頻頻溫服補養中氣補養津液中氣回復胃降脾升吐瀉自止而病愈或用黃豆漿約重三兩熱水調化去渣服豆與鹽皆補中氣而豆並能調和肝膽木氣之邪氣時令病最宜用豆即是調和木氣如無豆漿用豆豉一把加鹽煮水服鹽味厚些為合惟不可鹹鹽味薄則補中無力鹽味鹹則傷陰液宜加注意世用食鹽水甚效此寒霍亂也鹽傷津液非寒證慎用霍亂煩渴者烏梅五枚煎湯調生白蜜一匙立愈烏梅降膽經生津液白蜜潤肺胃也霍亂統分不渴者與渴而能飲水不吐出者與渴而能飲水仍吐出者不渴者用燒鹽湯溫補中氣即愈渴而水不吐出者用藿香荊芥各一二錢研末白水吞下疏通胃滯即愈如不及為末嚼吞亦可煎服亦可渴而水仍吐出者用燒鹽湯吞藿香荊芥即愈水仍吐出兼中寒也此三方可為霍亂治法之總結如非不渴之寒霍亂忌用鹽否則鹽傷津液吐利又傷津液必壞白糖水養中養津霍亂皆宜多食寒霍亂病人食之喜悅者亦宜食不喜悅者不必食津液已傷則食之喜悅也黃荊條葉寥花葉各一葉嚼食白糖水送下或煎服治胸腹絞痛之霍亂而渴者特效胸腹不絞痛不渴者忌服此二物與藿香荊芥氣味相同疏通之力量較大故寒霍亂忌之荊條可編筐箕之條其葉五岔七岔不等有寥花處多有之燒鹽湯白糖水藿香荊芥荊條葉寥花葉霍亂盛行時之簡便良方也荊條葉寥花葉宜早備隨身應用做成一分重一丸一丸便效三水瀉水瀉的意義夏月火氣濕氣當令夏火灼金木氣退化人身亦然脾濕土滯升降不調肺熱不能將水收入膀胱肝虛不能疏泄水濕水入大腸遂成水瀉水瀉分普通水瀉肺熱水瀉停食水瀉傷陰水瀉水瀉已愈二便難分濕氣水瀉轉寒水瀉普通水瀉水瀉一日一二次者為普通水瀉方用加減平胃散蒼朮厚朴橘皮檳榔炙草白芍當歸梔仁各一錢即愈蒼朮溫散水濕橘皮檳榔調理胃間滯氣梔仁清肺熱助收斂厚朴溫肝陽助疏泄炙草補中氣歸芍養津液也煎一次分三次服一服尿利瀉止即止服尿利切不可再服再服傷陰尿多即成大禍肺熱水瀉夏日肺熱汗出而水瀉好西瓜飽啖肺熱清小便利水解制止汗出亦肺熱也老人或體弱人用冬瓜蒸自然汁溫服清利肺胃瀉亦能止夏日水瀉肛門覺熱者即是肺熱西瓜汁冬瓜汁極效總之夏火克金則熱氣傷肺肺熱不能收斂故病水瀉所以清肺熱理胃滯為夏月利水唯一妙方不可徒用薑苓反傷津液而增肺熱也停食水瀉水瀉多兼停食不論何時誤服溫補多致瀉死停食水瀉分虛證實證實證噯酸惡食口苦潮熱譫語腹滿痛拒按脈實有力舌有黃燥厚苔虛證噯酸惡食不潮熱譫語不腹滿痛拒按不發熱或發熱起則頭眩口或苦或不苦舌無燥苔或有苔不多脈虛而緊緊者積聚之象也實證用大承氣湯下之下去燥糞水瀉乃止虛證用加減平胃散凡用平胃散總須輔以清熱養液之藥小便一利切勿再服再服傷陰小便一多必貽大患朮朴燥熱利水力大之故烏梅八枚白糖二兩水瀉極效此夏熱上盛相火不降木氣退敗不能疏泄烏梅補木氣助疏泄降相火故效夏日木氣不能疏泄故水入大腸也如夏日陰雨不熱水瀉盛行用黃豆炒熱磨粉食運水燥濕尿利而愈凡交夏病水瀉痢疾者服此方即愈傷陰水瀉水瀉日久諸藥不效食欲照常此瀉傷陰液熱氣外溢宜豬肉煮濃湯去油隨意啖食補起陰液熱氣內收小便清利即愈如胸中有停食臭味者用湯吞服神麯檳榔各一錢可也瀉久傷陰後患甚大此方補陰非草木之品所能及不可輕視水瀉已愈二便難分如水瀉已愈大小便仍分不開可用歸芍地黃丸一次吞服一錢一日三次服大小便自能分開緣水瀉傷陰肝木失養不能自主其疏泄之權欲小便則大便並出或則先解大便少許然後能解小便大便雖無水而是爛糞一日仍有二三次歸芍地黃丸乃六味地黃丸以補陰加當歸芍藥以調肝木也此方水瀉而人虛脈弱素日肝木枯熱者最效以上加減平胃散治普通水瀉西瓜冬瓜汁治肺熱水瀉大承氣湯治停食實證水瀉烏梅黃豆粉治脈虛水瀉鮮豬肉湯治陰虛水瀉歸芍地黃丸治陰虛肝枯水瀉濕氣水瀉水瀉不噯酸無停食關係而渴能飲水者用五苓六一散茯苓豬苓澤瀉白朮各二錢桂枝一錢六一散三錢煎服五苓去濕六一清熱利尿道也消食之品忌用若不噯酸而瀉白水是食不停於上而停於下仍用停食治法檳榔山楂麥芽神麯炒梔仁各一錢連服二三劑白水轉為黃水即愈火土轉寒水瀉水瀉有滯者以腹響腸鳴為證據人身二便分利又賴小腸運化之力此運化作用是整個圓運動火土二氣居小腸之部為圓運動的樞機中氣是也若有一點停食阻滯其間整個運動不能圓融小腸之力即不能將水分運入膀胱水入大腸便成水瀉水入腸中是以作響病水瀉者若服藥後腸已不響小便已利而仍水瀉且轉黑緑色食欲大減是停食尚未全消火土之氣轉寒宜消食兼溫中之法用炒檳榔炒山梔炒神麯炒麥芽各一錢加乾薑一二錢忌用炙草黑緑轉為黃色然後糞便漸乾乃愈涼藥陰藥不可再用如服乾薑發現燥熱加吞歸芍地黃丸一二錢以養陰為治水瀉無尿腹中雷鳴咽中有傷食氣味用檳榔大黃各一錢以消食大烏梅十枚補木氣助疏泄以行水傷食氣味已消仍瀉者是食已消去疏泄不足去大黃檳榔單用烏梅日日服之服至小便長為止雖咽中無傷食氣味而腹中雷鳴是亦傷食凡白朮山藥扁豆等一切補土之藥均忌此方可為水瀉總方平穩而有特效法則精當藥味簡單有益無弊也水瀉誤補而死者多矣食消尿利一日即可復原烏梅溫升肝經脾即受益溫降膽經胃即受益利尿又兼開胃進食之藥也若尿利仍服烏梅即小便加多肝脾枯燥變生大病烏梅其性溫燥故也水瀉咽中已無傷食味者不可用檳榔消滯如人虛脈少用參苓白朮散黨參白朮茯苓各五錢煎服連服三劑即止雖有腹鳴之證亦可服之此腹鳴乃中土虛而不運之滯不可消滯傷中亦不可用炙草以橫中水瀉而鼻氣熱者不可用大黃鼻氣熱者多下寒宜用檳榔一錢以去滯陳艾葉一錢以溫乙木之寒或用烏梅五枚以代艾葉亦可四痢疾痢疾的意義痢疾之病何以多在夏令與秋初因正當木氣敗退土氣濕盛之時偶然寒熱不調之大氣人身的木氣遂陷於土氣之下不能疏泄遂病痢疾而金氣當旺木氣更衰疏泄更難故不易治普通痢疾後重下紅白腹痛小便不利此病中氣虛寒不能升降木氣肝木下陷不能復升鬱生下熱木鬱生熱疏泄不遂所致方用乾薑二錢炙草三錢以溫補中氣木香五分以溫升木氣以疏泄小便當歸白芍各二錢以養木氣之津液而和其疏泄炒黃連一錢以清熱也舌有黃厚苔者加檳榔一錢以消胃滯無黃厚苔切不可加黃連春夏用吳萸水炒立秋後不炒紅白者大腸中之脂膏被木氣衝擊而下也大腸氣屬庚金金主收斂木氣下陷於庚金之中則衝擊於肛門而庚金之氣有收斂之故覺後重稍下紅白木氣稍遂故又暫止木氣主動暫遂一時又欲疏泄木氣疏泄金氣收斂相為乘除故痢疾一日數十次世以紅白為邪氣非下盡不可誤事多矣又以痢疾為有滯非消導不可滯誠有之亦本身之氣之滯只可調和升降萬不可消世云痢初起無補法木鬱不升愈補愈鬱也如病人所在地冬令雷鳴或冬令不冷大氣中陽根不足則夏日痢疾多有兼下寒而紅多白少者黃連忌用宜加生艾葉一錢以溫下寒切不可用附片附片補水木之陽木氣正鬱而補之鬱更加矣普通痢疾最多此方經過多少困難而成審度脈象加減用之無不效者此方亦治噤口痢疾痢而至不食中敗極矣不食之原因木氣橫結中氣大敗胃口熱結也木氣橫結以克胃土歸芍木香以舒木氣中氣大敗炙草乾薑以溫補中氣熱結胃口黃連清熱開胃故能食而痢止也痢疾之水熱乃木氣寒陷於下鬱而生熱今不能食則上下皆熱上下皆熱中氣虛寒薑連與木香白芍並用其旨微矣痢疾如在立秋以後其水氣之鬱而不能疏泄乃金氣斂結之故於方中加薤白五錢葛根三錢薤白降辛金葛根升庚金金氣通調水氣之疏泄乃遂小便乃利病乃能愈普通痢疾方之黃連秋後痢疾多宜用之春夏痢疾慎用秋後陽氣歸下水氣得根水熱較足春夏之痢疾水氣虛寒其熱不足故也偏熱痢疾腹痛下紅白白多紅少或全白不紅後重小便不利口渴身熱口臭氣實口苦舌苔乾黃脈象沉而實或數而細沉有力方用白頭翁黃柏當歸白芍葛根檳榔各二錢黃連一錢繞臍痛甚按之更痛者加酒製大黃一二錢清熱養水疏滯升陷即愈脈弱者大黃忌用如下白物而不口渴或下如熟藕粉之物脈不實用普通痢疾方去乾薑木香減半白頭翁黃柏最寒能清下部木氣鬱熱偏寒痢疾腹痛下紅白極重紅多白少或全紅無白小便不利不渴口淡氣微或面紅舌苔白而潤脈象沉微或洪大按之無有方用桃花湯乾薑赤石脂粳米各三錢溫寒即愈左脈較右脈細者加當歸白芍各一錢以潤養木氣乾薑溫中赤石脂固滑脫粳米生津液保胃氣也如脈不微不洪用普通痢疾方去黃連加艾葉一錢並加炙草一錢外感痢疾此因外感榮衛失和引動裏氣失和而病痢疾也痢疾證狀亦如普通痢疾惟加身痛與惡寒發熱脈象數促方用桂枝湯加葛根桂枝芍藥炙甘草生薑各三錢小紅棗肉六枚葛根三錢桂枝湯和榮氣加葛根和衛氣榮衛和則肝肺之氣和肝肺氣和疏泄與收斂調和不偏是以痢愈然方中藥品只在解表並不治痢可以見表裏一氣之意矣葛根和衛氣者葛根善升大腸金氣大腸氣升肺氣自降肺氣為衛氣之主肺氣降故衛氣和也痢疾盛行之際有病痢疾而手足抽搐牙關緊閉者此即外感痢疾衛氣閉束不舒榮氣乾澀不潤故現證如此此方開衛氣之閉潤榮氣之澀葛根芍藥各加為四五錢可也葛根開衛氣之閉芍藥潤榮氣只澀凡病痢疾小便一利木氣升達諸病即愈如小便已利病仍未愈此為大虛宜黨參白朮各二錢山藥炙甘草各三錢左脈較細者加白芍當歸各一錢不思食者加甜蓯蓉炮薑各五分以至一二錢附片不用較妥其性剛烈不宜痢疾痢病用之能將水氣燥傷水氣更亂或用參朮苓草當歸萸肉甜蓯蓉各一二錢補脾養肝血亦效此方脈虛痢久者甚相宜也小便不利認為應當補虛者此二方均宜凡體虛不能用木香以利小便之人可用鮮葡萄須一握煎服小便即利或肥烏梅五枚白糖一勺亦佳補木氣助疏泄也東行李根白皮補木氣助疏泄亦效普通痢疾如在冬天不聞雷而有雪有冰之地黃連可加至二錢因其地大氣陽足水氣之熱較實非黃連不能清去其熱能用黃連的普通痢疾其愈極速不能用黃連而用梔仁其愈稍遲然不能用黃連之地而亦用之傷損脾陽必遺後患日久難愈此人所忽也如痢疾日久飲食照常左脈小而沉小便不利而腹滿痛者好西瓜飽食小便清利諸病自愈或生荸薺十數枚連皮嚼食養陰去積即愈此即熱傷陰份之痢也如舌白如粉不渴日痢數十行小便不利痢下之物白而沉重胸腹如格漸至不食諸藥不效者用椿葉包圍腰腹緊墊肛門並閉口做深呼吸以聞椿葉的香氣並煎椿葉濃汁時時啖之約半日之間小便自利而愈此危候也然其脈必沉弱如痢疾發燒脈洪大有力則凶矣椿葉收斂金氣溫運木氣也東行李根白皮二兩濃煎亦效李根最補木氣性微燥木香有氣味厚量重本方分量乃薄者如用厚者須減三分之一否則傷血燥肝痢疾後重如力大難支有內臟都要壓出之勢此為大虛白芍五錢雌雞一隻燉服即能減輕老年人與上年冬季鳴雷交夏病痢疾之地多有大虛之證雞大補木氣之陽白芍和之助其上升也後重力大難支木氣陷極之象痢疾的原則中虛木陷世之好用大黃殺人者原則未認清也每年痢疾盛行之時每日食炒熱黃豆粉少許溫寒燥濕疏木使木氣不陷即可不病痢疾可靠之法也病痢時過服熱藥病愈之後大便後有膿血滴出腸胃間時痛時響小便時少時多腰下脊骨中每夜必有似欲下墜之意並作響聲腎脈肝脈如無面色深黃經年纍月不愈者此肝腎被熱藥灼傷陰陽俱虛腎寒肝熱而土濕方用黃土湯附子以溫腎寒阿膠生地黃芩以清肝熱白朮灶心土以除土濕炙草補中服後肝腎脈起升降流通其病乃愈白芍降膽經以升肝經清熱滯收疏泄以術草輔之重用最宜時方之歸脾湯亦效紅痢有寒證有熱證究竟寒多熱少白痢有熱證有寒證究竟熱多寒少一壯漢三十餘歲未結婚病紅痢不渴口亦不苦舌亦無苔脈沉實命服龍膽草炙甘草各二錢而愈一孕婦病白痢如清涕脈虛微命服附子理中湯加當歸鹿茸十餘劑乃愈痢疾原則只分寒熱兩門熱證用傷寒論白頭翁湯為提綱寒證用傷寒論桃花湯為提綱勿擾他藥一少年病痢日下數十行服石膏黃連等藥病加重豫診其脈弦而長胸飢此木氣疏泄之病也用阿膠五錢炙草三錢飢止脈平痢略減脈仍弦以為陰傷濕盛用鴨蛋做成之皮蛋兩枚服後糞下極多痢大減仍日數行後用白朮白芍各五錢並食豬肉而愈後之用白朮白芍者痢久則土敗木盛也食豬肉補陰液也痢之為病如此復雜不知原理徒守成方者宜其施治不效了後方白朮前方炙草凡木病須補中土仲景先師曰見肝之病當先實脾其義如此皮蛋養陰除濕五瘧疾瘧疾的意義瘧疾外證惡寒發熱汗出病解或熱退病解病解之後一如平人病深則隔日一作病淺則當日一作此金氣斂結木氣鬱結中氣滯結之病也金匱云瘧脈多弦弦者木氣鬱結不舒之象西南方此病最多因西南方土薄水淺地下封藏力弱降入地下的陽氣雖非春季升發之時亦隨時忽降忽升將下降的金氣抵觸不能降下金氣主收斂既降不下於土氣之下具斂結於土氣之際於是木氣與金氣斂結疏泄不通大氣之中常有偏於斂結作用人氣感之遂病瘧而現弦脈必弦象退淨瘧乃不發北方偶有病瘧則停食而感寒氣所成而已瘧疾分普通瘧疾惡性瘧疾普通瘧疾惡寒發熱或單寒不熱汗出病罷起居眠食一如平人為普通瘧疾方用麥冬草果仁烏梅方麥冬三錢草果仁一錢烏梅三枚切細吞服病發前服一劑煎服亦可服後胸腹響動即愈小兒減半麥冬開金氣只結草果仁開中氣之結烏梅開木氣之結故病愈也惡性瘧疾寒熱已罷仍不能食不能眠或常熱不休汗出體倦或吐或腹脹滿面黃肉腫尿少脈虛等等虛象為惡性瘧疾方用八珍益母丸三錢烏梅三枚煎湯吞送如無丸用湯藥黨參白朮茯苓炙草當歸川芎白芍生地各一錢益母草五分凡體氣虛弱與老年之人與久病瘧疾之人宜服此方平日曾服薑附者加乾薑附子各五分參朮苓草補氣分歸芎芍地補血分益母草活動氣血之結虛人老人其效極大開結之品只益母草一味且甚和平而補氣補血之品乃如此之多愈虛愈結治虛為重治結為輕之法也老人最怕瘧疾臟腑榮衛整個損壞之故麥冬草果仁烏梅方治普通瘧疾無有不效不傷身體省事多矣如惡寒多而發抖者是內熱素盛將麥冬加倍用之麥冬寒胃草果耗氣應服八珍益母者不可服之麥冬證脈弦細有力八珍證脈無力也八珍益母證如脈象太虛可用麥冬錢半草果五分以代益母益母散力太大恐更虧也瘧疾復雜此篇只列此二方者凡前賢醫案用涼藥清肺之病皆可以麥冬一方的原理方法括之前賢王孟英醫案多有清熱治愈者方法細密可學凡前賢用補劑而愈者皆可以八珍益母一方的原理方法括之有單用洋參見效者補金氣之降以開金氣之結也用烏梅白糖見效者補木氣之疏泄以開金氣之結也用燒酒泡紅棗燒焦見效者亦開金氣木氣之結也用醋糖見效者開金木之結也冷而不熱脈弦細而沉為麥冬證如脈不弦細但沉而不顯明亦為麥冬證沉而不顯為伏脈亦斂結之象也如單熱不冷而小便短者烏梅四枚以補木氣收相火小便短者木氣虛寒烏梅特效如單熱不冷小便長而且多脈不微不虛者白虎湯清金氣之燥熱補中氣之虛極效烏梅禁用單熱不冷兼骨節煩痛而嘔者又須遵金匱之法白虎湯加桂枝一面清金燥一面和榮衛為治冬雷鳴起大風冬不寒而反熱之地多麥冬兼烏梅證與八珍益母證或甚至八珍益母加附子乾薑乃愈也白虎湯詳傷寒方解篇烏梅五枚桂枝三錢麥冬生石膏各五錢炙甘草生薑各三錢紅棗六錢據前慣例可能為枚草果檳榔各一錢治普通瘧疾日久不愈者特效桂枝烏梅以解熱麥冬石膏以解寒炙草薑棗以補中瘧疾的寒熱榮衛與中氣的關係非少陽膽經的寒熱關係柴胡升散千金方喜用之只知少陽經之寒熱不知榮衛的寒熱也謂石膏麥冬係用以退熱不知榮衛的寒熱也瘧疾之熱出於榮寒出於衛榮衛調和寒熱自罷榮衛調和全賴中氣所以炙草薑棗有莫大之功草果檳榔開結之法亦不可少服麥冬草果仁方不愈者亦可服此方瘧疾只要有寒熱證在無論兼現何證總以麥冬草果烏梅方為主瘧疾已罷乃治他證一五十餘歲病者腹腫脹腳亦腫不能食舌苔黃口苦尿赤隔三日交申時發冷發熱病已兩月用麥冬草果烏梅於申時初服下瘧疾不發四小時時後舌苔黃退半進食甚多口不苦尿轉清連服三劑諸證全愈如瘧未愈而治他證榮衛未和必因他經之藥而使瘧病加重先治瘧疾瘧愈而榮衛調和陰陽不亂臟腑復其平和之常諸證自愈能食飯之功也麥冬草果仁烏梅方如因他病成虛而發冷者禁服須一病即發冷純屬瘧疾者乃可用之草果傷氣麥冬寒胃之故然較其他用砒霜常山之藥穩妥多矣如麥冬草果烏梅湯證服後仍發微冷微熱或冷熱止不思食此脾虛也麥冬三錢烏梅三枚黨參茯苓白朮各三錢不用草果一日服二劑脾土復原自愈其脈必不弦細不可再服草果傷脾此則惡性瘧疾之類矣瘧疾之寒熱有一定之時間不比暑病之熱時進時退時退時進認清此點便與暑證分清也六喉痛喉痛的意義白喉小病也死亡卻多藥之誤也喉痛分中虛喉痛陰虛喉痛濕熱喉痛外感喉痛陽虛喉痛爛喉痧普通喉痛中虛喉痛中虛喉痛喉痛不作寒熱或微作寒熱精神倦怠飲食減少面色萎弱或浮紅脈象虛小重按更微方用炙甘草一錢煎服即愈如其不愈炙甘草桔梗各一錢煎服分多次服下此病因中氣虛少陰心經之火不能下降也少陰之經心火與腎水同氣心火下降交於腎水不逆衝咽喉則咽喉不痛心火下降全賴中氣心火上逆中氣必虛故用炙甘草養中降火不瘥者心火不降肺金必傷金被火刑收斂滯塞肺主津液津凝成膿咽喉之間即起白點故甘草湯加桔梗以補中排膿降肺也脈象虛小中虛之象若重按更虛誤治即死陰虛喉痛喉痛不作寒熱或作微寒微熱精神並不倦怠飲食亦不減少面色如常脈象或沉或細弦或薄而澀或左尺微少咽部紅而不鮮紅處甚寬或不作紅色方用當歸五分嚼食立愈或用豬膚湯豬腹皮煮成濃湯去油加白糖隨時服分多次服下陰虛者火金不降而津液虧也火金不降此亦尋常之病原無何等危險自元金養陰清肺湯盛行白喉遂成要命的危險大證冬春之交死亡接踵養陰清肺湯除薄荷甘草外其餘麥冬生地芍藥貝母丹皮元參苦寒滋膩寒中敗脾此體強火旺脈實氣壯之人病喉症之方也白喉證脈實氣壯者少氣弱脈虛者多如中虛症服之心慌腹瀉增熱加痛一日即死豬膚湯養陰清肺不濕脾胃不寒中氣功效極大虛家極其相宜即脈實體壯之人服之亦奏殊效或用淡豆豉一把煎服甚效小兒尤宜喉症冬季春季極重夏季為輕秋季更輕冬季火正當藏根不當上衝春季木火甫經萌芽不當上衝故病重夏季火炎於上應病喉症故病輕秋季肺金燥結斂住火氣不得下行故更輕重者重在下焦根本動搖也脈象弦細津液傷耗之象白喉的脈是怕中沉較浮部虛少中氣離根則中沉少也如不急於補中而用涼藥必死濕熱喉痛此症惡寒發熱舌有薄苔喉痛如鎖身痛胸悶或不痛不悶脈象緊促方用苦酒湯半夏一錢研細雞蛋一個去淨蛋黃將半夏和蛋白仍入蛋殼中再加白醋滿蛋殼攪勻用柴火於蛋殼下煮三沸候溫徐徐服下不愈再作服此方苦酒半夏散濕開閉蛋白潤肺清熱也寒熱舌有苔身痛胸悶皆濕之現證濕熱凝沍故痛如鎖此證如服炙甘草必將濕熱補住而痛加重也脈象緊促閉結之象喉痛如鎖不可忽也苦酒即白醋外感喉痛此症惡寒微發熱卻惡寒特別之甚而體痛舌有黃燥苔口臭喉痛極劇脈象緊而有力或沉細有力惡寒脈沉緊有力為必要證據乃外感風寒衛氣閉住內熱之證也方用麻杏甘石湯麻黃二錢杏仁三錢炙草一錢生石膏三錢熱服即愈麻黃開衛氣之閉以舒肺而止身痛杏仁降肺潤肺生石膏散熱結以止喉痛炙草補中氣也如口臭而舌苔厚膩太甚時時噁心欲嘔者加生大黃五分或一錢以清胃間濁熱乃愈脈沉緊有力衛閉熱結之象為用麻黃石膏之據陽虛喉痛此症亦由外感而來微發熱惡寒不渴不食胸滿氣微神怠脈虛遲微小無神喉痛不甚速速回陽補中方用四逆湯附片乾薑炙草各二錢加童便半杯病人所在地上年冬至前後鳴雷或冬至後不冷春間即有此病不速治之即成傷寒少陰證而死或用豬腰湯溫補腎家亦效幼童宜之幼童小兒當冬至立春只間嘗有神憊面黃而喉痛者其脈必微少而遲豬腰湯極效豬腰湯詳古方篇腎氣丸冬至後咳而吐宜此方白喉病如中虛陰虛陽虛審查不清可用試探法用炙草一錢煎濃湯服下病減輕者即屬陽虛中虛痛反加重者即屬陰虛雖痛加重卻不妨事睡醒痛減亦為中虛睡醒痛加亦為陰虛如口並不苦嚼食炙甘草不知甜味此陽大虛也白者肺經已傷紅者肺經未傷白愈多者中氣愈虛有初病不過一白點腫不大服甘桔湯後白點加多腫加大者此非藥之過乃病氣正盛然隨盛隨衰病即遂愈不必疑慮凡中虛喉痛面色多紅服涼藥即死凡可食涼藥之病面色必不紅內熱愈實者面色必深垢而微黃也喉症亦然喉症之死皆死於中氣亡脫如中不虛者雖病至筋肉潰爛亦不致死如溫病而兼白喉須先治白喉後治溫病治白喉用炙甘草生甘草各五分桔梗一錢炙草服後喉痛已減溫熱加無妨服炙草所加之熱乃胃家之熱溫病胃熱為順也如喉間並無白點而有紅點此是陰虛火逆用生甘草降火即愈忌用炙草如滿喉紅成一圈此肺氣不足不能生津下降用豬膚湯潤之或六味地黃丸滋陰乃效脈虛者用生黨參三錢小棗十枚煎湯徐服使中氣復旺以生肺氣肺氣降而生津自然病愈如豬膚湯服後見效又痛者次咽圈之紅乃心火不降此心火不降乃腎氣不升心腎相交升降互根用腎氣丸一二錢調服而愈或豬腰不去內膜煮濃湯溫服以補腎氣腎氣能升心火自降也其脈必微而無神如服涼藥即危看喉之法命病者張口念哈字舌自向下自能得見患處凡喉痛除中虛陽虛陰虛三證外可用刮痧法一疏通氣血痛即能止刮痧法詳霍亂中爛喉痧此病乃猩紅熱之兼證也不可治喉治喉必壞猩紅熱治愈爛喉痧自愈猩紅熱治法用三豆飲加減詳本書溫病本氣篇藥店所售吹喉散皆清涼疏散之藥除中虛喉痛陽虛喉痛外皆宜用此藥吹之甚妥王孟英自製之錫類散最妙方詳王孟英醫案篇喉痛臃腫俗稱鵝子言腫處如鵝蛋也鵝子臃腫滴水難下脈實有力者將鵝子刺破吐出膿血即愈脈虛者用西醫洗腸器貯入稠粥汁由肛門灌入穀氣入腹中氣轉動鵝子減小便能服藥麻杏石甘湯證之喉痛刺破血出脈通惡寒罷立愈辨別喉痛寒熱用炙甘草試驗外可用肉桂一錢煎服寒者其痛立減再服肉桂即愈熱者其痛立加雖加痛無妨因熱證喉痛不致動關生死也白喉病在咽頭者重病在喉頭者輕咽頭屬胃中虛陽虛則病在咽頭喉頭屬肺中虛陽虛以外諸證皆病在喉頭中虛陽虛易死故病則咽重於喉也普通喉痛無以上各種喉痛脈證而喉痛者用王孟英青龍白虎湯橄欖十枚生蘿蔔半個搗爛煎服無橄欖用青果亦佳橄欖涼降蘿蔔溫降不偏涼又不偏熱能將肺間逆熱降下最善之方喉證起時宜多備之藥鋪的西藏青果甚好七感冒感冒的意義同氣為感異氣為冒大氣疏泄人氣也疏泄大氣收斂人氣亦收斂為感大氣疏泄人氣收斂大氣收斂人氣疏泄為冒感冒者感冒風寒也感冒與傷寒溫病不同傷寒溫病榮衛感冒裏氣遂病故病重故人死感冒之病半在肺家半在榮衛裏氣不病故病輕人不死也普通感冒惡寒發熱身痛能起床並不覺劇用蔥豉湯蔥頭四個連鬚淡豆豉有鹽者亦可兩羹匙煎服此亦麻黃湯證之意義病氣極輕者蔥頭降散衛氣豆豉調中宣滯也鹽最補中不惡寒只發熱神智清者仍用蔥豉湯神昏者一味黃豆湯養中養榮即愈神昏不惡寒只發熱此溫病之屬故不用蔥豉之宣通只用黃豆養中養榮相火歸根病即愈也此二方輕而又輕病愈之後無有他弊神志不昏仍是感冒並非溫病故仍用蔥豉湯時行感冒此病非傷寒非溫病惡寒發熱頭疼身痛不能起床數日之後亦覺口苦脈象躁急此時令之氣驟然上升感傷榮衛人多同病故曰時行方用生黑豆五錢薄荷一錢桑葉一錢淡豆豉三錢冰糖一兩煎服安臥不必厚蓋自然汗出而愈凡外感厚蓋每每汗出太多致生流弊此方即傷寒論麻黃桂枝各半湯之法不用麻桂本方而用薄荷桑葉以代麻桂豆豉冰糖以代白芍生薑大棗炙甘草因剛燥之品取汗必須確係麻黃桂枝證方可照方用藥黑豆潤降膽經亦可替代芍藥而無寒中之弊淡豆豉和平調中有能宣運滯氣如病已多日口已苦者加柴胡黃芩各一錢以升降少陽經氣病因呼吸驟然上升之大氣而來中氣驟虛故脈象躁急此病失治多有變成大病者兼瘧感冒外感惡寒發熱並惡風身痛並覺內熱脈不浮虛而沉數服發汗藥汗大出病解過半日病仍如故惡寒更甚再服發汗藥病必不已寒熱必更甚不發汗病由何解此為兼瘧外感方用重劑蔥豉湯從頭帶鬚五個淡豆豉五錢麥冬三錢草果仁一錢服後滿身微汗榮衛復和即愈豆豉和榮蔥頭和衛麥冬草果開瘧結也此等病無論服何方無不病更加重者惟此方和榮衛開瘧結微汗而愈此活潑之法果能悟通其學力必非尋常可比此病不速解決即轉成大柴胡湯證其證口苦申酉熱增而出冷汗起則頭暈不思食常欲吐舌苔黃而潤夜半發冷腹微滿面黃口臭不渴大便不結解時覺熱其口苦苔潤腹微滿口臭欲嘔者膽胃熱也頭出冷汗起則頭暈者少陽相火逆升也夜半發冷者膽經結子時膽經氣動也宜柴胡黃芩芍藥解少陽經之結降相火之逆大黃枳實清胃以去黃也宜用輕劑連日服之徐徐解除不可瀉下苔黃而潤胃熱不實也特別感冒特別感冒惡寒發熱頭疼身痛口渴脈沉軟有力惡寒至於發戰身痛有如被杖口渴而卻淡者此體強之人內熱素深忽感外感衛氣閉住內熱也方用荊芥薄荷桑葉竹葉各二三錢以開衛閉黃芩生石膏天花粉金銀花各二三錢以清內熱自然汗出而愈內熱脈軟此軟字有厚實之意非虛軟之軟虛軟之軟脈薄而微只可謂為虛脈不可謂為軟脈惡寒無內熱不發戰內寒口淡食鹽知鹹味內熱口淡食鹽不知鹹味身痛如被杖者衛閉之甚內愈熱衛愈閉也且有閉至脈伏於沉部之下者此衛閉之甚因於內熱脈沉有力故不補中以助內熱也熱傷津液腠理乾澀且有身重難以轉側者亦有服清熱藥後脈起熱通舌苔始現乾黃者加生黃一錢煎服以清內熱可也內虛感冒嘗有冬春之交忽然身體微寒微熱按其脈小弱而急身體微痛頭不疼服補中益氣丸三錢而愈或八珍丸三錢而愈又有夏令熱極之時忽然身痛惡寒壯熱灼手脈象洪大重按空虛服淡豆豉扁豆黑豆緑豆各三五錢而愈又有忽然頭痛如劈壯熱烙手不思飲食脈象洪數重按甚微或脈象平和獨右尺浮起動搖者用巴戟天甜蓯蓉各五錢以溫補腎氣緑豆一兩以降熱逆而愈頭痛如劈乃腎陽離根上衝之證非外感之頭痛也此乃內傷之病感動時氣之偏中氣頓虛榮衛無力有如外感凡感冒之頭痛不痛如劈也惡寒發熱身痛乃榮衛之事榮衛乃整個樞體之氣表司於肝肺發於脾胃源於兩腎補中益氣丸治愈此脾胃之中氣虛陷八珍丸治愈此氣血之虛虧豆豉黑豆扁豆緑豆治愈此中虛而相火外越巴戟蓯蓉緑豆治愈此腎虛而腎陽亢動故皆有榮衛之外證而脈則內虛之內證故皆治內而愈治內而愈者裏氣乃表氣之本裏氣和表氣乃和也如不治本而以世俗治外感之升散藥治之必虛脫也可見外感之病乃榮衛感傷風寒而自病也外感之病必惡寒不輕身痛亦烈脈有沉緊有麻黃證的意義乃可用薄荷等舒散之藥以開衛氣之收斂否則桂枝湯亦是調和內氣之方如單發熱不惡寒一味黃豆湯養中養榮以和榮衛而愈其內虛的關係尤不可忽矣湯頭歌訣之九味羌活湯一切外感均不可用詳湯頭改錯篇熱傷風陽熱之氣應當由地面上降入地面下時忽然降不下去天氣驟熱則病熱傷風空氣中陽熱逆騰金氣受傷人身應之熱傷風外證噴嚏連連鼻鳴清涕頭目覺熱似作寒熱動則汗出然能照常動作意識如故竟有十日半月不愈者病延日久遂致虛憊此肺家收斂之金氣被空氣之熱上衝之病也病在肺家不在榮衛故能飲食動作熱衛肺故噴嚏連連鼻鳴清涕肺主皮毛牽連榮衛故似作寒熱熱氣上衝肺氣不能降之故頭自覺熱熱衝肺逆大氣偏升中氣必虛故動則汗出此病名為熱傷風其實是傷熱風因大氣中的金氣被大氣中的熱氣衝散不能收斂人身木火之氣亦化熱不降而衝傷肺家乃自己本身之氣自病此病無論多日舌上無苔脈象虛數方用枯黃芩薄荷白朮炙草黨參當歸白芍各一錢冰糖紅棗各五錢脈重按虛微者加乾薑一錢用黃芩清衝入肺家熱用薄荷降肺氣之逆偏升之病中氣必虛故兼用白朮炙草黨參以溫補中氣當歸芍藥平榮氣之疏泄並養耗散之津液重用冰糖大棗養中氣補津液也脈重按虛微中氣必寒故加乾薑如服方病愈僅頭熱不減此肺氣已降肝熱獨衝用黑豆一味煮濃湯加鹽少許服下即愈熱傷風病日久不愈金氣不收木氣妄動相火外散中土失根尚再加咳嗽易成癆疾黑豆養木平衝鹽補中氣此病多發現於秋季四時之中大氣忽然溫升亦有病者服黃豆黑豆緑豆各一把潤降溫升之氣並養中氣亦效脈虛者加冰糖一兩以補中氣熱傷風如發現於冬春之交宜服八珍丸因陽氣由靜而動化熱上衝力量最大最傷土氣最傷血液參朮芩草以補土氣芍地芎歸以補血液故效三十二年冬桂林盛行因桂林夏季熱度一百一十度者多日處暑後即無大雨並無大雷入地之陽可謂十足卻冬季無雪不冷冬至前後大氣中常有火燒黃土臭味燉紅肉臭味夜多大風晝間山頭多布黃霧此種陽多不藏之氣象令人頭昏陽多不藏一到大寒應當陽動木泄之時力量特大所以傷血傷氣也冬春之交川滇黔無此氣象入冬聞雷降入地下的陽氣本來不盛也長江一帶無此氣象冬有雪也北方無此氣象土厚水深陽氣入地者深出地者不急也熱傷風用冰糖糯米粥補中氣補肺陰極效宜多食或用小黃豆兩把煮極爛睡前連渣服亦效黃豆能補中氣養木平衝潤肺金補津液助降氣而資收斂故效黃豆方如其效只暫時加生薑三錢與食鹽即效因火氣上逆入肺即不降入土中肺雖熱胃卻寒加薑以溫胃寒食鹽補中治肺熱須顧胃寒此治熱傷風之原則也食鹽以適口為度不可太鹹治感冒病不可用桂枝桂枝溫燥之性只宜真傷寒中風之桂枝湯麻黃湯證此證無溫燥的關係故也此外之感冒常有溫燥的關係用之病必加重湯頭歌訣之九味羌活湯一派溫升之藥常見世人用之而加病者不知感冒之理故也八燥氣病燥氣感冒大暑以後燥金氣動感冒之者惡寒發熱時止時作胸部似塞腹部似脹或頭痛或頭不痛脈象弦澀動在中部緣秋燥之時大氣中已降入地下之火氣忽然逆升與涼降之金氣抵觸金氣涼降不下火氣逆升不上金火裹束遂燥結於中氣之間人身感之肺金斂結則惡寒相火逆升則發熱金火裹束於中部則胸腹塞脹頭痛者肺金斂結降氣不舒也燥結於中四字注意先用刮痧法刮背心脊骨兩旁刮出紅點榮衛氣通乃可用蔥豉湯與麥冬草果仁湯重劑合用以開散之如無效者用人參敗毒散羌活獨活柴胡川芎薄荷前胡枳實桔梗茯苓生甘草黨參生薑各一錢煎服羌獨柴芎其性升散最開肺金之斂結薄荷枳殼前胡桔梗生薑其性降散能消胸腹之塞脹黨參益氣生津以潤燥結茯苓甘草補土和中燥氣斂結病結在中降不下去故兼用升散也否則外感最忌升散只宜降散人參敗毒散惟宜此病注意脈來中取弦澀乾燥斂結之象初病如失治遂釀成下文之小建中湯證此病一刮之後多自愈者病時只可食稠粥不可食乾飯初病失治裏氣內結而成痞脹腹部如鼓左脅按之作痛面色青黃宜小建中湯飴糖善養津液而開結塞芍藥桂枝升降木氣炙甘草薑棗調補中土土木調和運動能圓青黃自退青乃木氣之枯黃乃血壞也腹脹左脅作痛金結木敗之象此方開結調木故效如舌有乾黃苔脈象沉實者則燥結成實於原方加生大黃生枳實各一錢緩緩下其燥結舌無苔脈不沉實忌下此病江南多有之西醫稱黑熱證是也燥氣咳嗽乾咳咽喉不利麥門冬湯麥冬半夏潤燥開結參棗米草補中生津也燥氣瘧疾此病乃燥暑二氣裹束不降之病也初得先寒後熱大渴熱飲天明熱退申酉復熱卻只熱不寒舌如豬腰色濕潤如水而無苔脈在中部方用竹葉石膏湯石膏麥冬竹葉半夏各五錢以清燥暑而通降肺金結氣人參粳米各五錢補氣生津炙草三錢補中氣內經曰脈盛身寒得之傷寒脈虛身熱得之傷暑病虛脈非有大濕外證即易誤為陽虛然脈在中部因燥暑聚於中焦使然也世謂喜冷飲為陽熱喜熱飲為陰寒寒則不思飲矣人身六氣分離燥熱偏盛不能再與濕寒相合故燥熱極反熱飲也燥熱極舌反潤者燥熱太勝不能於他氣相合心脾津液被大勝之燥熱所迫不能於燥熱相交故舌有津液也熱不在胃故舌無苔傷寒陽明病燥舌苔乾黃乃燥氣病之實者此則燥氣病之虛者燥而虛的病最難醫治一發散即壞一作瘧治即壞秋深涼後復熱往往有此病發生世謂為秋瘟病是也此句出於傷寒論傷寒例有本作經曰此處將經誤認為內經又有一種秋燥瘧疾惡寒作戰隨即發熱汗出病解續又發作不渴舌有膩薄苔脈象中取而軟俗稱悶頭擺子前人謂為伏暑晚發軟脈與濡脈相似濡乃虛脈軟乃實脈方用苦杏仁鮮枇杷葉橘皮各五錢以降肺氣藿香半夏各三錢以降胃氣茯苓炙甘草各三錢以建土扶中澤蘭荷葉各三錢以宣舒暑氣用輕宣之法自愈如其惡寒發熱午後病勢較重脈象中取而弦實者又非輕宣之藥所能治必須用溫散金氣燥結之方乃能鬆開九味羌活湯羌活白芷川芎防風蒼朮溫升溫散黃芩生地清熱甘草和中細辛不可用薑蔥每味少許溫散甚宜用人參敗毒散亦效午後金氣當令燥結力大故發熱而脈弦實弦者斂結不能疏泄之象九味敗毒兩方溫散力大以開斂結於中之氣甚為相宜尺脈弱者減輕用之金氣收斂木氣疏泄疏泄當令之病收斂為藥收斂當令之病疏泄為藥九味敗毒兩方具木氣溫散疏泄之能故治金氣燥結聚斂之時氣病適合機宜如當木氣疏泄之候病外感發熱禁用金燥病時行之時如病者脈象虛小數疾服前數方不效者此屬內傷虛小數疾之脈此乃中氣無根元氣將熄一感時氣燥結之偏支援不住生命將亡必須設法使數急復其和平虛小轉為充足元氣旺相中氣有根運動復圓諸病乃愈方用巴戟天淫羊藿甜蓯蓉各三錢以補水中之火氣火氣由下升於左又復由上降於右火氣右降則生中土火氣由右下降須借津液運行之力用海藻昆布黃精各三錢以助右降之津液此方大補腎家之元氣以生中氣脈象自能由虛小轉為充足有數急轉為和平此時運動復圓肺金之燥結自能變為涼降自然病愈如不先補腎氣以調和脈象徒按病用藥虛小數急之脈根本已敗已無運化藥力之能勢必因藥力不化而加病也凡秋燥之惡寒發熱皆肺金與心包相火之事無整個榮衛關係誤用麻黃荊芥必生禍事己卯秋成都四川國醫專校二人病瘧多日未愈忽一日天氣大冷由單衣而換棉衣兩瘧疾不藥而愈可見金氣能涼降徹底則不燥結於中而病瘧也燥結之病四川最多四川霧多之故民國丙子年與王生養林同住南京清涼山掃葉樓立秋次日見山下地面起白氣一層此秋氣將地面陽熱收降入地陽熱不能順下又復逆升而上之象亦燥結之氣也故南京鄉下黑熱病甚多若蘇州杭州夏季極熱冬季極冷且有冰雪大氣的圓運動充足所以少燥結之病奉天洮南一帶沙漠甚多春月亦有燥氣乾燥云耳不燥結也燥氣喉痛此病發於秋季脈弱在中不移秋金收斂故脈在中燥氣傷津故脈弱也微脈弱脈皆是虛脈微乃陽氣虛弱乃陰液虛微脈指下不足重按則無弱脈指下不足重按不移中虛陽虛喉痛皆微脈也燥氣喉痛乃弱脈冬季亦有此病總以脈弱不移為主方用天花粉麥冬天冬玉竹橘皮各一錢法半夏二錢炙草二錢薄荷一錢花粉二冬玉竹潤肺清燥橘夏降肺胃薄荷開肺閉炙草補中氣潤肺藥中不可離補氣藥此方亦治上文陰虛喉痛燥氣霍亂初覺手足微麻惡寒發熱頭暈心煩胸悶身倦繼即吐瀉不止卻又汗出大渴能飲脈則右大於左舌心黃膩吐瀉至於肉脫目陷一日即死方用白馬通三五枚溫開水絞汁服下立愈發散藥寒涼藥溫暖藥均不相宜發散藥服之汗出熱不退熱反增加因舌心黃膩右脈大於左脈右為火金土三氣之位右脈大於左金土火三氣陽結於中也陽結於中病不在表故發散不宜陽結於中因感時氣之燥使然燥結須用開通陽結乃中虛不運故涼藥不宜脈右大於左為陽結之象熱藥助陽故服後昏迷白馬通溫潤開通是以下咽之後由胸而腹立刻舒展白馬通即白馬屎屎能解毒凡時氣為病便含毒氣燥氣結聚力大故白馬通開結較他藥為優內經曰夫虛者氣出也夫實者氣入也氣即陽氣春後陽氣出地故發熱則脈浮秋後陽氣入地故發熱則脈在中秋燥而發生燥氣霍亂之時證乃陽入而不能順下燥結中焦升降停滯故吐瀉發熱而大渴能飲白馬通所以為此病特效藥之方也無白馬通他色白馬通亦可惟須早服速服若至吐瀉而目陷肉脫便來不及挽救矣夏秋之交如有此病亦可用之預先防病亦可服也性氣和平多服無妨昆明收稻以後即有此病戊寅秋病尤甚著者用此方見效因廣為宣傳救活不少瘴氣地方交秋之後惡寒悶熱速服此方立刻汗出病解瘴瘧服之尤效瘴瘧乃燥結之病白馬通開通燥結故效本草綱目謂時行病起合陰陽垂死者白馬通絞汁三合日夜各二服合陰陽者陰陽不分也吐瀉而又大渴便是陰陽不分之證本草綱目又謂吐利不止不知是何病證服之極效又治絞腸痧痛欲死者王孟英霍亂論載有此方名曰獨勝散如燥氣霍亂發生之時不吐不瀉只惡寒發熱舌苔白黃滿布或口臭或口不臭者白馬通亦效易經係辭有云乾為天為金為良馬云云馬秉造化的金氣燥氣霍亂為金氣的結病故用金氣的通藥故白馬通為燥氣霍亂的特效藥馬屎名曰通通結力大也此病服竹葉石膏湯甚效竹葉五錢石膏麥冬半夏各四錢開金氣之燥結黨參炙草粳米各三錢補中氣也此病與下文成都霍亂溫清並用參看一則汗出能飲全屬燥熱故主竹葉石膏一則無汗飲仍吐出為中寒故溫清並用昆明同學劉澄志二少君於燥氣盛行之時病惡寒發熱頭痛心煩舌苔滿黃而潤舌邊舌尖一線深紅脈虛躁不食煩亂譫語先服人參敗毒散病勢見輕次日仍重著者用稻草心一握煎水服下一小時熱全退次日舌苔退去十分之九只有舌心一點仍黃再服稻草心少許黃全退飲食照常而愈舌滿黃而邊尖一線深紅此瘟疫病之舌苔也稻草治愈之如不用稻草而用他方必纏綿多日病將轉深而成難治此亦金氣燥結之病白馬通亦效此病一切現象皆舌苔滿黃而潤使然舌苔滿黃胃氣結也黃而潤胃氣不實也胃氣虛結中宮不運上焦火氣不能下降則煩亂譫語不食心煩頭痛金氣燥結則榮衛不通惡寒發熱金氣將暑火斂結於土氣之中故舌邊舌尖俱鮮紅而黃色滿布也稻草心秉秋金之氣中空善通亦金氣之結病用金氣之通藥之意最傷津液慎用慎用此等病北方甚少南方甚多西南非常之多北方大氣壓力甚大交秋之後由熱而涼由涼而寒陽熱壓入土下愈壓愈深陽氣降沉不再逆升金氣降令暢行故涼降而不病燥故北方少燥氣霍亂及燥氣瘧疾之病西南方的大氣壓力小於北方交秋之後金氣涼降之令被降而復升的陽熱所格遂燥結於土氣之際大氣中有燥結的病故人身有燥結之病也西南方大氣壓力小者西南土薄水淺地下封藏力量不固陽氣隨時逆升故金氣壓不下去西南多霧霧即地下水中陽氣己卯年成都病霍亂一街一日死六七十人病狀忽然惡寒發熱手足微麻上吐下瀉小便不利溺孔肛門均熱胸腹絞痛胸痞舌黃白而膩大渴飲熱隨又吐出吐有酸味肢冷過肘脈沉伏目陷肉脫此病中寒肺燥中寒不能運化升降倒作故上吐下瀉小便不利肺燥傷津水分被劫故溺孔肛門覺熱津愈傷肺愈燥故大渴中寒不能化水故飲後仍復吐出燥氣之病血脈燥結故肢麻不溫燥結之甚故脈沉伏燥結不通故痞而絞痛津傷故目陷肉脫燥結則陽氣不能四達故肢冷方用乾薑白朮沙參炙草各三錢藿香砂仁各一錢以溫運中宮滑石生石膏麥冬各五錢以開通肺氣之燥結車前仁木通各三錢以助滑石麥冬之力木瓜三錢運木氣調疏泄以利尿止瀉而和四肢中宮運化燥結開通津液復生升降復舊於是肢溫脈起諸病皆愈未曾出汗者加蒼朮薄荷各二錢以發表也此因客冬不冷地下封藏的陽氣不多節交夏至相火不降中氣虛寒金氣被刑於相火遂燥結不通故治以溫中清燥生津之法乃愈此病北少南多北方則夏日雨少燥熱過盛之時始有此病六氣為病惟金氣燥結將相火暑氣斂於胸膈之間令人莫測其所以然前人謂為伏暑晚發其實並非大氣中的暑氣中於人身伏藏至秋始發而成病也此病多發於立秋處暑之後處者入也暑者相火之氣也金氣涼降到底愈降愈涼暑火之氣乃愈降愈深暑火藏於水中不逆升出地而與金氣抵觸使金氣斂降之功被暑火格拒不下而成斂結之過相火之下降金氣降之也金火俱逆中上各經之氣為之橫塞相火逆騰中下無根所以病象無常而致死極速北方土厚水深下降之火封藏的住秋涼冬寒氣象極順西南土薄水淺陽氣下降封藏不住忽降忽升所以燥氣之病北少南多也內經冬傷於寒春傷於風夏傷於暑秋傷於濕獨無傷燥之文論者以為內經遺漏不知風為木氣濕為土氣寒為水氣皆不可傷惟燥氣宜傷燥氣斂結金氣受病燥氣傷去則金氣涼降徹底火藏水中下溫上清皆燥氣不向右逆起之德內經無傷燥之文亦燥起獨宜傷去之意歟成都一帶四季感冒悉用銀翹散頗多見效因此一帶地方的地層全係紅沙石土薄水淺所入於地下的陽熱不如北方封藏深固秋涼之後常有反熱之時冬時又不凍冰金氣不降隨時都被水中陽氣逆升格拒金氣降斂之性不遂竟成一種一年四季皆有燥結的大氣而成銀翹散開通金氣之功銀翹散治溫病不效治燥病極效溫乃木氣疏泄傷肺之病忌開通肺氣之藥燥乃金氣斂結之病喜開通肺氣之藥成都有某大醫將所開痢疾方給病瘧者次早有友人告以誤醫急命人赴瘧者家謂方給錯請勿服病家曰藥已服病已好矣無不稱羡其醫運之紅某大醫云乃銀翹散加減也此方凡感冒而胸悶脈不浮而有聚於中部之象者不論何時何地皆適用之不僅成都一帶適宜惟溫病不可用之痢疾瘧疾皆金木二氣結聚之病結於下則病痢結於中則病瘧故銀翹散皆效九痧症痧脹痧症諸書名目繁多其實只要忽然發熱欲吐肢麻背脹就是痧症名目雖多原則只是一個閉字燥金閉結刮而通之閉開即愈處暑以後燥金氣動地面之上金火裹束勞力之人飽受暑火薰蒸引動本身相火暑氣充塞肺家一遇涼風偶襲閉其皮毛暑火無處發泄燥金又加閉斂榮衛腠理不能流通暑燥之氣閉結於肺遂現惡寒發熱胸背作脹四肢作麻頭痛口苦欲吐種種急證宜先用檢查法其法用醫生中指節向病人胸缺盆骨下用力一按一拖拖處隨指突起一條便是痧脹隨將胸部的肉捏而提之左右捏提各三四道不可提過乳頭再將背脊兩旁刮出紅點背脹肢麻即松不藥而愈如其不能全愈可用生石膏麥冬各五錢以清肺氣之暑燥杏仁絲瓜絡荷葉邊竹茹各三錢鮮竹葉二十張以開通肺部與榮衛腠理之閉結服藥嘔吐者另服生薑汁一羹匙以降胃止嘔氣虛者加炙甘草二錢以補中氣小便不利者加薏苡仁三錢以利水濕數日乃愈次日三日仍用本方減半服此病肺氣燥結閉住相火為主榮衛腠理因而不通故現以上諸證此病初則脈沉繼則由沉而起也此病四時皆有處暑以後較多較重西南皆有廣西較多較重此方由仲聖竹葉石膏湯變化而來之方痧霍亂痧霍亂者霍亂而兼痧症上吐下瀉胸腹內燒而四肢卻涼大渴能飲飲後嘔吐其吐甚遠吐後仍飲脈沉痧乃外寒閉束故脈沉外寒閉住內熱故肢涼胸腹內燒而大渴能飲經脈閉束不舒胃不能降故仍吐出內熱結於膈上故吐出有力方用荊芥薄荷香薷各三錢以開衛氣之閉藿香三錢降香一錢以降胃逆黃連一錢以降胃熱扁豆三錢以養胃氣服後肢溫渴止再聞通關散少許以取嚏然後滿身汗出而愈通關散藥鋪有售者十濕熱病葉天士甘露消毒丹證治飛滑石十五兩綿茵陳十一兩淡黃芩十兩石菖蒲六兩川貝母木通各五兩藿香射干連翹薄荷白豆蔻各四兩上藥曬乾生研細末見火則藥性盡熱每服三錢開水調服一日二次或以神麯糊丸開水化服亦可王孟英注云此治濕溫時疫之主方也六元正紀五運分步每年春分後十三日交二運徵火旺天乃漸溫芒種後十日交三運宮土旺地乃漸濕溫濕蒸騰更加烈日之暑爍石流金人在氣交之中口鼻吸受其氣留而不去乃成溫熱時疫之病而為發熱倦怠胸悶腹脹肢酸咽痛斑疹身黃頤腫口渴溺赤便祕吐瀉瘧痢淋濁瘡瘍等症但看病人舌苔淡白或厚膩或乾黃者是暑濕熱疫之邪尚在氣分悉以此丹治之立效而薄滋味遠酒色尤為辟疫之仙方智者識之醫家臨證能準乎此化栽自可十全為上上參喻家言張石頑葉天士沈堯封以上王孟英語六元正紀天乃漸溫據溫熱經緯加葉天士神犀丹證治犀角尖磨汁石菖蒲黃芩生地冷水洗淨浸透搗絞汁銀花各一斤人中黃四兩研末連翹十兩飛淨清黛香豉各八兩元參七兩花粉紫草各四兩各藥生曬切忌火炒香豉煮爛為丸切莫加蜜每重三錢涼開水化服小兒用半丸王孟英注云溫熱時疫諸病邪不即解耗液傷榮逆陷痙厥昏狂譫語發斑等證但看病人舌苔乾者是溫邪直入血分酷熱之時陰虛之體新産婦人患此最多急須用此多可挽回切勿拘泥日期誤投別藥以僨事也兼治痘病重毒夾帶紫斑危證暨痘後余毒內熾口糜咽腐目赤神煩諸證上參葉氏本治驗以上王孟英語謹按本書溫病時病皆重在人身本氣自病皆是虛證王氏案中有云此二方一治氣分一治血分是王氏亦認為人身本氣自病也認定人身本氣自病用藥乃有著落葉氏王氏於治時令之濕熱病經驗宏富處方活潑不愧前輩名賢本書時病溫病只是重在認識原則最後讀此二方庶可無微不至也神犀丹如無犀角不用亦效至於此證發生必係淫雨多日又加酷熱濕熱膠沍人氣感之本氣自病如酷熱無雨相火不降熱而不濕則時證發生反多上熱下寒之病矣濕熱病初起則頭重胸悶口苦也考溫熱經緯為烏犀角尖磨汁石菖蒲黃芩各六兩生地冷水洗淨浸透搗絞汁銀花各一斤如有鮮者搗絞汁用尤良糞清連翹各十兩板藍根九兩無則以飛淨青黛代之香豉八兩元參七兩花粉紫草各四兩各生曬研細忌用火炒以犀角地黃汁糞清和搗為丸切勿加蜜如難丸可將香豉煮爛每丸三錢涼開水化服日二次小兒減半如無糞清可加人中黃四兩研入溫熱時疫諸病以僨事也溫熱經緯原文作溫熱暑疫諸病邪不即解耗液傷營逆傳內陷痙厥昏狂譫語發斑等證但看病人舌色乾光或紫絳或圓硬或黑苔皆以此丹救之若初病即覺神情昏躁而舌赤口乾者是溫暑直入營分酷暑之時陰虛之體及新産婦人患此最多急須用此多可挽回切勿拘泥日數誤投別劑以僨事也兼治痘瘄毒重夾帶紫斑危證暨痘疹後余毒內熾口糜咽腐目赤神煩諸證時病本氣篇終傷寒論方解上篇傷寒論方解上篇導言本篇與傷寒論原文讀法篇對照著讀讀傷寒論者只喜讀方最怕讀文文無理路可尋方有病證可按也雖有病證可按仍無理路可尋前代儒醫徐靈胎謂傷寒論只可一章一章讀不能整個讀夫所謂論者乃整個論非一章一章論如按章去讀不讀整個何論之有徐氏尚不能尋出文的理路其他更不必道矣本書傷寒讀法已將整個理路尋出讀者稱便茲於方中尋出整個理路讀者由方以求文其興趣必有更多於先讀讀法者如此則中醫人人皆能讀傷寒論然後中醫學可告成立著者識榮氣本病方桂枝湯芍藥桂枝炙甘草生薑大棗榮氣疏泄則汗出膽經不降相火上逆則發熱鼻鳴乾嘔榮衛分離則頭痛項強發熱汗出津液必傷表陽必虛榮衛分離中氣必虛芍藥降膽經降相火斂榮氣之疏泄炙草補中薑棗補中生津桂枝調榮衛實表陽也風傷衛氣衛氣減少榮氣加多故榮氣與衛氣分離而榮現疏泄之病緩脈乃疏泄向外之象原方分量載在世行本傷寒論原方一兩可同今之一錢棗有大小不同原方十二枚可用今之六錢衛氣本病方麻黃湯麻黃杏仁桂枝炙草衛氣收斂則無汗惡寒體痛腰痛骨節疼痛肺氣不降則嘔逆而喘榮衛分離中氣必虛衛氣不開表陽必虛麻黃瀉衛氣之收斂杏仁降肺氣之逆炙草補中氣桂枝調榮衛達表陽也收斂之病氣機滯塞故不用棗既不用棗亦不用薑矣寒傷榮氣榮氣減少衛氣加多故衛氣與榮氣分離而衛現收斂之病緊脈乃收斂向內之象榮衛雙病方桂枝麻黃各半湯芍藥桂枝炙草生薑大棗麻黃杏仁脈虛不緩不緊卻微惡寒微發熱而身癢身癢為榮衛俱虛欲自解而未能麻黃湯與桂枝湯減輕分兩雙解榮衛也榮衛雙病氣虛方桂枝二麻黃一湯桂枝芍藥炙草生薑大棗麻黃杏仁寒熱如瘧日僅再發此衛氣之虛雙解榮衛減輕麻黃輕泄衛閉也榮衛雙病津虛方桂枝二越婢一湯桂枝芍藥炙草大棗生薑麻黃石膏形作傷寒作渴而寸脈弱此津液虛而生燥也雙解榮衛減輕泄衛之麻黃加石膏以清燥也麻黃石膏能發越庳著越婢二字想係越庳二字之誤榮衛雙病兼裏氣濕寒方小青龍湯麻黃桂枝芍藥炙草半夏五味子細辛乾薑榮衛不解而心下有水氣以致膽經不降而乾嘔發熱相火不降而作渴欲飲水水入仍吐胃氣不降而作噫水入腸胃而作利小便不利少腹滿肺氣不降而作喘水氣上衝而作咳皆平日中下陽虛寒水上淩陽位之病此寒水乃中下皆寒而來之水麻桂雙解榮衛之鬱炙草補中氣細辛乾薑五味半夏溫降寒濕水氣乾薑溫脾陽以杜其入臟小青龍之咳喉間作癢清水中加稀痰小青龍湯加減法詳世行本傷寒論榮衛雙病兼裏氣燥熱方大青龍湯麻黃桂枝炙草生薑大棗杏仁石膏如非中風而是脈緊惡寒無汗之傷寒平日胃氣燥熱之人衛氣閉於外煩燥生於內甚至燥極傷津身重乍有輕時麻黃杏仁以泄衛桂枝以和榮石膏以清燥炙草薑棗以補中因脈緊故不用芍藥之斂也石膏清胃燥以杜其入腑杜其入腑云者杜其腑熱之成也誤服石膏亡陽須以真武湯救之榮衛病罷裏濕方五苓散茯苓豬苓澤瀉白朮桂枝無惡寒發熱項強之榮衛證而發熱心煩渴欲飲水水入仍吐與心悸皆水濕隔阻相火不降之故朮苓澤瀉豬苓以泄水濕桂枝助肝經之疏泄以行水濕去火降故吐止熱止悸止也榮衛病罷裏濕表虛方茯苓甘草湯茯苓炙草桂枝生薑汗出不渴表陽虛也汗出而渴表虛兼裏濕盛也汗出不渴雖屬表虛亦有裏濕茯苓泄濕生薑炙草溫中桂枝實表以止汗出也燥渴為陽實濕渴為陽虛濕阻相火不能下降相火灼金故渴榮衛病罷裏燥方白虎湯石膏知母炙草粳米傷寒而外有大熱相火外出裏氣必寒裏熱實則熱聚於內不浮於外故外無大熱肢厥有陽證陰證之分陰證裏陽虛陽虛於內不能達外故肢厥其厥有如冰冷陽證裏陽實陽聚於內不能達外故肢厥其厥不如冰冷不溫而已陰證脈微細而沉陽證脈滑而實或沉而實陽明燥熱故滑而實也石膏知母清陽明經之燥粳米炙草生津液而補中氣也白虎加人參湯白虎湯內加人參白虎證渴能飲水雖能飲水而口仍燥此燥熱傷津之所致非補氣不能生津於白虎湯內加參以補氣由氣生津也榮衛表病未曾出汗而成五苓白虎證者服五苓白虎必汗出而解裏氣和則表氣和也濕渴飲水仍吐出燥渴飲水不吐出太陰脾臟本病方四逆湯炙草乾薑附子此太陰脾臟之本氣病也太陰脾臟土氣濕寒之人表氣的榮衛分離裏氣的脾臟即鬱而現本氣之病乾薑炙草溫補中氣溫寒除濕以復土氣之升降附子溫水回陽以培土氣之根凡用四逆湯皆陰寒陽亡之病也少陰腎臟本病方附子湯附子白朮茯苓人參芍藥此少陰腎臟之本氣病也少陰腎臟病則水寒滅火火滅土敗陽氣微少尺脈微細但欲寐而不能寐背微惡寒骨痛脈沉皆陽氣微少陰寒之象水寒土敗則木枯克土平日腎臟虛寒陽氣不足之人表氣的榮衛分離裏氣的腎臟即鬱而現本氣之病附子回陽補火白朮茯苓補土人參補中氣芍藥安風木解骨痛附子最動木氣厥陰肝臟本病方烏梅丸烏梅乾薑附子人參細辛蜀椒黃連黃柏當歸桂枝此厥陰肝臟之本氣病也肝臟病則下寒上熱中虛風動上熱者因下寒木失溫養化風上衝風衝化熱熱傷津液故消渴心中熱痛而飢下寒蛔不能居尋胃間熱處而上故病吐蛔蛔動即是陽動故煩人身火在水下上清下溫則治火出水外上熱下寒則病上熱下寒中土必敗木氣化風木氣必傷烏梅補木氣生津液斂風氣附子蜀椒溫下寒黃連黃柏清上熱乾薑人參溫補中氣桂枝當歸溫養木氣而達肝陽細辛溫降衝氣也通脈四逆湯於四逆湯內加重乾薑下利汗出四肢厥冷陽將亡也其脈必微而欲絶中寒之至用四逆湯以回陽重加乾薑大溫中氣此方名通脈者脈生於中氣也曰外熱者汗出而陽亡於外也此方即四逆湯加重乾薑分兩凡陰寒脈微欲絶皆宜用之陽明胃腑本病方調胃承氣湯大黃炙草芒硝惡寒發熱之榮衛表病已經三日已經發汗卻汗發不透徹而發熱更加蒸蒸然手足出汗脈現實大之象此平日胃熱陽實之人榮衛的表病不解臟腑的裏氣偏鬱腑熱自現本氣之病若由蒸蒸發熱腸胃津液灼乾腸胃有了燥屎便成潮熱譫語腹滿痛拒按之大承氣湯下證如成下證則病重矣必須於胃熱未曾全實但蒸蒸汗出發熱之時用調胃承氣湯大黃芒硝平胃熱炙草養中氣也曰調胃者調和胃氣不取攻下使熱退不成下證也大承氣湯大黃厚朴枳實芒硝如當調胃承氣湯證時不豫調胃清熱則胃熱愈實便成燥屎腹痛拒按潮熱譫語等等之大承氣湯證當用大承氣湯之攻下燥屎法大黃芒硝攻下熱實枳實厚朴開通滯氣也大黃性寒芒硝性熱枳實性寒厚朴性熱寒熱混合則成圓的運動以圓運動的原則為下法此大承氣湯之微旨小承氣湯大黃枳實厚朴如應用大承氣湯攻燥屎但不知屎已燥否可用小承氣湯試探已有燥屎服湯後必放屁如不放屁是無燥屎無有可攻之物則不可用大承氣湯小承氣湯即大承氣湯去芒硝之滑瀉減輕厚朴之辛通也太陽膀胱腑本病方桃核承氣湯桃仁桂枝炙草大黃芒硝十二臟腑之經公共組織行於軀體稱曰榮衛榮衛臟腑雖有表裏之分仍一整個榮衛為臟腑之表臟腑為榮衛之裏也故榮衛之氣不和臟腑之氣即鬱三陰臟病之乾薑附子證與陽明腑病之大黃枳實證皆表氣不和裏氣偏鬱之病膀胱腑病亦然表病不解膀胱陽腑氣鬱而病熱其人如狂如自己下血熱隨血去病即自愈如不下血少腹有血急結作痛當用大黃芒硝攻其熱桃仁攻其血桂枝以和表炙草以補中氣先解表乃可用此方抵當湯大黃水蛭虻蟲桃仁如榮衛病而身黃脈沉少腹硬小便利人如狂亦膀胱腑熱亦當用抵當湯大黃攻其熱水蛭虻蟲桃仁攻其血也抵當丸以抵當湯為丸少腹滿而尿利為有瘀血宜丸藥緩下少陽膽經本病方小柴胡湯柴胡黃芩半夏生薑大棗人參炙草如榮衛表病不得汗解臟腑裏氣又不偏鬱則少陽膽經被迫於表裏之間而成少陽經病少陽經病三焦經下陷膽經上逆而現口苦耳聾諸證用柴胡升三焦經以解少陽結氣黃芩降膽經以清相火逆氣半夏生薑降胃逆大棗補中氣人參炙草補土氣而扶陰臟之陽也小柴胡湯加減法詳世行本傷寒論大柴胡湯柴胡黃芩半夏生薑大棗芍藥枳實大黃於小柴胡湯去人參炙草之補陽補土加芍藥以降膽經之逆枳實大黃以下胃腑之熱仍用柴胡黃芩半夏生薑大棗以解少陽之經也少陽經病亦少陽經本氣病小柴胡湯為和解少陽之經預防陰臟陽退之法大柴胡湯為和解少陽之經預防陽腑熱進之法口苦心下痞硬少陽膽經之結也嘔吐酸臭而下熱利陽明胃腑之熱也傷寒論方解中篇榮衛本病方桂枝湯方見前衛氣不共榮氣和諧只有疏泄而無收斂故自汗榮氣和者榮氣自和不與衛氣和也發熱汗出為榮弱衛強榮氣疏泄自傷本氣故曰弱也衛氣不與榮氣交和故曰強也邪風即榮氣偏於疏泄之氣非外來之風故以芍藥斂榮氣之疏泄以息邪風桂枝實表陽炙草薑棗補中氣也發汗一字誤卻後人不少收斂之性如何能發發汗宜作調汗讀榮衛調和則汗出也煩為陽氣勝先刺風府以泄陽俾桂枝湯奏全功也麻黃湯方見前衛氣閉束則肺金不降而病衄麻黃湯發汗以泄衛閉則肺金降不病衄緊者衛閉之象也既是傷寒衛閉惡寒用麻黃湯發汗宜解半日許復煩脈浮而數應再用桂枝湯降膽經以去煩而和榮衛不可再用麻黃也榮衛兼陽明胃腑之經氣病方桂枝加葛根湯桂枝芍藥甘草生薑大棗葛根榮衛表氣與陽明胃腑之經氣同病發熱惡寒頭痛項強汗出惡風榮衛病也項背幾幾硬直向後反折陽明經氣病也桂枝湯解榮衛葛根解陽明經氣也葛根清涼升散專升手陽明經手陽明升足陽明自降故葛根為陽明經病主藥葛根湯葛根麻黃桂枝芍藥炙草生薑大棗若榮衛病惡寒無汗又見陽明經病之幾幾桂枝湯加葛根以升散陽明經氣加麻黃以解衛氣之惡寒無汗也若此證又見下利此亦陽明經氣下陷之熱利仍用此方以升散陽明下陷之經氣而調榮衛之氣表病兼下利非裏病乃經病乃表病也葛根加半夏湯於葛根湯內加半夏若葛根湯證不下利而嘔此手陽明經氣下陷於後因而足陽明經氣上逆於前故用葛根以解榮衛表氣與陽明經氣加半夏降足陽明經以止嘔也麻黃湯方見前榮衛與陽明胃腑之經氣合病喘而胸滿宜麻黃湯瀉衛氣之喘滿不可下也單是陽明經氣病脈浮無汗而喘亦宜麻黃湯發汗衛氣乃肺金所司喘者肺氣因衛氣之閉束而上逆故宜麻黃也桂枝湯方見前陽明病脈遲遲者緩實之象既緩實似近於可下之證然汗出多又微惡寒是有表證宜桂枝湯發汗以解表也總而言之表證未解總宜解表解表用桂枝湯也若誤下之此為大逆如便硬而脈浮大亦不得因便硬而言下浮為表證亦宜桂枝湯發汗解表至於傷寒六七日不大便而頭痛有熱此胃熱實象宜調胃承氣湯以和胃若小便清而不赤仍是表病並非裏病仍用桂枝湯以解表若頭痛無熱則膽經上逆必衄亦宜桂枝湯以降膽經也大承氣湯方見前煩熱汗出則解又如瘧狀日晡發熱日晡發熱乃陽明之燥其脈當實宜以大承氣湯下之如不實仍是榮衛表病仍宜桂枝湯調胃承氣湯方見前表氣鬱極則戰而後汗解將戰之先其脈陰陽俱停如不戰汗但寸脈微者先出汗而病解但尺脈微者熱傷津液必用調胃承氣湯以和胃熱使陰陽和平其病乃解陽脈微胃腑之熱不實也太陰脾臟本病方四逆湯方見前太陰脾臟與榮衛同時為病當先用四逆湯以溫脾臟俟脾臟之下利腹脹愈後乃用桂枝湯以解榮衛之表此大法也其實四逆湯服後脾臟之病愈榮衛之病亦隨之而愈因裏氣為表氣之本裏氣之陰陽和表氣的陰陽亦隨之和矣脾臟與榮衛同時為病先溫裏後解病與胃腑與榮衛同時為病先解表後攻裏是對待理法脾臟病陰寒脾臟之陽未復而先發汗裏陽愈虛榮衛內陷則成壞病此法關係極大胃腑與榮衛同時為病詳下文桂枝湯方見前太陰病脈浮者可發汗此處之桂枝湯是陪辭太陰臟病忌發汗臟病脈浮更忌發汗少陰腎臟本病方桃花湯乾薑赤石脂粳米少陰病下利便膿血腹痛小便不利此因火敗而病濕寒乾薑溫寒去濕赤石脂以固脫陷粳米以補津液也真武湯茯苓白朮附子生薑芍藥少陰病腹痛下利尿短四肢沉重疼痛此為內有水氣水氣由水寒土濕木鬱而生附子補火回陽以溫水寒朮苓泄水補土芍藥調木生薑溫中附子湯有人參此方無人參參能生津助水也白通湯蔥白乾薑附子少陰下利水土寒而陽氣不升也乾薑附子以溫水土蔥白以升達陽氣而止利也白通加豬膽汁湯於白通湯內加豬膽汁人尿少陰下利脈微與白通湯若利不止厥逆無脈而又乾嘔煩躁是下寒上熱陰不藏陽陽氣上越蔥白附子乾薑以溫回陽氣加豬膽汁人尿涼降之物引薑附之熱性與上越之陽氣下行且益陰以藏陽也通脈四逆湯方見前下利清穀肢厥脈微不惡寒面色赤腹痛乾嘔咽痛利止脈不出皆中氣虛寒之至宜於四逆湯重加乾薑以溫補中氣中氣復則脈出也不惡寒陽越於外外不惡寒也少陰腎臟與榮衛同病方麻黃附子細辛湯麻黃附子細辛榮衛表病初得少陰腎臟裏病即動表證則發熱裏證則脈沉曰少陰病者必有但欲寐背惡寒等少陰證在也麻黃以解表附子以溫裏腎臟病則寒水滅火細辛以溫降腎家上淩之寒水也細辛是降藥非散藥此病不可發汗麻黃和衛而已麻黃附子炙草湯麻黃附子炙草榮衛表病少陰裏病同時施治須用炙草以補中氣也少陰病不可強發汗發汗口鼻眼目出血為難治矣四逆湯方見前少陰病脈沉者急以四逆湯溫之曰急者言不可發汗也厥陰肝臟本病方當歸四逆湯當歸桂枝芍藥細辛通草炙草大棗不下利不汗出僅四肢厥冷脈細無內寒陽亡的關係只是血脈不充木氣不潤中虛而經氣不達耳當歸桂枝芍藥溫血調木炙草大棗補中細辛通草通經也當歸四逆加吳茱萸生薑湯若手足厥冷脈細欲絶而平日舊有久寒者於當歸四逆湯加吳茱萸生薑以溫內寒也吳茱萸湯吳茱萸人參生薑大棗厥陰肝木寒極無陽以致膽胃皆寒故乾嘔吐涎沫頭痛吐利肢厥煩躁欲死膽肝皆寒木氣拔根中氣大虛故煩躁欲死吳茱萸溫降木氣生薑降胃參棗補中茯苓甘草湯方見前厥而心悸悸乃心下有水宜先用茯苓炙草以去水然後可用溫藥以治厥不先治水而用溫藥以治厥溫藥將水蒸入胃中必作利也四逆湯方見前嘔而脈弱小便復利復利者言尿多也脈弱而嘔陽亡於上尿多陽亡於下身微熱陽亡於外若加肢厥是陽亡不復是為難治宜四逆湯以回陽也陽明胃腑本病方調胃承氣湯方見前發汗後惡寒為腎陽虛不惡寒而惡熱為胃陽實宜調胃承氣湯以和胃也陽明腑病未曾吐下傷津而心煩是胃有熱宜調胃承氣湯大黃芒硝輕泄胃熱胃熱未實炙草補中氣也小承氣湯方見前太陽病時吐下發汗傷其胃中津液津傷生煩又加尿多津液更傷以致大便成硬心煩而大便硬是已成陽明胃熱之證宜小承氣湯輕下胃熱也陽明病脈遲而實汗出不惡寒身重短氣腹滿而喘潮熱此表證已解裏熱已實可以攻裏再看其手足濈然汗出手足秉氣於中土中土熱實則手足汗出是大便已硬可用大承氣湯以攻裏若汗多發熱而仍惡寒是表證仍在其熱不潮不可用大承氣湯但雖不可用大承氣而腹大滿不通是胃熱已實可與小承氣湯微和胃氣陽明胃腑津虛方蜜煎導方蜜煉成挺納入肛門為蜜煎導法陽明腑病大便燥結胃中並無實證此乃發汗傷津尿多傷津津液內竭不可攻下大便應用蜜煎導法蜜入肛門直腸吸收蜜之潤氣自然大便得下豬膽土瓜根汁方大豬膽汁或土瓜根汁此方較蜜煎導方寒津液內竭脈較有力者適用之否則灌入肛門之後直腸吸收而上亦能寒胃也麻仁丸麻仁杏仁芍藥大黃厚朴枳實蜜煎導豬膽汁土瓜根汁此燥在肛門之方若肛門與腸中皆燥而又無燥之實證者須麻仁丸麻仁杏仁以溫潤之芍藥以寒潤之又兼小承氣湯以輕蕩之每服只梧子大之十小丸輕緩極矣小承氣湯方見前陽明病譫語發潮熱是胃熱實也脈滑亦實可與小承氣湯下其胃熱但脈雖滑而急數急數之脈屬於裏虛不可用小承氣湯下胃熱如其以小承氣湯為主若裏不虛服後必放屁若不放屁是裏虛也不可服也所以明日不大便脈由急數而轉澀虛澀為陽氣虛故難治也大承氣湯方見前腹滿痛陽明燥土傷太陰之陰發熱而汗特別之多陽明燥土傷少陰之陰目中不了了睛不和陽明燥土傷厥陰之陰故皆宜急用大承氣湯下燥土之腑陽以救三陰之臟陰也陽明胃腑病有瘀血方抵當湯方見前陽明病而善忘此因有久瘀之血停於下部阻礙腎氣之故腎主藏智腎氣不能升達故善忘何以知其有瘀血大便黑硬便時反易也下有瘀血腎氣抑鬱故現黑色故以抵當下其瘀血也少陽膽經本病方小柴胡湯方見前嘔而發熱少陽膽經上逆也欲足少陽下降必須手少陽上升故小柴胡主之小建中湯桂枝芍藥炙草生薑大棗飴糖陽脈澀上焦津液不下也陰脈弦下焦木氣不升也上焦津液不下膽經上逆相火燒灼也膽經上逆肝經下陷則木鬱而腹痛也芍藥重降膽經相火桂枝升肝經木氣炙草薑棗溫補中氣飴糖補土氣潤津液木氣和則腹痛止也如不差是腹痛非肝木不升乃三焦經不升仍宜小柴胡湯以升三焦之經榮衛病過十日脈浮嗜臥脈細屬少陽經病胸滿腹痛亦少陽經病故主小柴胡湯嗜臥者少陽相火升降紊亂也榮衛病過十日榮衛病罷少陽膽經與榮衛同病方柴胡桂枝湯柴胡黃芩半夏人參生薑大棗桂枝芍藥炙草既有發熱惡寒肢節煩痛之榮衛表證又有微嘔心下支結之少陽經證桂枝湯小柴胡湯合併雙解也黃芩湯黃芩芍藥炙草大棗少陽經氣與榮衛表氣同時為病少陽相火熱盛於經則經熱與榮熱混合而病熱利黃芩清少陽相火芍藥解榮熱草棗補中氣也黃芩加半夏生薑湯於黃芩湯內加半夏生薑黃芩湯證而加嘔於黃芩湯加半夏生薑以止嘔也小柴胡湯方見前血結則陰陽之氣運行阻滯故病發如瘧中風經水適來榮分之熱即乘經水適來血室空虛而入血室血室為少陽相火所主故以小柴胡湯調少陽也傷寒經水適來暮即譫語如見鬼狀亦為熱入血室故以小柴胡湯調少陽也傷寒論方解下篇榮衛壞入太陰脾臟方四逆湯桂枝湯方見前榮衛表病只宜解汗若不汗解而誤下之下傷太陰脾臟而瀉利不止卻又有榮衛之身體疼痛表證雖有表證不可治表當急救裏宜四逆湯以溫太陰然後用桂枝湯以解表也新加湯桂枝芍藥炙草生薑大棗人參發汗之後身痛而脈沉遲發汗傷損中氣故脈沉遲發汗傷津津虧不能養木木枯風動故身痛桂枝白芍養木息風草棗補中加芍藥潤木枯加生薑行經脈加人參補中氣而生津液五苓散方見前發汗之後脈數煩渴發汗傷及太陰太陰濕起阻格相火不能下降故煩而渴脈數者虛也故以五苓泄太陰之濕也若發汗後脈浮小便不利而微熱消渴此渴亦太陰之濕也微熱脈浮亦濕格相火也故以五苓泄太陰之濕也若病在表不發汗而以冷水噀之灌之肉上粟起欲飲而反不渴亦太陰濕溢於皮膚亦宜五苓泄太陰之濕也文蛤散文蛤文蛤善入太陰而去皮毛之水濕也白散桔梗貝母巴豆痰實結在胸間巴豆桔梗貝母破痰實也此方乃結胸之方應移在下文結胸條後此處係榮衛壞入太陰之經病也三物小陷胸湯黃連半夏栝蔞實痰實有寒熱之分白散所治為寒痰此方所治為熱痰黃連半夏栝蔞清掃熱痰也此方應移下文痞證後桂枝去桂加白朮茯苓湯芍藥炙草生薑大棗茯苓白朮頭項強痛有因榮衛不和者有因濕氣鬱阻者小便不利濕也濕阻膽經下降之路故心下滿痛而發微熱宜桂枝湯去桂枝之調榮衛加白朮茯苓以去濕仍用芍藥降膽經炙草薑棗補中氣也厚朴薑夏參甘湯厚朴生薑半夏炙草人參發汗傷中脾家陰濕已起故腹脹滿參草補中厚朴生薑半夏溫散陰濕也桂枝加厚朴杏子湯桂枝湯內加厚朴杏仁表病攻裏故表病不解而加喘滿桂枝湯解表加杏仁厚朴溫降肺胃以消太陰之喘滿也榮衛壞傷中氣方中復木燥方乾薑炙草湯乾薑炙草自汗尿多心煩津液已傷反用桂枝湯加附子增桂枝以發汗津液更傷無津液則陽無所歸而中陽亡遂肢厥咽乾吐逆躁煩乾薑炙草溫補中陽中陽回復厥躁等證乃止芍藥炙草湯芍藥炙草中回之後津液未復木氣枯燥故腳不伸芍藥炙草以潤木液其腳乃伸用承氣湯使大便微溏陽明結消譫語乃止若重發汗復加燒針因而陽亡譫語者宜四逆湯以回陽也榮衛壞入少陰腎臟方桂枝加附子湯於桂枝湯內加附子發汗後汗漏不止陽亡風動故惡風尿難肢急附子回腎陽桂枝實表陽芍藥息風斂陽炙草薑棗補中氣也芍藥甘草附子湯芍藥炙草附子發汗而表病不解反惡寒此惡寒乃腎陽虛也附子以補腎陽芍藥甘草以解表也桂枝去芍藥湯桂枝去芍藥加附子湯桂枝湯內去芍藥榮衛表病誤下之後脈促胸滿脈促為表未解胸滿為膽經寒桂草薑棗以解表去芍藥之寒膽經也若脈促胸滿而又微惡寒者此惡寒乃腎陽虛去芍藥並加附子以補腎陽也真武湯方見前榮衛表病發汗汗出不解仍發熱心悸者腎陽傷水濕起也水寒則木氣拔根而克土故頭眩身瞤動也身瞤動者風木動也土敗腎寒中氣失根故振振欲擘地而居也苓朮補土氣附子溫水寒芍藥息風木生薑溫中降逆以止眩也芍藥生薑並用可去芍藥寒中之弊水寒土不敗風木不至動到如此地步故息風須兼扶土此為大法茯苓四逆湯茯苓人參炙草乾薑附子發汗之後若又下之表病不解又加煩躁陽亡而土濕也四逆湯加人參以回陽加茯苓以去土濕也雖有表病卻不治表以煩躁乃陽亡之事故以回陽為主乾薑附子湯乾薑附子汗下亡陽陽虛則晝日煩躁夜乃安靜大氣之中晝則陽出夜則陽入晝陽氣少夜陽氣多人身亦然故晝煩躁而夜安乾薑附子以補陽也禹餘糧丸原方闕載重發汗以亡腎陽腎陽不能交心則恍惚心亂陽陷不升則小便後陰痛當是溫腎補中之法禹餘糧收攝陽氣也桂枝甘草湯桂枝炙草發汗過多心悸欲得按汗泄腎陽木氣拔根風動而衝於上也風木之氣即肝木之陽肝陽下陷則肝風上衝肝陽上升則肝風自平桂枝升肝陽炙草補中氣肝風衝到上部中虛極矣心悸得按奔豚之漸也茯苓桂枝甘草大棗湯茯苓桂枝炙草大棗汗傷腎陽腎陽乃木氣之根腎陽傷木氣失根則肝陽下陷而肝風上衝其人臍下悸動乃肝風上衝欲作奔豚之兆桂枝升肝陽以止悸降衝茯苓炙草大棗補土氣以禦風木大棗富有津液最潤木氣而平風也桂枝加桂湯於桂枝湯再加桂二兩燒針令出汗針處起赤核燒針之熱將腎陽引出故針處起赤核此腎陽大虛之徵木氣必由少腹衝心而成奔豚之狀桂枝湯加桂以大升肝陽肝陽升衝氣乃平若不上衝不可與桂枝加桂灸其核上各一壯者灸以溫回浮出之腎陽也不上衝者肝陽未陷故不可加桂以升肝陽苓桂朮甘湯茯苓白朮桂枝炙草吐下傷損腎陽則風木上衝心悸頭眩若因其脈沉緊而又汗之風木更衝木衝克土振振身搖桂枝以達木氣之陽陽達則風衝平息而病愈茯苓草棗所以補中土和升降以禦風木也凡木病中土必虛故治風木之衝以達木兼補土為要桂枝去芍藥加蜀漆龍骨牡蠣救逆湯於桂枝湯內去芍藥加蜀漆龍骨牡蠣燒針之火能引陽外出陽亡驚狂起臥不安於桂枝湯去芍藥之寒加蜀漆以去濁痰加龍骨牡蠣以鎮攝陽氣因脈浮故用桂枝薑棗草以解表驚狂起臥不安必有濁痰阻塞心竅也桂枝甘草龍骨牡蠣湯桂枝炙草龍骨牡蠣燒針亡陽而生煩躁此煩躁較驚狂之陽亡病虛故不用蜀漆之去痰而用桂枝和表炙草補中龍牡鎮陽也榮衛壞入厥陰肝臟方當歸四逆湯方見前下利而脈浮革腸鳴浮革為木氣虛寒腸鳴肝膽寒熱不和腸間停有水氣當歸桂枝溫木氣之寒桂枝白芍調肝膽之寒熱通草通調肝經而平膽熱細辛補益木氣而理腸間之水草棗補中也乾薑黃連黃芩人參湯乾薑黃連黃芩人參吐為中寒入口即吐為上熱乾薑溫中寒連芩清上熱人參補中氣厥陰之氣下寒上熱故其病如此桂枝湯方見前榮衛病時發汗又下而脈仍浮榮衛病仍在仍再用桂枝湯以和榮衛也榮衛壞入陽明胃腑方葛根黃連黃芩甘草湯葛根黃連黃芩炙草利不止而脈促喘汗脈促為表未解喘而汗出為陽明經氣之熱脈促喘汗之利此陽明經之熱利也葛根升散手陽明經氣以解表連芩清熱止利炙草補中也麻杏甘石湯麻黃杏仁炙草石膏發汗下後汗出而喘汗乃胃熱喘乃肺實石膏清胃熱麻黃杏仁瀉肺實炙草補中氣也若身外有大熱其內必寒不可用石膏白虎加人參湯方見前服桂枝湯而大汗出煩渴不解脈洪而大此本有陽明胃熱服桂枝生薑增了胃熱胃熱蒸發故大汗出大煩渴脈洪而大虛也故用白虎以清胃熱加人參生津液以補虛也若吐下後七八日熱結在裏表裏俱熱渴而舌上干燥而煩能飲水數升亦津傷燥起亦宜白虎清燥加人參以生津液也梔子厚朴湯梔子厚朴枳實下後胃中氣滯胃熱上逆故心煩腹痛臥起不安梔子清滌胃逆之熱厚朴枳實舒降胃氣之滯也梔子乾薑湯梔子乾薑大下傷中中寒則相火不降而身熱不去胃熱上逆而心微煩乾薑溫中以降相火而退身熱梔子清胃熱而止微煩也梔子香豉湯梔子香豉胃熱上逆又加津凝氣滯則心煩而胸中窒塞梔子清胃熱以除煩淡豆豉以和中宣滯以去胸窒也梔子甘草豉湯於梔子豉湯內加炙草梔子豉湯證而煩不得眠心中懊憹與梔子豉湯若少氣者是中氣不足加炙草以補中氣也梔子生薑豉湯於梔子豉湯內加生薑若梔子豉湯證加嘔者加生薑以降胃止嘔也榮衛壞病中寒肺燥肝熱方麻黃升麻湯麻黃升麻當歸芍藥黃芩知母葳蕤天冬石膏炙草乾薑白朮茯苓桂枝大下之後泄利不止咽喉不利而吐膿血手足厥逆下部脈不至脈沉而遲咽喉不利吐膿血金氣上逆生燥也泄利不止中氣虛寒木氣下陷生熱也手足厥逆下部脈不至津液傷也脈沉而遲衛氣閉束也升麻升陷當歸芍藥黃芩養木清熱知母石膏天冬葳蕤清金潤燥薑草苓朮溫補中氣麻黃桂枝調榮衛也膿血泄利皆傷津液津傷則厥木熱金燥亦能發厥上逆下陷中氣虛寒也此病之泄利不止乃熱利與太陰下利清穀不止之寒利不同此熱利乃中氣虛寒木氣下陷生熱也肺逆生燥木陷生熱中氣虛寒衛氣閉束之病也榮衛壞病結胸方大陷胸湯大黃芒硝甘遂表未解而誤下榮衛經氣下陷不升則成協熱下利陷而復升將水與熱結於胸間心下硬痛脈沉熱實短氣煩燥心中懊憹則成結胸硝黃攻結熱甘遂攻結水也大陷胸丸大黃芒硝葶藶杏仁如大陷胸證而兼項強病連榮衛不可急攻宜用丸藥緩攻硝黃清結熱杏仁降滯氣葶藶去結水也小陷胸湯即前之三物小陷胸湯黃連瓜蔞半夏結胸脈不沉而浮滑心下不按不痛按之則痛此熱痰結在心下宜黃連瓜蔞半夏清降熱痰不可攻也榮衛壞病痞證方桂枝人參湯桂枝乾薑人參白朮炙草表未解而數次下之當經氣下陷而病協熱下利今不病熱利而病下利不止之寒利以至心下痞硬宜人參湯以溫寒止利桂枝以解表人參湯即理中湯大黃黃連瀉心湯大黃黃連下後又發汗中氣大傷濕熱上逆而成胸痞瀉心湯大黃黃連瀉心下濕熱而消痞若痞而仍惡寒者是病證尚在當先用桂枝湯以解表然後用大黃黃連以瀉心漬而不煎又只漬少頃輕之至也若不用輕劑瀉著胃中則大壞也附子瀉心湯附子大黃黃連黃芩心下痞關上脈浮此為上熱大黃黃連瀉熱消痞若心下痞而復惡寒出汗者汗出為上熱惡寒為下寒附子溫下寒三黃清上熱也用附子故加黃芩附子動木熱黃芩清木熱十棗湯大棗芫花甘遂大戟若頭痛心下痞而硬痛引脅下痛乾嘔短氣汗出不惡寒不惡寒表已解也此有水氣聚在胸脅並無腎寒宜芫花甘遂大戟攻水大棗保中氣顧津液也表解乃可攻水生薑瀉心湯生薑半夏黃連黃芩炙草人參乾薑大棗心下痞硬乾噎食臭腹中雷鳴下利脅下有水故腹中雷鳴中氣虛寒上熱不降故乾噎食臭而心痞中氣虛寒寒熱混合故下利宜炙草人參補中虛連芩清上熱乾薑溫中寒半夏生薑降逆利水也甘草瀉心湯炙草大棗黃連黃芩半夏乾薑心下痞硬而滿乾嘔心煩日利數十行又遭攻下痞硬更甚此中氣下傷宜炙甘草大棗以補中乾薑以溫中連芩清熱半夏降逆也赤石脂禹餘糧湯赤石脂禹餘糧若痞而下利不止服理中其利益甚者病在下焦不能收澀不可溫補中氣宜用赤石脂禹餘糧以收澀下焦也五苓散方見前若服瀉心湯痞不解反渴而口燥生煩小便不利此下傷中氣水濕不行阻格上焦相火所致宜五苓以瀉水濕也復利不止者當用五苓散利小便也旋覆花代赭石湯旋覆花生薑半夏代赭石炙草人參大棗若下利等病已愈只是心下痞硬噎氣不除此僅中虛胃逆參棗炙草補中虛旋覆花半夏赭石生薑降胃逆也瓜蒂散瓜蒂赤小豆若病如榮衛之惡寒發熱但不頭痛項強而胸痞氣衝不得呼吸此為胸中有痰當用瓜蒂赤小豆湧吐胸中之痰也此赤小豆乃半紅半黑者紅如朱黑如漆有毒非金匱赤小豆當歸散之赤小豆赤小豆當歸散之赤小豆乃食品之紅飯豆太陰脾臟熱證方黃連湯黃連乾薑人參炙草大棗半夏桂枝腹中痛欲嘔吐欲嘔吐為胸中有熱腹中痛為胃中有寒上熱中寒中氣之虛黃連清熱乾薑溫寒參棗炙草補中氣半夏降胃陰以收熱桂枝達肝陽以散寒寒熱不調故名邪氣梔子柏皮湯梔子炙草柏皮脾濕夾熱則發黃梔子柏皮清熱以行濕炙草補中以培土也麻黃連翹赤小豆湯麻黃連翹杏仁炙草生薑大棗赤小豆生梓白皮黃病乃瘀熱在裏熱瘀之由由於汗孔不開尿道不利中氣不足麻黃杏仁開汗孔連翹赤小豆利尿道炙草薑棗補中氣生梓白皮清瘀熱也此赤小豆是紅飯豆乃食品無毒不是半紅半黑之赤小豆茵陳蒿湯茵陳蒿梔子大黃黃病而至腹滿小便不利乃濕熱結聚之實證大黃下結聚梔子茵陳清濕熱也大陰陰濕小便不利不可下之惟濕熱結聚之小便不利非下去濕熱之結聚小便不能利也桂枝加芍藥湯於桂枝湯加重芍藥太陰臟病無滿痛者其滿而痛乃濕熱阻遏木氣木氣結聚之故於桂枝湯加重芍藥以瀉木氣之結聚也桂枝加大黃湯於桂枝加芍藥湯內加大黃如腹滿而痛至於大痛實痛此木邪結聚已深須於桂枝加芍藥湯中加大黃以重瀉木氣太陰土氣病則陰寒大黃瀉木氣之結非瀉大陰也桂枝湯乃調和木氣之第一方其中炙草薑棗調中氣生津液尤為調和木氣要藥故攻瀉木氣宜用此湯加芍藥大黃少陰腎臟熱證方甘草湯甘草少陰之氣水火同宮病則寒水克火故傷寒少陰病屬於腎臟陰盛故以附子溫腎陽為王少陰陽亡病寒少陰陽復則又病熱因中氣已傷升降之力弱少故陽復之後陽升不降於是病熱咽痛即陽復生熱不能下降之病甘草補中降熱也桔梗湯桔梗炙草服甘草湯病不瘥此必熱氣傷肺咽中已現白點白點者肺家津液被熱灼傷而成膿也炙草補中降熱桔梗降肺排膿有膿之處熱結難散必須排膿熱乃能散桔梗降肺排膿是其特長半夏散半夏桂枝炙草少陰咽痛有木氣化風上衝者木氣化風肝陽下陷也桂枝升肝陽以熄風半夏降逆炙草補中凡下陷上逆中氣必虛苦酒湯半夏雞子白苦酒少陰咽痛聲音難出其痛如鎖此濕傷肺家肺氣結聚雞子白潤肺經半夏破結降逆苦酒散結聚生津液收斂火氣下降也苦酒即酒醋二味用雞蛋殼裝攪勻柴火於殼下煮三沸豬膚湯豬膚白蜜白粉咽痛而下利胸滿心煩此津液大傷豬膚白蜜溫和潤澤極滋津液白粉收澀止利也白粉即鉛粉豬苓湯豬苓茯苓澤瀉滑石阿膠少陰下利咳而嘔渴心煩不得眠下利為濕為風煩渴咳嘔失眠為燥豬苓茯苓澤瀉以去濕滑石阿膠以潤燥息風而安眠也黃連阿膠湯黃連黃芩芍藥阿膠雞子黃少陰陽復心煩不得臥此陽復生熱灼傷心液連芩芍藥清熱阿膠養心液雞子黃溫腎補液以上交於心也雞子黃性大熱此方與黃連黃芩並用使心腎相交故煩止得眠其義深矣桃花湯方見前少陰病陽復生熱而便膿血可刺以泄熱若下利便膿血此為寒證仍宜桃花湯以溫寒也少陰陽復吐證方四逆湯方見前胸中有實痰阻格則心中溫溫欲吐復不能吐陽氣不通則手足寒而脈弦遲弦者聚也遲者痰也當用吐法吐去其痰若膈上有寒飲乾嘔急用四逆湯以溫之不可吐也少陰陽復土勝水負方大承氣湯方見前少陰水負趺陽土勝為順但土氣太過傷及腎陰而口燥咽乾傷及肝陰而利清水心下痛口乾燥傷及脾陰而腹脹不大便皆宜大承氣湯下燥土以救臟陰然乃燥土之事非少陰陽復之事耳厥陰肝臟熱證方白頭翁湯白頭翁黃連黃柏秦皮厥陰陽復木氣生熱木鬱於下則下利熱傷津液則口渴木陷不勝則下重白頭翁黃連黃柏秦皮清木氣之熱熱清則木氣上升也小承氣湯方見前下利譫語此為厥陰陽復生熱灼傷胃中津液而成燥屎之故宜小承氣湯下燥屎以復津液也瓜蒂散方見前痰實結在胸中陽氣不達故肢冷脈乍緊胸中窒塞故煩而不能食宜瓜蒂散以吐痰也四逆散柴胡芍藥枳實炙草陽復生熱熱傷木液木氣滯塞升降不和則病咳悸小便不利腹痛泄利下重柴胡芍藥升降木氣枳實調滯氣炙草養中也此證脈必沉滯陽明胃腑寒證方四逆湯方見前脈遲為寒脈浮為虛外熱內寒故下利清穀宜四逆湯以補虛溫寒也吳茱萸湯方見前食穀欲嘔屬於陽明胃寒吳茱萸湯以溫胃寒得吳茱萸湯嘔反增劇此屬於上焦有熱不止胃寒而已也茵陳蒿湯方見前但頭汗而身無汗此熱也小便不利渴而能飲此濕也濕熱凝沍瘀熱在裏身必發黃故宜茵陳蒿湯以清下瘀熱也陽明陽旺則病燥而小便多陽明陽虛則病濕而小便不利濕者太陰之氣也梔子豉湯方見前心中懊憹飢不欲食瘀熱在胸也頭有汗他處無汗熱越於上宜梔子清熱香豉去瘀此病見於陽明病下之後可見陽明之陽虛陽虛濕起陽又化熱也小柴胡湯方見前胸脅滿少陽經不舒也宜小柴胡湯以解少陽經脅下硬滿不大便而嘔舌上白苔津液不下故不大便少陽經鬱故脅滿而嘔舌上白苔膽胃俱逆故均宜小柴胡以解少陽之經也上焦得通津液得下胃氣因和小柴胡之妙也少陽膽經壞病方柴胡桂枝乾薑湯柴胡黃芩炙草桂枝牡蠣瓜蔞根乾薑少陽經病汗下並施膽經傷則寒熱往來胸脅滿結脾土傷則濕生尿短中氣傷則相火不降煩渴頭汗柴芩解少陽除寒熱舒胸脅牡蠣消滿結瓜蔞合黃芩以降相火四維皆病中氣虛寒乾薑炙草以溫補中氣桂枝泄小便以去土濕也柴胡加龍骨牡蠣湯柴胡半夏人參大棗桂枝茯苓鉛丹龍骨大黃牡蠣生薑少陽被下膽經逆則胸滿煩驚譫語脾土傷則濕生尿短身盡重柴胡半夏人參薑棗疏降膽經茯苓桂枝疏利土濕鉛丹龍牡鎮斂膽經大黃泄胸下停積之相火化生之熱與土氣中瘀住之熱也小柴胡湯方見前脅下硬滿為少陽經氣不降身黃項強尿短為太陰土氣濕寒黃芩寒中故服小柴胡則下重渴為相火逆飲水而嘔為中氣寒故均不可用黃芩若用之中氣更寒食穀即噦而欲吐也小建中湯方見前傷寒二三日為少陽經病之期心悸而煩乃膽經不降而中氣虛宜小建中湯補中氣降膽經也炙甘草湯炙草人參大棗生地麥冬阿膠麻仁桂枝生薑少陽經病誤汗傷其津液脈行阻滯繼續不勻而現結代心動作悸結代動悸津液既傷中氣尤虛草棗人參大補中氣地膠麥麻潤肺養肝以滋津液桂枝生薑助肝肺之陽以行地膠等潤藥之力也大柴胡湯方見前柴胡證仍在服小柴胡湯後嘔不止心下急鬱鬱微煩嘔不止而心下急且微煩此胃間有當下之熱宜大柴胡湯解少陽之經兼下胃熱也柴胡加芒硝湯於小柴胡湯內加芒硝少陽經病多日胸脅滿而嘔潮熱微利潮熱為胃家實熱當先用小柴胡以解少陽經病復以柴胡湯加芒硝以滑瀉胃家實熱也少陽膽經壞病結胸痞證方大陷胸湯方見前傷寒十餘日之久復往來寒熱此少陽經病病結在胃宜大柴胡湯解少陽之經兼下胃熱若外無大熱但結胸者此乃水結在胸頭上微汗出即水氣上蒸之故宜大陷胸湯下水也半夏瀉心湯半夏人參炙草大棗乾薑黃連黃芩少陽病中如胸滿而痛此為大陷胸湯之結胸證若胸滿而不痛此為痞證不可用小柴胡湯宜用半夏瀉心湯以治痞痞者中氣虛寒熱逆不降乾薑炙草人參溫補中氣之虛寒連芩清熱半夏降逆中氣旋轉逆熱不降則痞消也疑難篇三陽合併方調胃承氣湯方見前胸痛滿煩此有胃熱胃熱則自吐自下用調胃承氣湯以和胃熱若非自吐下則胃熱不甚便不可用調胃承氣嘔與吐下皆胃熱見其嘔便知其自吐自下也若但嘔而不自吐自下胸痛微溏此亦大陰寒證而不能用大柴胡湯也大柴胡湯方見前頭汗惡寒手足冷心煩不欲食大便硬脈細此少陽經氣微結可與小柴胡湯以解少陽若仍不了了可用大柴胡湯一面解少陽一面下胃熱也梔子豉湯白虎加人參湯豬苓湯白虎湯方見前心中懊憹舌有膩苔此胃有熱滯宜梔子豉湯清胃熱消胃滯若渴能飲水既飲水又口中乾燥此胃燥傷津至於極點宜白虎加人參湯以生津清燥若脈浮發熱渴能飲而尿又不利是肺金燥而脾土濕宜豬苓湯潤金燥而泄土濕如汗多而渴是胃燥之甚不可用豬苓湯復利其小便以增胃燥若三陽合病腹痛身重口不仁而面垢譫語遺尿是陽明燥證再加自汗燥極傷津宜白虎湯清燥保津也類傷寒篇濕病方桂枝附子湯桂枝炙草生薑大棗附子風濕相搏身體煩痛不能自轉側脈浮虛而澀此風濕亦本身之風濕也風濕入於榮衛故身痛而脈浮虛宜用桂枝湯去芍藥之收斂以和榮衛脈澀為無陽宜用附子補陽以散風濕不嘔為無膽胃之熱逆不渴為內寒之證據故主此湯桂枝附子去桂加白朮湯炙草生薑大棗附子白朮桂枝附子湯證而小便利大便硬此津液大傷濕氣不去宜於桂枝附子湯去桂枝之疏泄小便加白朮以培土氣之津液因津液即是濕氣濕氣即是津液去濕必須養津而後濕去濕氣之去全要氣行津傷則氣不行濕氣故不能去也甘草附子湯炙草附子白朮桂枝風濕相搏骨節煩痛汗出短氣小便不利惡風不欲去衣惡風汗出表陽虛也短氣中氣虛也小便不利木氣虛也骨節痛身微腫濕也附子白朮補陽除濕桂枝固表疏木炙草補中氣也以上三方乃治濕病之大法也霍亂方理中丸五苓散方見前人參炙草乾薑白朮寒霍亂乃濕寒阻滯升降停頓之病能飲水而仍吐者五苓散以去濕補中不飲水者是中虛且寒宜乾薑炙草白朮人參溫補之藥以理中氣而復升降也四逆湯方見前寒霍亂至於吐利汗出四肢拘急厥冷此陽亡之證宜四逆湯以回陽也若吐利而小便多大汗出內寒外熱脈微欲絶亦陽亡之證亦宜四逆湯回陽也通脈四逆加豬膽汁湯炙草乾薑附子豬膽汁霍亂吐利已止汗出肢厥脈微欲絶汗出肢厥而脈微此陽氣將亡於汗也通脈四逆重用乾薑溫中回陽以復脈加豬膽汁涼降於上復陰止汗以潛藏已復之陽也膽汁寒潤調劑薑附之燥熱妙用大矣既加乾薑若無膽汁陽回不能下降必飛越以去也四逆加人參湯炙草乾薑人參附子利止惡寒脈微雖微無有病象此為下利傷血四逆湯以治惡寒加人參補氣生血以治脈微也桂枝湯方見前吐利已止別無他病而身痛不休此榮衛不和宜桂枝湯和榮衛也大病瘥後喜唾方理中丸方見前大病瘥後喜唾久不了了者此屬胃寒宜理中丸以溫胃寒也傷寒愈後氣逆方竹葉石膏湯人參粳米炙草石膏麥冬半夏竹葉傷寒愈後虛羸少氣氣逆欲吐此傷寒陽明病後津傷燥起參草粳米補氣生津石膏麥冬清燥竹葉半夏降逆也大病愈後肺熱積水方牡蠣澤瀉散牡蠣澤瀉葶藶商陸海藻蜀漆栝蔞根大病已愈之後從腰以下有水氣者此肺熱不能收水澤瀉葶藶商陸海藻蜀漆以逐水牡蠣栝蔞以清肺熱也大病愈後氣熱方枳實梔子豉湯枳實梔子香豉大病愈後因勞病復此中氣熱窒梔子清熱枳實香豉理滯也有宿食加大黃陰陽易方燒褌散褌襠即褲襠陰陽易之為病忽然體重少腹痛少氣熱上衝胸頭重不欲舉眼中生華膝脛拘急陰中筋攣燒褌散已通陰陽之氣也男病用女褌襠女病用男褌襠男女傷寒交合之傳染病肝腎虛而又熱之病也金匱方解篇金匱方解篇導言仲景先師著傷寒雜病論為中醫方藥祖本金匱要略即雜病也傷寒論一百一十三方為一整個病因傷寒病的表裏是一整個的榮衛為臟腑之表臟腑為榮衛之裏裏氣調和表即不病表氣一病裏即失和學傷寒論須表裏作一整個學而後得知一百一十三方之所以然金匱各方是一個病一個方學明傷寒論一百一十三方之後再學金匱方輕而易舉學完之後再看王潛齋醫書五種之王氏醫案學其養陰活絡之妙以運用仲聖之法便能避免偏熱之弊未讀傷寒論必須先讀本書原理上篇古方上篇乃可讀此篇著者識原方分量載在世行本金匱要略漢時一兩合今三錢四分亦嫌太重原方一兩用今之一錢可也原方大棗十二枚用小棗十枚或八枚可也河南山西陝西大棗一枚有小棗四枚之多最好是用棗肉稱分量古方大棗十二枚用紅棗肉三錢為安內傷嘔吐噦下利大半夏湯半夏六錢白蜜五錢人參三錢分量係普通常用分量治胃反嘔吐者飲食入胃原樣吐出名曰胃反此病肛門乾燥屎若羊矢中氣虛津液少大便不下升降停頓是以胃反半夏降胃人參補中生津白蜜潤腸大便潤下中氣旋轉胃反乃愈也此病屬胃吐多嘔少嘔有聲無物吐有物無聲吐乃胃經之逆嘔乃膽經之逆也此病以吐為主茯苓澤瀉湯茯苓四錢澤瀉二錢白朮三錢桂枝二錢生薑四錢炙甘草二錢治胃反吐而渴能飲水者此吐乃水濕阻格胃氣不降之故苓澤白朮以泄水濕生薑炙草降胃止嘔桂枝達木氣以行小便也水濕阻格反渴能飲相火不降傷灼肺津之故然既有停水所飲之水仍然吐出也四逆湯炙草二錢乾薑一錢半附片三錢治嘔而脈弱小便復利身有微熱手足厥者嘔而脈弱陽盡於上小便過多陰盡於下陽虛身熱陽越於外四肢秉氣於脾胃身熱肢厥陽將亡矣乾薑炙草補中土之陽附子補腎家之陽也小半夏湯生薑四錢半夏四錢治諸嘔吐穀不得下者半夏生薑降胃止吐也小柴胡湯柴胡四錢黃芩三錢半夏三錢人參三錢炙甘草三錢生薑三錢大棗四錢治嘔而發熱者嘔為膽經之逆小柴胡湯和少陽升降之氣以降膽經也膽逆者胃氣必逆膽胃逆者中氣必虛膽經逆相火不降而中虛故發熱半夏瀉心湯半夏六錢黃芩三錢黃連一錢乾薑三錢人參三錢炙草三錢大棗六錢治嘔而腸鳴心下痞者膽經相火生熱上逆則嘔火逆於上中氣虛寒則痞火逆中寒升降停滯水走腸間則腸鳴乾薑炙草人參大棗溫中寒補中虛連芩降相火半夏降逆氣也吳茱萸湯吳茱萸二錢人參三錢生薑六錢大棗六錢治嘔而胸滿者嘔而胸滿中虛胃寒而膽逆也人參大棗補中生薑吳茱萸溫寒而降膽胃也吳茱萸溫胃最益肝膽最潤木氣與乾薑專溫燥中土有別如非膽胃寒證誤用萸殺人又治乾嘔吐涎沫頭痛者此頭痛乃頭頂痛乃膽經上逆之故中氣虛寒膽胃寒逆故此湯主之吐涎沫胃寒也半夏乾薑湯半夏乾薑各等分每服各一錢治乾嘔吐涎沫者此胃氣濕寒乾薑半夏溫寒除濕溫中降胃也黃芩加半夏生薑湯黃芩三錢芍藥一錢大棗六錢炙草三錢半夏六錢生薑三錢治乾嘔而利者此利乃木熱疏泄之利芩芍清木熱草棗補中薑夏降胃止嘔也膽木逆於上肝木陷於下中氣大傷草棗補中此方要藥生薑半夏湯即小半夏湯分量不同半夏四錢生薑八錢取汁治病人胸中似喘非喘似嘔非嘔似噦非噦心中憒憒然無可奈何者胃氣上逆濁瘀填塞故現諸證薑夏溫中降胃也橘皮湯橘皮四錢生薑八錢治乾嘔噦手足逆冷者肺氣阻滯故手足逆冷胃寒上逆故乾嘔而噦橘皮降肺氣生薑溫降胃寒也噦者似嘔非嘔俗所謂噁心是也橘皮竹茹湯橘皮六錢竹茹六錢生薑八錢人參三錢甘草五錢大棗八錢治噦逆者噦逆之病乃肺氣與胃氣不降橘皮竹茹專降肺逆生薑治胃逆參棗甘草補中氣以降肺胃也吐屬於胃嘔屬於膽噦屬於肺皆由中虛中氣乃諸經升降之軸心也病久之人胃氣將絶亦有噦者通脈四逆湯炙草一錢半乾薑三錢附子三錢即四逆湯加乾薑治下利清穀裏寒外熱汗出而厥者汗出而肢冷此裏陽將亡下利見之宜速用四逆湯加重乾薑以溫補中氣以回陽也中氣為諸脈之根本故加溫補中氣之藥下利有寒熱之別用薑附乃寒利用連芩乃熱利訶藜勒散訶藜勒十枚煨為散和粥食治氣利者木氣為濕所滯故下利而放屁訶藜勒行滯達木也紫參湯紫參八錢炙草三錢治下利肺痛者大腸金氣陷於下則利肺金之氣逆於上則痛下陷上逆中氣之虛甘草補中紫參理金氣之滯以復升降也梔子香豉湯梔子香豉各四錢治下利後心煩按之心下濡者下利不應上煩今利止而煩乃利止陽復陽復生熱熱生而心下按之濡乃虛煩也當用梔子以清虛熱豆豉宣滯和中以去濡也小承氣湯大黃四錢枳實三錢厚朴二錢治下利譫語者下利譫語是胃中有燥屎小承氣湯下其燥屎腸胃氣和則利止也大承氣湯大黃四錢枳實四錢厚朴八錢芒硝二錢治下利心堅者胃土燥實則心下自堅大承氣湯下燥實也燥熱結實於中則稀水旁流故下利也又治下利脈遲滑實者遲乃不數之意氣虛則脈數氣實則脈不數滑實者如鼎水沸騰重按有力下利見此乃腸胃燥實大承氣下其燥實也又治下利脈反滑當又所去者宿食結在腸胃則下利而脈滑大承氣下去宿食則利止也又治下利已瘥至其年月日時發者人身一小宇宙至其年月日時病仍復發是有老積大承氣下其老積也白頭翁湯白頭翁三錢黃柏三錢黃連三錢秦皮三錢治熱利下重者下利而渴濕熱之利濕熱傷肝木之陰木氣升不上來故下重也黃連黃柏秦皮白頭翁清肝木之濕熱也桃花湯乾薑二錢粳米三錢赤石脂一兩六錢治下利便膿血者中寒下利腸中脂膏下脫則便膿血乾薑溫中寒赤石脂固滑脫粳米補脂膏也此與白頭翁湯證為對待之法乾薑證則不渴也膿血係紅色內傷腹滿寒疝宿食附子粳米湯附子三錢粳米六錢炙甘草二錢大棗六錢半夏六錢治腹中寒氣雷鳴切痛胸肋逆滿嘔吐者內寒阻礙木氣木氣衝擊則雷鳴切痛胸肋逆滿而兼嘔吐附子溫寒粳米草棗補中氣半夏降逆氣也大建中湯乾薑四錢蜀椒二錢人參三錢治胸中大寒痛嘔不能食腹皮起有頭足上下痛不可觸近者寒極而木氣鬱衝則胸中大痛腹皮痛不可觸而有頭足上下薑椒溫寒人參補中氣補津液也薑椒並用燥熱傷津人參補氣生津是為大法痛有頭足上下木氣寒極鬱動之象赤丸烏頭二錢茯苓四錢半夏四錢細辛一錢朱砂不拘多少為衣治寒氣厥逆手足逆冷者陽敗內寒故四肢逆冷附子細辛回陽溫寒茯苓半夏除濕氣朱砂護心火也大黃附子湯大黃三錢附子三錢細辛二錢治肋下偏痛發熱脈弦緊者弦緊為寒偏痛者寒積也緊乃聚結之象發熱者內寒而陽氣外越也大黃附子細辛溫下寒積也寒積故用溫下之法此肋下偏痛多係右肋厚朴七物湯厚朴八錢枳實二錢大黃二錢桂枝二錢甘草二錢大棗五錢生薑五錢治腹滿痛發熱脈浮數飲食如故者腹滿痛為內實裏證發熱脈浮為外感表證表裏並見當先解表然後攻裏此傷寒之定法然傷寒表病飲食不如故且必身痛項強今飲食如故身不痛項不強雖脈浮發熱而腹滿痛自應以裏證為主故宜厚朴枳黃以攻裏實桂草薑棗以和表起也厚朴三物湯厚朴八錢枳實二錢大黃三錢治腹痛而閉者腹痛而大便不通內熱必實宜厚朴枳實大黃以下實不宜溫下之法也大承氣湯方見前治腹滿不減者內寒則腹滿時減時滿今腹滿雖少減而不足言減此非內寒而係內實當用大承氣下其實也大承氣湯下內實必有腹滿痛拒按之證大柴胡湯柴胡五錢黃芩三錢芍藥三錢半夏八錢生薑五錢大棗六錢枳實二錢大黃二錢治按之心下滿痛者按之心下滿痛此為少陽膽經鬱阻陽明胃腑經腑相逼之實證然實在胃腑不在膽經故用枳實大黃以下胃腑而以柴芩芍半薑棗和少陽之經也少陽膽經無實證大烏頭煎大烏頭八錢治寒疝繞臍痛手足厥冷發則白津出脈沉緊者肝腎寒極則痛繞臍手足厥冷而脈沉緊白津出者腎氣無陽而精自下也沉緊乃寒極不運之象烏頭溫補腎陽以生肝木也烏頭桂枝湯烏頭八錢桂枝三錢芍藥三錢炙草三錢生薑三錢大棗六錢治寒疝腹痛手足不仁身體疼痛逆冷者肝腎皆寒榮衛陽氣運達不到故病如此桂枝湯以和榮衛烏頭補肝腎之陽以達全身也當歸生薑羊肉湯當歸三錢生薑三錢羊肉四兩治寒疝腹痛肋痛裏急者肝經血寒肝陽下陷升不上來故現以上諸病當歸羊肉生薑溫肝血補肝陽也大承氣湯方見前治有宿食脈浮而大按之反澀尺中亦微而澀者食宿阻塞中氣不運故脈澀故當下之浮大二字是陪辭注意反字然必腹痛無有輕時按之更痛然後可下如脈數而滑為有宿食下利不欲食亦有宿食皆宜下之滑有沉實之意瓜蒂散瓜蒂一分赤小豆三分此赤小豆乃半黑半紅者紅如朱黑如漆治宿食在上脘者宿食在上脘當用吐法瓜蒂與赤小豆均味苦有毒服下之後胃不能留故吐出宿食亦即隨之吐出非此二物能將宿食吐出也宿食在上脘若誤下之中氣受傷食仍在胸則下利而死內傷胸痹心痛短氣栝蔞薤白白酒湯栝蔞四錢薤白八錢白酒半斤治胸痹喘息咳唾胸背痛短氣者胸痹喘息咳唾胸背痛短氣皆氣不降之病氣不下降濁氣填胸栝蔞薤白降濁白酒性溫力大助其下降也栝蔞性涼薤白性溫合而用之為降濁之妙品栝蔞薤白白酒加半夏湯即前方加半夏治胸痹不得臥心痛徹背者此濁氣不降之甚者加半夏以降濁也枳實薤白桂枝湯枳實二錢薤白八錢厚朴四錢栝蔞四錢桂枝一錢治胸痞肋下氣逆搶心者膽胃之氣上逆濁氣不降風木上衝枳實厚朴降膽胃栝蔞薤白降濁逆桂枝達肝陽以平風衝肋下為肝膽經氣升降之路故於升濁之中加調和木氣之法肝陽下陷則風氣上衝肝陽上達風氣自平此桂枝平風衝之義人參湯即理中湯人參三錢白朮三錢炙甘草二錢乾薑三錢治枳實薤白桂枝湯證者理中氣之旋轉以升降四維也此方全是溫補中氣之藥其脈必虛而不實枳實薤白桂枝湯證其脈必實而不虛也是此證有脈實者有脈虛者茯苓杏仁甘草湯茯苓三錢杏仁五錢甘草二錢治胸中痹塞短氣者濕凝於肺氣不下行故痹塞短氣茯苓泄濕杏仁潤肺降氣甘草補中治濕氣用潤品此法不可忽桔枳生薑湯桔梗四錢枳實四錢生薑四錢治茯苓杏仁甘溫湯證者此方治脈氣較實之胸痹短氣桔梗枳實降濁下氣生薑溫降肺胃也脈不如實枳實忌用薏苡附子散薏苡一兩附子三錢治胸痹緩急者病有時緩有時急是為虛證陽虛土濕故胸痹有緩急附子溫陽薏仁補土去濕也桂枝生薑枳實湯桂枝三錢生薑三錢枳實五錢治諸痞逆心懸痛者肝陽不能上達則心中懸痛肺胃濁氣不降則胸中痞逆桂枝達肝木之陽薑枳降肺胃之濁也如薏苡附子散證誤服枳實即死其脈必有虛實之別也烏頭赤石脂丸烏頭二錢附子乾薑蜀椒赤石脂各一錢治心痛徹背背痛徹心者寒淩火位故痛如此烏附椒薑溫寒赤石脂護心也凡用溫藥之痞痛必有緩急時痛時減內傷痰飲咳嗽苓桂朮甘湯茯苓桂枝白朮各三錢炙甘草二錢治胸中有痰飲胸脅支滿目眩者濕聚而成痰飲停於胃間則胸脅支滿甲木之氣不能下降乙木之氣不能上升則目眩苓朮補土泄濕以通木氣升降之路甘草補中桂枝疏泄小便以除痰飲之根也凡病痰飲當以溫藥和之惟陰虛之痰不宜溫藥短氣有微飲此飲當從小便去之此方主之腎氣丸亦主之腎氣丸培木氣以行小便也腎氣丸詳下文此方陰虛忌用甘遂半夏湯甘遂三錢半夏四錢芍藥三錢炙草二錢白蜜二兩治痰飲脈伏心堅滿者飲停心下故脈伏堅滿甘遂半夏逐水降痰芍藥甘草培土疏木蜜蜂滑潤以行水也世以甘遂甘草相反不然也己椒藶黃丸防己一錢椒目一錢葶藶一錢大黃一錢治腸間有水飲腹滿口舌乾燥者腸間有水飲中氣不運升降不通故腹滿於下口舌乾燥於上椒目防己泄濕大黃葶藶排水也十棗湯芫花大戟各等分研末大棗一兩煎湯吞送一錢治飲懸在肋咳嗽內痛脈沉而弦者芫花大戟攻下水飲紅棗保中氣保津液也木氣被水飲陰格不能疏泄則鬱而現弦象此可下之證脈必沉伏不伏不沉不可言下此大法也大青龍湯麻黃三錢桂枝二錢炙甘草三錢杏仁三錢石膏一兩生薑三錢大棗六錢小青龍湯麻黃三錢桂枝三錢炙甘草二錢芍藥三錢半夏四錢細辛三錢乾薑三錢五味四錢治溢飲者水飲歸於四肢則為溢飲當發汗而去水其陽盛而內熱者宜大青龍湯陰盛而內寒者宜小青龍湯陽盛脈必有力而燥陰盛脈必虛小而寒也木防己湯防己三錢生石膏一兩桂枝三錢人參四錢治飲停胸膈喘滿心下痞堅面色黧黑其脈沉緊者飲停胸膈陽氣不能上達而內結化燥故面色黧黑飲停而肺氣不降故喘滿其脈沉緊燥熱內結之象木防己泄水飲石膏清燥開結桂枝達陽氣人參補中氣保津液也木防己去石膏加芒硝茯苓湯即前方去石膏加茯苓芒硝治木防己湯證不愈者石膏清燥開結其治在上如其不愈宜從下治則去石膏加茯苓芒硝以下水得微利則愈五苓散茯苓二錢豬苓二錢澤瀉二錢白朮二錢桂枝二錢治瘦人有水飲臍下悸動吐涎沫而癲眩者水飲木鬱則臍下跳動水飲而肺胃之氣不降則吐涎沫水飲阻格膽經不降則癲眩五苓散泄水濕達木氣也半夏加茯苓湯半夏四錢生薑三錢茯苓三錢治崔卒然嘔吐心下痞眩悸者水在膈間膽胃之氣不將故心痞眩悸而嘔吐半夏生薑茯苓降泄水飲也澤瀉湯白朮二錢澤瀉五錢治冒眩者心下有水陽氣不降浮於上部故苦冒眩白朮澤瀉泄水也小半夏湯方見前治嘔而不渴者嘔傷津液故嘔後作渴今嘔而不渴此心下有水飲半夏生薑降水也若先渴後嘔停水較深宜小半夏加茯苓以厚藥力也厚朴大黃湯厚朴八錢枳實二錢大黃四錢治膈間有水飲胸滿者此由胃土壅實阻塞水之降路故使胸滿脈必沉實厚朴枳實大黃下胃氣之壅實也胸滿忌下脈不沉實下傷中氣易於致花膈間有水必有水聲葶藶大棗瀉肺湯葶藶三錢熬黃色搗丸大棗一兩治支飲不得息者飲阻肺氣呼吸困難葶藶瀉水飲而降肺氣大棗補中氣保津液也人忽瘦水走腸間瀝瀝有聲為痰飲飲後水流脅下咳唾引痛為懸飲飲水流行歸於四肢為溢飲氣短不得臥其形如腫為支飲痰飲之象飲食精華變而成痰故人忽瘦也小青龍湯方見前治咳逆倚息不得臥者支飲在胸氣不下降故咳嗽氣逆倚物作息水格陽逆故睡臥不下小青龍麻桂芍藥發汗泄水五味薑辛溫降水氣乾草補中半夏降逆茯苓桂枝五味甘草湯茯苓四錢桂枝四錢五味子八分炙草三錢治水飲服小青龍湯汗出後多唾口燥寸脈沉尺脈微面如醉狀氣從少腹上衝胸咽小便難熱流陰股時眩冒者汗後陽亡木氣失根風氣上衝股口燥氣衝咽喉腎陽虛故唾多手足厥逆風木上衝熱浮於上故面如狀醉肝風衝於上肝陽陷於下故熱流陰股風衝於上故冒木氣下陷不能疏泄故小便難風傷肺氣肺氣傷故寸脈沉風由少腹衝上腎氣拔根故尺脈微五味子補腎陽以安肝木之根而斂風桂枝茯苓達肝陽而平衝肝陽即是肝風陽達則風平也炙甘草補中氣也茯苓甘草五味薑辛湯茯苓四錢炙甘草三錢五味子八錢乾薑三錢細辛三錢治服桂枝五味甘草湯衝氣既低反更咳嗽胸滿者服桂枝風衝既平反更咳嗽此咳嗽乃寒水上淩火位仍用桂枝茯苓五味甘草湯去桂枝加乾薑溫中寒加細辛降寒水寒水下降咳嗽自止中氣溫運胸自不滿風衝能耗散水氣故風衝既平水氣又作而咳加胸滿自來皆謂五味斂肺止咳誤人多矣肺病總忌五味因其性大斂大熱之故只因傷寒論小青龍湯治咳有五味世人讀書不按事實遂以五味為治咳之藥小青龍之咳乃腎寒得水上衝之咳五味溫腎寒也茯苓甘草五味薑辛半夏湯茯苓四錢甘草二錢五味子八錢乾薑二錢細辛二錢半夏八錢治支飲冒而嘔不渴者冒眩嘔水不渴寒水上淩五味乾薑細辛半夏茯苓溫降寒水甘草養中氣也苓甘五味薑辛半夏杏仁湯茯苓四錢炙甘草三錢五味四錢乾薑三錢細辛三錢杏仁四錢半夏四錢治水氣嘔止其人形腫者服苓甘五味薑辛半夏湯後其人形腫此衛氣不舒不能收斂雖水去嘔止以腫之故水圍全去宜仍用茯苓甘草五味薑辛半夏以去水加杏仁以舒衛氣也不用麻黃而用杏仁麻黃泄衛力大甚敗陽也苓甘五味薑辛半杏大黃湯於前方加大黃三錢治服苓甘五味薑辛半夏杏仁湯後面熱如醉者此寒水上衝又有胃熱故加大黃以清面熱如醉之胃熱也內傷肺癰肺痿上氣乾薑甘草湯炙草四錢乾薑三錢治肺痿吐涎沫而不咳不渴遺尿小便數者此肺中寒冷上中虛不能攝下乾薑炙草溫補上中之氣也桔梗湯桔梗二錢炙甘草二錢治肺癰咳而胸滿振寒脈數咽乾不渴時時濁唾腥臭吐膿如米粥者中虛不運肺家濕熱不能下行久而成膿故現上列諸證桔梗排膿甘草補中膿去中復肺氣得降故愈也桔梗是降肺排膿藥自來認為載藥上行肺家藥皆下降也葶藶大棗瀉肺湯方見前治肺癰喘不得臥者濕熱薰蒸肺液成膿肺氣不降故喘而睡臥不下葶藶排膿大棗補中氣補津液也越婢加半夏湯麻黃六錢生石膏八錢炙甘草二錢生薑三錢大棗六錢半夏四錢治肺脹咳而上氣其人喘目如脫脈浮大者肺氣脹滿不能下行故喘而目如脫伏脈浮大是肺氣燥實麻黃泄肺實石膏清肺燥生薑大棗甘草半夏補中降逆也上氣者氣不下降也脈浮大此大字乃有力之大非虛大也肺癰脈虛肺脹脈實脈實故用麻黃石膏小青龍加石膏湯小青龍方中加石膏治肺脹咳而上氣煩躁而喘脈浮心下有水者肺脹而煩躁此肺氣實燥咳喘而脈浮則心下有水矣此中上實燥中下虛寒故用麻黃泄實石膏清燥以治中上薑辛五味溫寒水以治中下桂枝芍藥升降木氣甘草補中氣也脈浮有表邪故用調和榮衛之法心下有水者心下必有水聲用薑辛五味之咳喉中必作癢痰必清而夾水澤瀉湯人參三錢甘草三錢生薑五錢半夏四錢紫參五錢白前五錢桂枝三錢黃芩三錢澤瀉三錢治咳而脈沉者中虛胃逆熱閉於肺故咳而脈沉參草補中薑夏降胃紫參白前黃芩舒肺清熱澤瀉泄水桂枝達木氣助疏泄以利尿也此方治水但憑脈實沉脈之中必有熱閉在肺之象厚朴麻黃湯厚朴五錢杏仁四錢石膏一兩麻黃四錢乾薑二錢細辛二錢五味四錢半夏四錢小麥八錢治咳而脈浮者水飲阻格故咳而脈浮此病上實下虛上燥下寒其脈之浮必有力其咳必多清水咽喉必癢喉中必作水雞聲麻黃石膏厚朴杏仁小脈半夏以治實燥乾薑五味以治虛寒細辛逐水於下麻黃泄水於外也此方治水但憑脈浮浮脈之中必有上實下虛上燥下寒之象射干麻黃湯射干三錢紫苑三錢款冬三錢半夏四錢麻黃四錢五味四錢乾薑四錢細辛三錢大棗六錢治咳而上氣喉中水雞聲者寒水上逆喉中作癢呼吸如水雞之聲麻黃射干紫苑款冬半夏降肺泄水薑辛五味溫降寒水之衝大棗補中氣補津液因諸藥皆傷津液故以大棗補之麥門冬湯麥門冬六錢人參三錢半夏六錢炙草三錢粳米四錢大棗六錢治火逆上氣咽喉不利者中氣不足相火與金氣不能順降相火刑金肺液受傷降氣更衰故氣上而不下咽喉不利而作乾咳參草米棗補中氣麥冬潤肺降氣半夏降胃以降肺也此與麻黃薑辛之治法是相對的皂莢丸皂莢八錢蜜為丸梧子大以大棗炙甘草湯送日三丸治咳逆上氣時時唾濁但能坐不能眠者此肺家濁氣壅閉之病皂莢利氣破壅也力量太大慎用內傷血痹虛勞注金匱要略問曰血痹病從何得之師曰夫尊榮人骨弱肌膚盛重因疲勞汗出臥不時動搖加被微風遂得之但以脈自微澀在寸口關上小緊宜針引陽氣令脈和緊去則愈黃耆五物湯黃耆二錢桂枝三錢白芍三錢生薑三錢紅棗六錢治血痹身體不仁者此榮衛雙敗氣血運行不能流通之病黃耆大補衛氣桂芍薑棗大補榮氣榮衛俱足運動迅速自然流通血自不痹而無不仁也桂枝龍骨牡蠣湯桂枝三錢白芍三錢炙甘草二錢牡蠣三錢生薑三錢紅棗三錢龍骨三錢治虛勞遺精少腹急陰頭寒者膽經相火不降則肝陽不能上升肝陽不升則少腹急相火不降則陰頭寒木氣滯而升降不交則子半陽生木氣疏泄而遺精白芍降膽經降相火桂枝升肝經甘草薑棗調補中氣以助升降之能龍牡通滯氣並固精氣也此方通滯調木補中三法並重尤重降膽經也婦人夢交亦用此方病原同也小建中湯白芍六錢桂枝三錢炙草三錢紅棗六錢生薑三錢飴糖二兩治虛勞裏急悸衄腹中痛夢中失精四肢酸痛手足煩熱咽乾口燥者此方全在降膽經相火下交於腎水之中水火俱足則生元氣元氣上奉則生中氣建中之義即是降膽經相火下交腎水而已虛勞之病土木枯燥榮衛腠理多滯澀不通芍藥善通滯澀滯澀通後陰陽氣血乃易調和誠為此方要藥飴糖所以潤土木二氣之枯燥而和芍藥之苦味也陰虛不受甘藥之虛勞家用白朮黨參白芍各等分每日服之亦能得小建中湯之效土木兼醫小建中亦土木兼醫也黃耆建中湯即小建中加黃耆治虛勞裏急諸證不足者於小建中加黃耆以補衛陽白芍調榮陰黃耆補衛陽使榮衛運行速度增加然後病愈人身中氣如軸四維如輪軸運輪行輪運軸靈榮衛乃臟腑整個之外維外維運動臟腑乃和脈虛者宜此方此方所以補小建中之義也腎氣丸山藥四錢熟地黃六錢丹皮三錢山茱萸三錢茯苓二錢澤瀉一錢附子一錢桂枝一錢治虛勞腰痛小便不利者腎家水火均虧故腰痛木氣失根不得疏泄故小便不利少腹拘急腎氣丸補水火二氣木氣得根故愈薯蕷丸薯蕷八錢麥冬四錢桔梗二錢杏仁二錢阿膠四錢地黃四錢紅棗四錢人參四錢甘草四錢白朮四錢茯苓四錢神麯二錢乾薑二錢柴胡二錢白斂二錢桂枝二錢白芍二錢防風二錢川芎二錢黃豆卷二錢當歸二錢治虛勞諸不足風氣百疾者肺金不降收斂氣衰於是疏泄氣旺風木肆動津液被劫腠理枯滯而成虛勞此方以薯蕷補金氣之收斂而平木氣疏泄為主為虛勞病整個治法酸棗仁湯酸棗仁六錢知母四錢川芎四錢炙甘草四錢茯苓四錢治虛煩不得眠者膽經相火充足下降交於腎水則善眠睡川芎溫肝木以培膽經相火棗仁補膽經相火知母降相火以除煩茯苓甘草補中也大黃蟅蟲丸大黃黃芩白芍地黃杏仁桃仁乾漆水蛭虻蟲蠐螬蟅蟲各二錢炙甘草三錢治虛勞羸瘦腹滿不能飲食肌膚甲錯兩目黯黑內有乾血者此方乃磨化乾血之法不可急治內傷驚悸吐衄下血瘀血桂枝去芍藥加蜀漆龍骨牡蠣湯桂枝三錢炙草三錢生薑三錢紅棗六錢蜀漆二錢龍骨三錢牡蠣三錢治傷寒誤用火逼驚狂起臥不安者火逼之苦能將人身陽氣引而外出陽氣失根故驚狂而起臥不安龍骨牡蠣收攝陽氣桂枝炙草生薑紅棗解傷寒之表邪蜀漆蕩胸中之濁逆也芍藥性寒極敗陽氣故去之半夏麻黃丸半夏四錢麻黃二錢治心下悸者此土濕胃逆痰阻上焦心包相火不能下降之病心包厥陰之氣不將則跳動作悸半夏麻黃泄降濕逆心包之氣得降則病愈也其脈必重按不虛如重按脈虛有須兼用參草以補中氣也大黃黃連瀉心湯大黃一錢黃連一錢黃芩一錢治心氣不足吐血衄血者心屬火主下降心氣不足降氣不足也三黃瀉火故愈其脈必重按不虛也柏葉湯柏葉三錢艾葉一錢乾薑一錢馬尿一杯治吐血不止者此中氣虛寒肺金失斂之病柏葉溫中寒艾葉溫降肺胃馬尿助金氣之降斂也此病之脈必重按虛微也大黃黃連黃芩瀉心湯治吐血熱證柏葉湯治吐血寒證熱性向上故上熱則血不下降而吐出寒性向下不應吐血寒則中土氣虛旋轉無力四維不能升降上不降則吐血故用乾薑以溫中寒中氣旋轉降氣復原則血下行也凡上逆之病服熱藥而愈者皆中寒不運之故且有下陷熱證亦因中寒者所以經方有乾薑炙草黃連黃芩並用之法赤小豆當歸散赤小豆三錢當歸二錢赤小豆即紅飯豆治先血後便者木氣虛則疏泄盛故未便而血先下濕阻木氣之病也當歸大補木氣赤小豆泄濕調木也黃土湯灶心土八錢炙甘草二錢白朮三錢阿膠四錢地黃三錢黃芩三錢附子三錢治先便後血者此土濕木燥水寒之病也灶中黃土白朮補土除濕阿膠地黃黃芩清潤木燥以止疏泄附子溫水寒以培木氣上升之根故病愈也凡木氣疏泄之病多兼土濕水寒而本氣燥熱因濕鬱則木氣被遏而風動風動傷津故生燥熱水寒之脈必重按虛微也內傷奔豚奔豚湯炙甘草三錢半夏三錢生薑三錢芍藥三錢當歸一錢川芎一錢黃芩二錢葛根二錢李根白皮八錢治氣上衝胸寒熱往來腹痛作奔豚者木氣下鬱鬱極而發升而不降則氣上衝胸肝木上衝膽木不降則發寒熱肝木上衝其力極猛勢如奔豚肝木鬱故腹痛歸芎溫補肝木芍藥黃芩清降膽木葛根生薑半夏甘草養中降胃以調其升降之機李根白皮大補木氣而達木鬱也葛根是陽明大腸經之藥手陽明升則足陽明降也桂枝加桂湯即桂枝湯加重桂枝治外感發汗後復用燒針針處被寒核起面赤欲發奔豚氣從少腹上衝心者燒針能拔腎陽外出腎陽外出木氣失根則化風上衝針處赤核即外出之陽也桂枝湯調木氣加重桂枝者桂枝善降木氣之衝木氣之風上衝因木之陽下陷木陽上達則木風不衝桂枝降木氣之衝者乃達木氣之陽之故若非腎陽虛敗而係肝熱上衝之病則忌桂枝苓桂甘棗湯茯苓四錢桂枝三錢炙草三錢大棗六錢治發汗後心下悸欲作奔豚者發汗亡陽肝木下陷風衝於胸則心下悸動茯苓草棗扶土補中桂枝升達肝陽以降衝氣凡風木上衝之病中氣必虛故須土木兼治此大法也奔豚湯證乃風木正當上衝中土補藥壅滿不受故舒木之藥多補中之藥少此欲發奔豚木邪未盛故補土之藥較奔豚湯多木邪克土於木邪未盛之前補足土氣土氣不受木克木邪亦起不大也內傷消渴小便不利淋白虎加人參湯生石膏八錢粳米四錢知母四錢炙甘草三錢人參四錢治消渴能飲水口乾舌燥者消渴之病風燥傷津所飲之水被風消去津傷則燥故雖飲而口仍乾舌仍燥石膏知母粳米甘草清燥以保津人參補氣以生津也凡用石膏之病脈必實而不虛也五苓散方見前治消渴飲水水入即吐者飲水仍吐是水逆於上不能下行茯苓豬苓澤瀉白朮以去水桂枝達木氣以行小便也又治傷寒脈浮微熱消渴未發汗小便不利者傷寒未得汗解水濕阻格榮衛故消渴脈浮發熱小便不利五苓散泄去水濕榮衛得通故汗出而愈文蛤散文蛤治消渴飲水不止者飲水而吐出為水逆飲水不止為內濕文蛤性澀除濕潤肺也內濕而飲水濕阻相火下降之路相火灼金也豬苓湯豬苓茯苓滑石各三錢澤瀉錢半阿膠三錢治消渴脈浮發熱小便不利者濕盛風生則脈浮發熱二苓滑泄以去濕阿膠以清風也五苓散性剛豬苓湯性柔豬苓湯證脈有剛象腎氣丸方見前治消渴小便多者木氣失根疏泄妄行故小便多腎氣丸補水與補水中之陽木氣得根故愈栝蔞瞿麥丸茯苓薯蕷栝蔞各四錢附子二錢治小便不利而渴者上有燥熱則渴下有濕寒則小便不利瞿麥栝蔞清上附子溫下茯苓薯蕷除濕也此脈心存澀而尺微右尺必較左尺更微也蒲黃散蒲灰五錢滑石五錢茯苓戎鹽湯茯苓三錢戎鹽三錢白朮三錢戎鹽即青鹽滑石白魚散滑石五錢白魚一兩亂髮灰一錢治小便不利者均除濕之法蒲灰滑石濕熱之法戎鹽濕寒之法白魚亂髮灰開竅利水之法內傷水氣黃疸麻黃甘草湯麻黃四錢炙甘草二錢統治水病麻黃通腠理以散水甘草保中氣也越婢湯麻黃六錢生石膏八錢炙甘草二錢生薑三錢大棗六錢治風水惡風身腫脈浮不渴自汗身無大熱者汗出當風閉其汗孔水停皮膚則成風水病因於風故惡風內熱故汗出熱盛於內故外無大熱水在皮膚之表故脈浮熱在水中故身腫不渴石膏清內熱麻黃炙草生薑大棗發汗乃內熱蒸出之汗此方之用麻黃乃用以發散水氣用石膏乃清內熱以止汗也防己黃耆湯防己三錢黃耆三錢白朮三錢炙草二錢治風水脈浮身重汗出惡風者汗出當風汗孔復閉濕不得出骨節疼痛身重惡風是為風水防己散濕泄水黃耆補衛氣以開汗孔以助防己之功朮草補中除濕也防己散水力量特大與黃耆同用水去而人不傷白朮除濕生津為治水濕要藥津液與水濕原是一物故治水濕以顧津液為要防己茯苓湯防己三錢茯苓六錢炙甘草二錢黃耆三錢桂枝三錢治皮水治肢腫轟轟動者水在皮膚肢腫而動防己黃耆發汗去水動乃風木之鬱桂枝達木氣茯苓甘草扶土養中氣也越婢加朮湯即使越婢加白朮治水病一身面目黃腫脈沉小便自利而渴者水病小便當不利尿利傷津內熱作渴越婢湯散水清熱加白朮以止小便也小便自利乃小便太多非小便不短也前證脈浮此證脈沉浮沉皆兼實意故皆用麻黃石膏津液傷故脈沉水阻腠理故脈浮麻黃石膏皆能傷中故皆用甘草薑棗以補中氣蒲灰散方見前治皮水而厥者內熱故外厥滑石清內熱蒲灰利小便也麻黃附子湯麻黃三錢附子六錢炙甘草二錢治水病脈沉者此脈沉乃沉而無力沉而無力腎陽不足附子溫腎陽麻黃散水甘草保中也杏子湯杏仁三錢麻黃三錢生石膏六錢炙甘草三錢治水病脈浮者此脈浮必浮而有力肺熱充實石膏清肺熱杏仁降肺氣麻黃甘草泄水保中也桂甘薑棗麻附細辛桂枝三錢生薑三錢大棗六錢炙草二錢麻黃二錢附子六錢細辛二錢治水病心下堅大如盤邊如旋杯者下焦陰寒之氣逆塞上焦陽位凝聚不動則成此證附子細辛降陰寒桂枝麻黃發散榮衛甘草薑棗調補中氣也枳朮湯枳實三錢白朮二錢治水病心下堅大如盤邊如旋杯者此證與桂甘薑棗麻附細辛湯證有別前證用附子細辛脈當沉微現寒之象此證脈當濡實現濕痞之象白朮除濕枳實消痞也黃耆芍藥桂酒湯黃耆五錢芍藥三錢桂枝三錢苦酒六錢苦酒即醋治黃汗身重發熱汗出而渴汗沾衣色黃如藥汗者瘀熱在裏水與熱合則出黃汗此水病名黃汗黃耆桂枝發散榮衛以去水芍藥苦酒泄瘀熱也桂枝加黃耆湯即桂枝湯加黃耆治黃汗腰以上汗出腰以下無汗腰髖痛如有物在皮膚中身體疼痛煩躁者熱瘀於水榮衛阻滯則腰上汗出腰下無汗而腰痛身重煩躁桂枝加黃耆以通調榮衛也此方服後如不得微汗再服必得微汗榮衛乃通黃汗乃愈凡病腰以上有汗腰以下無汗皆有膽熱此方之芍藥為清熱要藥茵陳蒿湯茵陳蒿六錢梔子四錢大黃二錢治穀疸寒熱不食食則頭眩心胸不安發黃者濕熱瘀於脾胃故食則頭眩而心胸不安榮衛根於脾胃脾胃熱瘀升降不和則榮衛鬱阻而發寒熱食則熱增故頭眩茵陳梔子除濕清熱大黃下瘀雖發寒熱不治榮衛也梔子大黃湯梔子四錢香豉八錢枳實二錢大黃二錢治酒疸心中懊惱或熱痛者飲酒發生濕熱則懊惱熱痛梔子香豉蕩滌懊惱枳實大黃攻下熱痛也硝礬散硝石熬黃礬石燒等分治黃汗之得於女勞者女勞傷損肝腎不能化水則成黃汗其證足下熱額上黑腹滿日晡發熱而反惡寒木氣下陷則足下熱而腹滿陽氣不能上達則額上黑日晡陽氣入於土下增其瘀熱則發熱病屬腎虛腎陽不達於外則惡寒雖屬腎虛此時卻不能治腎惟當治其瘀熱硝石礬石去其瘀熱也瘀熱去後乃可治腎茵陳五苓散五苓散加茵陳統治黃汗病者茵陳最能去黃故於五苓去濕之中加之以統治黃病也豬膏髮煎豬膏即豬油八錢亂髮如雞子大三枚燒灰治諸黃病者濕熱瘀阻尿道不通豬油髮灰利尿道以去濕熱也桂枝加黃耆湯即桂枝湯加黃耆治黃病脈浮者治黃病當利小便以去濕熱脈浮則當汗解桂枝湯加黃耆以發汗也大黃硝石湯大黃四錢硝石四錢梔子四錢黃柏四錢治黃疸腹滿小便短赤自汗出者自汗出為裏氣熱腹滿尿赤為裏氣實大黃硝石梔子黃柏下裏實之濕熱也小半夏湯方見前治黃疸誤服下藥而噦者黃疸之病若小便色不變赤腹滿而喘欲自下利者乃脾腎寒濕不可用大黃梔子寒下之藥以除熱若熱除去則陽敗作噦噦者用半夏生薑以溫降胃陽也小柴胡湯方見前治黃疸腹滿而嘔者嘔為少陽膽經不和之病黃為膽經上逆之色膽經不和是以腹滿小柴胡和膽經也小建中湯方見前治諸黃疸小便自利者小便利則無濕既無濕而病黃此膽經上逆之病與濕熱無關宜小建中湯降膽經也黃疸之病亦有屬於濕寒者傷寒論曰當於濕寒中求之是也乾薑最要乾薑白朮與茵陳並用為宜內傷趺蹶手指臂腫轉筋狐疝蛔蟲刺腨方腨足肚也刺入一寸古時一寸合今五分只刺五分可也治趺蹶病但能前不能卻者但能前走不能後移太陽膀胱經傷於寒濕之故膀胱經自頭足行身之後刺腨以泄膀胱經之寒濕也藜蘆甘草湯藜蘆三錢炙甘草三錢治手指臂腫其人身體瞤瞤者痰阻經絡故手指臂腫風木之氣不能流通故動而瞤瞤藜蘆吐痰甘草保中也雞矢白散雞屎白治轉筋為病臂腫硬值脈上下行微弦者此病經風盛木氣結聚之病雞屬木氣屎能通結木氣之結病用木氣之通藥以通之也雞屬木氣白屬金色金能制木故效亦通蜘蛛散蜘蛛十四枚熬桂枝二錢治陰狐疝氣偏有大小時時上下者疝結陰囊上下不定有如狐妖此肝木結陷陽氣不能上達之病蜘蛛散木氣之結桂枝達木氣之陽而升木氣之陷也甘草粉蜜湯炙甘草二錢白粉一錢蜂蜜四錢白粉即是鉛粉治蛔蟲為病吐涎心痛發作有時者蛔乃木氣所生蛔動而上行故心痛而吐涎沫蛔動不定故發作有時白粉殺蟲甘草蜜蜂保中氣也烏梅丸烏梅三十個細辛六錢桂枝六錢川椒六錢當歸六錢乾薑一兩附子六錢黃連一兩六錢黃柏六錢黨參六錢治吐蛔心煩者吐蛔心煩此蟲病之虛證故用烏梅丸心病吐涎不煩不吐蛔此蟲病之實證故用甘草粉蜜湯虛證而用殺蟲之法非將人殺死不可烏梅丸寒熱並用乃調木氣之法亦即治蟲之法治蟲者治木氣也離開木氣而曰治蟲所以只知殺蟲了外科瘡癰腸癰淫瘡大黃牡丹湯大黃四錢芒硝三錢瓜子桃仁各三錢治腸癰其脈遲緊膿未成可下者薏苡附子敗醬散薏苡五錢附子三錢敗醬一兩敗醬即苦菜即做冬菜之青菜治腸癰其脈數膿已成不可下者大黃牡丹湯證之脈遲言不數也不數而緊為實數為虛膿未成而脈緊熱聚脈緊故下之膿已成故脈虛故薏苡附子以補之敗醬能滌膿也排膿湯炙甘草二錢桔梗三錢生薑一錢大棗五錢治膿已成者此方薑棗補中氣甘草桔梗排膿排膿散枳實芍藥桔梗為散雞子黃一枚調服藥與黃相等治瘡癰膿已成者此方枳芍桔梗皆無補性故以雞子黃以補之王不留行散王不留行十分炙甘草十八分厚朴二分黃芩二分芍藥二分桑白皮十分乾薑二分川椒三分小瘡則粉之大瘡但服之治金瘡者金瘡失血內寒木燥脈絡滯澀椒薑溫寒芍芩潤燥桑白皮厚朴王不留行活脈絡甘草扶中氣也黃連粉黃連一味作粉治浸淫瘡者濕熱之氣淫於四肢為浸淫瘡黃連收濕清熱也外感歷節中風桂枝芍藥知母湯桂枝四錢白芍三錢麻黃二錢防風四錢生薑五錢炙甘草二錢白朮四錢知母四錢附子二錢治諸肢節疼痛身體尪羸腳痛如脫頭眩短氣溫溫欲吐者榮衛閉澀則肢痛身羸下焦陽少則腳痛如脫肺胃熱逆則頭痛短氣溫溫欲吐桂枝白芍麻黃防風生薑甘草以調理榮衛知母清降上逆之熱附子以補下焦之陽白朮補中土以資旋轉而培榮衛升降之力也烏頭湯烏頭一兩炙草三錢白芍三錢麻黃三錢黃耆三錢白蜜一兩治歷節疼痛不可屈伸者濕寒傷筋著骨榮衛不通則疼痛不可屈伸烏頭溫寒逐濕白芍麻黃調理榮衛黃耆大補衛陽以利關節白蜜潤養津液炙草補中以資榮衛之運行也歷節之證肢節腫大體肉瘦削外感痙濕暍瘧栝蔞桂枝湯栝蔞根四錢桂枝白芍炙草生薑各三錢大棗六錢治榮衛外感身體強幾幾然汗出惡風脈反沉遲病柔痙者衛外感發熱惡寒身強而背幾幾反折刪去惡風汗出此中風之桂枝湯證而背卻幾幾欲向後折此津液虧傷是為痙病惡風汗出痙病之柔者脈反沉遲津虧之象桂枝調和榮衛栝蔞清熱生津降足陽明也葛根湯葛根四錢麻黃桂枝白芍生薑炙甘草各三錢紅棗六錢治榮衛痙病狀如栝蔞桂枝湯證不惡寒而惡風不汗出小便少氣上衝胸口噤不得語欲作剛痙者榮衛病而惡寒無汗仍傷寒麻黃湯證小便少津液傷而膀胱氣不降也氣上衝胸口噤不得語津液傷而胃經膽經不降也是欲作剛痙此病衛氣閉而不降陽明胃經不降少陽膽經不降麻桂甘草薑棗以開衛氣之閉而降膀胱之經芍藥以降膽經葛根以降胃經葛根之降胃經乃升大腸經之作用手陽明經上升足陽明經自然下降幾幾反折乃手陽明後陷之象手陽明後陷故足陽明前逆也幾幾反折津液虧傷之證芍藥葛根最生津液大承氣湯方見前治痙病胸滿口噤臥不著席腳攣急齘齒者痙病在榮衛不速汗解表鬱裏急津液胃熱故現以上諸證大承氣下胃熱也此即剛痙麻黃加朮湯麻黃四錢杏仁桂枝炙甘草各三錢白朮四錢治濕家身煩痛者濕鬱經絡則生煩疼麻黃湯發汗以去濕加白朮補土氣以去濕氣也麻黃杏仁薏苡甘草湯麻黃四錢杏仁薏苡炙甘草各三錢治濕家一身盡痛發熱日晡所劇者此病由於汗出當風閉其皮毛榮衛阻滯故身痛發熱日晡乃申酉之時陽明金氣當旺將風濕收斂榮衛難於流通故日晡加劇麻黃杏仁發散金氣之收斂薏苡甘草泄濕補土則榮衛和而風濕去也防己黃耆湯防己三錢黃耆白朮各四錢炙草三錢治風濕脈浮身重汗出惡風者衛氣不足不能收斂故脈浮汗出惡風濕凝經絡故身重黃耆大補衛氣收斂作用與疏泄作用調和榮衛運行能圓濕氣乃能流通此與麻黃散衛閉為相對之治法白朮防己補土除濕炙草補中也防己除濕有散性故與黃耆之補衛氣同用桂枝附子湯桂枝生薑各三錢紅棗六錢炙草附子各三錢治風濕相搏身體疼痛不能自轉側不嘔不渴脈浮虛而澀者風濕相搏榮衛不通故身痛不能轉側不嘔不渴言無熱也脈浮虛而澀言無陽也桂草薑棗補中氣達肝陽以調榮衛附子補陽氣也若小便利大便堅者去桂枝加白朮湯主之因濕家木氣不能疏泄當小便不利大便不堅今尿利便堅木氣疏泄傷津宜與附子桂枝湯內加白朮以補中土之津液去桂枝之疏泄木氣以減少尿量而潤大便也白朮能去土濕又能生津乃白朮之特長凡濕病大便溏者濕易去大便堅者濕難去最宜注意甘草附子湯炙草白朮桂枝附子各三錢治風濕相搏骨節疼痛而煩近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者身微腫汗出短氣惡風不欲去衣腎陽虛也小便不利骨節煩痛土濕也白朮除土濕附子補腎陽桂枝固表陽以止汗並利小便以除濕炙草補中氣也濕病朮附子為要藥骨內陽虛故近之痛劇汗出而又惡風之證腎陽虛者居多必不渴其脈必重按虛微白虎加人參湯生石膏八錢知母四錢炙甘草三錢粳米四錢人參五錢治暍病感冒風寒身熱而渴汗出惡風者暍病即暑病內熱蒸發則汗出內燥熱則外惡寒暑傷肺氣津液枯燥則身熱而渴白虎養中氣清肺燥加人參益氣生津也暑病之脈甚虛身熱又復惡寒內氣必有燥結石膏善清暑熱最開燥結凡用石膏之病必有燥熱在肺之證惡寒而渴是也暑脈雖虛而用石膏之脈必重按滑而有力最宜細辨一物瓜蒂湯瓜蒂治暍病身熱重痛而脈微弱者此夏月浴於冷水水入汗孔閉住內熱熱傷肺氣故脈微弱此微字作虛字看瓜蒂能泄皮中之水使汗孔仍開暑熱仍散病身重即肺熱之故白虎加桂枝湯即白虎湯加桂枝治瘧病脈如平人身無寒但熱骨節時痛煩而嘔者無寒但熱而煩嘔乃肺胃腎皆熱之象石膏清熱瘧病必結石膏又能散結故治之骨節時痛此必由於外感榮衛不調而來故加桂枝以和榮衛也謹按此方經文謂治溫瘧此溫字作熱字解非溫病之溫字也蜀漆散蜀漆即常山根雲母龍骨各等分為散治瘧多寒者寒主收斂收斂則結聚蜀漆雲母龍骨掃除結聚使陰陽之氣易於通調也鱉甲煎丸鱉甲十二分桃仁二分蟄蟲五分鼠婦三分螳螂六分蜂巢四分葶藶一分大黃五分厚朴五分石葦五分赤硝十二分烏扇三分即射干紫威五分即淩霄半夏五分柴胡六分黃芩三分桂枝五分白芍五分瞿麥二分阿膠五分人參三分丹皮五分乾薑五分治瘧病日久必發名瘧母者此瘧邪內結成為症瘕名為瘧母治以消結為治而以溫補中氣為主丹皮桃仁烏扇紫威螳螂鼠婦蜂巢蟄蟲破瘀以消結葶藶石葦瞿麥赤硝利濕以消結大黃厚朴泄胃熱滯氣以消結桂枝白芍阿膠鱉甲調木氣以消結半夏黃芩清相火調膽胃以消結人參乾薑溫補中氣以運行結聚也用人參不用炙草炙草壅滿助結之故用丸緩緩治之病去人不傷也外感百合狐惑陰陽毒百合知母湯百合一兩知母三錢治百合病欲食不能食欲臥不能臥欲行不能行飲食有美時或不欲聞欲食臭時常默默如寒無寒如熱無熱口舌小便赤諸藥不能治者肺朝百脈肺熱百脈皆熱故現諸證百合知母清除肺熱故諸病愈也滑石代赭湯百合一兩赭石三錢滑石三錢治百合病得之於下之後者下傷中氣濕動胃逆熱鬱於肺故成此病代赭石降胃逆滑石除濕氣百合清肺熱故愈百合雞子黃湯百合一兩雞子黃一枚治百合病得之於吐之後者吐傷津液又傷陽氣雞子黃補津液補陽氣百合清肺熱也百合地黃湯百合一兩地黃汁三錢治百合病不經吐下發汗病形如初者吐下發汗可以解除內熱今不經吐下發汗病形如初內熱瘀塞地黃滌蕩瘀熱百合清百脈之熱也百合洗方百合水浸一宿取水洗身洗畢將百合煮研淡食治百合病一月不解變成瘡者脈熱溢於皮膚嫧變成瘡百合洗瘡以去熱也煮研淡食內外並清鹽性熱故忌之栝蔞牡蠣散栝蔞五錢牡蠣五錢治百合病渴者相火刑金故渴栝蔞清肺金潤燥牡蠣斂肺止渴也百合滑石散百合五錢滑石五錢治百合病變發熱者濕熱瘀住肺氣故病變熱滑石清利濕熱百合清肺也甘草瀉心湯炙草五錢人參三錢大棗六錢乾薑三錢黃連二錢黃芩二錢半夏三錢治狐惑狀如傷寒默默欲眠目不得開起臥不安不欲飲食惡聞食臭面目乍赤乍白乍黑上部被蝕聲啞者此病中氣虛寒土濕木鬱木鬱生熱則蟲生焉濕熱入肺則有默默欲眠等證蟲時動時靜則面目乍赤乍白乍黑起臥不安蟲蝕上部則聲啞炙草人參大棗補中氣之虛乾薑溫中氣之寒黃連黃芩半夏除濕熱也此病實際是蟲病狀則如狐之惑人也有謂惑字乃蜮字之誤者苦參湯苦參二兩治狐惑蝕於下部咽乾者腎脈上循喉咽蟲蝕前陰則咽乾苦參洗前陰以去蟲仍服甘草瀉心湯以治病本也雄黃散雄黃二兩治狐惑蝕於肛門者雄黃燒熏肛門以去蟲也仍服甘草瀉心湯赤小豆當歸散方見前治狐惑汗出目赤如鳩眼四眥皆黑者狐惑汗出木氣疏泄濕熱蒸熏故目赤眥黑赤小豆除濕調木當歸養木氣也此赤小豆乃紅飯豆升麻鱉甲湯升麻二錢鱉甲一片甘草二錢當歸一錢蜀椒一錢雄黃四錢治陽毒為病面赤如錦紋咽喉痛唾膿血者此病膽經上逆相火刑金故面赤咽喉痛而吐膿血升麻甘草清利咽喉鱉甲當歸排除膿腐蜀椒降膽經相火雄黃泄濕氣也此方升麻上升之性對於咽痛吐膿恐有疑義吐膿咽痛皆上逆之病升麻升之豈不更逆後學慎用毒之由來不得其解升麻鱉甲去雄黃蜀椒湯即前方去雄黃蜀椒治陰毒為病面目青咽喉痛身痛如被杖者此病肝經下陷肝陽不能上達故面目皆青肝經下陷則膽經上逆故咽喉痛肝陽不能運於全身故身痛有如被杖升麻當歸升肝陽之下陷甘草清利咽喉鱉甲調木通滯也謹按咽痛用升麻危險曾見咽喉痛用升麻半日即死者婦人妊娠産後病及雜病桂枝茯苓丸桂枝茯苓芍藥各三錢桃仁二錢丹皮二錢治婦人妊娠三月血漏不止者婦人宿有症瘕之病胎氣漸大與症瘕相礙則血不止桃仁丹皮去症瘕桂芍調木茯苓培土症瘕去則血流通而不漏也附子湯附子白朮人參茯苓各三錢治懷胎六七月腹痛惡寒腹脹如扇脈弦發熱者腹痛惡寒而加腹脹脾腎陽虛之象弦乃木寒之脈內寒而熱發於外陽氣外泄附子溫腎陽神術茯苓補脾土也胎熱誤服附子則陽動而胎墮胎寒則宜用附子以溫寒也此湯即傷寒少陰附子湯去芍藥膠艾湯阿膠四錢艾葉一錢炙甘草二錢當歸一錢川芎一錢地黃一錢芍藥一錢治妊娠下血或妊娠腹中痛者血虛風動則下血腹痛歸芍芎地以養血阿膠以息風艾葉溫養木氣使經脈流通以復其常溫而不熱最和木氣甘草補中氣也當歸芍藥散當歸芍藥川芎各一錢茯苓二錢白朮二錢澤瀉一錢治懷孕腹中瘀痛者懷孕之病多在肝脾肝脾之氣不足則生瘀痛歸芍川芎以補肝經苓朮澤瀉以補脾經土木二氣充足則升降調而瘀痛止也土木兼醫婦科要訣薑參半夏丸乾薑二錢人參四錢半夏二錢治妊娠嘔吐者妊娠而嘔吐乃胎氣阻礙胃氣之故薑參溫補胃氣半夏降逆也謹按妊娠嘔吐諸藥不效時用烏梅六枚冰糖二兩頻服即愈因嘔吐既久膽經受傷膽逆不降木氣根虛烏梅大補木氣大降膽經冰糖補胃氣也當歸貝母苦參丸當歸二錢貝母二錢苦參一錢治懷孕小便難飲食如故者肝氣虛陷肺氣熱逆則小便難當歸補木氣以升陷貝母清肺熱以降逆金降則木升木升則尿利也苦參泄濕利水飲食如故中氣不虛也葵子茯苓散葵子五錢茯苓五錢治懷孕身重小便不利惡寒頭眩者小便不利而身重此有水氣頭眩惡寒者水阻經絡陽氣不達茯苓泄水葵子滑竅以利小便也當歸散當歸二錢白朮三錢黃芩一錢芍藥一錢川芎一錢妊娠常服此散最宜胎藥以土木為主白朮補土當歸川芎補木芍藥黃芩清熱以養血固胎也胎熱則動而不固故於當歸川芎溫性之中加芍芩以調之白朮散白朮三錢川芎二錢蜀椒一錢牡蠣二錢養胎之方土濕水寒木氣鬱結則胎動失養白朮補土除濕川芎溫達木氣蜀椒溫水寒牡蠣散木結也小柴胡湯方見前治産後大便堅嘔不能食者産後血去津虧則大便艱難膽火上逆則嘔不能食黃芩清降膽經上逆之相火火降則津液得下參草薑棗補中生血半夏降胃柴胡升三焦相火之陷也足少陽相火上逆手少陽相火即陷小柴胡湯之柴芩所以能解少陽之結者升降並用之法也大承氣湯方見前治産後便難嘔不能食病已解七八日更發熱胃實者胃中熱實故病解後又復發熱故宜大承氣湯下胃實也胃實者有宿食也産後三病一曰病痙二曰鬱冒三曰便難皆血去津虧使然血去津虧木氣疏泄易於出汗傷風則病痙津虧不能養陽陽氣上浮則鬱而昏冒津虧則大便艱難也當歸生薑羊肉湯方見前治産後腹中寒痛者産後肝陽不足故易寒痛當歸羊肉溫潤滋補以益肝陽生薑散寒也枳實芍藥散枳實芍藥各二錢治産後腹中熱痛煩滿不得臥者膽胃熱逆氣實不降故腹痛煩滿不得眠臥芍枳清降膽胃之熱也下瘀血湯大黃二錢桃仁三錢蟅蟲一錢治産後瘀血腹痛者服枳實芍藥散腹痛不愈此為瘀血著於臍下大黃桃仁蟅蟲下瘀血也謹按此病吞服五靈脂五分最效大承氣湯方見前治産後七八日少腹墜痛不大便煩躁發熱日晡為甚食則譫語夜半即愈熱結膀胱者熱結在裏故食即譫語夜半之後陽氣上升熱結得鬆故愈大承氣下裏熱也凡陰液不足而病陽熱之病皆夜半前重夜半後輕夜半前陽氣實夜半後陽氣升升則虛矣此亦冬至後下陽虛之理陽旦湯即桂枝湯治産後外感續續數十日不解微惡寒發熱頭痛汗出短氣乾嘔心悶者外感而惡寒發熱汗出頭痛此為桂枝湯證膽經上逆故亦短氣心悶乾嘔桂枝湯補中氣而解榮衛之鬱芍藥降膽經也竹葉湯竹葉三錢葛根二錢桔梗一錢桂枝二錢防風一錢附子三錢人參三錢炙甘草二錢生薑三錢大棗六錢治産後外感發熱面正赤喘而頭痛者面赤乃陽戴於上之證陽戴於上則虛於下附子補下虛之陽喘而發熱頭痛肺胃不降竹葉桔梗葛根以降肺胃桂枝防風以解榮衛人參甘草薑棗以補中氣也竹皮大丸生竹茹三錢生石膏三錢桂枝二錢白薇一錢炙甘草二錢治婦人乳中虛煩亂嘔逆者乳子之中而病嘔煩此中虛而肺胃之熱上逆甘草安中竹茹石膏白薇清降肺胃桂枝達肝陽以降逆衝也白頭翁加阿膠甘草湯即白頭翁湯加阿膠炙甘草方見前治産後下利虛極者産後血去木熱疏泄下利中氣與津液極虛黃連黃柏秦皮白頭翁清木熱阿膠補津液以止疏泄甘草補中氣也小柴胡湯方見前治婦人外感續來寒熱發作有時經水適斷者此為熱入血室小柴胡升降少陽之氣以解血室之熱也又治婦人外感經水適來晝日明瞭夜則譫語如見鬼狀者此亦熱入血室故小柴胡湯治之經水適來適斷三焦相火發動之時故外感即熱入血室戌亥時三焦相火主事故夜則譫語此病之脈右尺必特別緊動也旋覆花湯旋覆花三錢新絳三錢蔥白三個治婦人半産樓下者此病瘀血使然旋覆花新絳善行瘀血蔥白舒達血中陽氣使經脈調和仍復升降運動之常則半産漏下均愈也膠薑湯阿膠三錢乾薑一錢治婦人經陷漏下色黑者此中寒不運木氣下陷木鬱生風之病乾薑溫運中氣以升木氣阿膠平疏泄以止漏也木氣通達中氣運化清陽四布血色不黑色黑為陰寒故用乾薑用乾薑之脈必有寒象因色黑亦有熱者抵當湯水蛭二錢蟄蟲桃仁各三錢大黃二錢治婦人經水不利者經水不利有氣血虛者有瘀血壅阻者抵當湯下瘀血也虛實之分以脈為主溫經湯當歸二錢川芎一錢桂枝芍藥阿膠半夏麥冬各二錢人參炙草各三錢丹皮二錢生薑吳茱萸各一錢治婦人經水諸病歸芎桂芍以調木氣阿膠冬夏以降金氣參草生薑以調中氣丹皮吳萸以調血分之滯氣整個得運動圓然後經調也麥冬能開腹中一切結氣土瓜根散土瓜根一兩蟄蟲桂枝白芍各二錢治婦人經水不利少腹滿痛經一月再見者血瘀於下則少腹痛滿經脈熱滯則一月再見蟄蟲去瘀血桂枝芍藥調肝膽以和木氣木氣調和血行無阻則經來照常也土瓜根性涼善清血熱礬石丸礬石一錢杏仁三錢治婦人經水下利下白物者濕凝氣滯則下白物礬石除濕杏仁滯理氣也小青龍湯方見前治婦人吐涎沫者中下寒則寒水上逆而吐涎沫小青龍湯泄寒水也半夏瀉心湯半夏四錢乾薑炙甘草人參各三錢大棗六錢黃連黃芩各二錢治婦人吐涎沫誤下傷中心下即痞者誤下傷中中寒上熱心下即痞乾薑甘草人參溫補中氣以助旋轉連芩降熱半夏降逆也吐涎沫而不痞者宜小青龍湯輕劑發汗逐水以除涎沫之來源也甘麥大棗湯炙草三錢小麥四錢大棗六錢治婦人悲傷欲哭喜欠伸者中虛肺熱則成此病草棗補中小麥清肺熱也半夏厚朴湯半夏四錢厚朴生薑茯苓蘇葉各二錢治婦人咽中如有炙臠者濕凝胃逆則咽中有物不下有如臠肉朴夏薑蘇皆降胃逆茯苓除濕氣也當歸芍藥散當歸一錢芍藥二錢川芎一錢茯苓二錢澤瀉一錢白朮三錢治婦人腹中痛諸疾痛者婦人之病多在土木二氣歸芍川芎以治木氣苓朮澤瀉以治土氣也脾胃肝膽升降調和則諸病不生小建中湯方見前治婦人腹中痛者膽經下降肝經上升中氣不虛則痛自止紅藍花酒紅花一錢治婦人腹中氣血刺痛者血瘀則氣滯紅花去瘀活血則氣行無阻也大黃甘遂湯大黃二錢阿膠四錢甘遂一錢治婦人産後少腹滿如敦狀小便微難而不渴者此治水與血俱結熱在血室大黃甘遂逐水開結阿膠養血也腎氣丸方見前治婦人煩躁不得臥倚物作息不得小便飲食如故名曰轉胞者肝陽下陷故小便不得肝陽下陷則膽陽上逆故煩躁不得臥膽木不降阻礙肺氣下行之路故倚物始能呼吸此名轉胞乃肝腎陽陷尿胞不舉之病腎氣丸補肝腎之陽也膏發煎方見前治婦人陰吹者此病前竅喧鳴後竅不通此緣大腸乾澀胃家濁氣不得後泄肝木之氣因而阻滯故迫而向前竅疏泄則作喧鳴豬膏滑大腸而通後竅發灰泄木氣之阻滯也蛇床子散蛇床子治婦人陰寒者蛇床子溫暖腎肝納入陰中其寒自去也狼牙湯狼牙四錢治婦人陰中生瘡癢爛者此病少陰尺脈滑而兼數乃木氣陷於腎水之中鬱生下熱之病狼牙湯洗之以去熱達木也謹按金匱原文肺中風肺中寒肝中風肝中寒心中風心中寒云云下列病證所謂中風中寒實是病熱病寒大氣之中有兩種對恃作用寒熱是也熱則疏泄寒則收斂風亦疏泄故熱性與風性相通獨病熱不可稱為中風否則無法用藥原文以病熱的事實冠以中風之名中風者乃中外來之風五臟中外來之風豈有不經過全身整個榮衛而直入五臟之理又豈有臟中風腑不中風之理此原文之疑點也讀肺中風肺中寒應認為肺病熱肺病寒五臟風寒積聚應認為五臟寒熱積聚金匱原文要略所載夫人稟五常因風氣而生長云云一條與上條惟治肝也以下各句筆法俚俗不類西漢文字又其議論淺陋恐係王叔和所加讀者注意其文曰甘入脾脾能傷腎腎氣微弱則水不行水不行則心火氣盛則傷肺肺被傷則金氣不行則肝氣盛則肝自愈豈有金不生水水不生木病能自愈者後之人不聞有以正之且認為仲聖之法怪哉王叔和於傷寒論篇首妄加序列將寒字搗個大亂使後人治溫病治麻疹認錯原理又欲於金匱篇首搗風字的亂遺禍後世不可不辨王叔和收集仲聖傷寒雜病全文其功大矣愚妄多事以誤後人其罪亦不小金匱方解篇終古方中篇古方中篇導言先入為主學醫通弊不只是學習從前無原則無系統的醫書如此即使學本書也是如此欲除此弊惟有對比的學法古方上篇的編法五行對比並學六氣對比並學本篇的編法又與古方上篇對比並學前六方為上篇前六方為對比並學法後五方則為形實病的學法後二方則為婦人病的綱領學法炙甘草湯證治本位的意義炙甘草四錢人參三錢大棗四錢掰生地四錢麥冬三錢阿膠三錢麻仁六錢生薑二錢桂枝二錢治津液損傷脈結代心動悸者此滋養津液以運中氣之法也血脈心之所主津液流通中氣旋轉心氣下行心不動悸脈不結代是為平人津液損傷脈絡枯滯中氣不能旋轉故心氣不能下行而跳動作悸悸者似驚非驚所謂心跳是也脈來遲緩停止一至來而小數為結停而復來來而又停為代此津液損傷絡脈枯滯中氣因以不運之病也方用炙甘草黨參大棗以健中氣生地麥冬阿膠麻仁以滋養津液桂枝生薑升降肝肺之氣使生地麥冬阿膠麻仁陰潤之性運動不滯也此方滋養津液而重用炙甘草並用黨參紅棗且以炙甘草為方名非中氣運化津液不能復生卻非津液滋潤中氣不能運化之意也中氣如軸四維如輪軸輪相輔運動流通故結代動悸俱愈此方與理中丸為對應的治法一則病濕寒而中氣不運一則病燥熱而中氣不運一則溫補中氣以運動濕寒一則清潤燥熱以運動中氣茯苓杏仁甘草湯證治本位的意義茯苓杏仁各三錢甘草一錢治胸中痞塞短氣脈象濡短者此潤肺金以降氣除濕之法也肺金下行為順肺氣下行胸中寬舒故不痞塞短氣者氣不下行呼吸上迫非短少之短此病乃濕傷肺家津液氣不下行方用茯苓去濕杏仁潤肺行氣以除濕甘草養中也此方與麥門冬湯證為對照的治法一則病燥一則病濕燥乃金氣之本氣病濕乃金氣之兼氣病此方中氣藥僅用生甘草一錢甘草生用其性清涼較之麥門冬湯之補中之藥不及四分之一因濕之為病已至痞塞已成有形之物不可重用補中之品以增其滯塞也此方妙處全在杏仁潤肺之功如無杏仁肺家津液被茯苓傷耗濕不能去也麥門冬湯證燥傷肺家津液中氣大虛此證濕傷肺家津液中氣雖虛卻不可大補理中湯治胸痞中氣不運無形之痞也此方治胸痞濕氣填塞有形之痞也麥門冬湯證之上氣中虛不降而氣逆此證之短氣乃濕凝而吸不能深也脈象濡短濡為淫象短為肺氣不降之象去濕補津液的意義詳古方下篇本方推論的意義中酸棗仁湯證治本位的意義酸棗仁四錢川芎三錢知母二錢炙甘草三錢茯苓三錢治虛勞虛煩不得眠脈象虛浮者此升肝以降膽之法也人身陽入於陰則寐陽出於陰則寤陽入於陰者相火下行須得膽經右降膽經不降多由於熱此病之膽經不降則由於膽經之寒肝膽升降互為其根膽經降則肝經升膽經升則肝經降肝陽弱而升氣不足膽經可遂寒而不降方用川芎溫補肝陽以助上升以培膽經不降之根源酸棗仁補膽經相火以助膽經下降之氣膽經不降則生虛煩煩者熱也知母以清虛熱使膽經易於下降膽經不降相火外泄土氣必濕土濕則膽經更無降路茯芩去土濕以通膽經降路甘草培中氣之旋轉以降膽經棗仁川芎皆溫補木氣之熱之藥知母則引木氣之熱下行之藥此方與小建中湯證為對照的治法芍藥性寒川芎性熱膽木氣熱不降故用芍藥以降膽經膽木氣寒不降故用川芎溫升肝經以降膽經肝經木氣陽升膽經木氣自然不寒此為治木氣之對照治法中的亙根治法小建中湯清降膽經肝經自升此方溫升肝經膽經乃降也脈象虛浮者陽氣不降之象虛者肝陽不足之象人身中氣旋轉最密最速之時唯在睡臥酣甜之候如人一夜不眠次早膝冷如冰精神不振飲食不甘形成廢人一旦得睡膝即溫暖醒來之後精神健壯飲食甘美前後判若兩人中氣增減的關係也白頭翁湯證治本位的意義白頭翁二錢黃連二錢黃柏二錢秦皮二錢治肝經熱利後重渴而飲水脈象沉細而有力者此治肝木因熱不升之法也陰升化陽陽降化陰不升則陷不降則逆逆則生熱陷則生寒自然之理唯木氣之病有陷而生寒者有陷而生熱者當歸生薑羊肉湯木陷生寒之病此方木陷生熱之病因木本生火木鬱不生必生下熱也木主疏泄熱性本動故病熱利疏泄不通又欲疏泄故病後重木熱傷津故渴而飲水方用白頭翁秦皮專清木熱黃連黃柏並清濕熱因疏泄不遂必有濕氣濕與熱合阻木氣上升之路故病熱利而又後重濕熱除去木氣乃升也此方與當歸生薑羊肉湯證為對應的治法一則肝經下陷而病寒一則肝經下陷病熱故一則用溫一則用清脈象沉細數而有力下熱傷津之象薯蕷丸證治本位的意義薯蕷丸即山藥麥冬當歸阿膠地黃炙甘草黨參白朮茯苓白斂豆黃卷各二兩防風杏仁神麯桔梗乾薑各五錢大棗熬膏三兩蜜為丸每服三錢日二服治虛勞諸不足風氣百疾脈象弦澀小數者此概括治虛勞病之法也此方所治之風並非外來之風乃本身木氣失和之氣但看得見的只有口眼歪斜手足抽搐筋肉潤動覺得是風其餘的風都看不見了風氣百疾的虛勞金氣失收風氣肆動風氣一動克土耗水煽火侮金經絡因而滯塞運動因而不圓之病也此方重用山藥補金氣而助收斂加桔梗杏仁以降肺金之滯加麥冬以滋肺家津液則金氣收也用當歸地黃阿膠養血潤木芍藥清降甲木川芎桂枝溫升乙木甲降乙升運動復圓則風息也金逆木動全由中土旋轉之衰故用參棗炙草以補中氣中土氣虛必生濕故用白朮茯苓以補土去濕金逆木動經絡不運必生積滯故用乾薑神麯以行中土之滯柴胡防風白斂豆黃卷以疏木氣之滯也此方與腎氣丸證是對應的治法腎氣丸養金養木以保腎經而重在養木此方補金養木以維全體而重在補金寒熱並施虛實兼顧補瀉同行理全法備之方也此方與建中湯亦是對應的治法小建中重在降甲木甲木降相火乃降此方重在降辛金辛金降風木乃平脈象澀弦小數肺金不收津被風耗則脈澀風木疏泄則脈弦中氣虛血液少則脈小數也人身十二經絡六升六降而升的主力在肝木降的主力在肺金升降的樞軸在二土大氣的圓運動雖有升浮降沉之四部作用其實整個的圓運動只有升降而已升極則降無浮之存在也降極則升無沉之存在也妨礙升降由於滯塞故方中疏通滯塞之法並重生薑瀉心湯證治本位的意義生薑三錢法半夏三錢黃連黃芩各二錢黨參炙甘草各三錢乾薑二錢大棗三錢掰治傷寒壞病心中痞硬發熱頭汗乾噫食嗅脅下腹中雷鳴下利日數十行脈輕按浮澀重按虛小者此清熱溫寒升陷降逆並用之法也心中痞而硬者中氣虛寒旋轉無力膽胃之經氣不降也發熱頭上汗出者膽胃不降相火上逆也乾噫食嗅者膽經不降木氣逆衝上脘橫滯也脅下腹中雷鳴者膽經橫滯相火散漫寒熱混亂水氣漫溢也下利目數十行者膽胃之經熱散漫不收也此病復雜極矣其實只是中氣虛寒因而升降反常之故方用生薑半夏溫中降胃以開相火下降之路用黃芩黃連降相火降膽經以收散漫之熱用乾薑棗草人參以溫補中氣而升降上下經方寒熱並用此為大法瀉心者降相火也熱利有屁而射遠寒利無屁不射遠寒利一日數次即危不能數十次此方撥亂反正各得其宜此方升陷之法乃間接的非直接的上降則下升也此方與大黃黃連黃芩瀉心湯均稱瀉心者言只瀉胃上之熱不可瀉動胃氣之意利雖屬於熱中氣卻是虛寒注意此方與大黃黃連黃芩瀉心湯證為對應的治法大黃黃連黃芩瀉心湯證不過在上的火氣上逆而已此方則在上之火既已上逆在下之火又復下陷在內之火又復外泄火氣散漫內必生寒上逆下陷中氣必虛所以生薑乾薑與連芩並用而以參棗炙草補中用生薑者降胃也此病復雜極矣而治之法則甚簡單脈象輕按浮澀重按虛小膽熱外泄則脈浮汗出津傷則脈澀中氣虛寒則重按虛小黃耆五物湯證治本位的意義炙黃耆二錢炒白芍五錢桂枝二錢生薑三錢大棗六錢劈治血痹身體不仁脈象虛澀者此治榮衛內傷之形質病之法也榮衛者各臟腑公共組織以行於臟腑之外軀體之內整個圓運動之氣也人身氣化的運行在右曰衛在左曰榮榮氣左升以交於右衛氣右降以交於左榮中有衛衛中有榮氣血流通血不痹也身體健康無不仁也平日榮衛之氣偏虛偏盛中氣不能調和時有分離之意偶遭風寒外感情思內動一經激刺榮衛分開開而不合則中氣脫而人死開而仍合合不復舊則榮衛乖錯中氣損傷而患血痹身體不仁此方芍藥調榮黃耆調衛桂枝以助芍藥黃耆之力生薑大棗補中氣生血液以助榮衛之升降不用甘草者甘草性壅因血已庳身體已不仁榮衛運氣已不通甘草性壅即不相宜此方乃整個圓運動以通調血氣之方也脈象澀血不流通也脈象虛榮衛敗也大黃蟅蟲丸證治本位的意義大黃蟅蟲各三錢桃仁乾漆虻蟲水蛭蠐螬杏仁黃芩芍藥地黃各二錢炙甘草三錢蜜為丸如小豆大每服五丸或七丸日三服治虛勞贏瘦腹滿不欲食兩目黯黑肌膚甲錯內有乾血脈沉細而澀者此治乾血形質病之法也人身中氣旋轉經氣升降靈通流利一氣回圈百病不生是曰平人若是內有乾血肝經失養氣脈不通橫滯於中脾不能開胃不能降故腹滿而不欲食內有乾血故贏而肌膚如鱗甲之錯落肝竅於目肝經枯故兩目黯黑此時中氣滯澀極矣如不將乾血磨化經脈愈滯愈澀中氣愈滯愈減中氣消盡人遂死矣但磨化乾血宜緩不宜急更宜顧著中氣此方用大黃蟲桃仁乾漆虻蟲水蛭乾血磨蠐螬也血乾則氣滯杏仁以疏氣滯血乾則生熱黃芩芍藥以清血熱血乾則枯結地黃以潤枯結以上各藥皆須以中氣以運行故用炙草以補中氣乾血磨去經脈自和中氣旺而升降復其常斯病去而人安也此等病症內而臟腑外而經絡以至皮膚乾枯滯澀勞傷贏瘦所以不死者僅一線未亡之中風耳非磨化乾血不能使中氣復新非中氣復新不能新血復生此方妙在磨乾血之藥與補中氣之藥同用尤妙在每服只五七丸不曰攻下乾血而曰磨下乾血所以徐俟本身運動自然回復也此方與黃耆五物湯為對待的治法一則調和氣化以活動形質一則活動形質以調和氣化脈象細而澀即內有乾血之象大黃牡丹湯證治本位的意義大黃二錢芒硝一錢南瓜子一兩桃仁十枚丹皮二錢治腸癰少腹腫痞按之極痛如淋小便自調時時發熱自汗出復惡寒脈遲緊膿未成可下脈洪數膿已成不可下薏苡附子敗醬散證治本位的意義薏苡一兩附子二錢敗醬三錢即苦菜治腸癰其身甲錯腹皮急按之濡如腫狀腹無積聚身無熱脈洪數者次治局部形質病之在下者之法也大黃牡丹湯證血氣結聚故少腹腫痞按之痛腸熱內實故小便自調內熱實故發熱自汗癰之為病榮衛必鬱故惡寒脈遲緊者遲為沉實之象乃不數之意緊者向內結聚之象大黃牡丹湯大黃芒硝攻其實熱牡丹皮瓜子桃仁下其結血也此遲字不可認為寒之遲此腸癰實熱證之治法脈如洪數血已化膿便不可下此時按之必不即痛必不時發熱惡寒汗出也脈緊遲為內實脈洪數為內虛故洪數脈不可下薏苡附子敗醬散證大腸與肺皆秉金氣腸內肉腐金氣傷損收令不行故身甲錯金氣散漫故腹皮急而按之濡如腫狀癰而發熱身不熱而脈數故知為虛大腸為腑腑氣屬腸腸癰而身不熱脈又不沉實而虛數故知為腑腸之弱薏苡附子敗醬散附子溫回腑陽薏苡除濕健脾理滯敗醬滌腐生新也此腸癰虛寒證之治法凡腸癰之病病在左左腿伸則腹痛病在右右腿伸則腹痛再以手循大腸地位按之必痛也治氣化病認定全身運動因何不圓用藥幫助本身氣化運動回復其圓治形質病一面用藥去腐一面用藥生新腐去則運動圓圓運動則生新也大黃牡丹湯腐去則運動圓也因陽氣偏多陰氣偏少故運動不圓大黃芒硝下去過多之陽陰陽和平則運動圓也薏苡附子敗醬散陽復則運動圓而新生也因陽氣少陰氣偏多故運動不圓附子補起腑陽陰陽平和則運動圓也此二方為對照的理法大黃牡丹湯證誤用附子陽更盛陰更衰則病加病雖加不既死薏苡附子敗醬散證誤用大黃腑陽更退不待病加人即死矣葶藶大棗瀉肺湯證治本位的意義葶藶三錢搗末熬令黃色大棗一兩掰先煎大棗去渣入葶藶調服治肺癰喘不得臥口燥胸痛脈澀數者此治局部形質病之在上者之法也肺癰之病中虛而肺胃上逆肺胃俱逆膽經相火必不降相火不降將肺間津液熏灼成痰熏灼即久肺的形質即生膿成癰於是氣不降而發喘津液變膿而口燥肺被癰傷故不能臥而胸痛此方葶藶下膿大棗補津液補中氣不用灸草而用大棗如此之重者葶藶下膿極傷中傷極傷津液大棗津液極多又能補中也肺癰之人津液損傷血管乾澀炙草補中力大性橫不宜也脈象數中氣虛脈象澀津液少也此方與腸癰二方為對照的治法在上之病用中氣藥在下之病不用中氣藥之別甘麥大棗湯證本位的意義炙甘草二錢小麥二兩大棗二兩掰治婦女臟燥悲傷欲哭如神靈所作數欠伸脈象弱澀此治怪病之法也悲傷欲哭如神靈所作者本已並無悲傷的心思而悲哭不能自主故而神靈所作此為怪病其實並不為怪緣婦人之病木鬱為多木鬱生風妄肆疏泄傷耗肺臟津液金性本燥肺屬陰金從濕土化氣金氣主降金氣發現志悲聲哭所以其病發作如神靈為之不能自主欠者開口呵氣伸者舉臂舒筋此陰陽相引欲交不能之象乃中氣虛也方用小麥生津清燥大棗炙草養液補中故病愈也脈象弱澀津液不足中氣虛乏之象溫經湯證治本位的意義當歸二錢川芎一錢芍藥二錢阿膠桂枝麥冬各二錢黨參炙甘草各三錢法半夏二錢吳茱萸生薑各一錢丹皮二錢治婦人少腹寒久不受胎兼治崩中去血或月經過多或至期不來又治帶下唇口乾燥內有淤血又治婦人年五十內有淤血下利數十日不止日暮發熱少腹裏急腹滿手掌心煩熱脈象輕按浮數重按弱澀此治婦人經血病之法也婦人之病與男子相同所不同者胎産與月經也其實月經胎産之病與治之法乃五行升降圓運動而已少腹寒久不受胎者水氣主藏木氣主生胎乃藏氣與生氣之事水中火泄溫氣不足木氣的生氣無根藏氣與生氣不旺也崩中去血者內寒外熱上焦之氣因熱不降下焦之氣因寒不升不降則不收不升則下崩也月水過多者木氣熱而疏泄太過月水不來者木氣寒而疏泄無力也帶下者水氣阻滯升降失調鬱而疏泄津液外注也內有瘀血而唇口乾燥者瘀血阻滯脾陽不能上升以化生津液也年五十下利不止者五十月經應止水氣應當安靜之時內有瘀血木氣失養因而疏泄疏泄於前則為崩中帶下疏泄於後則下利不止也日暮發熱者內有瘀血木氣枯燥日暮陽氣下降陰枯血少不能藏陽陽氣化熱也少腹裏急與腹滿者木氣為瘀血所阻也手掌心煩熱者瘀血阻礙木氣升降之路手厥陰心包相火不降也方用當歸川芎溫暖升發以培木之生氣芍藥阿膠收斂滋潤養木息風以助水之藏氣桂枝配合芍藥於歸芎阿膠之中以升降木氣而調寒熱丹皮以去瘀血麥冬清燥熱半夏降逆參草補中生薑吳萸以通寒滯故諸病皆愈經血不和腠理必多結塞不通之處結塞之原由於津燥麥冬潤燥最能開結此方用之隨參棗薑萸之後導歸芎芍桂膠丹之先此方要藥也此治婦人病整個原理與治法也此整個原理治法瞭解凡前賢所治婦人病醫案皆可就其所用藥性尋求所治病理以合於圓運動的原則脈象輕按浮數中虛熱逆之象重按弱澀津虧氣滯之象人身十二經脾胃肝膽肺腎病證惟多脾胃肝膽肺腎六經治其餘六經自治故仲聖傷寒金匱之方多係脾胃肝膽肺腎之病如心經心包經不降只須肺膽胃三經下降心經心包經自然下降如膀胱經上逆肺膽胃三經下降膀胱即不上逆如小腸經大腸經不升肝脾腎三經上升大腸經小腸經自然上升如心經心包經病熱肺膽胃三經下降生陰心經心包經即不病熱心經心包經病寒肝脾腎三經上升生陽心經心包經即不病寒大腸經小腸經病寒肝脾腎三經上升生陽大腸經小腸經即不病寒三焦經火弱膽經下降生火三焦經自然火足是也雖亦有各本經之病應治各本經只是極少之數故先學脾胃肝膽肺腎六經之方省事得多卻能推行盡利也再進一步説肺為陰臟居最高之位陰性本是降的只要胃膽二經下降相火不克他胃經不阻礙他肺經是最喜下降的至於腎經只要膽經下降相火下交於腎肺金下降生水水源不斷肝木平靜不去耗水水無去路也是最喜上升的是肺腎之病亦極少只是中氣與肝膽二經之病多耳五行之氣皆各有定性所不定者水氣耳肝膽二經挾土氣為升降水氣和則中土旺歸納之下注重水氣與中氣便能得到極妙之境桂枝湯為治外感之法小建中湯為治內傷之法同是一方包舉中醫證治之綱領而皆肝膽中氣之藥可以見矣無定性之木氣病解決有定性之金氣水氣火氣土氣不難解決也古方下篇古方下篇導言醫學須先學根本根本學定乃學變通古方上篇中篇根本學法此篇推論的意義範圍極廣若根本未曾學定未可讀也著者識理中湯證治推論的意義寒霍亂瀉傷津亦有口乾微渴者薑朮均不可用寒霍亂亦有因吐而胃逆生熱服理中丸後更吐者須知寒霍亂用理中丸乃正吐正泄時之方吐瀉已止切莫服用用則燥熱傷陰必又別出禍事吐利大傷津液乾薑燥熱慎用寒霍亂胸腹絞痛者危險因為木氣阻滯全體空虛易於氣脫也若胸腹絞痛有木氣阻滯而土氣又虛寒者理中丸加加艾葉數分以溫木氣人身膽木降則胸不痛肝木左升則腹不痛如絞痛甚者是木氣有力加炒白芍數分以調木氣五行唯木氣最動動而不通故鬱而衝擊所以其痛如絞此病如誤服藿香正氣散立死因方中皆消藥散藥寒霍亂因於虛寒宜溫補忌消散寒霍亂可先以老生薑少許嚼之不覺甚辣便可用理中法無疑也嚼薑不辣凡欲試內寒皆可用之霍亂有寒症熱症濕症悶證之別熱症悶證忌燥者詳見時病本氣篇理中湯亦治胸痞胸痞者中氣虛寒不能旋轉四維不能升降也故服此方即愈若中脘寒痛已運動不通草參薑朮大補之乾薑三錢茶葉三分既效因中脘寒痛已運動不通草參薑朮大補之性反將不通之處補住單服乾薑溫運中宮流利無阻茶葉清涼引薑性下行故必見效痞者中氣不運尚未至於不通中脘寒痛眠餐具廢則不通甚矣可見人身是一活潑氣機補藥滯塞反釀禍事因能受炙甘草參朮之脈必虛而活潑中脘寒痛不通之脈必沉著不起不活潑了以次類推學醫要決曾治一五十歲病人環唇黃水瘡夜間癢甚大便十數日一次黑燥異常便後既下血碗余年餘矣醫治無效右脈微小食減方用輕劑理中湯加阿膠並用黃芩黃連少許五劑痊愈此病唇黃水瘡濕偏見也十數日始大便燥偏見也唇瘡夜癢熱偏見也便後下血風偏見也右脈微而食減寒偏見也風熱燥濕寒各偏一方中氣無運化調和之力必也用理中湯參朮炙甘草補中乾薑以燥土濕而溫寒阿膠以潤燥而息風連芩以清熱中氣如軸四維如輪軸運輪行寒熱和合燥濕交濟風靜木榮病遂愈焉河圖四象之中皆有中氣所以中氣運化四象自然調和也河圖詳生命宇宙篇又治一三十歲婦人眼昏而痛左眼較甚大便日三數次下白物不後重食減右脈微小左脈沉細醫治三年無效方用理中丸三錢阿膠三錢化水送下分三次一日服完三日見效半月痊愈大便下白物多熱此白物為寒者食減脈微故也此病脈微食少大便下白物中氣虛寒者也大便一日多次風木疏泄之現象也左目不明木氣疏泄自傷本氣也理中丸以溫運中氣阿膠以養木熄風所以病愈左脈較細木枯故也阿膠養木潤枯又治天津人五十歲腦力恍惚胸滿左膀左腿酸滯脈右虛大左細硬近一年矣醫治無效方用理中丸三錢阿膠三錢化水送下分三次一日服完三日見效一月痊愈此腦力不清肺經與膽經熱也左膀左腿酸滯肝經枯澀也胸間滿悶中氣虛寒也左脈細硬木氣枯也右脈虛食少中氣虛寒也理中丸溫運中氣阿膠潤肺金並潤肝膽木氣中氣旋轉肝木左升膽木與肺金右降是以病愈天津此人每日必食蘿蔔甚多蘿蔔生食性熱傷肺之故又治一老人眠食均減頭頂痛右脈虛左脈枯年餘矣用黑豆五十粒煎濃湯吞半錢理中丸二服而愈此病左脈枯應用阿膠以潤木氣因其食少阿膠敗脾改用黑豆潤木不敗脾所以效也以上四案曆治不效者只知頭痛醫頭腳痛醫腳不知整個治法不知治中氣之故也此方乾薑極熱熱則燥肺阿膠極膩膩則濕脾初學脈法不精可用四君子湯代理中湯用黑豆代阿膠亦效四君子湯黨參白朮茯苓炙草各一錢以補中土之氣黑豆四錢以潤降膽經原則是一樣的不過真有中寒者無乾薑不能溫中寒也中虛之病甚多然用乾薑之中虛病則甚少用白朮黨參炙草之中虛病乃多耳非真係中寒萬不可用乾薑學醫易於學偏由中氣學起仍易學偏河圖中氣陰包陽外陽蔽陰中倘誤用乾薑將陰液傷損包蔽不住陽氣中氣中的陽氣飛泄出來遂不思食而中氣消散也中氣乃陰陽和合而成的圓運動故陰陽不可偏傷白朮性橫吐多者忌服世人因土生於火又因理中丸用乾薑遂認中氣是陽性的不知中氣乃陰陽並重黨參即是補中氣之陰之藥用乾薑因中寒也余曾見一老人顴赤食減醫見其食減用白朮炙草補之大喘不食而逝顴屬腎胃家津液不足降力大衰腎水枯乾包藏不住相火故顴赤脾陽主化食胃陰主納食脾為陰臟其上升者陰中有陽也胃為陽腑其下降者陽中有陰也胃陰不足不能降納故不思食白朮橫燥炙草橫熱胃阻更傷降氣全消陽氣有升無降故大喘不食而逝白朮炙草看似尋常補品用不得當致造如此大禍老人的圓運動已在消減之時本難用藥用藥稍偏消滅更快如非陰寒偏盛之病附子肉桂一切動陽之藥下咽即生大禍中氣者陰陽互根五行運化六氣調和整個圓運動的中心之氣也有寒濕偏多之中虛燥熱偏多之中虛陰液枯涸之中虛寒濕偏多之中虛易治燥熱偏多之中虛難治陰液滋潤之中虛易治陰液枯涸之中虛難治陰液者有形之體質陰液既少不惟炙草不受即白朮亦不受故難治寒濕偏多津液滋潤乃可服理中丸一服即效寒霍亂用理中丸易治之中虛也如非寒濕多津液多之中虛誤服乾薑劫損真陰致人於死風熱暑濕燥寒皆能吐利此吐利乃因寒濕也凡中虛之病認為當用炙甘草補中服炙草後反覺胸腹橫滯者便是陰虛此津液不足脈絡枯澀故不受炙甘草之剛性可用冰糖冰糖覺熱可用白糖飴糖如陰虛之家津液枯燥又不能不用中氣藥者須避去甘味可用山藥扁豆糯米均佳冰糖性聚如虛勞咳嗽服之病必加重陰虛的中虛淡豆豉亦佳淡豆豉養中調中又能宣泄和平陰虛液枯腠理必滯故宜豆豉去滯如兩尺無脈者陰液太枯扁豆補土亦不可用土氣能傷水也凡百病皆有中氣關係中氣之治有溫中養中補中調中顧中之刖乾薑為溫中之法白朮炙草扁豆黨參為補中之法冰糖白糖飴糖山藥扁豆糯米為養中之法調中者用清輕之品以去滯顧中者用藥須照顧中氣不可損傷中氣也學醫最易蹈先入為主之弊一蹈此弊即易偏執本篇所引經方須將各方合成一個整的去研究明瞭自無先入為主之患偏於寒潤者易敗脾胃之陽偏於燥熱者易劫肝肺之陰皆能致人於死地肝肺陰液被劫即成癆瘵而死脾胃陽敗即滑瀉而死脾胃陽敗死在目前陰液被劫死在後日死因陰虛誤用剛燥之罪也人之有生先有中氣後有四維中氣如軸四維如輪軸連輪行輪運軸靈無論何病中氣尚存人即不病中氣漸復病即能愈故學醫必先從中氣學起自然一本萬殊頭頭是道萬殊一本滴滴歸源乾薑傷陰液用理中丸一錢乾薑只合一分慎用之意也乾薑所以溫中寒先以老生薑嚼服而不知甚辣便是中寒之證經方皆重證據故桂枝湯證在發熱汗出脈緩六字發熱汗出榮衛疏泄用芍藥以收斂疏泄之證也脈緩為虛用炙甘草紅棗補虛之證也麻黃湯證在惡寒身痛脈緊六字惡寒身痛脈緊衛氣閉斂用麻黃以疏泄閉斂之證也經方不言症而言證即是用藥之證嚼生薑而不甚辣初學用乾薑之證也理中丸之證脈微吐利氣微不渴皆是本書首列理中丸係認識中氣如軸四維如輪之法非教人以熱藥入手之法中寒病少有夏月上熱下寒之大氣中人食生冷則多有之吐有因於熱者食入即吐生甘草一錢生大黃五分煎服其脈必實也吐有因於胃虛者朝食幕吐脾胃之根氣不足腎氣丸一兩分五次吞服其脈必虛也吐與嘔之辨與利之寒熱之辨詳下文柴胡湯中有因停食而利者詳時病篇水瀉中及兒病篇中停食水瀉忌補中藥有用補中藥者必以疏通藥為主乃可一老人歲津液素虧左尺微少飲食一如少時一日食雞蛋會飯胃間不見消化胃右有三處作痛後食肥豬肉一塊下咽痛即全止少頃胃活動頓覺舒適緣人身的陰陽和平運動乃圓平者平均和者混和此人陰液偏少不能興陽氣平而和之運動已不能圓再食入雞蛋將陽熱加多於是陽多陰少不能運動而痛食物遂停頓而不消化陽熱加多得肥豬肉之陰液登時陰陽和平故下咽痛止而消化也凡病皆運動不圓凡病之愈皆不圓者仍復其間此圓字的事實上必左右相互平而又和然後能圓凡病除有宿食停痰停水瘀血必去之而後陰陽能復和平外皆須自己的陰陽和平而後病愈並非別有去病之法調和陰陽運動復圓之法也理中丸證不渴為寒其他的病多有熱而不渴者陰虛之人肺燥肝熱反多不渴渴有三病濕渴燥渴風渴濕渴者胸下有水濕阻隔相火不能下降火逆傷津則渴而能飲飲仍吐出燥渴者肺胃燥熱大渴能飲不吐出風渴者肝枯風動傷津則渴而小便多也濕渴燥渴詳傷寒論五苓散白虎湯風渴詳本篇腎氣丸烏梅丸中有室女二人春初食雞蛋雞肉生果忽然嘴向右歪脈現中虛左尺如無用理中丸二錢黃精三錢十劑而愈其一人服祛風除濕等藥病乃加重更歪食減右眼流淚眼跳不止不知中氣之理奈何凡偏左偏右皆中虛極也寒霍亂的頭痛由於中氣虛寒升降停頓其他的頭痛肝膽二經關係獨多陰虧液少木氣枯燥故也亦有肝經陽氣升不上來而頭痛者用川芎一錢黨參三錢溫補肝陽外皆宜降藥不可用升散之藥足軟無力動行有因肺熱者涼降肺家則愈此病能多食麥門冬湯證治推論的意義人身水下有火則水中生氣火上有金則火中生液水氣上升全賴肝木之疏泄火液下降全賴肺金之收斂肺金收斂全賴津液津燥液枯收令不行升的氣多降得氣少遂成乾咳上氣咽喉不利之病麥冬性極清降津液極多然能敗中滋濕半夏性燥利濕降力甚大麥冬得半夏清潤下行自無滋濕之過又以粳米參草紅棗補中之藥輔之中氣旋轉自無敗中之過麥冬半夏同用下行之力甚速如無中氣之藥極傷中氣麥門冬湯證其脈必中部虛少也如傷寒論人參白虎湯用石膏治傷寒燥渴石膏大寒遠過麥冬而必以人參粳米大補中氣以助旋轉尤需加炙草以充足其中氣健運之力亦於麥門冬湯同一意義特麥門冬湯證燥而不渴故不用石膏之大寒耳世人於石膏麥冬不知應重用中氣之藥反助以黃芩黃連芍藥生地陰寒之品使中氣大敗變成他禍可怕之至人參白虎湯詳傷寒論讀法篇半夏專降胃經加補中之藥既是降胃經之法金匱大半夏湯用半夏人參白蜜治朝食暮吐大便燥結是也此病之咽喉不利乃咽喉乾燥此病之咳嗽乃無痰之乾咳故用麥冬以潤燥如咽乾不因於燥誤用麥冬病必加重不因燥之咽乾乃下部陽弱脾胃津液不能上奉之故脾胃津液乃水中陽氣所化常用溫養脾腎之藥如下文腎氣丸少服或用補益脾腎之方乃有效也曾治一老人口舌咽喉具乾脈弱不振余用山藥枸杞煮豬腰湯見效滋養脾胃之津液溫升脾腎之陽氣也後易一醫用麥冬三錢高麗參三錢咽乾更甚不食而逝麥冬寒潤極敗脾陽極傷中氣老人陽氣微少故麥冬三錢即將微少之陽氣完全消減也老人中氣將完直補中氣之藥多不接受吞服五味子數粒補腎家水火以生中氣尚效麥冬潤肺生津能開腹中一切結氣為藥中妙品用之失當能殺人也下行之速津液之多開結之速莫如麥冬又能收斂金氣但須燥結之病補以中氣之品方可用之風熱暑濕燥寒六氣之中一氣有偏皆能令人肺氣上逆而咳嗽此病為燥邪偏勝之咳嗽肺金主收金氣為一年之圓運動成功的第一工作人身亦然而咳嗽乃痰人身圓運動工作最易最多之病參看下文小建中湯薯蕷丸方此處缺字按上下文意思或為病痰伏痰若咳而痰白膠黏脈象不潤夜則尿多此肺燥肝熱為陰虛之咳麥門冬輕劑多服即效肺潤肝即不熱也若咳嗽痰少聲空痰中有血脈來弦細沉而有力口苦舌有黃苔此膽胃二經有了實滯不宜大棗黨參炙草可用天冬麥冬貝母阿膠以潤肺燥款冬花馬兜鈴百部紫苑以舒肺絡冰糖以補中氣乃愈弦細乃津枯之象至於沉與有力則津枯生熱陰分被傷極矣而口苦苔黃必是起病由於外感衛氣閉塞而未開誤服溫補衛氣斂澀之故潤燥通絡補中均宜清輕之品服後弦細疏開陰液復生熱退絡活咳血乃止如用參草大棗經絡更橫津液更枯伏熱更甚咳血更多必死此方見效後可加當歸少許以補血如苔黃已退多加山藥扁豆以健脾胃二冬膠貝漸漸減輕始終不可用傷陰之藥此等病與治法仲景經方無有詳於王齋醫案細弦之脈閉斂之象如用芍藥病必加重芍藥其性收斂之故也自來治陰虛脈細好用白芍切宜戒之二冬膠貝寒滑敗土如非熱實脈實且須慎用一藥有一藥之功醫生用錯功便成過如補陽之功錯則傷陰補陰之功錯則敗陽補土之功錯則傷水補水之功錯則傷土初學總須於認定著落四字上用功方不錯誤白芍與當歸同用亦可舒開弦細之脈白芍性斂當歸性散之故也咳因於內寒者喉必做癢清水加稀痰痰不膠黏就枕即咳脈沉而細且微口淡無味飲食減少方用五味子細辛乾薑各一二錢即愈五味子溫腎乾薑溫中細辛溫腎寒降寒水之逆衝也細辛五味性皆收斂皆溫腎藥世醫誤以五味子止咳為肺家藥非是又誤以細辛為發散藥更錯此處缺字咳因於中氣虛寒而兼肺熱者痰必黃稠而不膠黏痰稠如膿方用理中湯加天花粉橘皮半夏以清降肺氣而溫補中氣即愈咳因感外寒者衛氣與肺氣閉束不舒咳聲不利頭身微痛脈象束迫方用蘇子杏仁橘皮半夏各一二錢以舒衛氣而降肺氣冰糖五錢炙甘草一錢紅棗三錢以補中氣即愈脈細者加生地當歸各一錢以潤血此方可為咳嗽普通用方但須認明是疏散衛氣並非疏散外來之寒氣也咳因於內風者交半夜即咳此本身木氣不調子半陽生陽生木動木氣上衝也白芍當歸各一二錢以調木氣飴糖一兩炙草一錢以補中氣即愈黃豆緑豆黑豆各一把濃煎臥前服養木平風亦效咳因於氣血虛者八珍湯黨參白朮茯苓炙甘草當歸白芍川芎生地各一二錢多服乃愈咳嗽而脈虛者大人小兒均宜此病如服蘇子杏仁等降肺氣之藥必壞咳因於津液乾枯者中年以後津液不足每到冬季日夜咳嗽夜間尤甚無痰乾咳咳時氣由下衝上此冬藏之陽氣由腎上衝用黃豆一把白菜心一整個煎服即愈白菜心下裏陽之上衝黃豆潤肺衛津液養木氣冬咳上氣木氣動也內經謂秋傷於濕冬必咳嗽既是此病咳嗽上氣由於津液傷濕乃土金之津液也此病除此方無特效藥咳嗽清痰而小便不利者黑豆三錢烏梅三錢服後小便利咳即止清痰者水也烏梅助木氣以疏泄水氣故小便利咳即止烏梅性溫屬陽故用黑豆和之豆與梅分量應如何配法臨時確定為是脈體柔潤者不用黃豆可用烏梅三枚白糖一兩咳因於酒積者吐黃稠痰胸熱食減面色青黃用白扁豆黃豆各一把或單用黃豆而愈胸熱食減濕熱傷損肺胃之陰也面色青黃陰傷土敗也扁豆除濕健胃黃豆清熱益陰兼而用之除濕不傷津液健胃不嫌橫燥養陰清熱而不敗胃又皆淡而不甘食品治濕熱而用淡味之穀食妙不可言若用他藥必貽後患黃豆善補膽肝胃脾肺腎之津液而不濕脾故愈此處缺字應為甘膩礙胃之意又有咳因酒積日久傷陰聲粗而空痰白稠黏不易咳出出則甚多脈洪大鼓指有力重按空虛關寸最盛關尺最微右脈最盛左脈最微行動欲喘此非尋常輕劑所能奏效須用大劑填陰之法熟地一兩龜板鱉甲各一兩以填陰扁豆黃豆各六錢以補土養木養津液牛膝枳實橘皮半夏各三錢以降肺胃濃煎多服服至脈小乃愈夜間乾咳無痰脈不虛浮蔥豉湯甚效脈不虛浮肺氣閉束之象蔥舒肺氣豉能宣通故效蔥頭三個豆豉五錢煎服如咳嗽脈短此為肺氣不舒蘇子杏仁各二錢紅棗十枚濃煎服脈長即愈此則肺臟本身自咳也小兒篇治咳方各宜參考四逆散治半夜煩咳脈實妙極虛勞咳嗽未有不愈治愈咳者因治咳之藥皆傷肺氣之藥補藥皆滯肺氣之藥故也可用淨糯米粉揉成小水圓扁形一寸大一個豆油或花生油豬油小火炸微黃木器裝放土地上半小時以退火氣涼水煮稀糊淡食不可放糖與鹽一日二次食半飽極有功效雖至無藥可治之虛勞之咳皆有奇效糯米補益肺陰性能收斂能補肺損炸過兼補中氣油的潤性最宜虛家咳而失眠潮熱盜汗最妙此無法中之法也虛勞咳嗽脈忌細數多服此方細能轉寬數能轉緩真有不可思議之妙虛勞咳嗽如有喉癢清痰夾水便是五味子乾薑細辛證可用五味子乾薑細辛各一錢另服一面仍食糯米粉水圓方五味乾薑細辛證非五味乾薑細辛不能醫如咳而喉不癢痰不清不夾水誤服之殺人五味乾薑細辛證脈必虛寒注意麥門冬湯金匱原文無咳嗽二字事實上上氣咽喉不利既是無痰之嗽見病本氣篇咳嗽最後一方重用麥冬無補中藥因中不虛此病中虛也上氣咽喉不利六字合看便是燥嗽氣不順下則逆而作嗽咽喉不利便是燥嗽的上氣周禮天官疾醫冬時有嗽上氣疾既是此病有痰為咳無痰為嗽肺為陰根肺陰足則全身的津液自足麥門冬補肺陰之方也用糯米稠粥調花生油不著鹽不著糖早晚飯後一碗數日之後陰生液旺凡肝腎陰虧上焦乾澀左尺脈少諸病皆有顯著功效調法須調至粥油不分乃止粥一碗油二兩如食後胃即覺膩者不可食耳秋冬尤宜此食一切價貴之物花生油有通結潤枯之功陰虛最宜小建中湯證治推論的意義此方重用芍藥名建中者中氣生於相火相火降於甲木故也相火降則中氣運中氣運則相火降交相為用其機甚速芍藥專降甲木而斂相火性寒味苦如不與飴糖薑棗桂枝甘溫之味同用將苦寒之性化合必傷土氣而敗相火造化之氣地面之上的少陽相火降於土下藏於水中遠為一年之根近為中氣之本人身亦尤是耳故降甲木以斂相火為治虛勞之大法為建中氣之關鍵膽經與相火關係全身可謂大矣此病如兼見咳嗽即入危險之境如咳嗽不愈便為難治因相火下降全賴肺金的收斂之力如咳嗽不愈肺金的收力散失相火永不能降發熱不止中土無根腎水不能復生肝木之氣枯竭五行消滅不能生也此病如兼咳嗽仍用原方因肺金收降本自然的性能只要甲木能降相火下行不傷肺金中氣回復肺金自能下降不咳也如加用治咳之藥必傷津液咳反加重葉天士謂芍藥入肺經其意即此此病為氣化為病形質未損之方如為病日久性質損壞此方諸藥均不相宜仲景立虛勞之法乃形質未損之法倘或之形質已損之虛勞亦用此方不惟無效病反加重因形質即壞者芍藥之大苦大寒不能受用炙草大棗甘味亦能聚氣而加咳形質已壞者咳嗽發熱自汗枯瘦而脈象細數飲食極少不能起床也人身形以生氣氣以成形形質已壞氣無所生故為難治虛勞病三十二歲以前得者發熱不止必入危險之境三十二歲以後得者可不發熱可免危險因三十二為四八之期男子四八腎水固定水能藏火故不熱女子則四七之後腎水固定也虛勞之病至於如此情形可謂重矣治法不獨降膽經相火以建中氣此五行之妙也中氣在二土之間胃土喜清降脾土喜溫升膽經相火下降則胃土清降而脾土溫升二土升降中氣自任尤妙在飴糖白芍合用重用虛勞用芍藥一要用辛甘之藥和其苦味二要有乾燥煩熱之證否則減輕用三要右手關上勝過他脈關上乃肝胃脈也冬至後夏至前不善用之最敗火土中伏後最易見功因夏至後太陽南行中伏地面之上壓力漸增地面上的太陽熱力遂壓入地面下去以後愈壓愈深愈壓愈多造化的中下陽氣充足人身膽經降入中下的陽氣亦充足故芍藥降膽經之功甚偉處暑後地面上的陽氣正在入地胃間的陽氣更足故處暑後用芍藥尤易見功冬至後地面下陽氣左升陽根疏泄人身此時亦中下陽泄根本動搖芍藥苦寒故用之見過所以老人與久病之人冬至後死者較多中下陽根泄動故也聖人春夏養陽秋冬養陰一日之間午前養陽午後養陰養陽者不用寒涼以傷中下之陽也養陰者不用燥熱以傷中上之陰也此指大概而言本書溫病篇溫疹各方均不用芍藥因溫疹之時正天人之氣陽氣動搖根本之時溫疹之熱乃下部微陽上衝所化之熱並非膽經不降相火所化之熱所以溫病篇各方見功極速而皆可靠也不僅用芍藥應研究節氣凡用苦寒之藥與滋潤發散之藥與治小兒發熱皆應知節氣的關係東部冷凍之地更宜注意人身腠理為氣血流通關鍵質係油膜為膽經相火之所司虛勞病氣血不通即腠理油膜乾澀之故小建中湯最通腠理血痹身體不仁功效尤著如左腹似痛非痛芍藥冰糖補身右之陰即愈右降則左升也膽經之陰降入肝經則肝陽和也虛勞病最忌黃耆與當歸並用耆性補陽最往上升最傷陰液當歸性濕而窒敗脾滑腸唯津液不足用當歸黨參臥時嚼服一錢甚效參補中氣之津液歸補水氣之津液膽木右降以生肝木遂成其圓的運動失眠尿多頗有特效黃耆的妙用在補衛氣衛氣虛陷不起者非耆不能補回世誤黃耆補衛為補肺肺主下降肺主下降何可用黃耆以升之黃耆的耆字誤為耆老的耆字遂又誤黃耆為補藥之長不可不知虛勞之病脈象浮虛者易治脈象弦細而澀者難治小建中湯用生薑桂枝之辛散以和芍藥之收斂炙草紅棗飴糖之甘補以和芍藥之克伐使土木之氣的圓運動舒展調和細澀之脈漸轉柔和其所以能轉柔和者中氣之復也如薑桂棗草飴糖的分量多少不適合於調和芍藥必有因用芍藥脈反加弦病反加重者弦細之脈不喜芍藥之苦寒收斂也弦細在左右不弦細中氣未被木氣克完尚有可為若右脈亦弦細而澀便難治矣可見治虛勞病之難也小建中湯亦治遺精陰頭寒肝主宗筋陰頭寒肝經寒也肝經乙木生於膽經相火膽經不降陰頭乃寒芍藥降膽經相火交與腎水肝木得根是以陰頭不寒若以熱藥以溫陰頭熱藥燥動枯木不惟陰頭仍寒遺精必更加重世謂精滿自遺不知飲食化精積精化氣豈有滿時精之化氣全在肝膽二經運動之圓肝膽二經何以運動不圓一由中氣虛一由腠理滯小建中湯建中氣通腠理降膽經升肝經遺精第一仙方夢因肝水升氣不遂而成所謂物質生精神是也宇宙造化圓運動之成功全是由秋金西降相火下藏成的人身的圓運動全是由膽經相火降入腎水之中成的故人身一切運動不圓之病小建中湯實握重要的原則以上所列病症不能完全吾人匯此原理便可曲盡法外之法以治一切運動不圓之病此點宜特別注意飲食入胃先變化成飴糖儲於胃壁後方以運輸於個臟腑及全體胃壁後方即五臟六腑皆繫於脊之處此處飴糖存儲者多身體必壯存儲者少身體必衰膽管由十二指腸下降為全身升降鎖鑰內經謂十一臟之氣皆取決於膽言膽經由十二指腸下降全身的升降乃通也小建中湯多用飴糖重用芍藥酸甘化陰使左尺脈加多建中又能補水左尺脈加白芍降膽經之能事也飴糖愈多愈妙桂枝愈少愈妙麥芽消積散氣芍藥破結通瘀力量均大小建中湯並用之須籍紅棗之補益以濟其偏不然虛人每有克伐之感覺則紅棗分量應重用也按各人脈象酌定之脾濕尿短忌用飴糖飴糖即麥芽糖雞肝一個炒白芍一兩同煮爛曬乾研末每早晚服一錢勝於小建中之功凡陰虛膽逆之人十二指腸形質枯損不受小建中湯甘味者服之膽管胃部即見疏通下降之效連服數日失眠尿多並膽胃不降於肝木燥動種種虛勞之病有出乎意外之功力雞肝大升肝陽白芍大降膽陰二味同用圓運動之力非常之大而且速二味多少隨時按證配合如服後病見減少而半夜大便者此為肝熱酌加白芍此方治遺精特效通滯之力大也若膽胃之陽不旺者白芍減半此方黃連阿膠雞蛋黃湯參看同學關崇卿寒露後交戌時左鼻出血數日不愈脈弦細急數命服黃連阿膠雞子黃湯一劑脈和而愈寒露陽氣下降入土比秋分多肝木根氣增加肝陽升的大過肺金降力受傷於是左鼻出血圓運動整個不圓中氣大虧故脈急數肝陽化熱傷陰故脈弦細此病如用補中涼血之法治之必能見效但不能如此湯之見效而脈和迅速也因黃連所降之熱即是雞子黃所補之虛即是黃連所降之熱虛即是熱熱即是虛黃連與雞子黃化合既不見虛即不見熱既不見熱即不見虛雞子黃潤而大熱其性上升黃連燥而大寒其性下降同具中土之色兩下混合則生中氣中氣升的迅速所以脈象和的迅速而病止也經方功效皆是如此由此旨而推之黃連阿膠雞子黃化合所治之虛病多矣雞子黃一枚黃連一錢煎透去渣調黃至極勻大有再造生命之功且能通調一切氣血滯塞不和諸病中風寒者加乾薑一二錢中寒者單嚼食乾薑不甚覺辣牛肚一斤生白芍一兩或五錢水六碗煎成一碗分二次服兌入飴糖二兩或一兩有小建中湯之功而補損之力獨大半身不遂久服尤妙牛肚不可去黑皮老人日日服之增壽可靠淡食白芍秋後可多用冬至後宜少用當歸生薑羊肉湯證治推論的意義疝病有寒者有熱者有木氣積聚者腹痛有寒者有熱者有水氣滯者有積聚者脅痛有寒者有熱者有木氣滯者有淤血者有水停者此方所治疝病乃因於肝經寒者如因肝經熱者其脈右大左細沉而有力或左脈弦實有力方用歸芍地黃丸歸芍以調木氣地黃丸益水養木以清熱因於木氣積聚者歸芍地黃丸加苦楝子以泄木氣丸藥每次二錢楝子每次二分徐徐治愈不可求速此方所治腹脅痛乃因於肝經寒者如因於肝經熱者左脅下痛腹瀉金黃或瀉白物其脈左關尺沉細或左關鼓指有力方用歸芍地黃丸二錢加梔仁三枚以清熱因於木氣滯者芍藥炙甘草各二錢加苦楝子五分因於積聚者獸炭五分或一錢甚者大承氣湯輕劑下之此證必腹痛拒按也其脈皆沉而澀因於淤血者痛處不移按之更痛八珍丸加桃仁紅花少許或加益母草生首烏有水者五苓散加牛蒡子有水者脅下必有水聲也孕婦下半夜左腹脅下痛不可忍左遲脈無有黃芩白朮各三錢多服左遲脈現痛即止矣獸炭獸肉炒焦成炭當歸生薑並用辛竄非常曾見一室女病腹痛醫用此方服後甚效更進一劑小便次數忽然加多且長臍內奇癢臍內有蟲爬出後服清肝涼血養陰之藥始愈蓋辛熱之劑溫肝經之寒過服則肝寒已去肝熱復生尿多蟲癢皆肝熱也大凡偏寒偏熱之方切須中病則止陰分受傷補救不易肝經秉春木之氣喜溫惡寒但尤惡燥溫則生氣充足上升而化心火心火因之而足寒則不升故冬令多食羊肉次年精神必能增加羊肉最能溫潤肝木能每早淡食一碗更妙無鹽則不助熱也經驗多的大醫治內傷病慎用桂枝因其燥肝之故只要善降肺膽二經肺經降生腎水膽經降生腎火水中火足肝木之陽遂足不惟肝木不寒而且肝木不燥補肝陽之妙法也肝陽由水中之火而生故不燥也肝木燥屁必多燥傷津液肝木橫滯則成庇治木氣病由無庇而治成有庇再由有庇而治成無庇乃能盡治木氣之能事生薑最燥木氣慎用服生薑而肝木燥者薑燥肺經之故肺如不燥能生水下潤則水氣柔和善治肝燥者必先潤肺金也廣西冬至食羊肉則病熱瀉大氣熱也腎氣丸證治描論的意義經方於五行皆有直接治法惟腎水無道直接治法治腎水之法薯蕷補肺地黃滋肝之法補肺金以益生水之源滋肝水以杜耗水之路也其實凡潤肺滋肝之藥皆能補益腎水此方既治小便過多又治小便不利可見木氣之動忽而太過忽而不及皆水氣與水中溫氣不足不能養木之故此方補金潤木滋腎水又用附片溫腎水凡陰液不足而腎陽又虛之病總以此方為大法此方藥店名桂附八味丸又名桂附地黃丸藥店的腎氣丸則名金匱腎氣丸於腎氣丸中加牛膝車前以利小便大傷腎氣切不可用其意以為小便不利也其如小便太多者何哉木氣疏泄之理不知故也後人將此方去桂附名六味地黃丸轉治腎水不足極有功效而不知全是補金潤水之功補金以培生水之源潤水以杜耗水之路腎水有生而無耗故腎水足也再於水中補火水中有火則生氣此腎氣二字之起源也腎氣者元氣也中氣之根也此病完全為肝腎病肝腎病而津液虧傷者忌用中土甘味之藥所謂土克水是也況津傷之人脈絡乾枯甘味壅滯用之必生脹滿六味地黃丸補水不如歸芍地黃丸補水功大而活動歸芍活動木氣不用活動木氣之藥必膩胃矣腎家水火二氣水氣多於火氣為順緣人身中氣為人身整個運動之樞機腎氣為中氣運動之基始水氣多於火氣火藏水中乃能生氣若火氣多於水氣水氣不能包藏火氣火氣遂直衝上越運動遂滅此方附子極少山藥地黃丹皮茱萸獨多即是此理況臥寐則生相火一年之秋冬又生相火一日之申酉以後又生相火故人身只恐津液不足不愁火氣不足果病水多生寒之病用附子以溫水寒一劑便奏全功若水少補水一年半尚難補起也小便不利服腎氣丸而現口苦者此腎水較腎火尤虛宜去附桂並去茯苓澤瀉加車前草同服水較火虛故不用附桂以助火苓瀉以傷水車前草潤而利尿故以之代苓瀉但火氣雖多不可用熱藥加火亦不可用涼藥滅火只宜潤肺滋肝以益水而配火水火俱多元氣更足如因火多水少而用涼藥滅火水火俱少元氣遂減中氣無根矣因火多而去火此不知根本之醫也附子純陽其性上升如水寒不大而多用附子或水不寒而誤用附子附子下咽能將腎中的陽根拔動而起使水氣從此不能包藏火氣為禍不小除純寒之證不能不用附子外其內傷之腎陽不足腎並不寒之證莫如用甜蓯蓉巴戟天柔潤和平益腎之品以代附子最為妥當豬腰子不去膜用生薑丁拌濕包固柴火燒熟放冷胃強者嚼食腰子胃弱者將腰子煮湯食右腰子中白油膜較左腰子特多腰子屬水腎水候於左此方溫補腎陽平和力大凡先天不足與腎家陽虛之人皆可奉為再造之寶但多食亦能動熱如其動熱須以養陰之品配之腎陽虛者虛而兼寒乃用附子虛而寒者脈遲而食減也腎為一身之本中氣為人身之生命腎中之氣又為中氣之生命凡老人八九十歲夜不小便眠食精神如常此必平日保養腎家之效如老人腎氣受傷食入仍吐即宜服腎氣丸養起腎氣以生中氣乃愈腎氣丸治腦鳴特效腦髓即腎精也如老人腎氣受傷春夏之間晝則微覺惡寒夜則微覺發熱微汗滿身口苦食減身體疲乏並無外感項強身痛之證亦宜腎氣丸以補腎氣自愈切不可用發散藥以速其死惡寒汗出乃榮衛將散之兆中氣之敗可知但不宜直接用白朮炙甘草補中之藥因此病之中虛乃腎氣不能生中氣的關係如服腎氣丸不效則腎陽難復宜多食豬腰湯以補命門相火自效此病欲知是否腎氣虧傷可於惡寒之時用溫水泡足覺身體陡然舒適惡寒全消者便是腎氣傷虧之象因足底為腎經湧泉穴此穴得溫腎陽上升故惡寒立罷榮衛的寒根於腎氣寒熱者水火之徵兆腎乃水火二氣所成也消渴小便多消者肝木失根風動消耗津液故渴風動疏泄故又小便太多是乃難治大病著者本腎氣丸的原理用遼海刺多的小海參一枚黑豆一把煮爛食極效因此病乃形質虧損非草木之力所能挽回此方一為血肉之品一為穀食之精海參大補腎中陽氣黑豆大補腎水水火均足水靜風平疏泄遂止凡腎家虧損及年老腎虛真有不可思義之妙凡補品多數皆有偏處或生脹滿或生燥熱種種不適功不抵過惟此方服之愈久神愈清氣愈爽服之終身不僅能卻病延年而已海參大補腎陰又補腎陽世人只知補腎陰也煮法先將海參用溫水泡一小時用手捏去渣換水兩大碗加黑豆一把微火煮八小時取出海參剝去沙泥腸勿去連湯食海參精華全在湯中也腎家虛損力可回天凡病精神不振飲食減少補中藥服之不受者可速服此方以補中氣之根源即效能於子時後寅時前服下效力更大凡半身不遂經脈不通症瘕皆可借子後寅前造化旋轉之力以宏海參黑豆補腎水火之功而復中氣之舊也消渴屬於熱者小黑豆煮濃湯常常服之勝於食涼藥人於四十後善保腎家左脈充足皆能有八十以上之壽因水足乃有藏火之處水虧不能藏火中氣失根與河圖中宮陰數在陽數之外陰以養陽之理相背則陽氣飛越中氣消散無藥可回也好食紙煙雞魚燒酒牛奶熱性等傷陰之物與燥熱之藥亦能使左尺脈少老人能受附子陽藥皆腎水充足之故前人謂陰脈旺者必壽其意深矣李東垣謂人當四十以後氣當下降宜升陽之藥此言誤人不少其實四十以後降氣即漸衰矣降氣者陰氣也津液也腎水之來源也東垣錯處湯頭篇中最多凡陰虛則肝熱肺燥忌食下列各物燕窩魚翅蝦米鯉魚鹹魚雞雞蛋牛肉羊肉鴿紅塘甜酒與一切酒胡椒花椒韭菜生薑蒜核桃茶煙以上各物皆傷陰分每晚調服鴨蛋一枚調十分鐘生食或開水沖服最能補陰惟大癰疽未合口者忌之小瘡之屬於陰虛者宜之此方比服補陰藥功大治幼童夜尿特效小便不利有因土氣虛者有因肝陽虛者有因肺陰虛者土氣虛肝陽虛者脈微肺陰虛者脈弱土氣虛者宜服茯苓白朮肝陽虛者宜服烏梅肺陰虛者宜服車前草苓朮除濕補土烏梅性溫補陽車前性涼補陰不可錯誤陽虛誤服車前敗脾滑腸陰虛誤服烏梅疏泄過甚小便不止而死此外則木氣結滯脈象沉澀亦小便不利宜傷寒論之四逆散柴胡白芍枳實炙草各一錢以升降木氣疏通滯氣並養中氣乃效又非腎氣丸所宜矣微脈弱脈詳脈法篇一七十六歲老人小暑大暑之間滿身發癢脈虛飯少行動無力脈甚潤卻散漫豫附子理中丸一錢二日後頭忽暈改服腎氣丸一錢一日二服至立秋約服三兩諸病全愈脈亦調整次年春精神大加行動如少年此病身癢陽氣虛也附子理中乃中虛又寒之之法此病中不寒故服之頭暈改用腎氣丸由水中補陽所以病愈小滿大暑之間正少陽相火之時此時補起相火秋後降入水中所以交春見效特大凡附子理中覺燥改用腎氣丸此法最佳最宜研究相火當令之時宜補相火所以冬季熱藥不宜冬季宜補水也世人以為夏季炎熱宜涼藥冬季寒冷宜食熱藥可謂不知醫理有一人夏季感寒惡寒甚盛服阿司匹林汗出感愈而胸痞氣微心煩意亂若甚危險者脈右關獨大虛松無神左脈甚細服附子理中丸梧子大五粒頃刻而愈此中寒兼陰虛附子理中少許即效若服之稍多必病愈而陰虛之病隨之起矣此治法乃中寒宜附子理中卻宜少服之法若服腎氣丸於右關脈大之中寒必不見效補益腎氣時方之中還少丹最好巴戟天甜蓯蓉楮實子五味子小茴香炒杜仲山茱萸各一兩以溫補腎肝陰中之陽枸杞熟地各二兩以補腎肝之陰山藥茯苓各一兩以補肺健脾牛膝遠志石菖蒲各一兩以疏通腠理使補益之品可無停滯之患避去附子肉桂之純陽於溫補中寓潤養之義蜜丸每服一錢飯後服此方與下文健步虎潛丸滋補腎肝之妙法也還少丹並治脾胃虛寒飲食不思發熱盜汗遺精白濁真氣虧損肌體羸瘦肢體倦怠等症菖蒲遠志最疏胸膈滯氣心虛者少用胸膈氣疏心腎乃交人見遠志的志字遂認為能補心腎誤後學者也還少丹用之於大隊滋補藥中正所以疏胸膈之氣以利導滋補之作用此方偏熱又尺脈少者宜之虎潛丸偏寒左尺脈少者宜之腎氣丸治的小便太多乃腎中火弱之虛病故用附片於地黃之之中以補腎水中之火以培木氣之根木氣得根疏泄有本故小便減少以歸於常若手厥陰心包經熱實之小便太多則非黃連不效厥陰熱實其脈細沉有力夜半煩躁口渴汗出甚則肢冷舌之中心兩旁黃苔兩條時起時退一夜小便十數次白日睡醒亦兩三次用黃連者降手厥陰心包相火也潘榮武同志少君五歲病此用白芍菊花以清肝熱麥冬以清肺熱生鐵落以降膽黃連以降心包大效口渴津液傷也汗出內熱也肢冷熱極則熱聚於內不能達於外也舌心兩旁黃胎時起時退舌乃心之苗心包熱實熱現於舌也胃熱之胎退則病愈不時起時退土氣厚重不移易也心包屬火而來自肝木木病則進退不定也白晝睡醒小便宜多睡則增相火火增則本熱也脈沉內實也細而有力熱傷陰也此證與腎氣丸證一虛一實雖實仍虛用參朮草棗白芍白芍重用以善其後焉單食甜蓯蓉一味剪細吞服一錢水火雙補可代腎氣丸陰陽俱虛形體瘦弱不能受附子者此藥最宜白果煨食十枚亦治腎虛小便太多此無熱之小便太多有老人小便不利服溫補肝腎之藥始利而大便反瀉不能收納此肝腎陽虛肝木又熱後服生雞子一枚生白芍二錢生知母二錢乃愈雞子以補陽知芍以清熱也此人服腎氣丸甚熱大黃黃芩黃連瀉心湯證治推論的意義腎水足則上升以交心火心火足則下降以交腎水腎水上升者陰中陽足也心火下降者陽中陰足也腎水不升則化寒故腎氣丸用附子以溫下寒心火不降則化熱故瀉心湯用大黃黃連黃芩以瀉上熱漬少頃者泡出味便服不可多泡也輕之至矣此心火乃心包相火非心藏君火君火不病病則人死降火與清火不同清者有去之之意降者引之使下歸於水中不去火也明瞭降火法之意方能治火氣之病如用清法去火乃火氣病之實者此方乃火氣病之虛者心氣不足四字切須認清心屬火氣下焦之火主上升上焦之火主下降心火不足乃心火之降氣不足如係心火不足便須用羊肉溫補木氣心火乃足或用腎氣丸以補木氣之根心火乃足吐血有因寒者有因熱者大黃黃連黃芩瀉心湯此病之由於熱者火熱不降中氣必虛故此方漬而不煎預防傷中為治火逆之大法即吐血之由於實者大怒之下肝膽橫塞實在肝膽虛在中氣如吐血而脈緊重按有力則瀉心之法中又須兼清肺和肝散結養中之品矣吐血乃大口吐出非咳血若吐血不止是中下寒盛肺金不斂而血逆行用柏葉湯乾薑溫中艾葉溫木氣而調升降各用三二錢馬尿一兩煎服即愈馬尿收斂下降能滋潤血液此脈必微而浮或虛而大也中溫肺斂血乃下行下部溫暖血乃歸根若服涼藥病則難愈有時咳血而大口吐出若屬於熱難治吐血不止或十數日發一次除用柏葉湯外紅燉羊肉隨意食特效此為木氣興中氣虛寒之病木氣寒則膽木不降故血逆行其脈必弦大或虛微弦而大為虛寒之脈微脈亦陽虛也羊肉溫補木氣又補中氣紅燉有桂皮等香料亦溫補木氣興中氣之品也凡吐血不止之吐血乃大口吐血非咳血非咯血慎之瀉心湯治上熱吐血柏葉湯治中寒吐血此種吐血多係一吐即愈惟虛勞咳嗽痰中帶血別難治以其形損故也人身之氣陽位在上陽根在下陰位在下陰根在上虛勞咳血肺質損傷陰根受傷如脈不細數尚可補肺益陰肺陰復原降氣充足圓運動迅速中氣復生自能病愈如脈細數形質大損陰液枯涸病即難治咳血又加發熱陰竭火飛一交節氣大氣變動即生危險咳血而脈尚未細數者切不可用補氣傷津之藥使之轉成細數方藥如下白芨阿膠糯米各三錢以補肺質之陰山藥扁豆各三錢以補肺陰之陽山藥兼補土去濕可以調和白及阿膠糯米膩性使之不礙食欲槐角二錢以清肺熱而助收降海浮石補肺質之損益肺質之陰以助肺金降氣苦杏仁泥一錢以潤肺質而降其逆氣蜜製款冬花枇杷葉各二錢以降氣止咳黑豆五錢養木氣降膽經斂相火引肺氣降入腎家黑豆益陰而不敗脾和木氣不使上衝以保肺金之安寧為此病要藥總之此病此方總要補陰不傷土氣補土不傷陰氣為主如半夜陽動宜加苦楝子生枳實一二分研末每日臥前吞服蓋能半夜舉陽此相火尚旺能將此火藏於水氣之中肺金賴以安寧中氣賴以復生此好機會也凡動陽食物一概不食用糯米百合山藥蓮子扁豆緑豆沙紅棗白糖豬板油蒸熟如泥以代早點食後不覺熱則中氣受補形質易復病愈較速形質不可損壞壞則難望復原醫此病者不可求速效致藥不見功反加病也至於鼻衄皆是虛證有燥病濕病之別燥病口苦額痛麥門冬湯可用濕病面黃食減炙草側柏葉各二三錢柏葉除濕斂肺炙草補中麥門冬湯亦重補中可見肺逆者中必虛也婦人經期鼻血大出此心熱橫肺乃倒行經也速將頭髮用涼井水泡之頻換新吸井水以撤心火心火降血則歸經另服柏子仁湯乃愈柏子仁湯詳湯頭篇一婦科年四十因咳嗽痰中有血注射葡萄糖鈣多次後遂痰中大口帶血晨起即咳半黑半紅繼則全紅中脘作痛有氣上下分行上行者由中脘向右入耳後至前額則鼻出血由中脘趨左腹腹即痛大便瀉稀水少許至十數次小便亦日十數次背後發熱月經減少飯食不甘睡亦不穩脈兩尺俱無豫用龜膠二兩鮮柏葉二錢一劑血止咳減第二仍二兩去柏葉加槐角二錢咳與背熱皆大減大便小便均復原狀食睡都好其間有一種現象頗為特別第二劑後額上皮內如有多少蟲行由後而前由上而下由頭下至臍下睡醒之後精神百倍右尺先有左尺亦來不多膠減一半槐角仍用二錢服至十劑病始全愈而左尺仍不足也此病陰虛而用補陽傷陰之藥圓運動失常此用不運動之藥使然耳人身陰陽圓運動後升前降左升右降此病兩尺俱無平日陰虧可知陰虧而咳此肺熱之咳葡萄補腎陽之藥糖補中土之藥陰虧之人忌補腎陽忌補中土陰陽運動是活潑的鈣乃金屬是不運動的所以注射葡萄糖鈣多次而成以上所列現象陰虧則不降所以熱咳既不下降而熱咳又加以補陽之藥陽多陰更傷更不下降於是由右上逆而鼻出血陰陽運動相抱如環肺陰既不下降而向上肝陽即不能上升而向左下陷於是腹痛下趨而連瀉不已小便多次亦肝陽下陷生熱也背面發熱者陽升於後不能下降於前也頭皮內如多少蟲行下至臍下者身後督脈上升之陽升至頭頂由額下降至臍也龜膠大補陰液以復尺脈用至二兩可謂重矣柏葉收肺氣槐角清肝熱故此方特效此病已花費二十餘萬此方十來日藥資不過千餘元耳此中醫根據圓運動的原則憑脈治病之妙也中醫不用不運動的藥吐血屬於虛勞者用生地熟地天冬麥冬知母桑皮杏仁白芍阿膠白芷甘草各一錢雞蛋三枚同煮蛋熟去殼用竹筷將蛋戮一小孔再入藥鍋內煮數分鐘先食蛋後食藥湯隔一二日一劑血鮮紅者藥加為各二錢服後脈細數者漸轉和緩肺內部痛者漸不痛潮熱者漸退雖二三期之重病亦效此方乃整個圓運動之法也虛勞吐血向來只有補陰之法補陽之藥不惟無效反以加病人身陰陽二氣互為其根一派補陰之藥皆是滅陽之藥土敗火熄不食而死雞蛋大補脾腎之陽有薑附之功無薑附之燥於大隊補陰地冬等藥中用之並使藥汁漬入蛋內而成一陰陽互化的圓運動脾腎陽復而左升胃肺陰復而右降形質與氣化的圓運動復原所以熱退進食愈吾人將此陰陽互化之意想清不用溫補藥而用雞蛋之理認識必能治多少陰陽兩虛無法用藥大症而得到愈快之境咳血者不可服服此方須隔一二日一服若每日服之雞蛋不易消化煮藥要蓋住炙甘草湯證治推論的意義此方用生地麥冬阿膠麻仁涼潤之品大補津液因脈已結代心已動悸已現津液燥熱之象津液乃中氣旋轉之所生必須中氣旋轉津液方能復生又必須津液滑利中氣方能旋轉此互相關係的實際上學者能思維透徹得到著落便能解決陰虛用藥的困難因向來治陰虛病的方藥只知涼潤不知補中及至涼潤傷中仍不能不用涼潤結果中氣敗完液乾人死不補津液中氣不能旋轉不補中氣津液無由而生而補中之藥必傷津液補津液之藥必傷中氣故困難也此結代之脈並不弦細與普通脈象一樣如其弦細脈絡枯澀炙草參棗不易用矣茯苓杏仁甘草湯證治推論的意義時方中之二陳湯陳半夏陳橘皮茯苓甘草世皆認為治痰通劑有以二陳湯治胸中痞塞短氣不見效者半夏與杏仁之分也半夏性燥杏仁性潤燥藥傷津潤物養津半夏只可去痰不可用以去濕用燥藥去濕津傷而濕不去用養津藥去濕津生則氣降氣降則濕行也濕在人身如物受潮濕是滿布的是侵透肉質的痰在人身痰自為痰離開肉質的易醫發汗利小便為去濕兩大法門然只能去初病之濕不能去久病之濕初病之濕濕氣未將肉質浸透故可發汗利尿以去之若久病之濕已將肉質浸透濕氣與肉質的津液合而不分發汗利小便皆大傷津液又須於發汗利尿之法中求深細的治法金匱曰若發汗大汗出濕氣不去微微似欲汗出濕氣乃去又曰大便堅小便利桂枝附子湯去桂加白朮主之濕氣與津液合而不分必發汗而微微似欲汗出滿身潮潤不見汗流然後濕氣與津液分開濕氣乃去大便堅小便利濕氣與津液不能分開必須去桂枝之疏泄小便加白朮以停留津液使大便潤而不堅小便比較減少濕氣與津液分開濕氣乃去此深細之治法之功效只須驗之脈象脈象調和而微小濕氣已去之脈脈象弦細不調為濕氣未去之脈濕氣之去全賴整個運動圓而木氣和弦細之脈整個運動未圓木氣未和也微微似欲汗出與小便減大便潤為整個運動圓經驗多時自知夏日久雨一人晨事操作冒雨用力過甚遂病感冒自服蔥豉湯體舒而熱不退食無味惟食糖有味尿短脈細而澀熱如在骨繼食黃豆四兩已能食粥三碗一醫用大劑茯苓蒼朮厚撲木通澤瀉等除濕之品遂失眠身黃不能行走尿愈短頭骨熱退反不能食身仍熱此病用力過甚之時而感受濕氣脾腎兩虧病氣極深重服除濕之品傷其脾胃津液脾津傷則陽散土敗而身黃腎津傷則腎陽不能藏而失眠不能行走今津液傷盡陽無所藏而散去故頭骨忽然不熱也此病尿短乃陰液不足肝腎之陽藏不住而外泄無力疏泄小便之故發熱不思食即陽氣外泄之據此時宜用乾薑附子炙草兼黨參黃精陰陽兩補方能回生學醫須學整個的乃能治病只知尿短為脾濕提筆大開除濕之藥致人於死危險危險可類推也曾見一醫治水腫重用茯苓澤瀉等除濕之藥下咽一刻胸痛汗出而亡詳湯頭篇大橘皮湯一人身黃足腫問其小便長而次數多其脈兩尺如無醫家按濕治黃腫反加用阿膠每日服之至半月尿減少再半月尺脈起黃腫漸消阿膠一味服至年餘乃全愈黃為土色入木為黃陰虛木敗之病也此方補陰以養木之法也酸棗仁湯證推論的意義失眠除因膽經寒外有胃氣不降者用法半夏五錢黨參五錢紅棗六枚半夏專降胃逆參棗補中氣胃氣降相火乃降相火降入腎家故眠也脈象平和或右關脈大無肝膽病證者便是有因膽經熱者半夜手掌發脹或膽經熱肝經亦熱則放屁聲大尿多左腿癢用龍膽草三錢清降膽熱並補中氣即效老人失眠左尺脈細小者此為真水就枯甚難治朱丹溪健步虎潛丸有效方用制龜板制鱉甲大熟地各四兩鹽水炒黃柏炒知母各三兩牛膝橘皮鎖陽虎骨當歸白芍各一兩黨參三兩研細末瘦羊肉蒸爛同搗為丸羊肉不拘分量以能搗和作丸為度臨睡時吞服四兩此方龜鱉熟地黨參補形質之陰知柏大寒補水右降虎骨羊肉補形質之陽又能溫補肝經耗損之氣鎖陽斂陽下歸腎水牛膝橘皮引陰藥下行以交腎臟歸芍調木氣之升降此方凡左脈細小一切陰虛虧損無不奏效一人年五十好怒兩目不能上視亦不能左右視視則頭目昏暈渾身陡軟每日必吐二三次並未吐出有何物飯食減少平日四分之三舌苔微現潤黃色六脈皆虛右有弦意左尺較少醫兩年無效令服健步虎潛丸一日五錢甫服一日即見大效加飯一碗服至一月全愈左遲脈較少為龜地知柏並用之據此方妙處全在虎骨溫補木氣之陽以配合龜地知柏滋補木氣之陰若徒知補陰不知補陽相火一敗土氣失根再不能食便壞此方亦根據腎氣丸之法加以細蜜之配合而來此朱丹溪之妙方也凡陰虛木旺諸病皆宜此方須知木之旺即是木之虛此方可謂能盡整個圓運動之妙此病之不能上視左右視者肝陽旺於上也肝陽旺於上者肝陽虛於下也肝陽之偏升膽陰之不降也故滋補陰液溫補肝陽並用恰合病機而血肉之品尤宜虛損之家研究此方得其妙處虛家肝膽之病之法應用無窮矣龜甲能降木氣偏升之力亦此病要藥失眠如由陰虛糯米粉做成水圓豬油炸臥前食半飽特效雞肝白芍方治失眠特效降膽經升肝經通滯氣補陰陽其力大矣雞肝方見前小建中湯將飴糖紅棗加重於半夜失眠時服之頃刻即能得睡可以見睡眠是膽經相火興中氣之事也治失眠病總以補中溫膽為主補陰為輔憑脈用藥不必拘執為妥陰虛之人有食飴糖作熱瀉者雞蛋黃油最通膽管最能活動身右一切痹著飯後服之甚佳用雞蛋連殼煮熟將蛋黃加油炒透成老黃色加水將油煮浮於水上取油服之能補相火溫暖膽經其力非藥力所能及膽經寒失眠至實清魚肝油補膽經相火功力大而性平和每飯後食半匙極佳每日食海參一條豬肉燉食極效半夜失眠枕上嚼食艾葉一二分極效皆補相火之意失眠由於相火虛者較多白頭翁湯證治推論得意義曾與一醫家同治一白頭翁證醫家主用白頭翁湯余曰脈弱不能受黃連黃柏之大苦大寒宜變通也用白頭翁秦皮而以梔子皮炒過代黃連黃柏又加山藥扁豆以益中氣服之而愈此方服之即愈若用原方必加脾敗之病矣加山藥扁豆者平淡之性扶土氣以任苦寒也此病傷寒厥陰肝經陽復生熱有之傷寒裏病一氣獨勝病氣極盛故陰經陽復所生之熱其力甚大非用黃連等大寒之味不能清之至於內傷肝經病熱左關遲脈小於右則歸芍地黃丸甚相宜六味地黃丸加歸芍滋養肝木津液之方也傷寒一氣獨勝詳傷寒讀法篇凡用大苦大寒傷中氣之藥不惟要審明脈象尤要審明病人所在地之地氣如夏日多雨地下之熱較實夏日少雨地下之熱較虛春夏則地下之氣之熱較虛秋冬則地下之熱較實造化地下的熱之虛實人身中氣以下的熱之虛實應之熱實故脈實熱虛故脈虛又如秋冬之間鳴雷則秋收之陽外散地下陽少人身中下亦陽少陽少則脈虛冬至後不冷常起大霧則冬藏之陽外散地下之陽少人身中下亦陽少陽少則虛冬月陽少脈虛來春春無所生陽更少脈更虛一直要到立秋處暑後太陽射到面的熱經秋金收降之力將他收而降入地面之下然後地下有陽然後人身中下陽氣漸充脈乃漸實也陽實脈實病熱之病其熱乃實然後黃連黃柏的證乃可用黃連黃柏之藥西南各地冬季無雪無冰氣候不冷重慶且多大霧地下藏陽不多醫家如仍按書用藥不知審查地氣一定將病治重而不知何以病重之所以然常謂東北方實病多西南方虛病多東北地方冬令嚴寒西南地方冬令少冷故也亦有個人之病不能一概而論則內傷之病有之時令病則大概相同內經四氣調神大論對於春生夏長秋收冬藏的藏氣特別重視醫家卻解釋錯誤使後人學之不得要領即如香連丸治痢疾東北各地都效西南如昆明重慶都則多不能見效反加病焉痢疾服黃連加病者將黃連易艾葉以溫暖肝經然後效也此因冬令不冷之地水中所藏陽熱不多肝陽不旺化熱之元素本少故畏黃連之寒而喜艾葉之溫也肝陽不虛之人不在此例前人立方根據一地之病證地氣吾人用前人之方須審各地之病證地氣此本書生命宇宙篇所以冬藏不足之地特別重視也總以病人之脈象為憑陽虛之地病人之脈亦多陽虛也人身內傷之病肝木剛燥之病最多歸芍地黃丸杞菊地黃丸極合機宜王孟英醫案所載養陰諸案可以為法當歸生薑羊肉湯治肝木寒證白頭翁湯治肝木熱證皆少有之肝木病也前人對於柔肝之法特別注意初學切不可忽薯蕷丸證治推論的意義木主疏泄其氣本動木動風生第一克土氣第二耗木氣第三煽火氣第四侮金氣第一克土氣者木本克土土氣旋轉須木氣調和木鬱風生則盤塞衝擊土氣便不能旋轉了虛癆病食減中虛中鬱即是此理第二耗水氣者就同有水氣的物件一被風吹水就乾了腎主藏精精者津液所成風木動則疏泄妄作腎不能藏津液枯耗也津液枯耗腠理不通百病皆起虛勞病發熱出汗乾澀枯瘦即是此理第二煽火氣者乙木上升則化君火甲木下降則化相火相火下降藏於水氣之中又為乙木之根氣病風則乙木不升而君火陷於下甲木不降而相火逆於上火氣者動氣也再遇風氣煽動故愈煽愈熱也火氣生熱灼傷水氣不能藏火元氣消散中氣滅亡虛勞病手足心熱潮熱出汗咳嗽食減而死即是此理第四侮金氣者金本克木木主疏泄金主收斂金氣收斂木氣乃不妄肆疏泄金氣之收斂雖隨中氣之右轉亦須木和風靜方能行其收令之權令木氣風動煽火上焚金氣雖欲收斂而有不能矣金不能收風氣愈泄水氣無根火氣飛越土氣消滅虛勞病咳嗽不止必死即是此理故曰風者百病之長五臟之賊也因木病而水火土金皆病故曰風氣百疾也蠱勞之病其初皆由木氣之妄動其後皆成於金氣之不收蓋金收則水藏金收則甲木下降金收則相火歸根相火歸根則水氣溫暖乙木溫和只生心火不生風氣甲降乙升土氣松和中氣旋轉各經升降之氣自然調和諸病自然消滅是金收二字責任實在不小金氣能收風木四害皆可不起所以虛勞之病最忌咳嗽也咳而不愈金氣全敗收氣全消風遂無平息之望中氣無存遂難治矣所以此方重用山藥補肺經之氣以助收斂而平風氣也此病此方於中氣旋轉陰陽升降五行六氣一氣回環的圓運動可以概括苟深思而明之虛勞諸病全解決矣水火交濟則人生水火分離則人死分離少者則病輕分則多則病重虛勞之病水火分離此方則有金木與中土之法而無水火之法何也緣肺金下降則生水膽木下降則生火故此方只有金木與中氣之法水火之法即在其中甲木下降乃生相火之法不言君火之法何也因乙木上升自生君火非甲木下降乙木不能上升故不言君火而君火自在其中故仲景醫經於勞傷各病皆是金木中氣之法諸家藥性皆稱羌活獨活薄荷白芷等好些發散藥為驅風藥風者木氣也木氣疏泄則成風豈有疏泄之病又有發散之藥以增加疏泄為能治風之理中醫學竟有如此不講理而衆口一詞者無怪瘟疹用散藥將人治死而不知其所以然也後學被其害者多矣生薑瀉心湯證治推論的意義凡經方寒熱並用皆既有寒又有熱之病不可認為寒熱並用乃彼此牽制之意用藥須於認定著落四字上求切實之解決如認定有寒乾薑便有了著落認定不清則著落不確含糊用藥必加病此病主因總是中氣虛寒不能旋轉於中因而四維的升降停頓應當上升下降的火成了上逆下陷之熱既成熱必須清去其熱其火乃能升降又非溫運中氣四維不能復升降之常此等病甚多將生薑瀉心湯的理法玩索有得應用無窮金匱黃土湯治便血用附子黃芩灶心土白朮炙草阿膠地黃既用附子之熱性又有黃芩之寒性既用灶心土白朮之燥性又用阿膠地黃之潤性用附子因腎水寒不能養肝木也用白朮灶心土因水寒木鬱土氣必濕土濕則木氣愈鬱愈妄肆疏泄也用阿膠地黃因木鬱疏泄必生風燥既生風燥必更疏泄也各有認定各有著落亦非寒熱燥潤並用彼此牽制也人身是五行六氣所成的五行六氣是融合的並不發現一行一氣的是圓運動的病則六氣分離各現本氣故寒熱燥濕風都發現也有人嗜酒遂病便血六年無虛日服黃土湯病反加其病面黃左腿足熱左手心熱左乳部微脹大腹滿脹小腹硬脹均時脹時消行動則咳脈小而短為處一方麥冬白芍法半夏各三錢川芎一錢白朮茯苓苡仁各三錢而愈此病面黃土濕也左手足熱血去木枯又阻於濕木氣不能左升則左足熱木氣不能右降則左手熱木枯氣滯升降不和則胸腹脹也方以術苓苡仁除濕建土麥冬半夏白芍由右以潤降廢膽胃三經輕用川芎由左以溫升肝經肝膽二經升降調和風木之氣得潤中土之氣運化故諸病皆愈脈短為氣滯故不用甘草以增滯也凡黃土湯證木氣不枯氣不滯脈不短小不熱不脹此病乃土濕木枯熱而又滯之病認定土濕苓朮苡便有了著落認定木枯生熱生滯白芍麥冬川芎便有著落降藥多升藥少造化之氣能降自然能升升降自如脹滿熱咳皆自愈矣升降的運動圓血自不下也生薑瀉心湯治傷寒壞病痞證其復雜情形非學有根底於傷寒論下過苦功者不能辨別出此方用藥之所以然但自來醫家有幾人能對於傷寒論用過苦功者醫家豈有不願用功學傷寒論整個原文次序愈讀愈不明白於是只有遂死記之一法不知整個如何能知一章傷寒一百一十三方三百九十七法是內傷外感整個的書不懂傷寒一病的書傷寒論無法讀徹底此中醫所由壞也本書傷寒論六經原文讀法篇與傷寒方解篇開自來學傷寒論簡便法門不可忽矣黃耆五物湯證治推論的意義身左不仁者榮氣衰也身右下不仁者衛氣衰也然今日之偏衰實由前日之偏盛而來因榮衛相實全要平均榮盛則身右之衛氣維繫不住榮氣而身向左傾衛盛則身左之榮氣維繫不住衛氣而身向右傾傾者偏盛之氣單獨震動圓運動忽然分離身體隨偏盛之氣之一方而傾倒也但榮當偏勝只責衛虛只責榮虛如當時補其虛之一方以調其盛之一方則榮衛和合運動能圓萬無病中風傾倒半身不仁之事榮盛而身向右傾傾後則榮衰矣衛盛而身向右傾傾後則衛衰矣一方偏少一方偏多運動不圓中氣遂受其影響而實中氣先弱不能運化榮衛也此等病證無論右傾左傾由於衛氣偏盛者極少由於榮氣偏盛者極多衛秉氣於肺肺氣能盛則金收水藏火祕木靜中氣益旺運動益圓病從何來榮秉氣於肝肝為一身動氣之主平日不知珍攝液虧水耗木枯風生木動生熱風熱傷金金不能收木氣更動此時中氣搖動極矣中氣尚能維持本身運動之圓木氣雖動不過發生木氣疏泄之本病而已何致將整個圓運動的個體忽然震開致向一方傾倒此必因又遇一番基刺方能一動而倒當未倒之先必有先兆如果頭腦眩痛耳鳴心跳眼生金花少腹乾熱半夜發躁手足麻掣痰火上衝行動眩暈種種陽亢陰虧等象其脈必右多左少左且沉細硬澀必於此時趕緊用滋津液潤枯燥去滯塞養肝木助肺金降相火培中氣之藥使氣血無阻腠理流通動氣入於靜氣之中剛柔相濟運化能圓方無後患如果衛氣偏盛靜氣可制動氣乃太平之象也然須本人忌食動陽燥熱刺激等物方能生效此病血痹身體不仁乃形之病方中只用調和榮衛之藥榮衛流通血自然不痹身體自然靈活也如其舌有膩苔須兼清理胃滯加神麯半夏檳榔之類如血痹已久須兼活血加桃仁紅花之類如津液枯澀乾薑辛散亦不用甘草橫滯亦不宜用宜加冰糖以助中氣則芍藥得甘味相和奏功必較易也榮衛之氣流通其力極大每當夜半陽生之時與天明陽動之際病人身體常有感覺如有一次由四維運動歸到中脘病必大愈蓋四維升降則生中氣中氣有力四維愈能升降之故世謂中風跌倒有中風中火中痰中氣中濕之分其實火也痰也氣也濕也皆由於風此風乃本身木氣之風卻非風寒之風平日陰虛陽亢肺家津液不能養木木氣生動肺金不能降之則木動風起榮盛衛衰榮衛分離而成半身不遂不過因木動中傷故火痰氣濕隨風木之動而起也於黃耆五物湯加治風治火治痰治氣治濕之藥可也榮衛不通必有瘀血須加活血通瘀之品乃能見效熱加梔子黃芩氣加青皮枳實痰加半夏南星濕加茯苓白朮如兼陽虛內寒乾薑附子尤要藥也惟中風之後有氣閉之證宜急順氣詳湯頭改錯篇烏藥順氣湯中此病世醫好用時方之防風通聖散而病加重因防風通聖散大開大合大通大散力量猛烈乃內風陡起忽然傾倒脈實氣實痰實熱實閉塞不通之方如果證與方合自當見效黃耆五物湯不合用也雖實亦只暫時之實閉塞稍通脈象轉和速補中氣調榮衛乃是治法黃耆乃大補衛氣以通腠理之藥力大功宏非他藥可及整個榮衛之內病身體不足氣血不和左右內外痹澀者非黃耆不能醫也其性由右下降復由左上升升力多於降力如津虧脈細者忌用必須認為整個榮衛之病乃可用之真能使身體強健也肺病忌黃耆性升之故此點人多忽之老人榮衛衰敗每逢氣候變化晴雨不定感覺全身困乏口發酸味用炙黃耆二兩紅棗六錢炙甘草一錢黑豆二錢煎服即愈黃耆紅棗並用補衛氣以運榮血黃耆又補陽補三焦相火炙草補中黑豆養榮整個得運動圓中土陽氣增旺口酸自止氣候變動宇宙大氣個體得榮衛整個開合錯綜不定人呼吸之故老人多病時令感冒病亦是榮衛不足之理特不可用黃耆以補外感之衛氣耳凡服黃耆須早服若晚服則性升動陽必出他患人身整個圓運動得氣稱曰榮衛榮衛二字乃氣行的地位與作用不同之名稱榮主疏泄作用衛主收斂作用榮主血液衛主腠理榮主身左衛主身右其實人身整個圓運動是分析不開的今分析言之因病機的關係各有分析的著落也榮衛關係最大莫如外感外感的病汗出乃愈榮衛和則汗出病乃榮衛分也榮衛為人身整個圓運動職司在肝肺樞機在中氣根源在兩腎所以外感之病有調和榮衛而愈者有調和肝肺而愈者有補中氣而愈者有補兩腎而愈者黃耆五物湯的榮衛關係腠理與血液的關係也淡豆豉最開腠理痛痹者早晚吞服一錢日久頗見功效可以為黃耆五物湯之助但無補益之功只有調中之效一人用力勞傷兩臂不能舉兩膝痛口淡不思飲六七日不大便腹不脹交酉時即悲苦胡説並不自知交子時乃止脈象薄澀而沉中有一細線著骨不起好吐酸水方用黃耆二錢桂枝一錢小紅棗十枚當歸一錢法半夏二錢麻黃一錢服一劑臂舉十分之六七膝不痛食飯兩碗胡説悲哭止解大便潤成條面上起小粒不癢口水止脈轉調細尚有十分之二三去桂枝再服一劑愈此病臂不舉膝痛脈薄澀榮衛虛也黃耆當歸紅棗桂枝以補榮衛悲哭不大便不思食脈沉陽氣下陷也耆桂以升陽氣脈細著骨此衛氣不舒二成積也麻黃舒衛氣以開積好吐口水陽氣陷而胃氣逆也黃耆桂枝以升陷半夏以降胃逆大便六七日解出仍是潤條陽氣不升中氣不運陽升中運大便乃下也耆棗升陽補中此病如攻不下大便必死如用生薑脈必更澀更細如用芍藥陽氣更陷此為用黃耆五物加減之一妙法在麻黃與黃耆當歸同用否則難效服藥後面起小粒者衛氣外發衛氣外虛不能作汗也人身百病多係虛弱結滯四個字人之死也除熱實而死外非虛弱而死即結滯而死或虛弱又結滯治不得法而死不論何病但見脈象虛弱之中有乾澀弦細之象便是虛弱而結滯之病弦細乃結滯之脈用八珍益母丸特效八珍益母丸詳時病篇惡性瘧疾法中此丸並能調經種子亦補益血之虛弱而調氣血之結滯也黃耆五物湯為榮衛虛弱結滯之法八珍益母則氣血虛弱結滯之法一人久咳胸悶兩臂舉動不靈脈象虛弱弦細八珍益母三劑全愈以能推之八珍益母丸所治之病多矣脈不弦細去益母血痹之人榮衛不通遇交節之前三日或久雨轉晴久晴轉雨身體必大感不適或忽然心慌尿多失眠忽然便瀉怔忡心跳異常不安或指脹肢痛肋脹陡作遺精白帶有不能形容之苦是腸胃中有老積阻滯營衛腠理陰陽不通陰陽隔離此等老積多由肝陽偏旺化風傷津而成宜用獸炭三五分空腹吞下必下污垢如熟藕粉或堅硬黑物此人大便內常有異物與特別乾燥之糞鼻梁與大眼角之間現有青色面色必晦暗不鮮脈必常沉而難活潑皆宜獸炭消積用西醫打診法聽其背部腰部胸部腹部聲音左右必有不同老積在左則左腹音空在右則右腹音空空者老積阻塞腠理氣機流通不勻也而有積之一方上而頭項以至胸肋腰腿必痞脹常發也獸炭用瘦豬肉不用肥的切細在滾開水裏一川色變即起將水氣吹乾以火炒成黑炭不可留黃色不可起煙研末用此炭比較穀食炭少傷胃西藥房有售者黃耆五物湯治整個榮衛敗壞不惟運動不圓致全身血痹之病獸炭治腸胃中老積阻止榮衛陰陽整個運動不圓因而發生上列各病善為運用亦可與五物湯相輔而行收效較速凡中年以後常有疾病脈不活潑山根兩旁有青緑暗色必有老積可於每交節氣前三日吞服獸炭積在左吞服二分積在右吞五分左積氣虛右積氣實也服後即服豬油白糖開水沖雞蛋化一枚以輔之並連日食之脈左細而澀者如食雞蛋不加豬油陰必更傷鴨蛋最補陰可單食不加豬油冬月臥前食能補陰以養陽食鴨蛋須調數百下凡虛損之家與老人小兒最宜食品治病宜重視之不得已而用藥亦須本品之旨藥雖補劑亦傷胃氣經驗自知凡身體一部分疼痛皆榮衛不調血痹所致惟胸骨疼痛痛至不欲直立此腎陽不充難以上交於胸諸藥不治惟五味吞服三五十粒以補腎特效如手膀不能舉用葛根薤白各三錢炙甘草二三錢紅棗三五枚疏通手陽明經氣即愈大黃蟄蟲丸證治推論的意義乾血為病與瘀血為病的分別乾血為病的外症腹滿兩目暗黑肌膚甲錯此是憑外證可斷的瘀血為病外證如婦人經停午後發燒咳嗽食減男子肌肉消瘦咳嗽食減午後發燒天明汗多小兒尿如米疳午後潮熱腹大經青面色黃青小兒夜啼大人發熱一陳或心慌或乾嘔或無故生氣或五更作瀉或吐瀉日久並不危殆男子日久遺精婦人日久白帶皆因膈上停有瘀血而成的病膈上停有瘀血升降不能全通故病以上諸證用養氣養血之藥加桃仁紅花治之即效乾血在腸胃既是乾的氣血均被阻塞不能運行所以腹滿肌膚甲錯兩目暗黑早露明白的現象膈上雖有瘀血瘀而不乾氣血運行大體仍然照常通利所以外證難斷也嘗治一九十老人眠食精神俱佳忽然言語顛倒絮絮不休喜動不靜夜亦不眠診其脈右實大左亦不虛舌有黃乾苔此瘀血與肝熱結於胃間也用桃仁紅花大黃黃連黃芩各二錢炙草二錢兩劑而愈此秉賦過人六七十時亦曾病此均服桃仁紅花三黃始愈也白芍雞肝方治半身不遂特效亦通瘀之故方見小建中湯證治推論中人身氣以成形形以寓氣實則氣以成形形以生氣氣化病易治形質未壞形能生氣也形質病難治形質已壞不能生氣也一面去形質之壞處一面調氣化以生形質總不能離培養中氣以恢復其整個圓運動之法大黃牡丹湯薏苡附子敗醬散證治推論的意義現代所謂盲腸炎病以割去盲腸為惟一治法大黃牡丹湯薏苡附子敗醬散治盲腸炎病則係運動全身為惟一執法治法人身構造復雜極矣但總不外左升右降以成一整個圓運動的功能大病將愈每於半夜陽生之時感覺身體左右形成一個太極相抱的圓此日即大見起色大黃牡丹湯所以去圓運動之滯礙使本身之運動迅速恢復其圓薏苡附子散所以賠補其本身圓運動之原素使本身之運動恢復其圓也人身是無數個細胞成的而無數個細胞的運動規則與最切一個細胞無異圓運動而已腸癰病如此一切病亦復如此若謂此二方是運動腸的一部分的不運動之法離開整個而運動局部運不動也雖治局部仍治整個此古中醫學工功參造化之妙也如瘡癰不在腹內而在腹外以榮衛為主以臟腑之虛實寒熱為據一人右腹痛右腿不能伸醫謂盲腸炎宜速割診其脈沉細不舒余用四逆散加梔仁貝母一劑而愈四逆散柴胡白芍枳實炙甘草柴胡白芍升降滯氣枳實疏通腸胃積滯甘草養中以助升降加梔仁貝母清熱消滯故愈病在裏故脈沉熱而滯故脈細一劑之後滯氣疏通脈來活潑故病愈也四逆散治腸癰初起大黃牡丹湯治腸癰將成薏仁附子敗醬散治腸癰已成各有層次不可混亂瘡科書以徐靈胎外科正宗張山雷瘡癰綱要為最好按其所用藥性以傷寒論榮衛臟腑中氣陰陽本氣自病雖實亦虛之理求之認明陽證陰證勿蹈拔毒外出之謬而使中氣消亡勿犯先時潰口之戒而致榮衛難復便能學著其好處瘡科非熱實脈實大渴口臭苔黃腹滿便結不可用涼藥涼藥敗中氣敗榮衛瘡家大忌也葶藶大棗瀉肺湯證治推論的意義前人謂此方用大棗以和藥力這句話與甘草和百藥的話一樣的無著落甘草並非和百藥也人身十二經皆根源於中氣中氣左旋右轉經氣左升右降升降不乖是為平人當升者不升當降者不降是為病人經氣的升降失常因於中氣的旋轉不旺要升經氣必調助中氣所以中氣如軸經氣如輪甘草大棗補益中氣治各經的藥有中氣的藥在內則軸運輪行氣化自和甘草和百藥的化其實就是甘草補中氣的意思用藥治病須先認定是何原理用藥方有著落不可含糊此方如不用大棗單用亭藶一定能將人瀉死何也膿去而津液隨之亦去中氣係存在津液之中津液去中氣亦去仲景方中凡用大棗皆是養中氣養津液之意大凡治肺病總要調中補土與治肝腎病不同肝腎病熱者水涸木枯風熱耗津中土之藥最增木熱最增木滯不惟甘草不受即大棗亦嫌壅滿肺經右降非中氣不能降肝腎左升肝腎有陽自然升耳升降已和又升中氣中氣復起升降更和上文茯苓杏仁甘草湯治胸中痞塞短氣降肺不用中氣藥因濕氣填塞已成有形之物用補中藥反助其填塞之性或其人中氣必不大敗如中氣大敗脈必入虛如無補中藥以旋轉於其間四維不能升降肺氣亦必降不下去是又不可不從活潑處以消息求之曾治一葶藶大棗瀉肺湯證因其人較虛弱用貝母桑葉各五錢以代葶藶大棗肉四兩同煎服甚效貝母桑葉排膿除痰之力亦大但不及葶藶之猛根據原理用藥不必死守成方適合病機乃善學古人者甘麥大棗湯證治推論的意義人秉造化圓運動的大氣而生大氣中有什麼人身有什麼大氣有降沉升浮人身有降沉升浮而並不覺得有所謂降所謂沉所謂升所謂浮者中氣旋轉作整個的圓運動也病者降沉升浮分析也原理下篇氣降則悲氣降則哭悲哭之發作本己並不知覺氣之偏降使然氣之偏降中氣不能運化使然五志五聲如此五色五味亦如此此等病證人鹹怪之且大駭焉而治法不過助中氣之旋轉復四維之升降極簡單極容易而卻歸本於宇宙之法亦極簡單極容易之法也圓運動而已一婦科二十五歲每日交午則悲哭不能止交子乃罷脈沉遲之至月經六個月不來服附子乾薑肉桂蓯蓉巴戟故紙五味黃耆黨參白朮紅棗炙甘草重劑三劑乃愈是陰寒證也陰盛氣降故交午病作此悲哭不屬於臟燥者本身的陰陽隨大氣的陰陽而病發也甘麥大棗補中氣潤臟燥之藥又有一種怪病病人未出屋而知屋外之事如有客來尚未抵戶亦未發現聲音病人在屋內曰某客來矣此為痰病痰去則愈此種怪病無理可求惟逐痰也溫經湯證治推論的意義後世治婦人病統以四物湯為王當歸川芎白芍地黃謂男子以氣為王女子以血為王不問內傷百病皆用四物湯加減即外感各病亦用四物湯加減名六物四合湯無一點理法一人倡之衆人和之誤人多矣不知人是五行六氣圓運動的大氣生的不論男女所有生理病理醫理總不外五行六氣圓運動所以溫經湯治婦女病證甚多仍不外五行六氣的圓運動本溫經湯之法活潑變通治婦人病應用無窮曾見一老醫治一五月孕婦神倦不思食處以四物湯加小茴香一劑而胎墮遂成訟醫會處理謂婦人病用四物並無不合不知無論何人總以中氣為主中氣者脾胃之氣也懷孕五月食減神倦中土虛也中氣不能統攝四維胎已不固四物湯滋潤之品最助濕敗土小茴香性極辛竄土敗矣又濕潤之中虛矣又竄動之所以一服而胎墮也此病應照溫經湯加減參朮苓草以補其中土桂芍芎歸以調水氣下寒者少加艾葉以溫下焦自能飲食增加胎氣日旺婦人之病雖較多經産一門仍無形六氣的圓運動世乃有以專門婦科稱者豈婦人另有專門之五行六氣乎溫經湯加減治婦人諸病極妥婦人産後發熱不退黑豆二兩每日煮湯服之數服即效服至熱退為止特效方也滋補肝腎的好處也溫經湯乾薑吳萸左遲脈虛少者慎用産後食生化湯誤人不少産後血去津傷最忌黃耆乾薑産後須自己恢復惟腹痛為有瘀血宜五靈脂五分吞服以化瘀血如仍痛者再吞服五分即愈益母草化瘀血太散不可用如無五靈脂不能不用益母草者不可過一錢煎服山西産後食小米粥只三指一撮將産婦身體餓傷極宜改良最好是頭一頓食大米粥不可稀小米性熱大補産後慎之三指一撮未免過於慎了兩廣産後食雞湯加燒酒生薑甚好平日左關遲脈細弱者仍不可食左關尺少為陰虛陰虛忌雞因雞助肝熱也肝熱者膽必寒雞加生薑燒酒薑酒能將肝之木熱運動歸於膽經熟能成圓肝即不熱所以薑酒雞為産後妙菜品著者尺脈少食雞即肝熱食薑酒雞即舒服桂枝湯麻黃湯桂枝麻黃各半湯證治推論的意義桂枝湯為治外感受風而病疏泄的大法麻黃湯為治外感受寒而病收斂的大法桂麻各半湯為治風寒兩感的大法麻黃其性疏泄專通收斂桂枝之芍藥其性收斂專平疏泄芍藥的作用是向內的不是向外的鄉村無醫藥之處遇外感發熱之病用酸菜湯碗兌水半碗無鹽者加鹽少許煮開熱服立刻汗出而愈春夏溫熱病發熱不退者服之立效酸的作用亦是向內的也但是一層無醫藥的鄉村方能有這合於古聖人遺教的成績若是有醫藥的鄉村乃至於有明醫有儒醫的都會則不惟無此成績且更以酸菜湯治時氣發熱為戒謂酸味之物有收斂作用時氣發熱而服酸菜湯豈不將時氣溫熱斂在腹內燒心爛肺而死因傷寒的卷首有王叔和妄加的序列王叔和所説的意義是冬有傷寒登時病作就要食麻黃湯這就是傷寒病若冬月傷寒登時不病寒毒藏於肌膚不知不覺安然無恙三個月後寒毒變為溫毒發起熱來這就是溫病大家將王叔和的話不管是與不是不加思想緊記在心以為春天發的時氣病既是冬天藏在體內的寒毒變成的溫毒當然不可食酸收之藥了明醫儒醫如徐靈胎與著溫病條辨的吳鞠通著溫熱經緯的王孟英著時病論的雷少逸著世補齊的陸九芝諸前輩先生無不尊重王叔和於理不合於事絶無之言所以全國一致流毒至今鄉村治外感惡寒用蔥薑鹽豉而愈蔥薑疏泄鹽豉養中而兼宣通亦合麻黃湯用麻黃之疏泄以開衛氣之閉斂的意義鄉村治外感發熱又惡寒者食香油酸辣麵湯酸以斂榮衛之疏泄辣椒以泄衛氣之閉斂面以補中香油以潤津液立刻汗出而解此又合於桂麻各半湯之原理也生薑傷肺外感莫用可多用蔥豉較為穩當自來注桂枝湯證皆曰風中肌腠用桂枝湯以解肌注麻黃湯證皆曰寒傷皮毛用麻黃湯以散寒桂枝的芍藥其性收斂下降既是肌腠有風芍藥不將肌腠的風愈加收斂出不來乎寒在皮毛如何會發熱惡寒又如何會骨節疼痛乎此兩方皆發汗之方麻黃性散服後汗出病解芍藥性斂又何以服後亦能汗出病解乎仲聖傷寒雜病論為中醫內外疾病方藥的祖本桂枝湯麻黃湯又為起首之方吾人讀諸前輩的大注起首一方便引人墮入五里霧中不知原理之害也桂枝湯為治外感的第一方小建中湯即是桂枝湯加重芍藥加飴糖為治虛勞的第一方一治外感一治內傷病證各殊方藥則同吾人於病殊藥同之中找出認定尋出著落然後能入仲聖之門然後能知圓運動的古中醫學一個原則支配一切分則的所以然大承氣湯核桃承氣湯四逆湯附子湯烏梅丸證治推論的意義整個的傷寒論曰表病曰裏病曰經病表曰榮衛裏曰臟腑經曰少陽之經臟乃脾臟腎臟肝臟腑乃胃腑與膀胱腑胃腑之病最多膀胱腑之病最少六氣圖三陽與三陰平列傷寒論整個病證實是三陰臟與陽明胃腑平列因少陽膽為經病而無腑病太陽膀胱腑病有兩證膀胱腑熱必胃腑熱故膀胱腑病可以附屬於陽明胃腑病傷寒一書如內容六瓣之一橘榮衛加橘皮三陰臟三陽腑如橘瓣將此比喻整個認識之後再由六瓣之中認為陽明胃腑病與三陰臟病相對將太陽膀胱腑病用於陽明胃腑病另將少陽經病劃出三陽腑病之外於是表則榮病熱衛病寒裏則腑病熱臟病寒少陽之經病半熱半寒的傷寒論的原則了然全書證治皆有系統矣腑病陽熱大黃清熱救陰為主藥臟病陰寒以附子溫寒救陽為主藥太陰之四逆湯乾薑炙草乃為太陰之主藥附子則太陰之母氣藥厥陰烏梅丸烏梅乃為厥陰之主藥附子則厥陰之母氣藥少陰之附子湯附子乃為少陰之主藥少陰之腎臟主藏津液乾薑燥烈傷津如少陰病未發現下利時乾薑慎用下利乃太陰脾寒之故肝腎病的藥皆不喜薑草壅留於中之故母氣者水中之火為土氣之根火生土也三陰臟病人死最速因陰盛滅陽陽亡甚速故也自王叔和將傷寒原文次序編定錯亂之後世人對於傷寒論整個陽腑陰臟病熱病寒的原理得不著根本的認識於是以訛傳訛遂相傳為傳經為熱直中為寒之種種謬説直中云者風寒直中人身陰臟而成病也按四逆湯附子湯烏梅丸藥性尋求乃人身陰臟自己陰盛病寒絶非風寒直中病寒也至於傳經二字更非明白辨正不能解決自古傳統之訛已於傷寒論原文讀法篇辨正之矣陰臟病寒的所以然古方上篇已説清楚所宜注意者不可誤信直中為寒四字耳中醫難學的所以然一在五行的大氣無顯明的説法一在傷寒論的原文弄不清楚再加上傳經為熱直中為寒的謬説大家相習不察王叔和又於傷寒論卷首妄加序例以亂之謂中醫學自古主今尚未成立亦無不可烏梅丸治蟲之理尤不可忽蟲乃木氣木氣失和然後生蟲不和者水寒於下土濕於中而木氣動也故椒附細辛以溫水寒連柏以清心火熱乾薑黨參以補土虛烏梅當歸桂枝補木氣而息風木氣復和蟲乃不動凡病吐蟲吐後則腹之右部即覺空虛者肝陽耗傷之象蟲即肝陽也治蟲烏梅丸和木氣外金匱則有甘草粉蜜湯其證吐涎心痛如咬發作有時故用鉛粉殺蟲然必用甘草蜂蜜以保中氣然後蟲去而人不傷蟲證有虛實之分烏梅丸治虛證粉蜜湯治實證實者有宜去之蟲也後世見蟲就殺竟有將人殺死而不悟其失者矣殺蟲宜於秋冬之間肝陽足也春夏不可殺蟲太陰之利寒熱皆有寒症不渴熱症則渴寒宜理中丸一面溫寒一面除濕培土熱宜豬苓湯一面除濕一面養津清熱寒熱皆兼腹滿寒之滿為土氣不能運化熱之滿為木氣之熱凝於濕中太陰病熱乃木氣之熱也陰寒證都不大渴惟少陰寒證有渴者以腎主津液津液傷則渴也然渴的程度只小渴耳較白虎加人參之渴不及多矣應用附子之證不得因渴不用附子服附子後反不渴是其明驗厥陰病舌卷囊縮寒證熱證都有寒則收引內聚熱則煎灼傷陰故皆有之心竅於舌手厥陰心包主之故肝臟病則舌卷囊屬肝木肝臟病則囊縮厥陰之氣上熱下寒故也大小柴胡湯證治推論的意義大柴胡湯證嘔而下利胸痞與太陰吐而不利胸痞明辨於下吐而下利又加心痞乃太陰寒證太陰之吐利不發熱不出汗胸痞不硬今一面下利又胸硬又出汗發熱乃少陽之熱利利出而兼嘔乃少陽之熱嘔嘔無物有聲而聲大吐有物無聲於少陽熱嘔之中加心痞而又硬乃少陽經逆塞心下非寒痞也於發熱出汗嘔而痞硬之中加以下利此熱利非寒利也曰少陽經病必有口苦耳聾肋痛諸證太陰臟病無有口苦耳聾肋痛諸證寒利下如注利時無屁糞為灰色一滑即下一瀉之後精神立刻短少熱利有屁利如噴出糞為稀水多有黃色稀水之中必難硬粒停而又下不覺其滑其射皆遠瀉後精神不衰反覺鬆快寒利色灰舌無苔而口淡熱利舌有黃苔而口苦陰陽不同虛實各判也陽腑陰臟腑病陽熱臟病陰寒一定之理少陽居三陽之一卻無腑病者少陽膽腑附肝臟而生入胃腑而下居其他臟腑之間陽盛則胃腑病熱陰盛則肝臟病寒故膽腑本身無有本病只有經病經病現時必項強已罷繼以口苦等證也一部傷寒論如內容六瓣之一橘表病宜汗法裏病宜下法宜溫法少陽經病不可汗不可下不可溫柴胡湯之柴胡卻有汗意黃芩卻有下意大棗生薑黨參卻有溫意所以能和解也少陽經病不可汗者汗所以通表氣少陽膽經秉氣水火居表裏之間汗傷水火津液必乾燥生煩而成壞病也不可溫者溫所以扶臟氣之陽膽經水火正鬱熱藥必助其逆升而不能降也不可下者少陽相火一病上熱不降中土失根下之必傷中敗土至於危亡也惟有和之一法不損其本來之氣調和其升降之鬱故病愈也表裏之間有少陽經少陽經之內是臟腑少陽經之外是榮衛故少陽解決整個表裏方能分清然必整個的表裏認識半表半裏的少陽經方能認識耳大柴胡湯是一面和解少陽經一面下陽明胃腑之熱之法小柴胡湯是傷寒的少陽經病之方後人每於老人之寒熱口苦亦率用之不知柴胡性升而散傷人可畏小柴胡湯柴胡係升手少陽三焦經相火下陷與黃芩降足少陽膽經相火上逆是整個的作用而又非參草薑棗溫補中氣不能成柴芩升降之功非少陽經病不可用也老人寒熱口苦此寒熱乃腎氣虛中氣敗而榮衛分散之寒熱口苦亦中虛上逆之苦萬不可用寒涼去火應服腎氣丸豬腰湯小刺遼海參溫補腎氣腎氣與中氣恢復榮衛有根仍然能作圓的運動膽經仍然下降寒熱口苦自止倘服小柴胡湯升散寒涼下咽即死再推論桂枝湯麻黃湯的意義外感病分兩大原則收斂與疏泄是也惡寒無汗脈緊為收斂為病發熱汗出脈不緊為疏泄為病收斂為病用麻黃湯之法疏泄為病用桂枝湯之法麻黃湯發散本身衛氣之法非散寒也桂枝湯補益本身中氣降膽經以調榮衛之法非散風也本書脈法篇有病外感風寒惡寒發熱而脈細用生地當歸等填補陰液之藥汗出感愈者有病外感風寒惡寒發熱而脈微用溫補腎氣之藥汗出感愈者時病篇有病外感風寒惡寒發熱而脈虛服補中益氣丸而愈者八珍丸而愈者裏氣和則榮衛和榮衛和則寒熱罷也若果外感風寒是風寒入了人身為病豈有將風寒補住病反能愈之理他如外感於暑脈虛惡寒發熱欲吐以扁豆藿香為主藥扁豆乃補胃之藥藿香乃降胃土之氣之藥若果是外來暑氣中入人身而用扁豆藿香將暑補於胃土之中降於胃氣之下此暑氣豈不深入胃中出不來乎暑者太陽直射地面的熱氣人身膽經與心包經相火之氣也宇宙的暑氣由地面之上降入地面之下則地面清涼萬物得根人身的暑氣由胃氣之上降入胃氣之下則肺氣清涼命門生火暑病者人身肺氣不能將人身心包經膽經的相火降入胃氣之下本身的暑氣停留於胸中與外來的暑氣接觸肺氣不降而相火停留故發熱欲嘔而成暑病藿香扁豆降之歸下故暑熱病得愈肺主皮毛皮毛主表暑熱傷肺氣牽連榮衛故暑熱病亦惡寒發熱也古人造字執火為熱日者為暑執主上升暑主下降所以稱少陰君火為熱火稱少陽相火為暑火人乃將暑字認為傷人的惡氣而不知暑乃天人的相火之氣萬物生命的根氣遂不治暑病以降之使下為主此自來不於事實上求原理之過也麻黃之法是調和本身榮衛之氣之法非散外來風寒之法藿香扁豆之法是溫降本身胃膽之氣之法非清外來暑氣之法外感風寒而用養陰補陽補中補腎補氣血之法是補益榮衛裏氣裏熱不偏虛表氣自調和亦治榮衛的裏氣之法非治風寒之法如應當補陰補陽補中補腎補氣血治愈的外感要食著外感散風寒的藥一定要死的裏氣已傷再食傷裏氣的藥焉得不死反之用補陰補陽補中補腎補氣血之藥以治應用麻黃湯法之外感也一定死的人身臟腑榮衛表裏一氣的圓運動是有層次有秩序的外感風寒傷了榮衛榮衛分離表裏的層次運動的秩序紊亂起來榮病疏泄氣機皆虛衛病收斂氣機皆實實而誤補實上加實亂上加亂焉得不死非麻黃湯證的外感脈不緊寒熱不甚也外感榮衛收斂惡寒之病只要惡寒不罷脈象緊而不舒未曾出汗或出汗未出徹底不論久暫始終須用麻黃之法以開衛氣使榮衛調和病始能愈與補陰補陽補中補氣血等調補以和表氣的治法是對的桂枝湯之法即補裏氣以和表氣之法內經曰夫虛者氣出也實者氣入也出入二字之意在一年説則立春後氣出立秋後氣入以外感説惡寒無汗為氣入發熱汗出為氣出惡寒無汗之麻黃法乃氣入為實之法桂枝湯法乃氣出為虛之法外感之病凡非惡寒無汗而是發熱汗出皆虛證非實證仲聖用桂枝湯以治外感用桂枝湯加重芍藥飴糖以治虛勞同是一方而為外感內傷之祖方氣出為虛之故也氣入為實之麻黃湯法須徹底認清但有惡寒身痛無汗脈象緊而不舒無論已發熱否總須發散衛閉重顧中氣為治此點徹底皆徹底矣注意溫病時病篇的烏梅白糖湯三豆飲麻疹之一豆飲乃桂枝湯用芍藥降膽經助收斂用草棗補中氣變化而來之法而善治不惡寒只惡熱一切外感蔥豉湯人參敗毒散一切用薄荷之方乃麻黃湯用麻黃以散衛氣助疏泄變化而來之法而善治惡寒之外感惟麻黃湯一證宜發散耳古方命名有名實不符之處如桂枝湯之桂枝本桂枝湯麻黃湯共用之藥麻黃湯之主藥係麻黃桂枝湯之主藥係芍藥名實不符所以後人解釋都不得要領當謂中醫書非醫學學好之後不能讀此之謂也傷寒病榮衛表病不經汗解則歸結於臟病陰寒腑病陽熱而死或歸結於少陽經津液乾而死溫病榮衛表病不經汗解則歸結於氣分病血分病腸胃病然皆熱而不寒虛而不實如不醫錯而死則陰分陽耗中氣減少轉成虛勞然後人死其他外感榮衛表病不經汗解則歸結於膽經與肺家或歸結於氣血歸結於膽經與肺家者榮分發熱作用司於膽木衛分惡寒作用司於肺金膽木橫逆則成虛勞肺經不降則成咳嗽歸結於氣血者榮衛不和氣血不通亦成虛勞若不咳嗽則身體羸弱久不復元亦不致死若加咳嗽則成瘵勞而死古方上篇前六方為初學基礎後十方為初學進一步基礎由內傷而知外感原理由傷寒而知溫病及一切外感原理也發熱惡寒乃榮衛之事有出於榮衛者有出於脾胃者有出於腎家者有出於膽經者有出於肺家者出於榮衛者榮衛自現本氣榮鬱則發熱衛鬱則惡寒也出於脾胃者脾為諸陰之本胃為諸陽之本脾胃為飲食所滯脾滯則現陰寒胃滯則現陽熱或脾胃將敗則脾胃分離亦現寒熱也出於腎家者寒乃水氣熱乃火氣腎氣敗而現水火本性也出於膽經者膽經居陽腑陰臟之間病則兼現陰陽之性也出於肺家者肺主皮毛皮毛主一身之表肺氣陽則牽連榮衛表氣而發熱惡寒也肺家之發熱惡寒時止時作不似榮衛外感之發熱惡寒無休止五種發熱惡寒惟寒脈緊無汗身痛項強之麻黃湯證為氣入則實之證應用發散之藥此外皆氣出則虛之證宜養中氣降膽經補陰補陽補中補腎補氣血為治矣惟兼有惡寒之證者宜加少許發散之藥如溫病篇之烏梅湯三豆飲加薄荷之法是也世謂外感不可用補藥太早恐將風寒補在身內其實是將衛氣的收斂作用補住耳凡病外感而日久不愈皆非風寒未清皆衛氣未曾散通之故只須切實認明麻黃是開散衛氣之收斂並非散開外來的風寒風寒傷了榮衛自病風寒並未入了人身便掃除了一切邪説而得外感病的原理此點明白溫病疹病一切感病的理都明白再推論承氣湯四逆湯得意義四逆湯加乾薑名通脈四逆湯治少陰病下利清穀裏寒外熱手足厥冷脈微欲絶者下利清穀肢冷此四逆湯證而脈微則屬通脈四逆湯證緣人身氣脈起於中氣中氣虛寒故脈微欲絶故於四逆湯加重乾薑大溫中氣以通脈加乾薑不加附子此四逆湯更重溫中之法若並加附子使脈暴出必致不救何也附子重用能引腎陽外散也通脈四逆湯加豬膽汁名通脈四逆加豬膽汁湯治寒霍亂吐下已止汗出而厥肢急脈微欲絶者吐下雖止而四肢厥冷拘急內寒也又加汗出脈微陽降脫矣通脈四逆湯加豬膽汁以收汗之陽由胃降入腎家也用膽汁之寒潤於薑附之中使將脫之陽仍降入腎而薑附得膽汁之寒潤化合剛變為柔陽入於陰學用薑附宜細玩之承氣湯為寒下之方一人病停食發熱日久未愈腸部痛不喜按形容枯瘦二便照常舌伸不能出口以指按舌心有乾黑苔一塊一醫擬調胃承氣湯炙甘草三錢大黃四錢芒硝四錢一醫謂脈弦少胃氣且右關尺部甚空擬四逆湯加大黃薑附草黃各一錢一劑痛減再劑脈和舌轉三劑改用炙甘草一錢檳榔五分而愈此病如服承氣必一下而脫本是下證卻用四逆湯以輔助大黃與四逆加豬膽汁湯本是寒證卻用豬膽汁以輔助薑附此圓運動的中醫學整個妙旨初學最宜注意者也脈法篇脈法篇導言當謂讀書不易治病不難書只言理病則憑脈理是活動的脈是實在的唯其是實在的可以再三審查反復推求以得著實在之解決所以去治病不難也而人往往得不著實在的解決者學脈的方法不善也學脈之法一曰脈位一曰指法一曰脈象一曰脈理明白脈位與指法然後能捐除自的成見看清脈來的真象脈象脈理必須於普通學法之中有系統以貫之然後無繁難之苦然後有運用之藥此篇脈支較善之法也編者枯潤二脈枯潤二脈者用藥之提綱枯脈宜養陰潤脈莫傷陽潤者津液充足枯者津液乾澀潤脈無論何病慎用涼潤藥枯脈無論何病忌用熱燥藥認明枯潤二脈處方用藥便少錯誤微弱二脈微脈潤而少輕有重按無總屬陽氣微溫補宜急圖弱脈枯而少輕無重按有總屬陰液枯清潤法當守此二脈脈體皆少一者宜補氣補陽一者補液補陰最易含糊須以輕按重按之間尋出證據以為用藥之本病人的體質不是陰虛便是陽虛故診脈先以枯潤微弱分別陰虛陽虛便有把握也微弱二字自來概屬虛脈之稱而以陰虛陽虛置之不辨遺誤後學不少故以脈法起首鄭重言之傷寒論少陰病脈微細用附子營衛病脈弱而渴用石膏是也枯潤二脈別陰虛陽虛弱微二脈辨別陰虛陽虛又須審查兩尺左尺較右尺少為水虛右尺較左尺少為火虛據兩尺為判斷之中判斷用藥更少誤差總之脈法的陰虛陽虛認識無差然後能識一切疾病之陰虛陽虛然後能判斷一切醫書所説疾病之陰虛陽虛此要決也虛實二脈實脈中沉盛滿指成分厚久按總有力攻下須研究此為陽實氣實熱實胃家實可用攻下之實脈脈之成分厚而不薄滿指有力中沉兩部久按不衰此為完全的實脈所謂完全實脈中土實則全體皆實也攻下胃實不可冒味須有法度應當研究詳古方上篇大承氣湯中此外則伏而有力脈細有力軟而有力滑而有力亦有實意但只腠理熱實只宜清潤疏通之法無有下法完全實脈脈來遲緩因中土實則熱實熱實則脈來不數也病有名五實證者脈完全實而不食不大便不小便不出汗須攻下與發汗並施此證少有凡診實脈須兼腹診以手按大腸部位病人拒不受按此腸中有當下之燥屎此脈有小而實者如兼現虛證當用補氣補血之藥輔助下藥緩緩下之如溫病篇之黃龍湯法是也虛脈松而大氣血與陽虛陰虛液虛者脈與松大殊松有成分不足向外發散之象大而松為氣虛血虛陽虛乃對上項厚而有力之實脈而言其實除厚而有力之實脈外多是虛脈不止松大為虛大而松之虛直接補之虛也其他之虛脈體微小亦有松意多有不能直接用補必須全體的圓運動得圓然後不虛陰液之虛脈則或弦或細或澀或弱或沉或結或代也血虛乃血中之溫氣虛鬆緊二脈松脈即虛脈虛鬆氣不充諸病宜急補補氣與補中脈法諸書只有虛實而無松脈虛乃其名松乃其實松乃外散之脈成分不夠之脈也補氣補虛則歸根而不外散緊脈與松脈反內聚不舒象轉繩彈人手寒實之現狀緊脈有細小之象轉繩者向內收緊也寒性收斂故脈緊食停則氣聚於食故脈緊氣血不調或熱聚而不散而成一部之積聚亦有緊者積聚在於何部緊則現於何部皆宜溫散清散通散之藥寒性之收斂衛氣之收斂也古書云左脈緊傷於寒右脈緊傷於食不儘然外感之脈若迫促不舒其中即有衛氣收斂之緊意滑澀二脈滑脈有二象鼎沸與盤珠鼎沸躁熱病盤珠津液多燥熱傷津如鼎鍋之水被火煎熬沸騰故脈滑津液滋多往來流利如珠走盤故脈滑痰病脈亦滑痰亦津液也新婚有孕脈亦滑津液增多也鼎沸之滑重按有力有孕之脈脈氣充足痰病之滑脈氣不足澀脈有兩儀血少與陽虛血少澀在左陽虛澀右居澀如刀刮竹亦如雨點沙血少津枯故脈澀陽虛脈澀者津液生於陽氣也榮衛不足脈亦現澀榮衛調和充足然後津液生也血少津枯之澀者薄而有力陽虛之澀薄而微也榮衛不足之澀薄而無神也左屬水木故血虛則澀應於左右屬火土故陽虛則澀應於右榮衛不和不足必左右皆澀弦緩二脈弦脈收斂病氣機不舒展治弦須養中用藥忌收斂疏泄暢通則氣機舒展疏泄不通則氣收聚弦者如弓之弦向內收聚之象木主疏泄木氣本身稚弱不能疏匯則脈弦金氣燥結木氣因而不疏則脈弦弦乃木氣之鬱象木氣稚弱之弦宜溫養木氣金氣燥結之弦宜清潤金氣之燥開散金氣之結然後木氣之鬱舒開脈乃自去唯既現弦象木氣愈鬱而欲疏泄則克中土中氣受傷不能運化四維病即關係生死故又須於疏展木氣之中兼扶中土五行之氣鬱則克其所勝而悔其所不勝此自然之勢也金匱見肝之病當先實脾其意指此也弦即為寒木氣陽弱也弦則為飲木氣不能疏泄水分也弦則為痛木鬱衝擊也弦則為風木病風而脈弦則病重矣中氣敗故病重也弦脈多胃氣脈少故也治弦脈忌用收斂藥慎用剛燥藥寒病之弦脈弦溫能則弦化則弦脈易治之病此外之弦脈皆不易治寒病之弦飲病之弦弦大而虛潤而不枯風病之弦不潤而細陰虛津枯之脈弦宜養津清熱內傷之脈弦宜補中土兼治木氣弦乃能去緩脈虛而散散慢不收斂中虛衛氣虛疏泄自出汗緩與弦為對待之象忌疏泄藥喜收斂藥傷寒論桂枝湯證發熱汗出脈緩即是此脈中氣與衛氣不足故也散字讀閃言鬆散非分散也此緩脈非和緩無病之緩非熱實而脈反遲緩不數之緩是緩脈有虛實之分也濡細二脈濡脈為濕盛細脈為津傷濕熱脈亦濡細亦主無陽濡脈如棉在水中細脈如蛛牽細濡而似緩有濕熱細而無力為陽虛津傷之細細而有力津傷則生熱故細而有力細而有力著骨則為積聚濡中藏細則濕傷津液故濡溢於外細現於內故濕用利水藥有不效者利水藥傷津液之故善治濕者養金氣之收斂調木氣之疏泄扶土氣之運化溫乃自去津液不傷大小二脈脈大氣離機脈小氣歸裏脈大病漸增脈小漸自已冬季脈大最忌胃熱實則脈大而有力中部沉部盛於浮部此大脈為實否則愈大愈虛脈小則氣歸於裏有病而脈由大轉小乃將愈之象此小脈非微脈非細脈陰虛亦有大脈者浮大而不潤澤重按迫迫奪指有燥動之象陽虛亦有脈大者大而虛松指下潤澤重按無有對膈研究參與外證容易明白脈有重按起指脈即浮起寸多尺少浮多沉少夜半不安此為陰虛陰之封藏夜半陽動陰虛不藏故脈現如此狀態也芤革軟硬四脈芤熱陰傷極革脈屬陽虛硬脈寒之象軟脈熱在中芤革二脈皆中空芤則浮而邊虛有柔松之意為熱傷陰之象革則沉而邊實有石硬之意為寒傷陽之象失血則芤失精則革硬脈有牢堅之意陽和之氣少也軟脈似濡而厚按之欲沉不沉而有力乃內熱之實脈不可認為軟弱之軟世以軟弱並稱軟脈遂為人所忽唉軟弱之軟則微脈也實熱之軟則如膠黏而有力舉指不移硬脈則脈之沉部硬而牢堅重按有力陰寒之象外證必無燥熱之事沉部硬部必寬厚不細而鼓指有力軟脈有力為熱硬脈有力為寒浮沉遲數四脈浮脈隨手起總是虛之徵諸病忌升散中下復其根以指按至沉部隨指而起即往上浮是為浮脈並非浮中沉三部浮部有脈中部沉部無脈浮而向外中氣虛也浮而脈上其虛更盛浮弦鼓指則兼肝風外感脈浮只宜降藥兼補中氣內傷脈浮必重補中內傷脈浮中部以上多中部以下少也外感之脈必有束迫不舒之象不必定見浮脈外感之家必定有忽然惡寒發熱頭痛為據如麻黃湯證之脈當有惡寒脈沉及至脈由沉而浮時即發熱而汗出唉沉脈在肉下虛實易了然沉實為實熱沉微屬虛寒如沉細無力亦屬虛寒沉細有力亦屬實熱實則不通分整個實和腠理經絡的實整個的實如傷寒論承氣湯證攻下之胃家實是腠理經絡的實如沉細有力弦緊鼓指只宜滋潤疏通理氣活血為治遲脈乃虛寒裏陽太少時無病脈遲者元氣難久持不及五至為遲胃家熱實脈反遲緩不數故遲脈亦有實熱者實熱之遲緩厚而有力虛遲之遲脈來虛微以證判之極度易明瞭無病脈遲則腎家無氣將難久存矣數脈乃中虛虛甚則數甚數亦為虛熱兼細則陰病中虛則數世人所忽河圖之數五數居中而統四維故平人之脈以醫生一呼一吸脈來五至為準中虛不能統乎四維故脈來過乎五至而成數脈熱傷津液脈來亦數數而兼細則中虛而津液亦虧陰分受傷為難治矣發熱而脈沉不數多實發熱脈動數必虛此脈必中部以下較微少也如沉而微其虛更甚數極度之脈中氣大虛之脈也涼藥傷中下咽即危用甘味補中中氣回復膽經相火下降熱即退下而不數此與熱實而脈反遲緩為對待的理法數讀索世人卻認數脈為熱殺人不少經文氣虛脈乃數也句宜注意結促動代四脈結促與代脈脈來停一至動脈如豆動只見關中位脈動現數象停止一至為促外感風寒榮衛迫促促乃表鬱之脈脈不現數象而停一止為結結乃津液不足不能流通之脈代脈之止有定數亦津液損之脈也長夏脈代有孕脈代為中氣加多之脈中氣能代四維也亦有秉賦代者乃富貴之人也若病重脈代則危此代脈無神乃中斷不能連續之脈長夏之代有孕之代多在五至以內脈神特別充足五為中氣中氣之中原有四維故也詳生命宇宙篇河圖中動脈有如豆動無頭無尾只於關脈見之氣機不舒主內痛也洪伏二脈洪脈向外掀中氣大虛證愈洪中愈虛兼弦乃別論實脈必向內沉世謂洪而有力為實認錯矣雖有力亦向外之力耳向外則內虛必矣必洪而兼弦乃為實象弦乃內聚之象洪而兼弦是原有內熱被衛氣斂之熱鬱則脈洪熱鬱被斂不能通達則洪而兼弦在外感宜舒散衛閉兼清內熱內傷病少洪弦者有之亦內熱為衛氣所閉仍舒衛閉兼清內熱洪大無力者全屬於虛洪而弦大有力乃為實象然實脈不洪必如胃家實可用下藥乃為真實洪而兼弦有力乃實在腠理不在胃腑舒散衛閉腠理一通即不實矣伏脈氣內實深藏骨際間熱深與痰閉指下細心探伏與洪是對待之象氣雖內實熱清痰豁之後脈起不伏即不實矣躁駛二脈躁脈不安定外因與內因駛脈上下竄虛與熱之徵有內熱而感外寒熱為衛氣閉束動不能通則躁急不寧此因於外感者宜散衛清熱溫病之脈躁急乃木火離根此因於內傷者宜照溫病證治法駛脈因虛因熱如小寒前後小兒幼童忽不思食或咽痛或咳嗽遲脈中有一線上竄入關脈此腎虛陽動宜溫養腎家如肝膽有熱肺虛不能收降關脈中有一線竄出人寸脈宜補中斂肺兼降膽經如尺脈中有如珠的一點竄入尺下此腎敗也最難治男童早婚有此脈者多死平人脈欲知病人脈先學平人脈調勻柔和者乃是平脈訣平人脈亦稱胃氣脈亦稱和緩脈來去調勻不來多去少不來盛去衰神氣充足體質柔潤所有以上各病脈尋找不出一字此胃氣健旺和緩無病之平人脈也內經脈法以胃氣為主胃氣多病脈少者易愈胃氣少病脈多者病重病脈太多胃氣太少者易死學平人脈可常診視無病而身體健全元氣未泄面無浮紅食量極度好體力甚大跑步而脈不加快不喘氣之人之脈便可得著胃氣脈和緩的認識然後可學病脈胃氣脈者中氣脈也真臟脈五行運動圓見圓不見真一見五行真胃氣無毫分心火的真臟脈如鉤如上挂之鉤有上無下之象只有浮而不降也肺金的真臟脈如毛薄澀之象將散而不收也肝木的真臟脈如弦如新張弓弦徑疾如循刀刃毫無生意之象欲疏泄而不能也腎水的真臟脈如石如石沉水底毫無陽和之象只沉而不升也此皆中氣無存不能調和四象四象各現本氣之真也故稱真臟脾土的真臟脈為緩有如屋漏時而一落遲緩不能連續之象中氣不能自存也五行之真已現中氣先亡故曰死脈也如鉤如弦如石如緩則各脈皆鉤皆毛皆弦皆石皆緩一氣獨勝諸氣敗亡故死也指法與脈位自來診脈兩手分診圓運動學的診脈必須兩手合診因整個圓運動的消息須兩手合診則比較上去審察方能審察得出又須三指斜下次指按在寸脈的浮部中指按在關脈的中部名指按在尺脈的沉部沉部在骨中部在肉浮部在皮斜下者中指比次指重名指比中指重即難經所謂三菽之重六菽之重九菽之重是也是為三部診法若三指不分輕重便不合寸關尺三部脈的本位三部之法之中又有九候之法三部九候者一部三候三部九候寸脈本位在浮部浮部有浮部的浮中沉關部本位在中部中部有中部的浮中沉尺脈本位在沉部沉部有沉部的浮中沉三部九候的診法只須三指斜下三指同時由輕按而重按由重按而中按而輕按由輕按而再輕按便將寸關尺三部九候的整個手法得著三部九候的指法是按寸關尺皮肉骨的地位不是按脈的整個體是下指診察的方法方法與地們徹底了然後診脈看脈在此地位中的動動惡如何方能審察出脈的真相下指診脈不可將指頭死按脈上就如用眼睛看物卻把眼睛珠放在物上如何能將所看之物看得明白三部九候的指法無差便能免卻此弊診脈動稱為看脈不如將看字改為聽字能將聽字的意義體會有得則診脈必有聰明過人之處聽字比看字靜得多活潑得多看是我去看他聽是聽他來告我必能聽而後得整個認識也三部九候的候字候者等候之意我的指頭只在九外字的地位上審察地位等候脈來告我候字聽字的意義大醫的妙用全在於此先將指頭審察九個字地位以候脈來指頭與脈見面之後仍不聽脈仍只審察九個字地位有意無意之中聽出脈的病點來然後繼續搜求由合聽而分聽由分聽而合聽整個脈體即是整個人身的河圖由合以求分便知病之所在由分以求合便得處方的結果總而言之不可由我去找脈須候脈來告我我去找脈我便有成見了就得不著脈的真相了診脈先分別脈的大體診脈須先定六脈的整個大體切不可先注意關脈怎樣寸脈怎樣尺脈怎樣先診整個大體診出大體是陽虛是陰虛陽虛者脈氣潤陰虛者脈氣枯潤者無論何病慎用陰寒藥枯者無論何病忌用陽燥藥又要診出虛的程度如何方能決斷用藥處方定藥要在指頭未離開脈時決斷定藥要在指頭未離脈時研究清楚如診脈放手再來定藥即不準確在脈上定方即在脈上審察所用的藥與脈的輕重審察再三心中安了放手即提筆寫方寫完之後再寫醫案然後可同別人説話萬不可先寫醫案後寫藥方寫完醫案再寫藥立方所寫之藥必不全合所診之脈矣擬方定藥要在指未離脈之時如認為中氣虛寒擬用理中湯是必脈未松微潤而不枯倘肝膽脈比較細則乾薑傷津細澀乃津傷之脈須加少許芍藥當歸以潤肝膽津液如脈來松微證現虛寒當用理中補虛溫寒而左尺比較短少左尺屬水是水氣不足當加熟地麥冬以補左尺水氣理中湯乃不發生燥熱傷津之過如麥門冬湯治中虛肺燥其脈必澀倘澀而兼細則去半夏半夏傷津細澀之脈最忌如小建中湯治虛勞以芍藥降膽經收相火為主須右脈關寸之間脈氣較他脈為盛乃受得芍藥之苦寒倘右脈動關寸之間脈氣不盛膽腎之熱不足當減輕芍藥或不減輕芍藥加冰糖白糖以和芍藥之苦免傷膽胃之陽如腎氣丸治腎氣不足須看左尺右尺比較之多少左多右少為火虛附桂宜稍加重右多左少為水虛附桂即宜輕用如當歸生薑羊肉湯治肝經虛寒倘肺脈虛弱生薑只宜少許肺主收斂生薑辛散傷肺也如瀉心湯治心火不降吐血衄血倘脈來不實便不可用也如診治傷寒麻黃湯證問證無差是麻黃湯證也當用麻黃多少當以寸脈尺脈而定寸脈弱尺脈少只宜輕劑麻黃便可出汗寸脈弱肺家收斂力少尺脈少腎家津液不足也倘麻黃分量與脈不稱則服後汗多諸禍作矣如診治桂枝湯證問證無差是桂枝湯證也而脈氣虛軟芍藥寒中宜多用炙甘草以扶中氣以減去脈之虛軟則芍藥乃能免寒中之弊如診治普通外感用薄荷以調衛氣用黃豆以和榮氣薄荷散性甚大倘脈氣無弦緊之象不可多用多則辛散傷肺更加發熱如診腸胃熱滯擬用大黃以消熱滯倘脈象重按不實便不可用如其不能不用必須用朮草以輔之乃不發生下傷中氣之禍如診吐血之虛熱證飲食甚少陰液又傷擬用補土養液之藥補土之藥必傷陰液養液之藥必傷土氣必須詳審脈象脈象潤數朮草不可並用或術草均不可用則用山藥扁豆以代術用白糖以代草細脈最忌辛散當歸不宜只宜阿膠虛熱吐血肺脈如細更須保肺橘皮下氣亦能傷肺半夏更不敢當如診治腹瀉腹瀉因於食滯熱滯者多因於陰寒陽敗者少兩下診治錯誤關係生死甚速認為陰寒脈必微少無神瀉後氣衰稀糞下注不射不食乃可用薑附以溫寒回陽食滯熱滯脈必緊細有神瀉後氣不衰糞粒兼水射遠能食乃可用神麯穀芽以消食梔子黃芩以清熱脈雖緊細若右脈較左脈無力消食預防傷中清熱預防敗火前人有云左脈緊傷於寒右脈緊傷於食其實傷食不必緊在右脈傷寒也不必緊在左脈如診陰寒夾暑其人不食不大便不小便但欲寐不能寐口渴而苦舌無苔六脈洪大異常沉按虛空而關脈洪大中藏有弦細之象洪大虛空陰寒之脈口苦而關脈內藏弦細是乃暑脈方用重劑四逆湯以回陽兌入冬瓜蒸自然汗以清暑也無冬瓜汁麥冬二三錢亦可如診得婦女經停脈象平和尋求結果在左關得看病象左脈較他脈多些此木氣不調也用桂枝湯一劑左脈多處平了僅食飯加增再診則左尺較他脈少此備熱液少也桂枝湯加生地以補左尺一劑左尺脈起經來如常王夢英醫案載一人病外感寒熱身痛夢英診之脈弦細異常夢英曰陰虛極度矣未可治外感用重劑熟地當歸等補陰之藥而愈外感風寒而用熟地補陰之藥豈不將風寒補住不知榮衛乃人身表氣之陰陽表氣之陰陽根於裏氣之陰陽裏氣之陰陽偏多偏少表氣之榮衛即不能調和而成圓運動外感風寒而榮衛病乃榮衛因風寒之傷而榮衛自病並非風寒入了人身為病此病脈象弦細異常陰液偏少即不外感榮衛早已失和再遇外感失和更甚所以熟地等藥補起陰液以興陽氣調歸於平裏氣這陰陽既調表氣之陰陽亦調陰陽調而榮衛和所以外感愈也王氏謂未可治外感正所以治外感也王氏用此藥治此病乃由經驗而來於外感風寒並非風寒為病乃榮衛自病的原理尚不知道因王氏亦王叔和伏寒變溫之信徒故也醫家有舍證從脈不通之説毫無理由如此案醫家即謂第舍證從脈的治法可以見中醫不知原理自古已然一七十老人冬有外感惡寒重發熱輕脈動不緊而虛微服腎氣丸五錢半夜寒熱罷而體舒次早滿身微汗而愈傷寒論麻黃湯治惡寒脈緊緊者衛氣閉束之象故麻黃開衛氣之閉束為治惡寒定法今外感惡寒脈微微者陽虛之脈腎氣丸補起腎陽裏氣的陰陽平榮衛的陰陽自和所以病愈而行微汗如不補腎陽而用發散之劑必脫陽而亡此兩案在已知圓運動原則的醫家自必認為當然而不通醫家無不問之而咋舌學脈不可就脈猜病應問病求脈所問之病是外感求得之脈乃是內傷內傷治愈外感自愈外感病在榮衛果是裏氣不傷之榮衛表病脈必弦緊束迫不舒而現躁爭之象不現陰虧之弦細脈不現陰虧之微脈按疏泄收斂之法治之可也所以學醫要學具體的病乃能治抽象之病也明瞭傷寒論桂枝湯麻黃湯證脈的意義本書溫病烏梅湯三豆飲證脈的意義自能明瞭此兩案的意義桂麻二證與烏梅三豆之意義本氣自病的意義也一女科平日陰虛血虛脈象沉澀左尺尤弱平日有病皆服歸芍地黃丸補血而愈一日洗澡受寒身痛怕冷不能起床脈象沉澀尤甚豫歸芍地黃丸八錢吞下安臥並未出汗而愈明是外感受寒全從補血補陰施治而愈者因脈象沉澀故也若照外感治法而用發汗之品傷其血入陰分病必加重至於不起所以此病明是外感病愈汗出其惡寒自罷乃榮衛之和陰血已虛可作汗故不汗出而病愈也此病治效所憑者脈前人謂此等治法為舍證從脈動其實何曾舍證正因此證由於脈象純係血虛陰虛乃成此證也證由血虛陰虛而來故用補血補陰之藥病自能愈故用藥治病必以脈為主又一男科自稱男病復發口淡不食亦不飢小便黃如柏汁甚長大便燥結身倦無力診其脈全體細弱右尺較少豫附桂八味丸二錢茵陳蒿一錢吞服一日二服服後胃更滯更不欲食脈細轉和右尺亦起因以乾薑兩片嚼服辣味少苦味多辣味少者亦口淡之例下焦無火也苦味多者火虛於下而逆於上也用原方加乾薑少許同服食遂增加尿黃亦減脈更調和一劑之後去乾薑只用附桂地黃丸四錢茵陳蒿一錢一日分二次服數日全愈此病口淡不思食當然不宜地黃因脈細陰虛故仍用之右尺火虛故又用附桂黃病為濕尿長非濕故宜地黃也無濕而病黃乃膽經之逆也膽經相火逆行於上故病黃味苦火逆於上則虛於下故口淡不食茵陳清上逆之熱地黃滋陰附桂補火所以病愈此病此方亦憑脈耳若以口苦胃滯之故不用地黃脈細難復病將壞矣此病前數年曾病一次醫用附子理中加黃連時輕時重三年始愈脈細尿長不知養陰其不死者幸也此案用藥亦全憑脈象之功數日全愈理有當然故學醫歸結在用藥用藥的根據在脈象故善於學脈者乃能立於不敗之地也一人左肢腫脹疼痛午前輕左腫痛為陰虛午前為陽虛脈左右皆虛右尺尤虛命脈服附桂地黃丸每日二錢午前服下三日全愈此病有謂為濕熱者有謂為風濕者有謂為氣虛者今憑脈用附桂地黃丸全愈可見憑脈治病能免去一切牽纏而得著根本解決也國醫指南將十二經病證分虛實寒熱挨次列出後學稱便然於脈的虛實寒熱無有認識即無法辨別證的虛實寒熱只要於脈的虛實寒熱有精細的認識無論何證的虛實寒熱不唯能徹底辨別且能尋出整個治療之法不唯辨別醫書已載之病證且能辨別醫書所未載的病證由脈斷病實有不可言喻之妙因一經的虛實寒熱必有他經的關係脈法不精必無整個徹底的辨法而頭痛治頭腳痛治腳病不有愈且生他變也欲認識脈的虛實寒熱只要有十架病床的中醫院以一年的臨床經驗便可成功總之由脈斷病是由原則以解決分則由病斷病是圖解決分則而遺卻原則由脈斷病百無一失由病斷病失多得少甚至全失無得脈者審病斷病處方用藥的根據也以上審脈用藥之大概分別法也又有寵統學法六脈中部為主凡中部以上脈盛中部以下脈虛無論何病先補中氣再配合病之藥凡中部以上脈少或無脈中部以下脈多有力無論何病溫藥補藥忌用宜用消滯清熱養陰藥中部以下主裏中部以上主外裏氣不足故先補中裏氣有餘故忌補藥人身右為陰道左為陽道左脈陽虛則升不上來右脈陰虛則降不下去升不上來則左鬱而虛大宜溫升之藥降不下去則右鬱而實大宜涼降之藥左屬水木右屬火土左脈沉細水木枯澀宜滋潤水木之藥右脈微少火土衰退宜溫補火土之藥左寸屬心火左寸不足木氣足則左寸足右寸屬肺金右寸不足不治右寸土氣足則右足左尺屬腎水左尺不足宜補水兼降肺金右尺屬相火右尺不足宜溫腎兼降膽木此大概寵統學法也寵統學法中更有寵統學法即上文所説脈的大體柔潤布微為陽虛夫論何病不可用涼藥攻伐藥乾枯而弱為陰虛夫論何病不可用燥熱藥橫補藥是也只要指法活潑大體認清寵統之中已得應用地步了學醫歸結在學脈以上學法理路明白初學入門之捷徑也還有好些省分診脈病人伸手就診都將掌心向上仰著更無法診得明白萬不可掌心向上定要虎口向上而且將掌向心微彎則脈來流利醫生仍能用指法去細細尋求李瀕湖候正之四言舉要曰初持脈時令仰其掌不可為訓處方定藥要自己立法診脈之時即是定方之時此時指下心中只知病人身體整個氣機的圓運動如何不圓要用如何的方法以補救其圓滿所開藥方卻要自己立法此時切不可有一句古人的書在我的心裏若是心裏有一句古人的書心就離開指下忘卻病人的整個氣體便不能立出合於病機的方法來自己立法者所用之藥只與脈的病機相合不遷就書上成方也書上的成方乃教人自己立法之意耳診脈之時既不可想著病人身體的形質又不可想著書上的一句話此時心中只覺兩手按著一個圓運動的氣體此妙法也亦捷訣也想著書想著形質決不成功試驗便知脈的原理腕上動脈能診全身此扁鵲脈法非內經脈法脈者血中之氣也脈分寸關尺三部正對腕後高骨為關脈關上為寸脈關下為尺脈寸脈以診胸上尺脈以診臍下關脈以診胸臍之間左以診左右以診右尺主沉寸主浮關主中關者升降浮沉的關門運動的中樞之意關前至魚際得一寸關後至尺澤得一尺古人一尺約今之五寸也魚際者掌下大橫紋也寸關尺三部為全身氣脈總代表之處兩臂下垂兩腕上舉以寸關尺三部配合全身上中下三部左右相對成為一個圓的運動右降左升運動勻和是為平人造化秋金之氣居上而降於西人身右寸屬肺肺與大腸相表裏肝與膽相表裏造化夏火之氣居上而來自春木左寸屬心脈心與小腸相表裏左寸亦候小腸之氣造化冬水之氣來自秋金人身左尺屬腎脈腎與膀胱相表裏左尺亦候膀胱之氣造化相火之氣降於秋金藏於冬水人身右尺相火脈三焦相火與心包相火相表裏右尺亦候心包之氣造化中土之氣居中而在相火之上身右關屬脾脈脾與胃相表裏右關亦候胃經之脈肝膽脈俱候於左關卻膽經脈亦候於右關右關乃土氣之位少陽相火附於土氣之上也膽經循胃口環行入胃中而下也大腸經脈候於肺脈大腸位居下部亦候於尺脈小腸位居中焦亦候於右關脈心包相火位於心下亦候於心脈也腕上動脈名曰太淵乃肺脈也人離母腹通了大氣肺家即起呼吸作用呼吸作用起後回圈作用排泄作用消化作用乃隨肺家的呼吸作用相繼而起內經曰肺朝百脈言百脈皆朝於肺唯肺家呼吸作用之命是聽也難經曰寸口者脈之大會手太陰之動脈手太陰動脈肺脈也各脈皆會於肺脈各臟腑的作用皆起於呼吸作用此所以中醫診脈只診肺脈便知全身也參看生命宇宙篇法醫學的證明現在要總結一句讀者特別注意脈法要學得深透指法要按得活潑無論何病應用何藥但是陰虛之脈用養陰之藥無論何病自然病愈但是陽虛之脈用養陽之藥無論何病自然病愈但是中虛之脈或滯積之脈用養中之藥調滯水消積之藥無論何病自然病愈脈輕按多重按少為中虛輕按少重按多多而虛松成分不足亦為中虛脈潤中虛補中不兼潤藥脈枯中虛補中加用潤藥真寒之脈指下膚冷真熱之脈指下膚熱根本上獲著解決之法再加以本證上應當兼顧的治法病證雖多醫書雖繁實際上都解決於極少極簡的脈法之上看去似乎太不科學其實由極少的原則以處理極多的分則正是中醫學最科學處因極多的分則乃發源於極少的原則故也若謂一個病一個原則無是事也當謂學醫甚難診脈甚易病太多書太多談空理故難也在脈上尋辨法有實在的證據有原則的現象故易也將無書的病無數的書歸納於三指之下以求切實的解決此學中醫的祕決也舌胎篇平人舌胎舌本寬厚紅潤胎面呈荷花色凡無此色的舌胎中氣不足荷花色粉白帶紅有似膩非膩的一層五臟六腑皆繫於舌本故臟腑之氣皆現於舌舌的部位舌尖火中屬土左屬木右屬金根屬水舌尖鮮紅此心火不降脈實者吉脈虛者病重重在中氣虛不能降火也脈實者舌必痛脈虛者則有種種衰敗之病而不痛老人舌尖紅用藥錯多不利脈虛之舌尖紅如食涼藥既生危險危險在中氣更傷火更不能降也尖與中之間如現水濕浮聚之形主胸間有積水左有黃厚胎主肝熱之積與胃之左部有積右有黃厚胎主膽熱之積與胃之右部有積根部應常有厚膩如不膩而是光胎此腎氣虛簿體氣單弱之人也舌左部腫硬肝熱右部腫硬肺膽熱全部腫硬胃熱傷寒舌胎病在榮衛時舌無胎陰臟病時荷花色變為豬腰浸在水中之淡灰色雖有淡灰色仍無胎此淡灰色裏氣陰寒之色也如淡灰色而舌心有膩胎此陰寒又兼濕滯也陽臟病時舌胎現有黃燥色此胃熱之舌胎再燥則轉黑色再燥則胎起斷紋黑上生刺此胃中熱燥至極之舌胎也此種舌胎便是大承氣湯症此黑色在舌中心與中心之兩旁若黃燥無黑胎只可微下用調胃承氣湯大黃玄明粉炙甘草黃燥亦在舌之中心與中心之兩邊若舌胎滿黃而不燥者此非胃熱實症乃濕熱病凡外感病數日不愈必起胃熱即舌上生胎表氣不解裏氣必鬱之故也如係大承氣湯症之胎若不下之胃熱更甚則津液燒乾舌必乾縮而現虛象實極反虛最宜注意由實轉虛者當下失下手足濈然汗出潮熱腹滿痛等症漸漸消減只余不大的潮熱與拒按之一症大承氣湯陽盛脈實大今則不現陽盛脈實而成陽弱脈虛舌胎縮小伸不出來黑胎縮成一小硬塊此時脈若沉部較多可用調胃承氣湯緩下之若脈大重按虛少便不可用承氣湯須用大黃兼理中湯或加附子方能下去拒按之點而獲愈也舌即不能伸出可用指探之此黑胎黏在舌心成一硬塊此等症使人難下判斷就只可憑看拒按一點耳陰寒裏症舌胎黑潤而無胎以乾薑炙甘草溫補中氣即退此種舌胎滿黑而潤不似胃熱實症之黑在中心不似胃熱實症之黑而乾燥內傷病誤服寒藥湯中亦有此胎少陽膽經之大小柴胡湯症之舌胎小柴胡湯症舌胎白潤而兼黃膩大柴胡湯症舌胎則潤膩之中兼有乾黃溫病舌胎溫病病在榮衛無胎入氣分舌胎全白如滿鋪乾粉此肺氣大熱之胎必燥渴能飲入血分無胎舌全紅或絳赤有入腸胃者則舌有乾黃胎入氣分清氣分之熱如血分清血分之熱入腸胃下腸胃之熱方詳溫病本氣篇暑病舌有少許黃胎膽經相火之氣停留胃中故現少許黃胎雖有黃胎並無燥症只滯而仍虛之症耳濕病舌胎有薄膩一層濕潤不燥濕熱病舌胎淡白或厚膩或乾黃濕熱傷陰則淡白濕熱聚於胃中則厚膩濕熱聚久津液灼傷則乾黃燥病舌胎潤而不燥惟滿布黃而膩之胎亦潤而不燥燥乃斂結之氣也燥乃乾燥斂結燥寒燥熱相兼以症判之如時病篇成都燥病乾薑麥冬並用之症是也胃中燥熱黃胎在舌心兩旁而成條形如不成條形滿舌散見此病不在胃而在胸膈之間須竹葉方能掃除此胎多不黃而白潤也普通外感舌胎或白或黃膩而滋潤只是胃間小有滯氣而已無入胃腑病實之症也內傷的舌胎無荷花色而現淡灰色此陽氣不足無論何病皆屬陽虛如看不準當參脈象與病症為斷如舌胎中前左右有灰色黑色淡白色淡黃色夾雜而濕潤此中土大敗之象冬末春初小兒發現此舌先溫補中土俟夾雜之胎退去乃按病治病此種胎中虛兼腎虛也凡舌胎黃膩濕潤去黃膩之藥必須兼溫補中氣凡診病無論何病須看舌胎舌有厚黃胎少許乾燥者有一部分胃熱方中須有兼清胃熱理胃滯之藥如檳榔花粉之類舌心有黑膩一點如指大極膩極密緊貼舌本撥之亦看不見肉此有老瘀血結在胃中須用氣血雙補之藥加桃仁紅花五靈脂益母草通瘀輕用多服乃愈氣血雙補八珍湯最佳八珍丸更好丸藥服下與胃中細毛緩緩摩擦去瘀血之妙法舌之紅心有棗核大一塊紅色此最壞之症一些燥熱藥補氣藥均用不得用則真陰立竭多死不死亦從此病重無法挽回此傷真陰之舌胎也紅而乾者更危也又有病由外感多日不愈口苦舌胎滿布黃點其點甚稀胎潤不燥服黨參烏梅麥冬而苦退黃退者此胸隔有膽經木火之氣凝聚不降胎之黃點乃中虛之現象也蟲病舌胎舌上有小黃圈圈中有一點此圈不止數個病重者下唇內面有好些白點此種舌胎其脈必大小不定忽燥忽急也此舌胎的原理不得詳細的解釋大約土木二氣不得之故土氣開竅於口土氣之中發現木之動氣故有圓點之形木之動氣乃蟲為之蟲病秋冬多實春夏多虛秋冬陽內入故實春夏陽外出故虛陰虛舌胎胎與舌本均淡白色牙齦腮內滿口肉色唇內唇外之色兩眼角肉色都一律淡白滿身膚色亦皆淡黃淡白脈並不細數有沉而摶指有力之意此種陰虛須多日調養方能轉愈脈沉搏指是其證據慎勿誤認為陽虛而服熱藥以加病陰虛之胎灰潤不白舌胎光絳陰虛血熱舌本圓而硬與滿舌無津液或大便乾伸不出齒亦陰虛血熱舌脹滿口此中寒血熱乾薑溫中蒲黃清熱即愈共為末擦舌上即消如不知中寒全用涼藥必生危險陰虛舌胎王孟英醫案載的甚多舌胎濕潤津液必多舌胎乾燥津液必少舌胎的胎字有寫作苔字者胎乃底子之意不可寫作苔字舌本的本字是整個肉質胎乃面上一層不可認為苔字初學看舌胎須兼脈症為斷脈症須兼舌胎為斷舌胎代表整個內臟陰陽調和中氣充足之人舌胎必有荷花色陰陽不調中氣不足則現種種不足不調之象多看舌胎現而易見藥性提綱篇初學用藥的提綱初學用藥可看汪韌庵編之本草備要明白實在極為適用茲將常用者加以系統的簡單説明先將此説明認識較有綱領中氣藥溫補中氣以炙甘草為主藥性溫有起死回生之功凡脈虛大而潤或微小而潤皆宜若脈枯細與陰虛諸證慎用脈實有力者忌用陰虛而脈枯細有兼補中之必要者於滋陰藥中斟酌少用否則橫滯傷陰中氣反因之窒塞不能運化小兒不宜重用補中而不橫窒者冰糖最好但力小無起死回生之能白糖養中較冰糖更平和矣大棗補中最補津液性溫惟有滯塞諸證者不可用黨參補中氣補津液性平如有衛氣閉束之外感服之衛氣愈閉為禍不小水飲病亦不可服生津助水之故此外凡補土之藥皆能補中生甘草性寒能將中氣的運動力量減少也中寒乾薑為第一要藥有起死回生之力古方乾薑炙草同用之證皆有關生死大病誤用傷陰為害最大炮過用力稍減生薑亦能溫中搗汁止嘔止吐外感用之有傷肺之害必須完全寒症肝不燥肺不熱者乃可用之蜂蜜煉熟溫中補液惟無運化之力生蜜寒中調中理滯食滯用神麯麥芽山楂檳榔草果俱炒過用神麯草果皆性熱余性平凡舌上有黃白膩苔皆宜氣滯用砂仁蔻仁用量愈輕愈好淡豆豉調中理滯其性陰柔溫燥病妙品中寒乃常有之事中氣最怕病熱中氣若熱胃中陰不包陽陽氣飛散即死本人好食熱性食物與醫生好用熱性之藥日久中氣遂熱可怕治之之法養肺陰養胃陰降膽經與溫補中氣並重可愈飯後胸下熱即中氣熱也脾胃土氣藥補脾胃土氣白朮為主藥宜用慎用忌用之脈與炙甘草同性平不可用土炒傷其津液以增燥性脾胃無滯者合用有滯之吐瀉忌用其次則山藥扁豆薏苡皆補土氣性味平淡兼能除濕凡除濕之品皆傷津液蒼朮除濕性燥兼能發濕氣之汗茯苓除濕其性平而剛豬苓澤瀉除濕性柔小便利者肺津虧者皆不可用除濕之藥皆於土氣有益然土虛無濕切不可用以傷脾胃津液致土氣更敗也凡補土除濕之品陰虛慎用忌用半夏藿香平降胃氣赤石脂善收滑脫平和妙品冰朋散口舌諸熱擦之特效木通性平瀉水清心熱而下行肺與大腸金氣藥補肺金山藥為主藥其性平和最助肺金收斂之氣並能利尿利尿者金氣收則水歸膀胱也肺虛而燥者以阿膠之滋潤輔之凡補中補土之藥皆於肺金有益土生金也凡補肺之藥皆補大腸紅棗補肺能填補傷損糯米最補肺陰落花生潤肺通滯杏仁溫肺降氣馬兜鈴潤肺降熱麥冬清肺開結桔梗排膿降肺至若旋覆花枇杷葉桑葉皆性燥皆普通降肺之品虛人都不宜用款冬花紫菀性潤降肺甚好葛根升大腸金氣性涼薤白降肺金性溫合併用之能將整個金氣的升降活動起來如膀臂酸痛二便不通均有特效肺臟內積有實熱輕則括蔞貝母重則生枳實最妙槐實清金氣之熱咳血最效中寒者輔以冰糖紅棗或山藥扁豆黃芩清肺熱極寒中氣初學莫用知母清肺只宜少用竹葉清降肺胃功效特殊舌上白黴之時氣與痧脹病非竹葉重用不效肝膽木氣藥補肝膽木氣當歸川芎地黃芍藥合用為主藥芎歸補木氣之陽芍地補木氣之陰當歸性散益肝芍藥性收助膽川芎溫升地黃涼降乃木氣整個圓運動之藥於土氣藥中用之如八珍湯善治諸虛者中土運於中央木氣升降於四維之功也芍地能助金氣之收助水氣之藏芎歸能助火氣之長凡能善用八珍湯之醫家其成績必有意想不到之妙芍地性寒芎歸性熱當歸潤腸脾濕忌用阿膠潤木氣助收斂止疏泄功效無匹脾濕腸滑忌用溫補木氣烏梅第一發熱舌無黃胎而尿短者極效發熱則膽經逆相火虛烏梅補膽經相火而降之使下也山茱萸溫補木氣善於收攝酸棗仁專補肝膽收斂相火首烏溫補木氣能通能斂艾葉溫肝經暖下部能通十二經丹皮能除血中伏熱性平功大妙品也秦皮性寒而澀最清木熱下焦不收宜之白頭翁寒能涼血分苦能堅下焦與秦皮合用故治熱痢龍膽草大瀉肝膽之火並除下焦濕熱實證乃可用之普通肝膽病熱芍藥生地二味已足運用雞助肝熱為害甚大雞湯一大碗兌好燒酒二兩生薑二兩能將肝經之熱運到膽經以成木氣的圓運動妙品也生薑燒酒俱往右降由右下降入肝經再由左升入膽經膽經能熱肝經乃不偏熱耳羊肉溫潤木氣妙品廣西獨不可用冬月食之病熱瀉吳茱萸溫補木氣大熱善通其力極猛初學莫用細辛溫降寒水最益木氣最傷津液初學莫用苦楝子能去木氣實熱肝病脈沉相宜防風性平乃疏通木氣使之不鬱防其生風之藥質潤而力散疏泄之病忌之世認為防外來之風防外來之風必如桂枝湯之芍藥乃合理也腎家水火二氣藥補腎水以熟地龜板為主藥女貞子亦效性均平和黃精滋補脾腎津液最宜水虧之家補腎火以韭菜子菟絲子甜蓯蓉巴戟天溫而兼潤為宜五味子大補腎陽性較剛烈善通少腹之滯塞肺病忌用海參大蝦溫而潤補的力量太大和以白糖能增圓運動之力不使其熱性偏於一方而成陽盛化熱之害凡補腎火須帶水性之溫藥非真係水寒無火不可用剛燥之附子君火相火藥補君火之藥皆溫補腎家之藥水中陽足君火自足補相火之藥皆溫補腎家之藥心包相火亦來自腎家清君相二火之藥黃連為主藥大苦大寒誤用殺人初學莫用必要用時以梔仁代之由心包屈曲下行功用極妙柏子仁清降心火潤肝潤腎和平妙品遠志極傷胸部津液初學莫用腎熱者梔仁知母最佳外感榮衛藥外感榮衛病衛病收斂以麻黃為主藥疏泄之力極大凡皮膚腠裏筋骨關節無所不到虛人小兒老人雖輕用亦不可凡衛氣閉束惡寒之病可用薄荷蘇葉荊芥蔥頭以代麻黃疏瀉力小非真麻黃湯證莫用麻黃榮病疏泄以芍藥為主藥苦寒傷中須用甘溫之藥以和之凡一切外感發熱鼻不塞脈不緊依溫病為治黃豆黑豆為主藥潤降肺膽平疏瀉兼養中氣大便滑瀉忌用山藥扁豆合用能代炙草大棗凡惡寒發熱之病多日不解須看舌苔有黃苔而脈沉既須用清解之藥按證施治至於羌活獨活白芷升麻性燥氣升不合榮衛生理千萬莫用黃耆大補衛氣之陽乃瘡科補虛之藥內傷病關於榮衛不足運動不靈如黃耆五物湯之證乃可用之肺虛忌用世以黃耆當歸並用為氣血雙補多有流弊肺氣主降黃耆性升故也柴胡解少陽經氣之結之藥性升而散最傷肺氣脈象沉緊之肝膽病如傷寒論厥陰下篇四逆散之證乃可用之因發熱惡寒的病不止傷寒病小柴胡湯一證也常用藥中特別注意藥附子性熱乃補陽溫水寒之藥非補腎之藥巴戟蓯蓉等才是補腎之藥非將傷寒金匱有附子各方研究清楚不可使用如非陽氣虛少水氣又寒之病而誤用之且有將中下陽氣引出之患與撥動木氣煽動心氣之患其患大矣大黃性寒乃攻下腸胃燥熱結聚實證之品須有舌苔乾黃腹痛拒按之證乃可用之若僅舌苔乾黃腸胃並無燥熱結實拒按證只可少用兩三分以清燥熱否則腸胃無有燥熱結聚實在之物當之必將人瀉死芒硝性熱用蘿蔔制名玄明粉瀉性速過大黃世乃認為性寒名實不符本草備要謂芒硝能化七十二種石為水又曰玄明粉實熱忌用因其熱也有用玄明粉代西藥瀉鹽用瀉後常有傷陰出汗須用涼藥清熱汗乃能止者可見也枳實性寒下氣猛烈虛家忌用厚朴性熱最能下氣最傷陰液最傷元氣慎用傷寒大承氣湯為攻下腸胃燥熱結實主方大黃枳實之寒配以芒硝厚朴之熱寒熱並用做圓的運動而下是定法也生石膏乃清散金氣燥結之藥寒中敗陽誤用殺人必須將傷寒論白虎湯與本書時病篇痧脹證研究清楚乃可用之初學如有用之