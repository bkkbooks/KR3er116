再由春升上乃為君火而君火又隨相火下降名曰五行其實六行因六氣各有事實故又曰六行六氣六行六氣是融合極密分析不開和平不偏的圓運動木氣偏見則病風君火之氣偏見則病熱相火偏見則病暑金氣偏見則病燥水氣偏見則病寒土氣偏見則病濕故六氣名目而有厥陰風木少陰君火少陽相火太陰濕土陽明燥金太陽寒水之稱也內經謂在地為五行在天為六氣在事實上説不過去此即五行圖加一相火名曰五行六氣其實六行六氣陽升陰降自然之事陰性本降三陰之升陰中有陽也陽性本升三陽之降陽中有陰也金木水火分主四維相火土氣同主中宮中宮在地面之際四維距地面較遠六行六氣的圓運動四節一氣大寒立春雨水驚蟄屬初之氣春分清明穀雨立夏屬二之氣小滿芒種夏至小暑屬三之氣大暑立秋處暑白露屬四之氣秋分寒露霜降立冬屬五之氣小雪大雪冬至小寒屬六之氣此時令病發生之根源也圓運動的天人一氣時令病上最為顯著內傷雜病亦屬六氣特不似時令病關係生死之速耳因時令病乃整個六氣分散中氣消滅極易故死甚速也厥陰風木地面上屬陽地面下屬陰初氣之時大氣由寒而溫地下水中所封藏經秋收來的陽熱動而上升此陽熱與水化合是為木氣木氣者一年之陽根也大寒節氣當陰極之時故稱厥陰厥者極也木氣主動動而不通則成風故稱風木少陰君火二之氣亦從地下陰位升出地面即木氣上升之氣也此時大氣較熱不似厥陰之陰極故稱少陰木氣上升之氣即水中氣藏上年秋時下降的陽氣此陽氣由地下升至地上照臨大宇光明四達上升之象有如君位故稱君火此時大氣由溫而熱又稱熱火少陽相火三氣之時地面上陽熱盛滿經暮夜大氣之涼降降入地面下之水中然當暑熱上騰之時旋降旋升地下水中為生物生命之所從出此陽熱實為生命之本地面上陽熱盛滿地而下所得陽熱不多故稱少陽此陽熱降入地下水中以生中氣中氣旋轉則上下交清有如相臣之職故稱相火此火不降暑熱薰蒸又稱暑火太陰濕土四氣之時地面上陽熱盛滿地面下舊有的陽氣亦升上來地面上非常之熱地面下非常之寒熱屬陽寒屬陰大氣陰多故稱太陰為在水下則生氣火在水上則生濕此時地面上陽熱盛滿尚未降入土下寒熱相逼濕氣濡滋土氣在升降之交故稱濕土陽明燥金地面上為陽位五氣之時地面上盛滿的陽熱經秋氣之收斂正當下降中土之下陽氣充足濕氣已收大宇光明陽盛而明故稱陽明金氣當旺濕也收則燥熱氣結此時地面上空的金氣壓力極大故稱燥金太陽寒水六氣之時地面上的陽熱經秋氣之收斂全行降入土下的水中造化之氣中下為本中下陽多故稱太陽此陽熱降入水中水即將他封藏不泄此時大氣降壓水外即寒水外已寒則水內陽藏故稱寒水五行的運動圓合成一氣木升金降木不病風金不病燥水升火降火不病熱不病暑水不病寒土運於中土不病濕運動不圓升降不交各現各氣則病風熱暑濕燥寒病者大氣病也人身之氣亦如是也初氣之時宜養木氣二氣之時宜養火氣三氣之時宜補相火之氣四氣之時宜養土氣五氣之時宜養金氣六氣之時宜補水氣相火下降於水中為君火之始氣君火者相火之終氣君火又隨相火下降也人秉大氣的五行而生臟腑人秉大氣的木氣而生肝臟與膽腑造化的木氣乃太陽射到地面的熱由秋季降入冬季再由冬季水中升出春季而成人身的木氣亦然肝膽的體質均在右肝經的作用在左膽經的作用在右必膽經相火則右降入下部水氣之中再由下左升然後發生肝經作用人身處處有疏泄作用處處有木氣秉大氣的火氣而生心臟與小腸腑心與小腸主血有宣通作用人身處處有宣通作用處處有火氣秉大氣的金氣而生肺臟與大腸腑肺與大腸主皮毛有收斂作用人身處處有收斂作用處處有金氣秉大氣的水氣而生腎臟與膀胱腑腎與膀胱主骨有封藏的作用人身處處有封藏的作用處處有水氣秉大氣的土氣而生脾臟與胃腑脾與胃主肉有運化的作用人身處處有運化的作用處處有土氣秉大氣的相火而生心包臟與命門腑命門亦稱三焦心包與命門主油膜有燔灼的作用人身處處有燔灼的作用處處有相火之氣右腎內的白油即是命門相火心房為心臟油膜包住的心尖為心包臟燔灼即是燃燒胃為脾之腑脾為胃之臟臟者藏也腑者化也陽性化陰性藏藏者藏其所化化者化其所藏人身秉造化的陽氣而生腑秉造化的陰氣而生臟腑為陽其色明臟屬陰其色暗陽而明故能化陰而暗故能藏此臟腑二字之意也他臟他腑仿此人身肝木之氣疏泄不及則現無汗尿少糞難腹痛脅痛婦人月經來遲等病疏泄太過則現自汗尿多遺精發熱頭暈耳鳴婦人白帶月經來早等病疏泄不及者水中的火氣不足疏泄太過者金氣不足也人身肺金之氣收斂不及則現汗多頭暈發熱咳逆上氣遺泄尿多痿軟等病收斂太過則現惡寒糞艱胸悶無汗等病收斂不及者木氣過於疏泄收斂太過者火氣不能宣通也人身心火之氣宣通不及則現血痹神倦口淡血寒等病宣通太過則現舌痛喉痛心跳心煩等病宣通不及者木火之氣虛宣通太過者中氣虛金氣不降也人身腎水之氣封藏不及則現陽越頭暈發熱足腫等病封藏不及者金氣收斂之力衰木氣疏泄太過也腎水無封藏太過之病腎水愈能封藏陽根愈堅固也人身脾土之氣運化不及則現腹滿停食上吐下瀉四肢不舉全身倦怠等病土氣填實則不能運化也人身相火之氣燔灼不及則現下寒腎寒脾胃衰弱二便不固等病燔灼不及者相火的本氣少也相火無燔灼太過之病有相火不降之病相火降於水中水中有火則