停止今天所講的就是從生活作用停止後得來的云云細胞生活作用停止後的生理學中無有中醫學也以後國民皆科學青年古中醫學將來之或興或廢全視科學青年之能徹底認識大氣的物質能力運動與否科學方法改良中醫科學云者有原理有系統有證實之謂非死體剖解之謂死體剖解學是分析的是片段的是直不運動的是死的大氣的古中醫學是不能分析的是整個的是圓運動著的是活的彼此立場適成相反由死體剖解來學中醫的醫家未曾見其能治大病者凡改良一事必須確知此事本身的究竟而後可言何者為良何者為不良向相反之立場上去求改良結果必更加不良而已分析的死體剖解學只可作外科手術的研究人是生物之一生物是大氣生的故人也是大氣生的世界的人如都認識人是大氣生的豈止中醫得著改進的根本辦法而已哉中醫不良非中醫學本身不良乃為中醫學本身説法的書不良耳不注意此點乃曰取消五行是無異坐井觀天者嫌天小也老子曰執古之道以禦今之有能知古始是謂道紀老子之言善夫漢儒董仲舒謂大雪節天氣上升地氣下降閉塞成冬關於生物生命的宇宙大氣圓運動總是天氣下降地氣上升從無一息是天氣上升地氣下降者至於大雪之時地下封藏的陽氣特別之多圓運動的力量特別之大更不閉塞董仲舒下幃讀書目不窺園者三年研究宇宙全要在事實上尋出實在憑據來三年目不窺園在布幃子裏面憑空瞎造謠言後人尊之未免太不實事求是了荀子曰六淫之氣皆出於地荀子乃從實地考研得來有科學家的眼光中國的哲學史有實地整理之必要矣王養林書後去年夏中央國醫館館長焦易堂先生設特別研究班陳立夫先生薦彭師子益充該班系統學教授學員八十人皆醫專畢業與行醫多年之士有充大學教授者有業西醫者畢業之日一致歡喜曰今乃得見我中國古醫學的本身真相早已合乎現代醫學矣養林聞之歎為先得我心敢掬誠敬告於我輩科學青年如學中醫讀圓運動的古中醫學可省在醫校學醫十分之九的腦力即能得到中醫學整個的根本解決讀生命宇宙篇即能得到中醫學整個的根本信念中醫書籍無有將古中醫學原則的本身真相樹立起來使學者讀之瞭解中醫學的所以然者有之自吾師圓運動的古中醫學一書始江蘇省政府主席陳果夫先生設醫政學院考選各縣有科學思想之中醫六十人到院訓練特約吾師演講聽衆相率請益豈偶然歟中醫是生命與宇宙合一之學明瞭生命宇宙乃能明瞭陰陽五行卻非在現今科學潮流澎湃時代無法證明陰陽五行中國文化本位自力更生讀此篇得見焉中醫的內經有云善言天者必驗於人善言古者必合與今善言氣者必彰於物此篇有之今之言物者不知有氣言人者不知有天言今者不知有古讀此篇必知所返矣鐵道部技正孫子明先生於吾師抵南京之日邀集現任要職曾留學歐美之張德流諸先生六十餘人先後在南京第一公園五洲公園聽吾師講演生命宇宙孫先生繼言於衆曰現今世界科學方法所不能解決之事物惟生命宇宙耳彭叟由大氣運動中得著解決將我中國古代的形上文化與現代世界的科學文化合而為一源源本本信而有徵愛因斯坦發明相對論已令舉世震驚今彭叟發明生命宇宙偉大過之為天地立心為生民立命為往聖繼絶學非彭叟不足以當之云中華民國二十六年元旦太原川至醫專學校畢業門人山西屯留王養林謹跋於南京清涼山掃葉樓汪英時書後彭子益先生所著圓運動的古中醫學新舊中醫學者皆喜讀之謂其能建設中醫學原則系統能增加中醫治療功效使學中醫者容易成功因叩先生此書所以能至於此之由先生曰中醫學乃人身一小宇宙之學而關於生物生命宇宙中心究在何處中西學説無道及者傷寒論為中醫方法祖本首一方桂枝湯治中風發熱桂枝湯中的芍藥係收斂作用既因中風而發熱反用芍藥以收斂之是何理由歷來注釋無能解者宇宙之中心不知宇宙的上下四維便無法認識傷寒論首一方不解原理學醫入門便被阻攔宇宙中心中醫學原則中心也傷寒論中醫學原則之分則也原則不知何有分則中醫書籍囫圇支離後人從何學起廢書長歎而已民國六年知山西霍縣事農桑局種核桃久不出土掘而視之見發根之芽與發乾之芽並不直上直下乃相抱如環作圓運動之態蓋天氣下降地氣上升升降搓挪而成此圓運動也於是得知宇宙中心之所在一日到聖佛村辦公見兒童摘食未熟小杏欲止之一老人曰時行病發大熱用此小杏十數枚搗爛加鹽少許煎湯熱服即汗出熱退也於是得知傷寒論桂枝湯用芍藥之原理且並得知自來用銀翹散治溫病用升麻葛根湯治麻疹錯誤的原因乃於公余之暇將整個囫圇支離之中醫學揭出原則定出系統重新編訂此本書之由來也云云夫核桃發芽煮食小杏亦尋常耳一與有心人接觸之下數千年之中醫學理遂得大明於世殆有天意存乎其間歟爰述先生之言以告讀先生書者知此書之起源焉中華民國三十年端午鄉後學吳門汪英時謹跋於國立桂林師範學院附中宿舍王詳瑞贊古中醫學河圖起源圓的運動萬物皆然五種物質各有能力運動失圓因成病矣原則系統本來如此書説不明中醫之恥吾師彭叟得天獨厚圓運動學淺明深透初學入門舉步升堂科學多種對證周詳古中醫學乃大自然中醫真相至今始傳中華民國三十六年清明廣西博白王詳瑞謹贊
