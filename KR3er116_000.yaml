body:
  text: 全書概要一居今日科學昌明時代而編著學中醫的書籍一要不只保存中醫原有的功效而且要能增加中醫原有的功效並且要縮短學習成功的學程方能引起學者的興趣而學到成功而增加功效縮短學程學到成功必先使學者徹底認識古中醫學本身真相的究竟二新舊醫學原則上有一致之點商務印書館出版之大學叢書疾病總論有云宇宙森羅萬象無非物質勢力運動物質發生勢力勢力發生運動疾病者細胞之物質勢力運動之變動也云云古中醫學人身與宇宙同一大氣的物質勢力圓運動之學也自古以來的醫書未曾將人是大氣生的一語道破只有似是而非的説法無徹底明白的説法求有原則有系統使學者計日成功之本不可得後人不能認識中醫學本身真相的究竟無不終身在猜疑摸索之中猜摸有得再猜再摸又不是矣謂中醫學自古迄今尚未成立並非過論三中醫為人身與宇宙同一大氣物質勢力圓運動之學本書本此原則用中醫原有名詞以有原則有系統有證據的科學方法編成之不攙入一句西醫名詞因物質勢力運動的原則中西是同的物質勢力運動的方法卻不同中醫的物質勢力運動是整個不可分析的是圓的是活的不是死的如攙入西醫名詞中醫學的本身真相反遭掩晦不惟功效不能保存中醫的本身必致滅亡四此書自民國十年起曆充太原北平成都重慶醫學教本南京中央國醫館特別研究班昆明市中醫學特別研究班教本前後二十餘年新舊同學二千餘人一致歡喜認為確能使人認識中醫學本身真相增加功效縮短學程之本共修正過三十餘次此書原名系統學從同學諸君之請改名圓運動的古中醫學中華民國三十年丁亥端午彭子益重著於廣西博白年七十四歲目録上篇總目原理上篇古方上篇古方中篇古方下篇傷寒論方解篇金匱方解篇溫病本氣篇時病本氣篇兒病本氣篇脈法篇舌胎篇藥性綱領篇生命宇宙篇下篇總目原理下篇傷寒論六經原文讀法篇雜病篇王氏醫案篇湯頭改錯篇雜説篇上篇各篇為初學醫時必讀之本下篇各篇為學醫將成時始讀之本湯頭改錯篇則非用汪訒庵重校湯頭歌訣對照著讀不可傷寒論六經原文讀法篇序初不料我中醫方藥祖本的傷寒論的本身真相自古到今未曾明白示人以整個的認識也自來注傷寒論者無不曰風中肌腠寒傷皮毛如不發汗將風寒發散出來這風寒就會由太陽傳入陽明而成陽明病傳入少陽而成少陽病或風不中肌腠寒不傷皮毛風寒直中三陰之臟而成三陰臟病南北同風古今一致在事實上徹底研究起來乃風寒傷人之後人身本氣自病並非風寒入了人身為病病成於人身的本氣而起因於風寒所傷耳傷寒論本身真相原來如此與注家所注根本上完全不合可怪也有識之士則歸咎於王叔和編訂傷寒論次序錯亂所以後人無法認識傷寒論的真相傷寒論被王叔和編次後原文次序究竟如何不可得而知所可得知者六篇之名詞名詞曰太陽篇陽明篇少陽篇太陰篇少陰篇厥陰篇六篇之名詞六氣之名詞也人身個體表有榮衛裏有臟腑而皆六氣之所生欲認識本氣自病的傷寒論真相必先求六氣之表裏根據六氣之表裏以尋求理路再由理路以認識真相其庶幾乎此篇讀法非敢更改自來讀本之次序也由次序以認識傷寒本氣篇自病的真相耳中華民國二十八年己卯冬月子益重編於成都四川國醫專科學校讀法總綱傷寒論一百一十三方三百九十七法欲知原文逐章之意義須先之本論六經整個之組織整個傷寒論六經之組織事實上如內容六瓣之一橘榮衛如表皮三陽腑三陰臟如裏瓣初病在表皮汗出則病解在表不解裏瓣乃病榮衛表病用汗法解之臟腑裏病臟病用溫法解之腑病用下法解之榮衛臟腑之間又有少陽經病少陽經病不可汗不可溫不可下用和法解之病證雖多無非表裏與經方法雖多無非汗溫下和瞭解原則自能瞭解分則人身乃陰陽交合圓運動的氣化構成之體陰寒陽熱乃其本性表則榮陽衛陰裏則腑陽臟陰中氣充足之人陰陽交合調融不分無所謂寒無所謂熱中氣不足表的榮衛之氣分離榮則現出陽的本性而病熱衛則現出陰的本性而病寒裏的臟腑之氣分離腑則現出陽的本性而病熱臟則現出陰的本性而病寒少陽之經在榮衛臟腑表裏之間賦有陰陽二氣之性質病則寒往熱來熱往寒來此原則也陰陽分離寒熱偏現因又變化發生各項證狀此分則也故傷寒論的病證與治法在原則上無非寒熱的本體而已在分則上無非寒熱的變化而已六經的經字應作家字解家有內宅有外牆裏的臟腑如內宅表的營衛如外牆內宅是各個的外牆是公共的公共者各個的公共也無病之人三陽三陰是圓運動的陰中有陽陽中有陰是調和不分的雖是各個實則整個得病之人表氣公共的外牆被風寒打開裏氣的內宅遂分離成了各個分離的輕病輕分離的重病重全分離則有陽無陰或有陰無陽中氣消滅而人死少陽經之經字則指經絡的經氣而言也本篇分上篇中篇下篇上篇以明榮衛病臟腑病與少陽經病之本體中篇以盡其蘊下篇以通其變所謂本體者榮衛主表用汗法之病臟腑主裏臟用溫法腑用下法之病少陽經主半表半裏用和解法之病是也凡原文之屬於榮衛臟腑與少陽經本體各病各章列為上篇凡原文之屬於本體而事實較復各章列為中篇凡原文之由本體發生種種變化各章列為下篇如學彩色繪畫之法先認識五種未經攙和之本色然後可求知攙和之各樣雜色認識上篇然後能認識中篇認識上篇中篇然後能認識下篇歷來注傷寒論之家都如繭縛之艱晦此篇讀法有如鳥瞰之明白只須用以前讀傷寒論十分之一的腦力便能整個徹底瞭解如欲讀此篇須先讀原理篇處方篇方能瞭解上篇榮衛病太陽之為病脈浮頭項強痛而惡寒凡發熱先惡寒此一章論榮衛病提綱凡原文稱太陽病皆榮衛病太陽病發熱汗出惡風脈緩者名為中風緩有虛象中字作傷字解言衛氣為風所傷也風性疏泄傷衛衛傷則榮病太陽病頭痛發熱汗出惡風者桂枝湯主之此發熱亦先惡寒太陽中風陽浮而陰弱陽浮者熱自發陰弱者汗自出嗇嗇惡寒淅淅惡風翕翕發熱鼻鳴乾嘔者桂枝湯主之寸脈為陽尺脈為陰浮弱熱汗鼻鳴乾嘔皆榮氣鬱而疏泄之事疏泄傷陰桂枝本為解肌若其人脈浮緊發熱汗不出者不可與也常須識此勿令誤也熱在肌故曰解肌桂枝湯收斂之劑脈緊無汗收斂之病故不可與以上四章論榮病太陽病或已發熱或未發熱必惡寒體痛嘔逆脈陰陽俱緊者名曰傷寒緊乃閉斂之象緩乃疏泄之象是相對的寒性收斂傷榮榮傷則衛病太陽病頭痛發熱身疼腰痛骨節疼痛惡寒無汗而喘者麻黃湯主之榮降於膽膽逆則嘔衛降於肺肺逆則喘衛病閉斂故頭項強痛之外又加腰痛骨痛以上二章論衛病太陽病外證未解脈浮弱者當以汗解宜桂枝湯言有表證總宜汗解弱脈津液傷故宜桂枝湯脈浮者病在表可發汗宜麻黃湯脈浮而數者可發汗宜麻黃湯脈數有緊象故宜麻黃湯欲自解者心當先煩有汗而解何以知之脈浮故知汗出解也自解者不服藥而解陽鬱後通先煩而解以上三章總結上文太陽病得之八九日如瘧狀發熱惡寒熱多寒少其人不嘔清便欲自可一日二三度發脈浮緩者為欲愈也脈微而惡寒者此陰陽俱虛不可更發汗更下更吐也面色反有熱色者未欲解也以其人不得小汗出身必癢宜桂枝麻黃各半湯清便大便小便欲字作能字解惡寒乃衛閉衛閉向內面色不當發熱今發熱故曰反榮氣疏泄向外故面有熱色服桂枝湯大汗出脈洪大者與桂枝湯如前法若形如瘧日再發者汗出必解宜桂枝二麻黃一湯洪大之脈外盛內虛故仍用桂枝湯之法如瘧再發衛閉氣虛故用桂二麻一之法桂枝湯之法收外盛之氣以回於內之法也太陽病發熱惡寒熱多寒少脈微弱者此無陽也不可更汗宜桂枝二越婢一湯榮衛雙病燥傷肺液陽字指寸脈言無陽謂寸脈弱也形作傷寒其脈不弦緊而弱弱者必渴被火者必譫語弱者發熱脈浮解之當汗出愈此章弱者必渴句申明上章越婢湯兼清燥之義以上四章論榮衛雙病傷寒表不解心下有水氣乾嘔發熱而咳或渴或噫或利或小便不利少腹滿或喘者小青龍湯主之表病未解而臟氣之濕寒已動解表兼治濕寒傷寒心下有水氣咳而微喘發熱不渴小青龍湯主之服湯已渴者此寒去欲解也此章不渴二字申明上章小青龍湯用溫法之義以上二章論榮衛病中兼見臟寒之病太陽中風脈浮緊發熱惡寒身疼痛不汗出而煩躁者大青龍湯主之若脈微弱汗出惡風者不可服也服之則厥逆筋惕肉瞤此為逆也以真武湯救之首句是設問辭非中風也表病未解而腑氣之燥熱已動解表兼治燥熱傷寒脈浮緩身不疼但重乍有輕時無少陰證者大青龍湯主之此緩字有實象桂枝湯證之緩乃虛象也燥傷津液故身重津液復通故身重乍有輕時以上二章論榮衛病中兼見腑燥之病中風發熱六七日不解而煩有表裏證渴欲飲水水入則吐者名曰水逆五苓散主之熱為表證渴為裏證此熱乃陽為水格非表病也太陽病小便利者以飲水多必心下悸小便少者必苦裏急也水格則心氣不降故悸傷寒汗出而渴者五苓散主之不渴者茯苓甘草湯主之渴而汗出為裏濕盛不渴而汗出為表陽虛以上三章論榮衛病解臟氣之濕動傷寒脈滑而厥者裏有熱也白虎湯主之燥熱灼津津液沸騰則脈滑內熱格阻陰氣於外則外厥此滑脈重按有力厥者肢冷畏寒也傷寒脈浮滑此表有熱裏有寒也白虎湯主之表熱裏寒無用白虎之理當是表寒裏熱乃傳抄之誤也傷寒無大熱口燥渴心煩背惡寒者白虎加人參湯主之無大熱無表證之發熱也燥渴心煩裏熱之徵背惡寒與厥皆裏熱格阻外陰之象傷寒脈浮發熱其表不解者不可與白虎湯渴欲飲水無表證者白虎加人參湯主之有表熱則裏陽虛故不可用白虎以敗裏陽重申上章之義也病人身大熱反欲得近衣者熱在皮膚寒在骨髓也病人身大寒反不欲近衣者寒在皮膚熱在骨髓也此診斷內熱之一法不可拘執以上五章論榮衛病解腑氣之燥動太陰脾臟病太陰之為病腹滿而吐食不下自利益甚時腹自痛若下之必胸下結硬凡稱太陰病皆太陰脾臟病乃裏病非經病少陰厥陰準此此一章論太陰病之提綱陰臟病寒本體原來陰寒故也少陰厥陰準此自利不渴者屬太陰以其臟有寒也宜服四逆輩不渴二字為陰寒用熱藥之據少陰腎臟病少陰之為病脈微細但欲寐也少陰腎臟水火二氣陰臟病塞則寒水滅火寒而無火故但欲寐而不能寐無火故脈來微細也陰病之提綱少陰病得之一二日口中和其背惡寒者當灸之附子湯主之腑陽病熱口中苦臟陰病寒口中和和字乃不苦之意腎主骨腎寒故背寒少陰病身體疼手足寒骨節痛脈沉者附子湯主之少陰臟病則陰盛陽衰水滅寒火故主附子以上二章論少陰病之外證厥陰肝臟病厥陰之為病消渴氣上衝心心中疼熱飢而不欲食食則吐蛔下之利不止厥陰陰陰臟本體陰寒陰寒盛於下故虛熱現於上耳此一章論厥陰病之提綱傷寒脈微而厥至七八日膚冷其人躁無暫安時者此為臟厥非為蛔厥也蛔厥者其人當吐蛔令病者靜而復時煩此為臟寒蛔上入其隔故煩須臾復止得食而嘔又煩者蛔聞食臭出其人當自吐蛔蛔厥者烏梅丸主之蛔乃木氣中之陽氣所成厥陰本體陽微而動與太陰少陰不同處此一章引臟厥以證蛔厥也傷寒五六日腹中痛若轉氣下趨少腹者此欲作利也轉氣下趨少腹肝木下陷木氣疏泄故利此一章論下利屬於木氣之下陷下利清穀裏寒外熱汗出而厥者通脈四逆湯主之外熱汗出陽氣外散下利見之故用大溫厥有陰證之厥陽證之厥以其他外證陰陽分之大汗出熱不去內拘急四肢痛又下利厥逆而惡寒者四逆湯主之凡用四逆湯皆陰寒陽微之險證也大汗出熱不去內拘急四肢痛又下利厥逆而惡寒者四逆湯主之凡用四逆湯皆陰寒陽微之險證也汗出若大下利而厥冷者四逆湯主之此陽氣將脫之象也以上三章論厥陰本體病之危險各證手足厥寒脈細欲絶者當歸四逆湯主之若其人內有久寒者當歸四逆加吳茱萸生薑湯主之血虛而寒故肢厥脈細較前數證為順也此一章論厥陰之輕證陽明胃腑病陽明之為病胃家實也一部傷寒論惟陽明胃腑有可下實證此一章論陽明胃腑病之提綱傷寒三日陽明脈大大者實大也大脈有虛實之分三日詳傳經篇太陽病三日發汗不解蒸蒸發熱者屬胃也調胃承氣湯主之證僅蒸蒸發熱乃胃家實之漸也以上二章論陽明胃腑病成之漸二陽並病太陽證罷但發潮熱反不能食者胃中必有燥屎五六枚也宜大承氣湯下之若能食者但硬耳燥屎乃胃家實之物故下燥屎病乃能愈榮衛與陽明胃腑都病稱二陽並病但硬言不燥也病人不大便五六日繞臍痛煩燥發作有時者此有燥屎故使不大便也胃中食物被燥氣煉乾故稱燥屎大下後六七日不大便煩不解腹滿痛者此有燥屎也所以然者有夙食故也宜大承氣湯宿食為燥氣煉乾成燥屎病人小便不利大便乍難年易時有微熱喘冒不得臥者有燥屎也宜大承氣湯小便不利喘氣不臥皆是燥熱傷津陽明下證需小便利燥熱傷津故不利也以上四章論陽明胃腑下證之實據陽明病潮熱大便微硬者可與大承氣湯不硬者不可與之若不大便六七日恐有燥屎少與小承氣湯湯入腹中轉矢氣者此有燥屎乃可攻之若不轉矢氣此但初頭硬後必溏攻之必脹滿不能食也欲飲水者與水則噦其後發熱者必大便復硬而少也以小承氣湯和之不轉屎氣者愼不可攻也必兼潮熱之便硬乃可用大承氣湯下之矢古庇字轉矢氣者放屁也此一章示人愼重用下之法太陽膀胱病太陽病不解熱結膀胱其人如狂血自下下者愈其外不解者尚未可攻當先解外外解已但少腹急結者乃可攻之宜桃核承氣湯膀胱陽腑陽腑病熱血下熱去所以自愈太陽病榮衛病也熱結膀胱太陽陽腑自病也太陽病身黃脈沉結少腹硬小便不利者為無血也小便自利其人如狂血證諦也抵當湯主之榮衛病時而脈沉發狂少腹硬膀胱熱也傷寒有熱少腹滿應小便不利今反利者為有血也當下之不可余藥宜抵當丸熱不實小便不利必熱實小便乃利太陽病六七日表證猶存脈微而沉反不結胸其人發狂以熱在下焦少腹當硬滿小便自利者下血乃愈所以然者以太陽隨經瘀熱在裏故也抵當湯主之榮衛之中有太陽之經腑熱則經熱入裏以上四章論太陽膀胱腑病則名實相符之太陽病也太陽腑病只有四章少陽膽經病少陽之為病口苦咽乾目眩也此一章論少陽經病之提綱傷寒中風五六日寒熱往來胸脅苦滿默默不欲飲食心煩喜嘔或心中煩而不嘔或渴或腹中痛脅下痞或心下悸小便不利或不渴身有微熱或咳者小柴胡湯主之非表可汗非裏可溫可下只可和解故曰經病所有諸證皆少陽經氣升降不和之現象血弱氣盡腠理開邪氣因入與正氣相搏結於脅下正邪分爭往來寒熱休作有時默默不欲飲食臟腑相連其痛必下邪高痛下故使嘔也小柴胡湯主之邪乃膽木克胃土痛乃肝木克脾土傷寒四五日身熱惡寒頸項強脅下滿手足溫而渴者小柴胡湯主之少陽經循脅下行脅下滿故屬少陽經病四五日詳傳經篇以上三章論少陽皆虛證傷寒發熱汗出不解心下痞硬嘔吐而下利者大柴胡湯主之下利乃胃熱痞嘔乃經結故解經兼下胃此一章論少陽實證然實在胃腑少陽經證仍虛也上篇讀法榮衛病上篇論榮衛表病本證又於表病未解時與表病已解後提出臟腑重病榮衛病上篇整個傷寒論之雛形也臟病上篇論臟病陰寒乃其本體凡外感風寒必榮衛先病臟腑後病榮衛不解裏氣鬱動臟陰偏盛之人乃陽退而病臟寒與榮衛不解裏氣鬱動腑陽偏盛之人乃陰退而病腑熱是相對的理路並無三陰直中三陽傳經之事不過腑陽偏盛亦須榮衛已病數日腑病乃成世遂誤認為傳經臟陰偏盛榮衛一病裏陽遂退臟病即成病成較速世遂誤認為直中遂將榮衛主表臟腑主裏表病不解裏氣乃動之天然的正路鬧錯此處一錯全部傷寒論之路路俱錯此篇臟病列於腑病之前者因臟病腑病只在各人素日陰陽偏盛的關係並無腑病為傳經臟病為直中之事風寒偏傷榮衛之後榮衛病成榮衛本體自病也榮衛不解臟腑病成亦臟腑本體自病也由榮衛入臟腑入臟入腑既無一定則列臟病在前或列腑病在前均無不可榮衛乃臟腑之表臟腑乃榮衛之裏榮衛臟腑本是一個所以表病不解裏病必作腑病上篇膀胱腑病列於胃腑病之後者腑病以胃為主體也凡下證皆胃家負責如不先認識胃腑應下之實證而據言膀胱腑病之下證輕重不分易致亂也少陽經病列於臟腑病之後者先知榮衛之表再知臟腑之裏然後能知少陽之經在半表半裏也經病之經字為少陽病之本證陽明雖有經病統在榮衛汗法之列經病不可汗故惟少陽有經病傷寒論難瞭解糾纏太多也原文詞意糾纏叔和編次糾纏注家不憑事實只憑理想糾纏此篇先立原則後立分則糾纏既清系統明白所以一讀即能整個瞭解上篇者原則也中篇榮衛病病常自汗出者此為榮氣和榮氣和者外不諧以衛氣不共榮氣和諧故耳以榮行脈中衛行脈外復發其汗榮衛和則愈榮內衛外所以榮衛一病必先寒後熱此一章論榮衛和合則不病分離則病太陽病發熱汗出者此為榮弱衛強故使汗出欲救邪風者桂枝湯主之疏泄失宜謂之邪風乃木氣失調之氣病人臟無他病時時發熱自汗出而不愈者此為衛氣不和也先於其時發汗則愈宜桂枝湯榮偏疏泄故弱衛不交榮故強上章同意以上二章論榮病太陽病服桂枝湯煩不解先刺風池風府卻與桂枝湯則愈刺通形質氣化易於運動二穴在大椎旁酒客家不可與桂枝湯得湯則嘔以酒客不喜甘故也酒客胃熱甘性壅緩助熱熱性往上故嘔凡服桂枝湯吐者其後必吐膿血也桂枝湯多熱藥吐膿血者血熱也以上三章論桂枝湯用法傷寒脈浮緊不發汗因致衄者麻黃湯主之麻黃湯衄前之法既衄則不可用太陽病脈浮緊發熱身無汗自衄者愈衄亦是汗義故愈太陽病脈浮緊無汗發熱身疼痛八九日不解表證仍在者麻黃湯主之服藥已微除其人發煩目瞑劇者必衄衄乃解所以然者陽氣重故也睡則陽氣下降而生相火故曰陽氣重以上三章論衛病脈浮緊者法當身疼痛宜以汗解假令尺中遲者不可發汗何以知之然以榮氣不足血少故也不可發汗言不宜用麻黃湯原劑發汗耳用極輕劑麻黃便合傷寒發汗宜解半日許復煩若脈浮數者可更發汗宜桂枝湯既服麻黃湯發汗不可再用麻黃湯以上二章論麻黃湯用法太陰脾臟病病發熱頭痛脈反沉不差身體疼痛當溫其裏宜四逆湯發熱頭痛身體疼痛表證脈沉臟寒裏證有表證脈當浮今脈沉故曰反沉為裏證之脈臟陰寒故脈沉下利清穀不可攻表汗出必脹滿臟寒攻表裏氣更虛故汗出脹滿下利腹脹滿身體疼痛者先溫其裏乃攻其表溫裏宜四逆湯攻表宜桂枝湯裏氣乃表氣之本故當先溫裏氣裏氣的陽氣充足表氣自能外解倘先解表則裏陽更虛矣攻字作治字解非攻伐之攻詩經云他山之石可以攻玉攻玉者治玉也古人文法常有如此者太陰病脈浮者可發汗宜桂枝湯已見吐利腹滿乃稱太陰病臟病忌汗臟病脈浮更當溫裏此章申明上章脈沉先溫之義耳若無吐利腹滿則不能稱太陰如曰四日太陰之太陰乃榮衛之事詳傳經篇以上四章論太陰臟病與榮衛表病同時發現宜先溫裏然後解表少陰腎臟病少陰病二三日至四五日腹痛小便不利下利不止便膿血者桃花湯主之下利而尿短腹痛濕寒木鬱此膿血濕寒證也陽虛木陷故下膿血少陰病二三日不已至四五日腹痛小便不利四肢沉重疼痛自下利者此為有水氣其人或咳或小便利或不利或嘔者真武湯主之尿利為下焦虛寒尿不利為水塞土濕木鬱腹痛肢重咳嘔皆水寒使然少陰病吐利手足厥冷煩躁欲死者吳茱萸湯主之煩躁欲死胃陽將亡矣故以溫降胃陽為治少陰病下利脈微澀嘔而汗出必數更衣反少者當溫其上灸之利減汗出而嘔陽亡於上故當溫上更衣入廁大便也少陰病下利白通湯主之少陰下利陰寒疑滯故治以溫通以上五章論少陰臟病少陰病下利脈微者與白通湯利不止厥逆無脈乾嘔煩者白通加豬膽汁湯主之服湯脈暴出者死微續者生陽欲離根上熱下寒溫藥中兼養陰之法陰不藏陽則脈暴出陰能藏陽則脈微續少陰病下利清穀裏寒外熱手足厥逆脈微欲絶身反不惡寒其人面色赤或腹痛或乾嘔或咽痛或利止脈不出者通脈四逆湯主之其脈即出者愈身熱面赤腹痛乾嘔皆中下陽亡之證以上二章論少陰病生死的關係少陰病脈微沉細但欲臥汗出不煩自欲吐至五六日自利復煩躁不得臥寐者死吐痢忽作又加煩躁中亡陽滅故死少陰病吐利煩躁四逆者死吐痢汗出肢冷皆為逆少陰病四逆惡寒而身蜷脈不至不煩而躁者死不煩而躁中亡陽散少陰病惡寒身蜷而利手足逆冷者不治惡寒而利又加肢冷陽亡不復故不治少陰病下利止而頭眩時時自冒者死陽氣離根向上飛越故下利止而眩冒少陰病六七日息高者死中氣離位而上浮故息高以上六章論少陰陽亡死證此等死證非醫藥所誤而成乃陽亡也少陰病吐利手足不厥冷反發熱者不死脈不至者灸少陰七壯手足不厥又見發熱者陽復也少陰病惡寒而蜷時自煩欲去衣被者可治煩欲去衣被者陽復也故可治少陰病下利若利自止惡寒而蜷臥手足溫者可治利止肢溫此陽復也少陰病脈緊至七八日自下利脈暴微手足反溫脈緊反去者為欲解也雖煩下利必自愈緊去肢溫脈微此陽復也此之下利必止一次乃臟氣復和之利以上四章論少陰陽復不死證少陰病始得之反發熱脈沉者麻黃附子細辛湯主之熱為表證沉為裏證解表溫裏雙解之法少陰病得之二三日麻黃附子甘草湯微發汗以二三日無裏證故微發汗也無裏證不用附子此乃偏重微發汗之言以上二章論少陰裏證與營衛表證同時發現表裏雙解之法少陰病脈細沉數病為在裏不可發汗臟陰病裏陽微故忌發汗以散陽氣臟病只宜溫寒不宜發汗上章麻黃兼表證也少陰病脈沉者急溫之宜四逆湯申上章陰臟不可發汗之意少陰病咳而下利譫語者被火氣劫故也小便必難以強責少陰汗也火氣發汗傷津熱藥亦火氣之類也少陰病但厥無汗而強發之必動其血未知從何道出或從口鼻或從目出是名下厥上竭為難治下則陽厥上則陰竭故為難治少陰病脈微不可發汗亡陽故也陽已虛而尺脈弱澀者復不可下之發汗能亡陽下亦能亡陽以上五章論少陰裏病不可汗厥陰肝臟病傷寒脈促手足厥逆者可灸之肝臟陽微不能四達故脈促肢冷乾嘔吐涎沫頭痛者吳茱萸湯主之肝臟俱寒胃陽亦敗陽微陰逆現證如此病人手足厥冷言我不結胸少腹滿按之痛者此冷結在膀胱關元也此木氣寒由於水氣寒之證也以上三章論厥陰肝臟病之溫法傷寒厥而心下悸者宜先治水當與茯苓甘草湯卻治其厥不爾水漬入胃必作利也水氣阻格心氣下降之路心氣不降故悸此一章論治水之法如不先治水而用溫藥治厥水被溫藥蒸迫入胃故必作利嘔而脈弱小便復利身有微熱見厥者難治四逆湯主之嘔則上逆尿利則下脫脈弱又厥故難治發熱而厥七日下利者為難治陽越於外又滅於內七日下利陽難復矣以上二章論厥陰臟病生死的關係傷寒發熱下利至甚厥不止者死陽越於外又絶於內故主死也傷寒六七日不利便發熱而利其人汗出不止者死有陰無陽故也七日來復之期忽然發熱下利汗多陽亡矣傷寒發熱下利厥逆躁不得臥者死躁不得臥陽氣脫根陽脫外散故發熱也傷寒六七日脈微手足厥冷煩躁灸厥陰厥不還者死七日當陽氣來復之期厥不還陽不復也下利手足厥冷無脈者灸之不溫若脈不還反微喘者死中氣消滅故見微喘下利後脈絶手足厥冷睟頻率還手足溫者生脈不還者死睟時一周時也傷寒下利日十餘行脈反實者死下利脈當微弱陽亡不能運化則脈實以上九章論厥陰陽亡死症傷寒五六日不結胸腹濡脈虛復厥者不可下此為亡血下之死腹濡為中虛血寒故下之即死傷寒脈遲六七日而反與黃芩湯徹其熱脈遲為寒今與黃芩湯復除其熱腹中應冷當不能食今反能食此名除中必死下利脈沉弦者下重也脈大者為未止脈微弱數者為欲自止雖發熱不死發熱不兼下利厥躁者此發熱為陽復此一章論厥陰陽復不死證下利脈沉而遲其人面少赤身有微熱下利清穀者必鬱冒汗出而解病人必微厥所以然者其面戴陽下虛故也面赤微熱陽氣上盛下利清穀陽氣下虛汗出則上下和平故微厥病解下利脈數有微熱汗出令自愈設復緊為未解脈數得汗陽氣通調脈復緊陽仍未通也以上二章論厥陰臟病陽復病解證陽明胃腑病問曰陽明病外證云何答曰身熱汗自出不惡寒反惡熱也汗自出反惡熱胃家陽實之現象問曰病有得之一日不惡熱而惡寒者何也答曰雖得之一日惡寒將自罷即自汗出而惡熱也胃家陽實故惡寒之表證易罷問曰惡寒何故自罷答曰陽明居中土也萬物所歸無所復傳始雖惡寒二日自止此為陽明病也陽明病胃陽實乃胃家自病經文傳字含意甚多詳傳經篇傷寒脈浮而緩手足自溫者是為係在太陰太陰者身當發黃若小便自利者不能發黃至七八日大便硬者為陽明病也傷寒轉係陽明者其人湒湒然微汗出也此借太陰以證陽明脈緩肢溫太陰陽明所同陽明則緩而實便硬汗出太陰則否以上四章論陽明腑病之外證問曰何緣得陽明病答曰太陽病若發汗若下若利小便此亡津液胃中乾燥因轉屬陽明不更衣內實大便難者是名陽明也胃陽原來偏旺津傷燥結則內實便難本太陽病初得病時發其汗汗先出不徹因轉屬陽明也胃陽原來偏旺故表氣鬱胃陽則實若表病汗解裏陽即不偏實問曰病有太陽陽明有正陽陽明有少陽陽明何謂也答曰太陽陽明者脾約是也正陽陽明者胃家實是也少陽陽明者發汗利小便已胃中燥煩熱大便難是也太陽發汗多津液傷則腸胃約結為脾約胃家實乃陽明實證來自榮衛與少陽皆虛證也以上三章論陽明胃腑病之來路陽明病不吐不下心煩者可與調胃承氣湯不吐不下津液未傷心煩乃胃家實之漸太陽病若吐若下若發汗微煩小便數大便因硬者與小承氣湯和之愈和字之意乃調和非泄下服後便軟為和表證以罷乃可用小承氣湯陽明病脈遲雖汗出不惡寒者其身必重短氣腹滿而喘有潮熱者此外欲解可攻裏也手足濈然而汗出者此大便已硬也大承氣湯主之若汗多微發熱惡寒者外未解也其熱不潮未可與承氣湯若腹大滿不通者可與小承氣湯微和胃氣勿令大泄下此遲字乃緩象陽明之緩有實象非虛緩但有惡寒即是表證尚在未成陽之據此上三章論陽明腑病初成之微下法陽明病自汗出若發汗小便自利者此為津液內竭雖硬不可攻之當須自欲大便宜蜜煎導而通之若土瓜根及與大豬膽汁皆可為導凡下證總要胃家實此乃肛門燥結而已趺陽脈浮而澀浮則胃氣強澀則小便數浮澀相搏大便則難其脾為約麻仁丸主之胃家陰液表傷不能下降則陽強而上浮陽明病本自汗出醫更重發汗病已差尚微煩不了了者此大便必硬故也以亡津液胃中乾燥故令大便硬當問其小便日幾行若本小便日三四行今日再行故知大便不久出今為小便數少以津液當還入胃中故知不久必大便也便硬則陽熱偏盛故煩雖煩胃家並不實問小便關係大如不問而用承氣湯則壞矣此數位乃數目之數脈浮而芤浮為陽芤為陰浮芤相搏胃氣生熱其陽則絶浮為陽盛芤為陰虛絶乃絶對非絶滅也脈陽微而汗出少者為自和也汗出多者為太過陽脈實因發其汗出多者亦為太過為陽絶於裏亡津液大便因硬也陽實又多汗故陰絶對然非胃家實之實傷寒四五日脈沉而喘滿沉為在裏而反發其汗津液越出大便為難表虛裏實久則譫語沉滿為裏實發汗則表虛久則屎燥故譫語汗出譫語者以有燥屎在胃中此為風也須下之過經乃可下之下之若早語言必亂以表虛裏實故也下之則愈宜大承氣湯風乃本身木氣疏淺之氣言汗出傷胃津液也過經過六日下之則愈二句接為風也三字讀便明顯以上七章論陽明便硬因津液被傷之虛證陽明病下之心中懊憹而煩胃中有燥屎可攻腹微滿初頭硬後必溏不可攻之若有燥屎者宜大承氣湯不可攻為主必潮熱滿痛拒按乃可攻也腹為滿上加若僅二字讀便明顯得病二三日脈弱無太陽柴胡證煩躁心下硬至四五日雖能食與小承氣湯少少與微和之令小安至六日與承氣湯一升若不大便六七日小便少者雖不能食但初頭硬後必溏未定成硬攻之必溏須小便利屎定硬乃可攻之宜大承氣湯太陽二字疑係少陽二字無少陽而心下硬故宜和能食為無燥屎然煩躁心下硬亦須和之不能食為有燥屎然尿少但初硬後必溏也心下硬為少陽證許少陽中以上二章論陽明便硬先硬後溏之虛證陽明病譫語發潮熱脈滑而疾者小承氣湯主之因與承氣湯一升腹中轉矢氣者更服一升若不轉矢氣勿更與之明日不大便脈反微澀者裏虛也為難治不可更與承氣湯也滑脈按有力然疾則不實矣可下脈必緩實非宿食之滑疾非實脈故用承氣反澀譫語潮熱脈反微澀故為難治傷寒若吐若下後不解不大便五六日上至十餘日日晡所發潮熱不惡寒獨語如見鬼狀若劇者發則不識人循衣摸床惕而不安微喘直視脈弦者生脈澀者死微者但發熱譫語者大承氣湯主之若一服利止後服弦為木氣生氣澀為無生氣微者句指無獨語諸證以上二章論陽明之敗證發汗不解腹滿痛者急下之宜大承氣湯燥土傷及太陰之陰陽明病發熱汗多者急下之宜大承氣湯燥土傷及少陰之陰傷寒六七日目中不了了睛不和無表裏證大便難身微熱者此為實也急下之宜大承氣湯燥土傷及厥陰之陰以上三章論陽明非常實證陽明證其人善忘必有畜血所以然者必有久瘀血故令善忘屎雖硬大便反易其色必黑宜抵當湯下之腎主藏智腎氣傷則善忘黑為腎色病人無表裏證發熱七八日雖脈浮數者可下之假令已下脈數不解合熱則消穀善飢至六七日不大便者有瘀血也宜抵當湯若脈數不解而下利不止必脋熱而便膿血也浮數可下乃設問詞消穀善飢血瘀生風浮數熱在經不在腑熱在經故便膿血以上二章論陽明蓄血之證陽明病下血譫語者此為熱入血室但頭汗出者刺期門隨其實而瀉之濈然汗出則愈但頭出汗肝膽經熱刺期門以瀉肝膽熱此一章論陽明病之婦人熱入血室證太陽病項背強幾幾汗出惡風者桂枝加葛根湯主之幾幾直硬意陽明經不前降則後陷而直硬足陽明經主前降手陽明經主後升手陽明經能後升足陽明經則前降太陽病項背強幾幾無汗惡寒者葛根湯主之幾幾之項強榮衛鬱而陽明經氣亦動也故雙解之太陽與陽明合病者必自下利葛根湯主之榮衛之氣與腸胃陽明燥熱之氣混亂熱則氣動熱氣動則自下利太陽與陽明合病不下利但嘔者葛根加半夏湯主之混亂之氣盛於下則利盛於上則嘔太陽與陽明合病喘而胸滿者不可下麻黃湯主之有榮衛之惡寒有陽明之脈大曰合病陽明病脈浮無汗而喘者發汗則愈宜麻黃湯此章與上章均重在喘字故主麻黃喘為肺實陽明之喘肺氣燥實內傷之喘多肺氣虛陽明病脈遲汗出多微惡寒者表未解也可發汗宜桂枝湯遲有緩象言不數也以上七章論榮衛與陽明胃腑經氣同病治法太陽病外證未解者不可下也下之為逆欲解外者桂枝湯主之外證未解而下之榮衛內陷矣故稱為逆夫病脈浮大問病者言但便硬耳設利之為大逆硬為實汗出而解何以故脈浮當以汗解脈浮為表證脈大為腑證腑證兼表證當先解表與表證兼臟證當先溫臟為對待理法傷寒不大便六七日頭痛有熱者與承氣湯其小便清者知不在裏仍在表也當須發汗若頭痛者必衄宜桂枝湯頭疼有熱陽明不降故衄此頭痛乃額角痛膽經上逆故痛二陽並病太陽初得病時發其汗汗先出不徹因轉屬陽明續自微汗出不惡寒若太陽病證不罷者不可下下之為逆如此可小發其汗設面色緣緣正赤者陽氣拂鬱在表當解之熏之若發汗不徹不足言陽氣拂鬱不得越當汗不汗其人煩燥不知痛處乍在腹中乍在四肢按之不可得其人短氣但坐以汗出不徹故也更發汗則愈何以知汗出不徹以脈澀故知也陰臟病連榮衛先溫後表否則榮衛內陷陽腑病連榮衛先表後下否則榮衛內陷汗徹則脈象和榮衛調澀則不和不調也病人煩熱汗出則解又如瘧狀日晡時發熱者屬陽明也脈實者宜下之脈浮虛者宜發汗下之宜大承氣湯發汗宜桂枝湯發熱脈實故屬腑證發熱脈虛故屬表證太陽病未解脈陰陽俱停必先振栗汗出而解但陽脈微者先汗出而解但陰脈微者下之而解若欲下之宜調胃承氣湯鬱極則脈停鬱極後通則振憟陽脈微腑氣不實也陰脈微燥熱傘津也以上六章論陽明兼榮衛須先汗以解表然後可下之法少陽膽經病傷寒中風有柴胡證但見一證便是不必悉具口苦耳聾目眩咽乾胸硬脅痛寒熱往來嘔而發熱者小柴胡湯主之少陽膽經上逆則嘔而發熱傷寒陽脈澀陰脈弦法當腹中急痛者先用小建中湯不差者與小柴胡湯主之陽澀陰弦木氣鬱結建中舒鬱柴胡散結主之似多此二字嘔家不可與建中湯以甜故也甘味壅緩嘔家胃逆不降忌甘味之壅緩以上四章論小柴胡湯用法太陽病十日已去脈浮細而嗜臥者外已解也設胸滿腹痛者與小柴胡湯主之榮衛病過十日嗜臥胸滿脈細屬少陽也傷寒六七日發熱微惡寒肢節煩疼微嘔心下支結外證未去者柴胡桂枝湯主之微嘔支結少陽證也太陽與少陽合病自下利者與黃芩湯若嘔者黃芩加半夏生薑湯相火熱而動故少陽經與表合病即利以上三章論榮衛表病與少陽經合病之治法陽明少陽合病必下利其脈不負者順也負者失也互相克賊名為負也脈滑而數者有宿食也當下之宜大承氣湯合病下利乃經氣紊亂之利木克土為負脈左盛右衰為負脈負為主宿食為陪服柴胡湯已渴者屬陽明也以法治之小柴胡多熱藥陽明偏燥故服之作渴以上二章論少陽與陽明合病之治法婦人中風發熱惡寒經水適來得之七八日熱除而脈遲身涼胸脅下滿如結胸狀譫語者此為熱入血室也當刺期門隨其實而瀉之血內熱故身涼譫語刺期門以瀉血熱婦人中風七八日續得寒熱發作有時經水適斷者此為熱入血室其血必結故使如瘧狀發作有時小柴胡湯主之三焦相火尺脈主之血室亦尺脈主之此病尺脈必動數婦人傷寒發熱經水適來之時晝日明瞭暮則譫語如見鬼狀者此為熱入血室無犯胃氣及上二焦則自愈熱入血室暮則熱增故譫語也不犯胃氣及上二焦小柴胡湯之法是也以上三章論婦人經期榮衛感傷風寒須治少陽之經之法中篇讀法中篇榮衛臟腑與少陽經各章亦皆榮衛臟腑少陽經之本體病也榮衛者十二臟腑公共組織以行於身之氣三陽三陰各居一半太陽只占十二分之二所以由榮衛可內傳十二臟腑由太陽只能由太陽本經內傳太陽本腑原文以太陽二字代替榮衛二字於是由表傳裏顯而易見之陰陽大路兩條拼成了太陽的一條太陽的一條如何能傳三陰原文榮衛三章足證太陽二字代替榮衛二字不然何以既稱太陽又稱榮衛乎讀原文榮衛三章可信內容六瓣之一橘足喻整個傷寒論的組織橘皮如榮衛六瓣如三陽腑三陰藏也陽明病者可下之實證也而不可下之虛證乃有如此之多上篇所載為實證中篇所載為虛證知陽明病實又知陽明能病虛然後能治傷寒陽明病少陽居榮衛表氣陽明裏氣之間故有與榮衛陽明相連之病婦人經水原於腎家少陽之腑居於腎中故主柴胡也下篇榮衛壞病太陽病三日已發汗若吐若下若溫針仍不解者此為壞病桂枝不中與也知犯何逆隨證治之汗吐下滅治病之法治之不愈遂成壞證本發汗而復下之此為逆也若先發汗治不為逆本先下之而復汗之為逆若先下之治不為逆本字作應當二字解以上二章論榮衛壞病之提綱傷寒醫下之續得下利清穀不止身疼痛者急當救裏後身疼痛清便自調者急當救表救裏宜四逆湯救表宜桂枝湯裏氣為表氣之本故先救裏救表是陪發汗後水藥不得入口為逆若更發汗必吐下不止脾臟陽虛之人發汗則陽更虛也發汗後身疼痛脈沈遲者桂枝加芍藥生薑各一兩人參三兩新加湯主之身痛脈沈遲中虛木枯也太陽病發汗後大汗出胃中乾煩躁不得眠欲得飲水者少少與之令胃氣和則愈若脈浮小便不利微熱消渴者五苓散主之水濕阻格相火不歸故脈浮發熱消渴小便不利四字為主病在陽應以汗解之反以冷水漱之灌之其熱被卻不得去彌更益煩肉上粟起意欲飲水反不渴者服文蛤散若不差者與五苓散寒實結胸無熱證與三物小陷胸湯白散亦可服病在陽此陽字作表字解寒字作痰字解無熱證無發熱表證小陷胸湯是痰結法白散是水結法以五苓散為主寒實結胸三句乃下文結胸之事應移小結胸病在心下按之則痛章後讀發汗後飲水多者必喘以水灌之亦喘發汗之後中虛不能化水水停氣逆故喘發汗已脈數煩渴者五苓散主之此證小便必不利小便若利忌用五苓散服桂枝湯或下之仍頭項強痛翕翕發熱無汗心下滿微痛小便不利者桂枝湯去桂加茯苓白朮湯主之頭項強痛乃濕阻也發汗後腹脹滿者厚朴生薑甘草半夏人參湯主之脹滿為中虛陰逆太陽病下之微喘者表未解故也桂枝加厚朴杏仁湯主之表病攻裏故表不解陰凝肺逆故作喘以上十章論榮衛壞入太陰脾臟傷寒下後心煩腹滿臥起不安者梔子厚朴湯主之腹滿為濕凝心煩為熱瘀土濕不運阻塞上焦火氣下降之路故熱瘀而作煩傷寒醫以丸藥大下之身熱不去微煩者梔子乾薑湯主之中寒故外熱熱瘀於上故心煩發汗若下之而煩熱胸中窒者梔子豉湯主之胸窒乃中虛不運煩熱乃熱為濕瘀發汗吐下後虛煩不得眠若劇者必反復顛倒心中懊憹梔子豉湯主之若少氣者梔子甘草豉湯主之若嘔者梔子生薑豉湯主之中虛熱瘀故心中懊憹凡用梔子湯病人舊微溏者不可與服之舊時大便不實之人寒藥須慎用也以上五章論榮衛壞入太陰脾臟濕熱瘀阻之證太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子湯主之腎陽泄故汗如漏水寒木鬱故肢急尿難發汗病不解反惡寒者虛故也芍藥甘草附子湯主之病不解為榮氣未和反惡寒為腎陽虛太陽病下之後脈促胸滿者桂枝去芍藥湯主之若微惡寒者去芍藥方中加附子湯主之脈促為表未解胸滿為膽經寒惡寒為腎陽虛下之後復發汗必振寒脈微細所以然者以內外俱虛故也發汗為外虛脈微細為內虛太陽病發汗汗出不解其人仍發熱心下悸頭眩身瞤動振振欲劈地者真武湯主之悸眩瞤動水寒木枯欲蒘地者中土無根欲居土下發汗若下之病仍不解煩躁者茯苓四逆湯主之陽逆於上則煩陰拔於下則燥虛寒兼濕下之後復發汗晝日煩躁不得眠夜而安靜不嘔不渴無表證脈微沈身無大熱者乾薑附子湯主之昔日陽氣在外陰氣離根故煩而燥夜則陽氣歸內故安靜未持脈時病人叉手自冒心師因教試令咳而不咳者此必兩耳無所聞也所以然者以重發汗虛故如此汗泄腎臟陽氣腎虛故而耳無所聞木氣衛塞也汗家重發汗必恍惚心亂小便已陰痛與禹餘糧丸中虛腎陽外泄故心亂水寒木陷故陰痛脈浮數者法當汗出而愈若下之身重心悸者不可發汗當自汗出乃解所以然者尺中脈微此裏虛須表裏實津液自和便自汗出愈濕溢則身重水停則心悸自汗則水濕俱去裏氣漸復則裏氣不虛乃能自己出汗裏氣漸復者腎陽復也發汗過多其人叉手自冒心心下悸欲得按者桂枝甘草湯主之水寒木陷風衝悸動肝陽上升風氣自平發汗後其人臍下悸者欲作奔豚茯苓桂枝甘草大棗湯主之風氣衝撞如豚之奔扶土達木風氣乃平燒針令其汗針處被寒核起而赤者必發奔豚氣從少腹上衝心者灸其核上各一壯與桂枝加桂湯更加桂二兩核起而赤者陽拔火泄也水寒則肝陽下陷肝陽下陷則風氣上衝故發奔豚太陽病下之後其氣上衝者可與桂枝湯用前法若不上衝者不可與之風氣不衝木氣未陷木未下陷故不可升木氣風氣即肝木陽氣故肝陽下陷則風氣上衝肝陽上升則風氣平也傷寒若嘔若下後心下逆滿氣上衝胸起則頭眩脈沉緊發汗則動經身為振振搖者茯苓桂枝白朮甘草湯主之振搖土敗風衝也水寒為因風衝為果傷寒脈浮醫以火迫劫之亡陽必驚狂起臥不安者桂枝湯去芍藥加蜀漆龍骨牡蠣救逆湯主之燒針之火引陽外出陽氣拔根故驚狂也火逆下之因燒針煩躁者桂枝甘草龍骨牡蠣湯主之煩躁比驚狂起臥不安為虛太陽傷寒者加溫針必驚也傷寒宜補中調榮衛溫針拔起腎陽故驚以上十八章論榮衛壞入少陰腎臟病人有寒復發汗胃中冷必吐蛔胃冷吐蛔厥陰之病汗亡胃陽之過下利脈大者虛也以其強下之故也設脈浮革因而腸鳴者屬當歸四逆湯革為寒浮大而革為虛木氣虛寒故腸鳴傷寒本自寒下醫復吐之寒格更逆吐下若食入口即吐者乾薑黃連黃芩人參湯主之吐為中寒入口即吐為上熱中寒與上熱俱盛也以上三章論榮衛壞入厥陰肝臟太陽病先發汗不解而復下之脈浮者不愈浮為在外而反下之故令不愈今脈浮故知在外當須解外則愈桂枝湯主之汗下不愈故為壞病下後無故則屬陽明大下之後復遽發汗小便不利亡津液故也勿治之得小便利自愈小便不利別無他病津液復生小便自利太陽病桂枝證醫反下之利遂不止脈促者表未解也喘而汗出者葛根黃連黃芩湯主之利不止為陰證脈促喘汗之利則陽證也脈促者句上加一若字讀便明顯利遂不止為陪脈促喘汗為主下後不可更行桂枝湯若汗出而喘無大熱者可與麻黃杏仁甘草石膏湯汗出為胃家燥熱喘為肺氣實逆無大熱者無表證之發熱身外大熱身內即不熱即忌此方發汗後不可更行桂枝湯汗出而喘無大熱者可與麻黃杏仁甘草石膏湯不可桂枝湯言宜麻杏湯也非一概不可也服桂枝湯大汗出後大煩渴不解脈洪大者白虎加人參湯主之大汗津液洪大虛脈大汗又煩渴故宜急救津液脈洪大又渴此洪大重按必兼滑象也傷寒病若吐若下後七八日不解熱結在裏表裏俱熱時時惡風大渴舌上干燥而煩欲飲水數升者白虎加人參湯主之欲字作能字解裏燥熱熱主泄故惡風裏熱極表亦熱此表熱非表證之熱表熱重按無根裏熱之熱有根太陽病先下之而不愈因復發汗以此表裏俱虛其人因致冒冒家汗出自愈所以然者汗出表和故也得裏未和然後下之虛乃津液傷津傷熱越故冒津傷則屎硬發汗後惡寒者虛故也不惡寒反惡熱者實也當和胃氣與調胃承氣湯僅是惡熱之實只宜和胃不宜下胃以上九章論榮衛壞入陽明胃腑太陽病以火熏之不得汗其人必燥到經不解必清血名為火邪清與圊通言入廁也經詳傳經篇脈浮宜以汗解用火灸之邪無從出因火而盛病從腰以下必重而痹名曰火逆腰下屬陰火邪傷陰故腰下重痹脈浮熱盛反灸之此為實實以虛治因火而動故咽燥吐血病熱得火故咽燥吐血也微數之脈慎不可灸因火為邪則為煩逆追虛逐實血散脈中火氣雖微內攻有力焦骨傷筋血難復也誤用熱藥亦能致此太陽病二日反燥反尉其背而大汗出火熱入胃胃中水竭煩燥必發譫語十餘日振栗自利者此為欲解也故其汗從腰以下不得汗欲小便不得反嘔欲失溲足下惡風大便硬小便當數而反不數及大便已頭卓然而痛其人足心熱穀氣下流故也振栗自利熱泄陰復故字上有若不自利意失溲惡風等皆津傷木鬱降而復升則頭痛太陽病中風以火劫發汗邪風被火熱血氣流溢失其常度兩陽相熏灼其身發黃陽盛則欲衄陰虛則小便難陰陽俱虛竭身體則枯燥但頭汗出劑頸而還腹滿微喘口乾咽爛或不大便久則譫語甚者至噦手足躁擾撚衣摸床小便利者其人可治兩陽熏灼故曰陽盛陽盛則陰傷而無小便陰氣復故小便利太陽病吐之但太陽病當惡寒今反不惡寒不欲近衣此為吐之內煩也吐傷胃氣胃逆生熱胃虛逆熱故生內煩太陽病當惡寒發熱今自汗出不惡寒發熱關上脈細數者以醫吐之過也一二日吐之者腹中飢口不能食三四日吐之者不喜糜粥欲食冷食朝食暮吐以醫吐之所致也此為小逆胃陽浮微忌用涼藥胃虛熱逆故欲冷食胃虛不運故仍吐出以上八章論榮衛壞入陽明胃腑津液虛之證結胸痞證病發於陽而反下之熱入因作結胸病發於陰而反下之因作痞所以成結胸者以下之太早故也腑陽當下下早結胸臟陰忌下誤下成痞此一章論結胸痞證之提綱太陽病脈浮而動數浮則為風數則為熱動則為痛數則為虛頭痛發熱微盜汗出而反惡寒者表未解也醫反下之動數變遲膈內拒痛胃中空虛客氣動膈短氣躁煩心中懊憹陽氣內陷心下因硬則為結胸大陷胸湯主之若不結胸但頭汗出余處無汗劑頸而還小便不利者身必發黃也胃中空虛故客氣動膈客氣應往下降返逆不降之氣尿利周身有汗濕熱有出路則不發黃也傷寒六七日結胸熱實脈沉而緊心下痛按之石硬者大陷胸湯主之沉為實象緊為結聚之象有實故石硬太陽病重發汗而復下之不大便五六日舌上燥而渴日晡時小有潮熱從心下至少腹硬滿而痛不可近者大陷胸湯主之硬滿而痛水邪結實經氣不能運行也結胸者項亦強如柔痙狀下之和宜大陷胸丸前胸陰虧則項反折病連頸項不可急攻結胸證其脈浮大者不可下下之則死關脈沉實下其實也浮大不沉中下虛也此證經文未列方附子理中丸甚合結胸證悉具煩燥者亦死結胸煩燥中下陽脫也小結胸病在心下按之則痛脈浮滑者小陷胸湯主之滑脈重按不空按之痛為有邪實太陽病二三日不得臥但欲起心下必結脈微者此本有寒分也反下之若利止必作結胸未止者四日復下之此作協熱利也不臥心結脈微中下虛寒也二三日陽明少陽經期太陽病下之其脈促不結胸者此為欲解也脈浮者必結胸也脈緊者必喉痛脈弦者必兩脅拘急脈細數者頭痛未止脈沉緊者必欲嘔脈沉滑者協熱利脈浮滑者必下血脈浮結胸理中湯證緊乃閉束弦乃木邪細數津枯沉細寒束沉滑浮滑則經熱也以上九章論結胸問曰病有結胸有臟結其狀何如答曰按之痛寸脈浮關脈沉名曰結胸何謂臟結答曰如結胸狀飲食如故時時下利寸脈浮關脈細小沉緊名曰臟結舌上白胎滑者難治下利胎白滑脈上盛下虛火土將亡也病脅下素有痞連在臍旁痛引少腹入陰筋者此名臟結死少腹屬腎陰筋屬肝水木皆寒生機將滅臟結無陽證不往來寒熱其人反靜舌上胎滑者不可攻也臟結無陽證純陰也如能作熱尚有生機以上三章論臟結以證結胸太陽病外證未解而數下之遂協熱而利利下不止心下痞硬表裏不解者桂枝人參湯主之利下不止上加一若字便明顯痞硬寒利協熱而利為陪利下不止心下痞硬為主此章與上文葛根黃連黃芩湯為對待之法傷寒大下後復發汗心下痞惡寒者表未解也不可攻痞當先解表表解乃可攻痞解表宜桂枝湯攻痞宜大黃黃連瀉心湯主之先用涼藥攻痞則榮衛內陷裏為表之本故解表乃可攻痞脈浮而緊而復下之緊反入裏則作痞按之自濡但氣痞耳心下痞按之濡其脈關上浮者大黃黃連瀉心湯主之心下痞而復惡寒汗出者附子瀉心湯主之濡為濕熱惡寒乃陽虛汗出乃上熱也太陽中風下利嘔逆表解者乃可攻之其人漐漐汗出發作有時頭痛心下痞硬滿引脅下痛乾嘔短氣汗出不惡寒者此表解裏未和也十棗湯主之水氣阻礙上焦降氣故現諸證傷寒汗出解之後胃中不和心下痞硬乾噫食臭脅下有水氣腹中雷鳴下利者生薑瀉心湯主之水氣因外熱而亂溢膽胃因中寒而不運故現諸證傷寒中風醫反下之其人下利日數十行穀不化腹中雷鳴心下痞硬而滿乾嘔心煩不得安醫見其心下痞謂病不盡復下之其痞益甚此非結熱但以胃中虛客氣上逆故使硬也甘草瀉心湯主之原理與上章相同中氣較上章虛寒傷寒服湯藥下利不止心下痞硬服瀉心湯已復以他藥下之利不止醫以理中與之利益甚理中者理中焦此利在下焦赤石脂禹餘糧湯主之復利不止者當利其小便中不虛寒誤服溫補中愈滯故利愈甚本以下之故心下痞與瀉心湯痞不解其人渴而口燥煩小便不利者五苓散主之水濕阻在心下亦能心痞五苓證尿不利傷寒發汗若吐若下解後心下痞硬噫氣不除者旋覆花代赭石湯主之中傷胃逆故痞硬氣噫病如桂枝證頭不痛項不強寸脈微浮胸中痞硬氣上衝咽喉不得息者此為胸有寒也當吐之宜瓜蒂散諸亡血家不可與之寒字作痰字解痰在上焦故可用吐法果胸寒則忌吐傷寒吐下後發汗虛煩脈甚微八九日心下痞硬脅下痛氣上衝咽喉眩冒經脈動惕者久而成萎有上逆諸證而經脈動惕津血枯極故久則成萎太陽病醫發汗遂發熱惡寒因復下之心下痞表裏俱虛陰陽氣俱竭無陽則陰獨復加燒針因胸煩面色青黃膚瞤者難治今色微黃手足溫者易愈燒針傷陰木枯克土微黃肢溫木土尚和獨少也以上十二章論痞證太陰脾臟熱病傷寒胸中有熱胃中有邪氣腹中痛欲嘔吐者黃連湯主之中下濕寒中上濕熱傷寒脈浮而緩手足自溫者繫在太陰太陰身當發黃若小便自利者不能發黃至七八日雖暴煩下利日十餘行必自止以脾家實腐穢當去故也脾濕瘀熱故病發黃腐穢即脾家實物傷寒身黃發熱者梔子蘗皮湯主之身黃發熱尿必不利熱瘀濕中故也傷寒瘀熱在裏身必發黃麻黃連軺赤小豆湯主之土敗濕生鬱阻木氣木鬱生熱熱瘀之由傷寒七八日身黃如橘子色小便不利腹微滿者茵陳蒿湯主之熱因濕瘀濕因熱聚熱下尿通濕乃出去以上五章論太陰脾臟濕鬱木氣木鬱生熱證本太陽證醫反下之因而腹滿時痛者屬太陰也桂枝加芍藥湯主之脾傷不運木氣遂結太陰陰寒無下證也大實痛者桂枝加大黃湯主之木邪由結而實下結實之木邪非下太陰土氣太陰為病脈弱其人續自便利設當行大黃芍藥者宜減之以其胃氣弱易動故也太陰陽微無下證芍藥大黃性寒敗陽傷寒發汗已身目為黃所以然者以寒濕在裏不解故也以為不可下也當於寒濕中求之濕寒黃為土氣本病濕熱黃為木氣瘀熱以上四章論太陰脾臟熱病之下證下木氣之結非下太陰也少陰腎臟熱病少陰病欲吐不吐心煩但欲寐五六日自利而渴者屬少陰也虛故引水自救若小便色白者少陰病形悉具小便白者以下焦虛有寒不能制水故令色白也欲吐心煩為陽復利傷津故渴若小便色白以下以虛寒證明陽復也少陰病二三日咽痛者可與甘草湯不差者與桔梗湯腎陽復生心火火不降則咽痛中氣虛也少陰病咽中痛半夏散及湯主之陽復上衝化火咽痛少陰病咽中生瘡不能言語聲音不出者苦酒湯主之少陰陽復是生心火火逆傷肺之證也少陰病下利咽痛胸滿心煩者豬膚湯主之陽復化熱傷津滋補津液以養陽氣故愈病人脈陰陽俱緊反汗出者陽亡於外也此屬少陰法當咽痛而復吐利陽亡亦咽痛上熱因下寒也補上章之義少陰病下利六七日咳而嘔渴心煩不得眠者豬苓湯主之陽復化燥土氣又濕少陰病得之二三日以上心中煩不得臥黃連阿膠湯主之陽復化熱灼傷陰液之證少陰病八九日一身手足盡熱者以熱在膀胱必便血也膀胱經行身外故身盡熱熱不藏故便血少陰病四逆其人或咳或悸或小便不利或腹中痛或泄利下重者四逆散主之陽復生熱熱生木滯故現諸證少陰病便膿血者可刺陽復化熱熱傷陰血刺法所以泄熱也少陰病下利便膿血者桃花湯主之申明上章少陰便膿血之本病原是寒也以上十二章論少陰腎臟陽復生熱少陰病飲食入口即吐心中溫溫欲吐復不能吐始得之手足寒脈弦遲者此胸中實不可下也當吐之若膈上有寒飲乾嘔者急溫之宜四逆湯肢寒弦遲乃實痰在胸阻滯陽氣不通之證此一章論少陰陽復之吐證少陰負趺陽者順也少陰寒水趺陽中土土旺為順言陽勝陰負乃為順也少陰病得之二三日口燥咽乾急下之宜大承氣湯水負太過亦不宜也少陰病自利清水色純青心下必痛口乾燥者急下之宜大承氣湯少陰之急下證乃水負太過之證少陰病六七日腹脹不大便者急下之宜大承氣湯少陰病燥土克傷水分之病非少陰本病一為燥土克傷少陰心液二為燥土克傷肝液三為燥土克傷脾液上列急下三證特別少有以上四章論少陰下證下燥土也非下少陰也此病傷寒少有厥陰肝臟熱病凡厥者陰陽氣不相順接便為厥厥者手足逆冷是也諸四逆厥者不可下虛家亦然降極而升升極而降陰陽相接便不見厥傷寒一二日以至四五日而厥者必發熱前熱者後必厥厥深者熱亦深厥微者熱亦微厥應下之而反發汗者必口傷爛赤陰陽往復厥熱迭現下字作清字解傷寒厥五日熱亦五日設六日當復厥不厥者自愈厥終不過五日以熱五日故知自愈升降均和則六日不厥傷寒厥四日熱反三日復厥五日其病為進寒多熱少陽氣退故為進也厥多為陽退則上章厥應下之乃熱深也熱深亦厥陽退亦厥寒熱之分全慿脈證傷寒始發熱六日厥反九日而利凡厥利者當不能食今反能食恐為除中食以索餅不發熱者知胃氣尚在必愈恐暴熱來出而復去也後三日脈之其熱續在者期之旦日夜半愈所以然者本發熱六日厥反九日復發熱三日並前六日亦為九日與厥相應故期之旦日夜半愈後三日脈之而脈數其熱不罷者此為熱氣有餘必發癰膿也六日九日設詞食後發熱胃陽外散也以上五章論厥陰肝臟復生熱仍以陽退生寒以明之也傷寒發熱四日厥反三日復熱四日厥少熱多其病當愈四日至七日熱不除者必便膿血厥少熱多陽氣復旺陰經之熱最傷血也傷寒熱少厥微指頭寒默默不欲食煩躁數日小便利色白者此熱除也欲得食其病為愈若厥而嘔胸脅煩滿者其後必便膿血厥與嘔煩並見熱蓄於陰經之中故便膿血下利脈數而渴者令自愈設不差必圊膿血以有熱故也陰經陽復之熱最傷陰血故也傷寒先厥後發熱而下利者必自止見厥復利由陰轉陽故利自止由陽轉陰故復利傷寒先厥後發熱下利必自止而反汗出咽中痛者其喉為痹汗出傷陰咽痛熱滯故喉痹痹者血傷也發熱無汗而利必自止若不止必便膿血便膿血者其喉不痹熱傷陰部故便膿血熱血俱去故喉通也下利寸脈浮數尺脈自澀者必圊膿血浮數經熱尺澀陰熱陰經屬血熱故膿血下利有微熱而渴脈弱者令自愈微熱而渴為陽復脈弱乃陽復本象厥陰病欲飲水者少少與之欲飲為陽復之熱微陽初復難消化水也下利欲飲水者以有熱也白頭翁湯主之木陷陽復故下利有熱熱清木氣自升熱利下重者白頭翁湯主之木熱下陷而又疏泄疏泄不通故下重下利後更煩按之心下濡者為虛煩也厥陰陽復陰陽未調故煩心下濡有濕也下利譫語者有燥屎也宜小承氣湯此燥屎乃陰液被陽復之熱所傷而成者凡可下之利必水中夾硬粒且利時有屁舌有黃苔以上十三章論厥陰肝臟陽復生熱傷血病人手足厥冷脈乍緊者邪結在胸中心下滿而煩飢而不能食者病在胸中當吐之宜瓜蒂散肢冷脈緊痰阻清陽風木鬱衝故飢不食此一章論厥陰肝臟陽復之吐證陽明胃腑寒病陽明病若能食名中風不能食名中寒中字作病字解風字是陪詞熱之意也陽明病若中寒不能食手足濈然汗出此欲作固瘕必大便初硬後溏所以然者胃中冷水穀不別故也胃中冷不是外寒入胃冷的此汗出無燥證大便下白物為固瘕脈浮而遲表熱裏寒下利清穀者四逆湯主之若胃中虛冷不能食者飲水則噦水之消化較難於穀噦者噁心欲吐之意陽明病不能食攻其熱必噦所以然者胃中虛冷故也胃氣大敗則噦不能食虛又被攻故大敗病人脈數數為熱當消穀引食而反吐者此以發汗令陽氣微膈氣虛脈乃數也數為客熱不能消穀以胃中虛冷故也火熱藏於下為主逆與上為客火逆於上中下皆塞中塞不能運化四維故脈數也傷寒大吐大下之極虛復極汗出者以其人外氣拂鬱復與之水以發其汗因得噦所以然者胃中虛冷故也拂鬱者皮膚作癢也外氣不交內氣則拂鬱而為癢中寒故也陽明病法多汗反無汗其身如蟲行皮中狀者此久虛故也申明上章外氣拂鬱之證陽氣虛越故癢陽明病心下硬滿者不可攻之攻之利遂不止者死利止者愈硬滿為中寒利不止則中氣亡故也結寒嘔多雖有陽明證不可攻之膽經不降則嘔膽逆則中下皆寒故忌攻發汗多若重發汗者亡其陽譫語脈短者死脈自和者不死亡陽譫語心氣失根心主脈脈短無生意直視譫語喘滿者死下利者亦死直視譫語喘滿肝心肺胃絶下利脾腎絶夫實則譫語虛則鄭聲鄭聲者重語也申明上兩章亡陽之譫語乃是虛證也以上十二章論陽明胃腑陽退生寒證此胃家陽不實也食穀欲嘔者屬陽明也吳茱萸湯主之得湯反劇者屬上焦也胃冷宜溫中寒不運上焦反熱陽明病無汗小便不利心中懊憹者身必發黃熱濕瘀積膈膜之上水之化源不通故黃陽明病面合赤色不可攻之必發熱色黃小便不利面赤為火越攻之火散無歸故發黃也陽明病發熱汗出者此為熱越不能發黃也但頭汗出身無汗劑頸而還小便不利渴欲飲水漿者此為瘀熱在裏身必發黃茵陳蒿湯主之但頭汗出熱也小便不利濕也故病黃陽明病下之其外有熱手足溫不結胸心中懊憹飢不能食但頭汗出者梔子豉湯主之肢溫頭汗熱在上也膈上熱瘀故懊憹也陽明病被火額上微汗出小便不利者必發黃火熏則生熱熱瘀濕中故黃額上汗熱也陽明病脈遲食難用飽飽則微煩頭眩必小便難此欲作穀疸雖下之腹滿如故所以然者脈遲故也此脈遲為胃虛胃虛遭下所以不愈傷寒噦而腹滿視其前後知何部不利利之則愈腹滿而噦濕熱虛證二便清通濕熱出路以上八章論陽明胃腑陽虛又兼上熱證陽明病發潮熱大便溏小便自可胸脅滿不去者小柴胡湯主之少陽膽經由耳下胸循脅便溏尿利非脾濕乃膽熱潮熱膽胃熱也陽明病脅下硬滿不大便而嘔舌上白胎者可與小柴胡湯上焦得通津液得下胃氣因和身濈然而汗出解也上焦津液不通故舌上胎白胃和則汗出以上二章論陽明胃腑虛而又兼少陽經之病少陽膽經壞病本來太陽病不解轉入少陽者脅下硬滿乾嘔不能食往來寒熱尚未吐下脈沉緊者與小柴胡湯若已吐下發汗溫針譫語柴胡證罷此為壞病知犯何逆以法治之轉入少陽實少陽自病少陽經結故脈沉緊此一章論少陽經壞病之提綱傷寒五六日已發汗而復下之胸脅滿微結小便不利渴而不嘔但頭汗出往來寒熱心煩者此為未解也柴胡桂枝乾薑湯主之滿結渴汗寒熱心煩少陽證小便不利太陰證傷寒八九日下之胸滿煩驚小便不利譫語一身盡重不可轉側者柴胡加龍骨牡蠣湯主之相火根拔則煩驚譫語土濕則身盡重得病六七日脈遲浮弱惡風寒手足溫醫二三下之不能食而脅下滿痛面目及身黃項強小便難者與柴胡湯後必下重本渴而飲水嘔者柴胡湯不中與也食穀者噦身黃項強尿難太陰濕也服寒藥則下重以上三章論少陽膽經壞入太陰脾贓傷寒脈弦細頭痛發熱者屬少陽少陽不可發汗發汗則譫語此屬胃胃和則愈不和則煩而悸弦細譫語津液耗傷津傷火浮故煩悸也傷寒二三日心中悸而煩者小建中湯主之木土液傷相火不降則煩悸三日少陽期詳傳經篇傷寒脈結代心動悸者炙甘草湯主之土木津液虧極則動悸結代醫藥之誤也太陽病過經十餘日反二三下之後四五日柴胡證仍在者先與小柴胡湯嘔不止心下急鬱鬱微煩者為未解也大柴胡湯下之則愈急鬱煩三證須右脈實大或沉緊沉滑方可下傷寒十三日不解胸脅滿而嘔日晡所發潮熱已而微利此本柴胡證下之而不得利今反利者知醫以丸藥下之非其治也潮熱者實也先以小柴胡湯以解外復後以柴胡加芒硝湯主之下藥不兼解少陽故利而少陽病證仍在下之而不利的而字易當字讀便明顯凡柴胡湯病證而下之若柴胡證不罷者復與柴胡湯必蒸蒸而振卻發熱汗出而解下後經氣內陷再升之則經和振寒而解以上六章論少陽膽經壞入陽明胃腑傷寒十餘日熱結在裏復往來寒熱者與大柴胡湯但結胸無大熱者此為水結在胸脅也但頭微汗出者大陷胸湯主之無大熱無表熱也汗出內熱也水結可攻水傷寒五六日嘔而發熱者柴胡湯證具而以他藥下之柴胡證仍在者復與柴胡湯此雖已下之不為逆必蒸蒸而振卻發熱汗出而解若心下滿而硬痛者此為結胸也大陷胸湯主之但滿而不痛者此為痞柴胡不中與也宜半夏瀉心湯痞證中寒上熱中虛濕鬱以上二章論少陽膽經壞病結胸痞證太陽少陽並並病而反下之成結胸心下硬下利不止水漿不入其人心煩下利不止水漿不入心下硬而兼心煩便非太陰寒利太陽與少陽並並病頭項強痛或眩冒時如結胸心下痞硬者當刺大椎第一間肺俞肝俞慎不可發汗發汗則譫語脈弦五六日譫語不止當刺期門肺俞瀉泄衛肝俞泄榮期門泄肝肝泄膽和太陽少陽並並病心下硬頸項強而眩者當刺大椎肺俞肝俞慎勿下之上章忌汗本章忌下故用刺法津液不傷又能愈病以上三章論榮衛與少陽經並並病結胸下篇讀法壞病榮衛臟腑各有正病病在榮衛經醫治誤牽連臟腑表裏混亂是曰壞病結胸榮衛之氣與胃腑經氣被下混亂中氣下傷經氣陷而不升則為協熱下利經氣陷而復升將水飲邪熱結聚於胃口之上則為結胸關上脈浮者水邪格熱於上關脈沉者水邪結於胃口也大陷胸湯下水下熱其力甚猛胃中空虛四字垂訓深矣痞證中氣下虛不能運化有虛兼濕寒虛兼濕熱之分寒則陰臟本氣熱則濕鬱不行阻塞木火升降之路結胸與痞證乃壞證之更壞證也先知榮衛本病臟腑本病然後知榮衛臟腑牽連不分之壞病故壞病結胸痞證列於下篇先知陰臟本病只病寒不病熱然後知陰臟病熱別有原因先知陽腑本病只病熱不病寒然後知陽腑病寒別有原因故陰臟熱證陽腑寒證列於下篇先知榮衛本病臟腑本病少陽經本病然後知少陽經牽連臟腑榮衛之壞病故少陽壞病列於下篇上篇各本體病各章能先徹底認識下篇各章自能認識也傳經篇傳經各章大凡病若發汗若吐若下若亡津液陰陽自和者必自愈陰陽氣鬱必生阻滯阻滯既去陰陽自和和則病愈陰陽不和陽盛陰退則病入腑陰盛陽退則病入臟入臟入腑則臟腑自病傷寒一日太陽受之脈若靜者為不傳頗欲吐若躁煩脈數急者為傳也不傳者不入臟腑為傳者或入臟或入腑傷寒三日三陽為盡三陰當受邪其人反能食而不嘔此為三陰不受邪也榮衛中有六經一曰太陽二曰陽明三曰少陽四曰太陰五曰少陰六曰厥陰三日之後應屬三陰之經不受邪不傳也傷寒六七日無大熱其人躁煩者此為陽去入陰故也入陰者入三陰臟實陰臟自病傷寒二三日陽明少陽證不見者為不傳也不傳不入陽明之腑不傳少陽之經也入陽明腑亦陽明腑自病傳少陽經亦少陽經自病也太陽病頭痛至七日已上自愈者以行其經盡故也若欲作再經者針足陽明使經不傳則愈使經不傳使榮衛不傳榮衛也針榮衛中之胃經以泄榮衛之氣故愈傳經二字是榮衛傳榮衛陽旺之人乃能再經針胃經以泄陽旺之氣陰陽自和故病愈而不再傳若陽氣不旺之人如榮衛不能汗解則入三陰之臟不能再作經也傷寒三日少陽脈小者欲已也三日為少陽經之期脈小少陽經氣不動風家解表而不了了者十二日愈一日一經十二日則榮衛傳榮衛兩周以上八章論傳經病有發熱惡寒者發於陽也無熱惡寒者發於陰也發於陽者七日愈發於陰者六日愈以陽數七陰數六也此章言榮衛表病不入裏大概不必拘執傳經讀法經字應當作兩解一作表字解一作裏字解表則統屬於榮衛裏則各分臟腑傳字應作兩解一作入字解一作傳字解由榮衛入臟腑曰入既入此臟此腑則不再入彼臟彼腑之謂由榮衛傳榮衛曰傳一日太陽二日陽明三日少陽四日太陰五日少陰六日厥陰不論何日應傳何經只要不見何經本臟本腑之病仍是惡寒發熱身痛仍是榮衛之事之謂榮衛者六經公共之表氣也臟腑者六經各個之裏氣也公共的為傳各個的為入名雖曰入其實乃為各個自病也人身臟腑以外皆為榮衛皮毛屬太陽皮下白肉屬陽明白肉下之膜屬少陽膜下紅肉屬太陰骨屬少陰筋屬厥陰故一日太陽二日陽明云云也疑難篇疑難各章傷寒脈浮自汗出小便數心煩微惡寒腳攣急反與桂枝湯欲攻其表此誤也得之便厥咽中乾煩燥吐逆者作甘草乾薑湯與之以復其陽若厥愈足溫者更作芍藥甘草湯與之其足即伸若胃氣不和譫語者少與調胃承氣湯若重發汗復加燒針者四逆湯主之脈浮自汗尿數心煩惡寒攣急乃津液耗傷的陰虧證厥乾躁煩吐乃中宮陽亡的寒症熱藥耗津拔陽故服熱藥中氣轉寒但雖中寒而津傷絡熱故攣急譫語燒針拔陽更甚問曰證象陽旦按法治之而增劇厥逆咽中乾兩脛拘急兩而譫語師言夜半手足當溫兩脛當伸後如師言何以知之答曰寸口脈浮而大浮則為風大則為虛風則生微熱虛則兩脛攣病證象桂枝因加附子參其間增桂令汗出附子溫經亡陽故也厥逆咽中乾煩燥陽明內結譫語煩亂更飲甘草乾薑湯夜半陽氣還兩足當熱脛尚微拘急重與芍藥甘草湯兩脛乃伸以承氣湯微溏則止其譫語故知病可愈陽旦證即桂枝湯證附子能補陽亦能拔陽躁為陽氣拔跟雖陽明譫語先溫中回陽後用清潤病則壞矣法則嚴焉以上二章論榮衛壞入太陰脾臟牽連肝胃太陽病寸緩關浮尺弱其人發熱汗出復惡寒不嘔但心下痞者此以醫下之也如其不下者病人不惡寒而渴者此轉屬陽明也小便數者大便當硬不更衣十日無所苦也渴欲飲水少少與之但以法救之渴者宜五苓散渴欲飲水四句接醫下之也句讀如其不下者句下有心下不痞意無所苦無胃實證前為榮衛而太陰後為榮衛而陽明此一章論榮衛壞入太陰脾臟借陽明胃燥以明之傷寒六七日大下後寸脈沉而遲手足厥逆下部脈不至咽喉不利吐膿血泄利不止者為難治麻黃升淋湯主之中氣虛寒金燥木熱上逆下陷經絡閉塞此病復雜矣此一章論榮衛牽連肝肺壞病陽明中風口苦咽乾腹滿微喘發熱惡寒脈浮而緊若下之小便難也由榮衛中風而陽明病為陽明中風口苦少陽滿喘陽明寒熱脈浮太陽為三陽合病陽明病脈浮而緊咽燥口苦腹滿而喘發熱汗出不惡寒反惡熱身重若發汗則躁心憒憒反譫語若加燒針必怵惕煩躁不得眠若下之則胃中空虛客氣動膈心中懊憹舌上胎者梔子豉湯主之若渴欲飲水口乾舌燥者白虎加人參湯主之若脈浮發熱渴欲飲水小便不利者豬苓湯主之脈浮太陽緊與咽燥口苦少陽腹滿至身重陽明心中九句先接身重句讀三陽合病之陽明陽不實濕反多陽明病汗出多而渴者不可與豬苓湯以汗多胃中燥豬苓湯復利其小便故也申明上章小便不利汗出多小便即少也陽明中風脈弦浮大而短氣腹部滿脅下及心痛久按之氣不通鼻乾不得汗嗜臥一身及面目悉黃小便難有潮熱時時噦耳前後腫刺之小差外不解病過十日脈續浮者與小柴胡湯脈但浮無余證者與麻黃湯若不尿腹滿加噦者不治弦少陽浮太陽太陽明短氣腹滿黃噦陽明鼻乾潮熱陽明脅痛心痛嗜臥少陽少陽經循耳前後不尿腹滿為脾敗噦為胃敗故成不治三陽合病腹滿身重難以轉側口不仁而面垢譫語遺尿發汗則譫語下之則額上生汗手足逆冷若自汗出者白虎湯主之腹滿身重至遺尿諸證如加自汗是陽明燥極之證如不自汗而發汗傷津譫語更甚如下之則傷胃陽也若自汗句接遺尿句讀以上五章論榮衛與陽明少陽合病陽明病脈沉而緊者必潮熱發作有時但浮必盜汗出沉緊閉束之象熱不能通故潮熱有時浮為陰虛熱越故盜汗陽明病初欲食小便反不利大便自調其人骨節痛翕翕如有熱狀奄然發狂濈然汗出而解者此水不勝穀氣與汗共並脈緊則愈尿難骨痛水濕之病穀氣作汗水濕即出先狂而後汗出鬱而後通也陽明病反無汗而小便利二三日咳而嘔手足厥者必苦頭痛若不咳不嘔不厥者頭不痛咳嘔厥脈緊之證閉束不降故頭痛陽明病但頭眩不惡寒故能食而咳其人必苦咽痛若不咳者咽不痛眩與咳皆閉束不降咽痛者氣不降也以上四章論陽明脈緊太陽病過經十餘日心下溫溫欲吐而胸中痛大便反溏腹微滿鬱鬱微煩先此時自極吐下者與調胃承氣湯若不爾者不可與但欲嘔胸中痛微溏者此非柴胡證以嘔故知極吐下也少陽經結故十餘日病不解他經無十餘日病仍如故者自吐自下大柴胡證大柴余波故與調胃如非大柴余波腹滿便溏乃太陰寒證但嘔而無自吐自下故知非大柴胡證嘔與自吐自下皆大柴胡證故以既嘔則知自吐自下也傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有裏也汗出為陽微假令純陰結不得復有外證悉入在裏此為半在表半在裏也脈雖沉緊不得為少陰病所以然者陰不得有汗今頭汗出故知非少陰也可與小柴胡湯設不了了者得屎而解少陽病即病結小柴胡湯補中升降以解結惡寒冷滿硬細皆結頭汗表結脈沉裏結得屎而解用大柴胡湯也以上二章論少陽與陽明少陰之疑似證少陽中風兩耳無所聞目赤胸中滿而煩者不可吐下吐下則悸而驚由榮衛中風而少陽經病為少陽中風少陽不直接中風此一章論少陽病當保津液太陰中風四肢煩疼陽微陰澀而長者為欲愈由榮衛中風而太陰病為太陰中風少陰中風陽微陰浮為欲愈由榮衛中風而少陰病為少陰中風厥陰中風脈微浮為欲愈不浮為未愈由榮衛中風而厥陰病為厥陰中風世謂三陰直中其根據即在此然則上文陽明中風少陽中風又將何説以上三章論三陰將愈之證太陰病欲解時從亥至醜上疑闕少陰病欲解時從子至寅上疑闕厥陰病欲解時從醜至卯上疑闕太陽病欲解時從巳至未上疑闕陽明病欲解時從申至戌上疑闕少陽病欲解時從寅至辰上疑闕疑難篇讀法讀傷寒論要一眼將整個看個了然偶因一章疑難費解便將整個耽擱本篇讀法為能一眼了然整個之故將疑難費解各章列為最後一篇吾人了然整個之後再讀疑難各章疑難者亦不疑難矣類傷寒病篇類傷寒各章太陽病發熱而渴不惡寒者為溫病若發汗已身灼熱者名曰風溫風溫為病脈陰陽俱浮自汗出身重多眠睡鼻息必鼾語言難出若被下者小便不利直視失溲若被火者微發黃色劇則如驚癇時瘛瘲若火熏之一逆尚引日再逆促命期溫乃木氣疏泄之病風乃木氣疏泄之氣溫病忌發汗發汗則疏泄又疏泄矣風溫云者疏泄又疏泄之病也自汗出以下諸證皆疏泄之甚肺陰復亡之現象此風字非風寒之風也此一章論溫病溫病未立方原理即方也太陽病發熱脈沉而細者名曰痙津液傷故脈細太陽病發汗太多因致痙發汗太多故津液傷病身熱足寒頸項強急惡寒時頭熱面赤目脈赤獨頭搖卒口噤背反張者痙病也身熱足寒等等痙病等等皆津液傷所致痙病現證如此太陽病發熱汗出不惡寒者名曰柔痙痙病方詳金匱太陽病發熱無汗反惡寒者名曰剛痙以上五章論痙病濕家之為病一身盡痛發熱身色如熏黃也土色為黃土氣為濕故濕病則身黃濕阻榮衛故身疼發熱太陽病關節疼痛而煩脈沉而細者此名濕痹濕痹之候其人小便不利大便反快但當利其小便關節疼煩脈沉而細濕傷津故疼痛脈細濕家其人但頭汗出背強欲得被覆向火若下之早則噦胸滿小便不利舌上如脂者以丹田有熱胸中有寒渴欲得水而不能飲則口燥煩也脂乃脂膏之脂寒字作痰字解下有熱而胸有痰所以舌上如脂也病者一身盡疼發熱日晡所劇者此名風濕此病傷於汗出當風或久傷取冷所致也日晡乃申酉時此時空氣收斂風濕歸內故劇問曰風濕相搏一身盡疼痛法當汗出而解值天陰雨不止醫云此可發汗汗之病不愈者何也答曰發其汗汗大出者但風氣去濕氣在是故不愈也若治風濕者發其汗但微微似欲汗出者風濕俱去也微微似欲汗出者惟病人自己知道傷寒八九日風濕相搏身體煩痛不能自轉側不嘔不渴脈浮虛而澀者桂枝附子湯主之若其人大便硬小便自利者桂枝附子去桂加白朮湯主之小便利大便硬津液傷濕不去必小便減大便和濕乃去也風濕相搏骨節煩疼掣痛不得屈伸近之則痛劇汗出短氣小便不利惡風不欲去衣或身微腫者甘草附子湯主之濕流關節陽虛不能外達濕家病身上疼痛發熱面黃而喘頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞內藥鼻中則愈內藥鼻中藥方缺濕家下之額上汗出微喘小便利者死若下利不止者亦死汗喘陽亡於上便利陽亡於下上下脫中氣亡故死也以上九章論濕病太陽中暍者發熱惡寒身重而疼痛其脈弦細芤遲小便已灑灑然毛聳手足逆冷小有勞身即熱口開前板齒燥若發汗則惡寒甚加溫針則發熱甚數下之則淋甚暍乃暑火暑火傷肺肺主皮毛與榮衛相合肺熱故作寒熱身重疼痛毛聳逆冷身熱因於肺熱肺熱難於呼吸故口開肺熱則腎熱故齒燥弦細芤遲皆暑傷津液之象遲者熱則脈緩也太陽中熱者暍是也其人汗出惡寒身熱而渴也肺熱則汗出而渴肺內熱故外惡寒暍病方祥金匱太陽中暍身熱疼重而脈微弱此亦夏月傷冷水水行皮中所致也暑天浴於冷水水氣將熱氣閉住故發熱身疼重也以上三章論暍病問曰病有霍亂者何答曰嘔吐而利名曰霍亂霍者大也又散之速也升降倒行中氣將亡之大亂也問曰病發熱頭痛身疼惡寒吐利者此屬何病答曰此名霍亂自吐下利止復更發熱也榮衛根於脾胃故吐利則作寒熱吐則傷津故利止復更發熱霍亂頭疼發熱身疼痛熱多欲飲水者五苓散主之寒多不用水者理中丸主之霍亂病有熱霍亂有寒霍亂濕霍亂乾霍亂寒熱混合霍亂經文只論濕寒二種也吐利汗出發熱惡寒四肢拘急手足厥冷者四逆湯主之寒霍亂中常有此病陽亡極速故用四逆湯既吐且利小便復利而大汗出下利清穀內寒外熱脈微欲絶者四逆湯主之欲利而尿又利又大汗出脈又欲絶陽將亡也故用四逆湯回陽吐下已斷汗出而厥四肢拘急不解脈微欲絶者通脈四逆加豬膽汁湯主之汗出而厥陽將亡矣故用通脈四逆回陽加豬膽汁養胃膽之陰以收陽氣也惡寒脈微而復和利止亡血也四逆加人參湯主之脈和而惡寒為亡血者陽氣既微陰血亦弱也故用四逆補陽人參補氣以生血和字不可誤利字吐利止而身痛不休者當消息和解其外宜桂枝湯小和之身痛不休為有表證故用桂枝湯吐利發汗脈平小煩者以新虛不勝穀氣故也脈平此病已愈之脈以上九章論霍亂傷寒其脈微澀者本是霍亂今是傷寒卻四五日至陰經上轉入陰必利本嘔下利者不可治也欲似大便而反矢氣仍不利者此屬陽明也便必硬十三日愈所以然者經盡故也本嘔下利此是霍亂不可用傷寒三陰之法為治便硬矢氣此是陽明又不可用霍亂之法為治下利後當便硬硬則能食者愈今反不能食到後經中頗能食復過一經能食過之一日當愈不愈者不屬陽明也六日為一經後六日為後經能食而病愈胃陽旺也能食而病不愈乃霍亂病下利之後虛證也以上二章乃傷寒霍亂相似之病然霍亂不傳經蓋借霍亂以證傷寒耳大病差後喜唾久而不了了者胃上有寒當以丸藥溫之宜理中丸此病常有傷寒解後虛羸少氣氣逆欲吐者竹葉石膏湯主之中虛胃熱胃熱則氣不降故少氣大病差後從腰以下有水氣者牡蠣澤瀉散主之腰下有水乃濕熱瘀阻傷寒差已復更發熱小柴胡湯主之脈浮者以汗解之脈實者以下解之惟少陽經病纏綿因其在表裏之間也若無少陽經證浮以汗解實以下解大病差後勞復者枳實梔子湯主之若有宿食者加大黃如博棋子五六枚勞復多熱多結病人脈已解而日暮微煩以病新差人強與穀脾胃氣尚弱不能消穀故令微煩損穀則愈病新差脾胃弱損穀以養脾胃以上六章論差後勞復傷寒陰陽易之為病其人身體重少氣少腹裏急或引陰中筋痙攣熱上衝胸頭重不欲舉眼中生花膝脛拘急者燒裩散主之醫陽以陰醫陰以陽天人之妙皆圓運動此一章論陰陽易病類傷寒篇讀法傷寒論乃人身整個病人身有臟腑有榮衛榮衛主表臟腑主裏表裏之間又有少陽之經人身整個病者腑病熱臟病寒榮病熱衛病寒少陽之經病半熱半寒是也溫痙濕暍霍亂諸章所以借證傷寒整個的病非論溫痙濕暍霍亂的病為一目了然傷寒整個的病計應將整個以外各章另列一篇以清界限溫痙濕暍諸章非傷寒整個的病是傷寒類似的病也讀法總結研究傷寒論鬚根據事實以探求學理內容六瓣之一橘事實也本篇榮衛病各章原文稱為太陽病表病責在榮衛或由表入腑而病陽熱或由表入臟而病陰寒只視各人素來陰陽之偏耳若將表病責在太陽起首便將表裏混亂所以後人又添出傳經為熱直中為寒之臆度整個傷寒論的理路更使人無法找尋本篇首揭榮衛名正言順事實顯然上篇榮衛本病為桂淋汗法之病陽明胃腑本病為三承氣下法之病三陰臟本病為薑附溫法之病少陽膽經本病為柴胡和解之病上章各章應作一氣讀一概念間便將整個傷寒論的本體了然中篇各章皆本體較復的事實然既能於一概念間了然上篇的整個自能於一概念間了然中篇的整個也下篇榮衛壞病由本體病變壞而來上中篇揭出本病正以使下篇易於分別何以成壞病也下篇陽明胃腑病寒名雖陽明實則陽明陽退也下篇三陰臟病熱太陰則濕盛鬱住木氣木鬱則生熱也少陰則心火與腎水同氣火敗則水寒火復則生熱也厥陰則肝經與心包同氣相火敗則木氣寒相火復則生熱也少陽膽經壞病少陽經與臟腑相通亦如榮衛與臟腑相通故少陽亦有壞病也如此則一概念間了然下篇的整個如此則一概念間了然三篇仍是整個傳經另立一篇所以使傳經二字的意義徹底明顯也疑難各章另立一篇事實與文字多費思索之故有礙一概念間整個認識的成功也類證另立一篇不因借證旁參之故窒礙本論整個之表現也人身一個小宇宙整個的傷寒論乃整個人身整個宇宙的剖解學與修理學認識整個傷寒論一切外感內傷各病的原理自能認識此篇次序乃為求認識整個傷寒論之一法耳爰為訣以作全篇之歸納焉訣曰傷寒之病先分表裏表曰榮衛裏曰臟腑榮熱衛寒腑熱臟寒寒熱偏見運動不圓榮衛之法桂枝麻黃總統六經並非太陽太陽桃核陽明承氣少陽曰經大小柴劑太陰四逆少陰附子厥陰烏梅諸法由此腑不病寒臟不病熱腑寒臟熱別有關涉榮衛少陽乃有壞病少陰厥陰獨有死證傳經二字令人滋疑只問見證莫拘日期傷寒之法是一整個表裏與經條理不錯整個之外溫痙等則借證傷寒另列於後原理上篇原理上篇導言中醫學乃人身一小宇宙之學斯言也人皆聞而笑之謂其空泛無當也其實非乏而且非常之實在本來是人身一小宇宙之學只因無法得知宇宙遂無法得知中醫倘因不知之故遂將中醫學的本身改變一個方法去研究他只有愈走愈遠者只須尋出一個實在的研究方法一研究便將宇宙得著得著宇宙自然得著中醫此實乃得著宇宙自能得著中醫研究法讀者只須一字不可放鬆過去總要於實在二字上尋出著落便完全得著矣著者識二十四節氣圓運動簡明圖説欲學中醫須先認識十二經名詞的所以然欲認識名詞須先認識陰陽五行六氣的所以然欲認識陰陽五行六氣須先認識二十四節氣地面上所受太陽射到的熱降沉浮的圓運動右下左上中降沉升浮中秋冬春夏中西北東南中圖的虛線為地面虛線下為地面下虛線上為地面上圖的圓線上方在云層之際圖的中心為一個生物的環境的大氣圓運動的中心由中心以觀察四維便見一個生物所在地的宇宙範圍圖的中心的中字便是