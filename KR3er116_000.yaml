北夏至由北而南的卯時是東升的酉時是西降的故曰南行北行東升西降研究有造化的宇宙從太陽的熱射到地面後起此宇宙乃北溫帶的造化宇宙夏長的長讀漲違反常規的影響人身乃造化的大氣所生人身也是一小造化身之左部應東方屬春氣身之胸部應南方屬夏氣身之右部應西方屬秋氣身之臍部應北方屬冬氣胸臍之間應中央屬中氣中氣旋轉於中央四氣升降於四維造化之氣運動常圓人身即得健康運動不圓而反常人身即多疾病大氣運動失圓而反常大氣之病也大氣病人氣亦病也類如冬令以寒藏為常倘或冬令之後氣候忽暖水中陽熱當藏不藏水中陽熱在造化為中氣之根在人身為生命之本今當藏不藏泄出地面外則化為邪熱內則根本空虛人與造化同氣於是冬溫等病發生人多死亡也鼠疫即冬溫之最重者春令以溫生為常倘或初春之時氣候過溫水中應當上升的陽熱升的太過則陽根拔泄人與造化同氣於是春溫等病發生人多死亡也腥紅熱即春溫之最虛者夏令以熱長為常此時太陽盛滿地面的熱以下降土中為貴夏日雨多則陽熱下降酷熱無雨則陽熱不降人與造化同氣如陽熱不降於是霍亂等病發生人多死亡也秋令以涼收為常倘或深秋之時大氣燥結不降熱氣散而不收人與造化同氣於是發生時行感冒熱傷風也大氣有病之時惟中氣健旺之人自已本身運動能圓然後不隨大氣之不圓以俱病也又如人身下部之氣損傷交春必病極虛弱的溫病左部之氣損傷交夏必病胸中乾塞的病右部之氣損傷交冬必病乾嗽的病本身之氣損傷不能隨大氣的運動以俱圓故病人身一小造化的證據病重之時方能顯現得出因無病之時是整個圓運動病重之時整個運動分開然後顯出證據整個圓運動者氣也人身之氣即宇宙之大氣人身生命死亡的因果人身個體的生命乃秉受造化陰陽二氣和平升降所成圓運動的中氣而來是人身之有生命因人身有造化的中氣也中氣之亡約分數項一由天年已盡中氣終了而中氣亡一由疾病將人身的圓運動消滅而中氣亡或由疾病經醫治誤將人身的圓運動損壞而中氣亡一由造化之大氣先病使人身的圓運動失圓而中氣亡一由不善攝身由漸而甚將本身的圓運動損壞而中氣亡人有生命因人身有造化的中氣中氣既亡所以死也吾人身體輕健眠食甘美精神活潑便是中氣充足之象徵病人將死之前必欲大便與噁心欲吐便是上下脫離中氣將亡之象徵無病之人精神短少眠食不甘便是氣不足之象徵孔子的學説周易易經係辭下傳曰天地之大德曰生又曰天地氤氳萬物化醇男女媾精萬物化生三人行則損一人一人行則得其友言致一也天地以生育萬物為德因天地間無處無圓運動的大氣的中氣即無處無有生物氤氳者大氣中的陰陽交互圓運動極密之意男女媾精亦猶是也但陰陽運動不可偏多偏多則不能圓不能一致故不能圓三人損一一人得友言陰陽偏多則不圓也係辭上傳又曰易有太極是生兩儀兩儀生四象易乃陰陽交易太極者陰陽交易相抱而成之一點中氣是也由陰陽交易而成生物的中氣是為先天既有中氣即成生物是為後天上傳所言即是天地生物經過陰陽交合成了中氣之後便成生物個體太極是由陰陽交合圓運動而成個體的一個起點一點之中原已含有陰陽圓運動的整個由一個太極的旋轉運動起一個分為兩個兩個分為四個以至分為無數個而成一生物整個個體此太極的義意也群細胞學的證明係辭下傳又曰天地設位而易行乎其中矣地面之際之上為天地面之際之下為地地面之際為中太極的形狀乃陰陽交易於地面之際相抱如環的一點圓運動行者運動也易經卦象天卦在上地卦在下名曰否卦地卦在上天卦在下名曰泰卦天本在上而氣下交於地地本在下而氣上交於天上下相交遂成産生太極的圓運動泰者通泰運行通泰也若天氣在上上者竟上而不下交地氣在下下者竟下而不上交成了直的不運動無有中氣無有太極否塞不通萬物不生造化息矣易經説卦傳曰帝出乎震齊乎巽相見乎離致役乎坤悅言乎兌戰乎乾勞乎坎成言乎艮勞讀鬧附圖太極的圓運動左上右下升浮降沉東南西北春夏秋冬卯午酉子溫熱涼寒生長收藏河圖同此圓之虛線地面之際圖的小圈即一個生物所在地大圈即是所在地的環境震巽者東方之稱春氣之位離者南方之稱夏氣之位兌乾者西方之稱秋氣之位坎者北方之稱冬氣之位坤者南西兩方之間之稱中氣之位艮者北東兩方之間之稱中氣之位震巽離坤兌乾坎艮乃易經八卦名辭卦者大氣圓運動的現象之稱此圖為八卦圖此東南西北即一個生物所在地的東南西北八卦圖即宇宙圖圖的虛線在造化為地面之際在人身為臍上胸下之間帝出乎震者言上年夏時太陽射到地面的陽熱經秋氣之降收於地面之下經冬氣之沉藏於地下之水中到了今年春初之時此陽熱由水中上升出於東方也陽熱為造成生物生命元素之原始故稱曰帝齊乎巽者震居東方地面之下巽居東方地面之上震為春初巽為春末春末之時地下水中所藏的陽熱齊升於地面地面上的生物生髮都齊也相見乎離者離居南方正夏之時此時地面下所藏舊年的陽熱升浮地面上來與今年直射地面尚未降入地面以下的陽熱相會見也致役乎坤者役者事也圓運動之事也言今年升浮的舊年收藏於地下之熱與今年直射地面之熱不可浮而不降坤為圓運動升極而降之方離位正浮的陽熱到夏秋之間的坤方而初降也悅言乎兌者陽熱升而不降則亢而悔升而能降則和而悅此時地面的陽熱得地面上天空金氣之收而降入地下以為來春萬物生髮之本陽熱秋降萬物得根而皆悅也金氣詳下文氣象學證明戰乎乾者兌居西方地面之上乾居西方地面之下地面之下乃為陰位秋冬之交陽熱降入陰中非常充足陰陽乍合必戰動而後自然也勞乎坎者陽熱由地面之上降入地面下之水中宜封藏不可外泄當慰勞之使安靜不可泄動也成言乎艮者坤為升極宜降之位陽熱至坤如不能降不能行圓運動之事而直上矣陽熱至艮如不能升不能成圓運動之功而直下矣艮坤為升降之樞機乃圓運動之中氣如無中氣直下不升直上不降造化息矣成言乎艮言年的圓運動成功於艮方也帝出乎震之時大寒立春節前後也此時大氣降極而升由靜而動地下水中所藏上年秋季所收降的陽熱升動出土造化個體根氣搖泄人身下部的陽熱亦升動搖泄身體不強中氣不足之人尤其是年老之人與常病之人此時必感覺精神不振食減不安小兒如於此時發生麻疹必多嘔吐凶證下部陽泄中氣失根故也如麻疹發生於小寒前後多死陽根拔散故也冬至後有小蟲飛動或起熱風或聞雷聲即是陽根拔散之事實也齊乎巽之時穀雨立夏節前後也此時地面下所藏的陽熱升出地面者多人身下部的陽熱亦升出中氣以上者多也相見乎離之時夏至節前後也此時造化個體的陽熱盛於地面之上虛於地面之下人身個體的陽熱亦盛於中氣之上而虛於中氣之下也夏至前後所以下寒之病特多也致役乎坤之時夏秋之間之時也此時造化由升而浮的陽熱又須由浮而降由浮而降中氣之能人身如中氣不足上部陽熱降不下去便成病也悅言乎兌之時立秋處暑前後也此時造化個體由地下水中升浮於地面之上的陽熱與今年夏季直射地面的陽熱都向地面下降造化圓運動的個體中下如植物個體的根本中上如植物個體的花葉在個體之上的陽氣下降乃生根本在個體之下的陽氣上升乃生花葉在上的陽氣即是在下的陽氣在下的陽氣即是正上的陽氣今秋悅言乎兌的陽即是來春帝出乎震的帝此時地面之上陽熱已多不能下降以交陰則澎渤而作吼能下降以交陰則收斂而生悅人身此時陽氣下降精神強足迥異尋常而死人最多的時令病處暑後即消滅也處者歸也入也言地面上的暑熱歸入於地面之下也所以人身立秋之後內必生熱如此時陽熱不足下降不多冬至之時水中陽少便成大病戰乎乾之時寒露霜降節前後也陽氣出外則下虛陽氣入內則下實兌居地面之上上即外也乾居地面之下下即內也此時陽氣入內者多造化個體中下陽實人身個體亦中下陽實造化個體與人身個體中下為本故人當秋冬之交則特別壯健也兌乾之時宇宙與人身中氣之上的陽氣收降於中氣之下中下的陽氣既實秋氣又收斂之收降不遂則燥結於中土之際於是江南的黑熱病西南的瘧疾即盛行也勞乎坎之時冬至節之時也此時陽氣入地封藏不泄為來年歲氣圓運動之本惟水有封藏之能故陽氣入地必須入於地下的水中然後能封藏不泄人身此時如縱欲瀉陽來年交春陽熱出震必根氣虛乏倘感時疾必易致死小兒冬春之交發熱出疹服升散藥寒涼藥破氣藥必死即是陽根不藏又遭藥力升散之故此時如特別寒冷陽氣封藏人身必健美也成言乎艮之時冬春之間之時也離居南方升極之位坎居北方降極之位圓運動個體升極必降故陽降於坤位降極必升故陽升於艮方艮坤為升降的中氣人身此時中氣不足陽氣升不上來必成危險大病也以上節氣須將八卦圖的上下左右按著自己的身體揣想方有著落吾人欲求明瞭生物生命的字宙造化可將圖的中心小圈作為我的個體所在地由我的個體所在地的地面仰觀俯察此地的環境設想此地未曾有太陽的熱射到地面以前是怎樣的是陰冷的再設想太陽的熱射到地面以後由兌而乾而坎艮震巽離坤而兌用下文植物學來實地證明便能將這生物生命的字宙造化整個的所以然明瞭俯察者俯察地面之下也近世科學家研究關於生命的宇宙乃向太陽係的行星上多少萬里多少萬年去找尋結果是徒勞無獲既將圖之中心作為我的個體所在地再由我的個體所在地的環境仰觀俯察以求明瞭大氣的升浮降沉又須在我們的個體內尋找大氣升浮降沉的關係如此則我身個體的圓運動與造化個體的圓運動是二而實一的研究便能感覺有實在的事實發現矣地面之下最要緊易經係辭下傳又曰仰則觀象於天俯則觀法於地近取諸身遠取諸物造化宇宙之構成全是太陽射到地面的陽熱壓入地面之下的水中再由水中澎出地面又由地面壓入水中回圈不已成立的而將陽熱壓入地下乃金氣之力將壓下的陽熱封藏不泄乃水氣之力觀象於天注意天空的金氣也觀法於地注意地下的水氣也俯仰之間有升降交會的中氣也近取諸身吾身一小宇宙也遠取諸物物身亦一小宇宙也易經係辭上傳又曰天垂象見吉凶聖人效之河出圖洛出書聖人則之河圖伏羲時代黃河中所發現之圖則者取為法則也今在山西榮河縣境附圖河圖此亦關於生物生命之宇宙圖即是一個生物個體圖即是一個細胞圖點的白色是代表大氣的陽性點的黑色是代表大氣的陰性下方一點代表大氣之下沉上方兩點代表大氣之上浮左方三點代表大氣之上升右方四點代表大氣之下降中央五點代表沉浮升降的中氣中央五點加五點為十點代表中氣為陰陽化合的圓運動個體的樞軸下方一點加五點為六點代表沉氣之中有中氣沉氣之中有中氣則下沉仍然上浮以成其為圓運動上方二點加五點為七點代表浮氣之中有中氣浮氣之中有中氣則上浮仍然下沉以成其為圓運動左方三點加五點為八點代表升氣之中有中氣升氣之中有中氣則左升仍然右降以成其為圓運動右方四點加五點為九點代表降氣之中有中氣降氣之中有中氣則右降仍然左升以成其為圓運動白點加入黑點代表陽中有陰黑點加入白點代表陰中有陽言陽性為直上之性陰性為直下之性直上直下不能成圓運動必陰陽化合然後不直上不直下而成圓運動然必上下左右皆含有中氣然後能成整個圓運動也造化圓運動個體之構成先有沉後有浮沉貴能升浮貴能降沉浮有先後之分升降無先後之別八卦圖表示造化之成只是太陽的熱經秋降入地面之下的水中又經春由水中升出地面上來又經秋由地面降入水中升極而降降極而升升降不已所以成為圓運動河圖表示宇宙造化中氣居沉浮升降之中中氣之成在沉浮升降之後而中氣之用又皆寓於沉浮升降之間升者所以使沉的不可再沉降者所以使浮的不可再浮中氣者升降之樞軸也浮沉為陰陽之本體升降為造化之妙用沉者再沉則直下浮者再浮則直上直上直下則陰陽之本體發現圓運動消滅而造化息矣造化息中氣亡也一二三四五代表大氣內所有五種物質組織圓運動個體之次序六七八九十代表大氣內五種物質能力整個圓運動之成功也太陽射到地面的熱經秋降入地下經冬藏於地下之水中與水化合之後經春再由水中升出地面升出地面草木發生故春氣屬木將陽熱降入地下的降力是地面上天空的金氣金氣自秋始顯故秋氣屬金冬氣下沉最沉者水陽熱歸水故冬氣屬水太陽射地的熱夏時為多故夏氣屬火土壤在地面之際居升浮降沉之中故中氣屬土故稱大氣內的金水木火土五種物質為五行五行者一個圓運動中五種物質的氣發生五部份能力之運行也河圖個體下一代水數上二代火數左三代木數右四代金數中五代土數分言之則曰五行合言之則曰一個大氣的圓運動而已八卦圖的五行坎水離火震巽木兌乾金坤艮土也五行物質各有能力火氣有煊通能力夏月造化熱漲奮興夏月入身汗出色華水氣有封藏能力冬月造化水冰地結冬月入身氣固骨堅木氣有疏泄能力春月造化凍解草生春月入身筋脈舒達金氣有收斂能力秋月造化天涼熱降秋月入身毛孔閉合人與造化同一氣也大氣的五行運動不圓則時令傳染病發生人身的五行運動不圓則個體之病發生如疏泄作用大過則發熱汗出收斂作用太過則惡寒無汗之類是也人身疾病無不由大氣的物質能力所發生中醫的學理無不有大自然的科學的原則惟自來醫家不能盡人皆知偶有知者亦無徹底的辦法耳能力亦稱作用河圖與八卦圖代表造化個體物質能力的圓運動亦即代表人身個體物質能力的圓運動亦即代表一個細胞小體物質能力的圓運動圓的虛線在造化為地面之際在人身為胸下臍上之間生物個體最初的一個細胞無不具有河圖圓運動的大氣的物質能力又經大氣圓運動的積纍而後成其個體故生物全體細胞仍是最初的一個細胞一個宇宙個體一個人的個體皆可作一個細胞觀皆可作一個河圖觀能力物質分不開的人的喜怒悲恐思想行為早已具備於最初的一個細胞之中而來自造化宇宙圓運動的大氣也詳原理下篇八卦圖的圓運動一年一整個一日一整個河圖的圓運動一年一整個一日一整個一時一刻一分一秒以至無可分析無不是一整個吾人的個體則具有八卦圖與河圖的圓運動而成為本身個體的圓運動八卦圖的宇宙河圖宇宙的先天也八卦圖為陽運陰中陰包陽外的圓運動河圖為陰陽平均的圓運動然河圖白點的陽數二十五黑點的陰數三十是河圖仍陰多於陽故人身的陽氣為圓運動之始人身的陰氣又為包藏陽氣使陽氣運動能圓之資也如人身陽氣損傷則陰寒凝沍不能運動而人死人身陰氣損傷則陽氣無所包藏陽熱飛越運動解體而人死研究八卦圖的宇宙由兌金起兌金於空間為西方於時間屬立秋處暑節此時秋金收斂將地面所有太陽射到的暑熱降入地面之下而成陽盛之乾卦此陽入於冬至坎水之中經過小寒由艮卦上升交春而成震巽之木再升而成夏至離卦之火此火經坤土之降又同本年太陽射地的暑熱由兌而收入於地下是為一年秋降為春升之本人身陽氣的運行亦復如是所以人身右部不降之病較左部不升之病多而左部不升之病由於右部不降者亦不少也研究河圖的宇宙由中氣起中氣左旋則木火左升中氣右轉則金水右降轉者由上而下旋者由下而上中氣如軸四維如輪木火左升必右降以交金水金水右降必左升以交木火以成其圓運動圓運動者整個不能分拆以成其為整個中氣運動是也易經係辭下傳又曰易簡而天下之理得矣天下之理得而成位乎其中矣易簡圓運動極容易極簡便也理即是圓運動之理言不僅生物個體生成於圓運動之中凡天下一切人事只要合於大氣的圓運動合於天地生物的中氣無不得到成功之位的極好的政治極好的家庭極好的社會皆有極簡易的圓運動之理政府一舉一動無不得自人民人民一事一物無不信任政府父慈其子子孝其父夫婦相和朋友相信人人都在圓運動之中中氣彌漫而與天地合德斯成盛隆之世反之則政府欺壓人民人民疑罹政府父不慈其子子不孝其父夫婦相背朋友相偽遂成了無中氣的直不運動否塞不通世道壞矣天下之理相對的兩個成為圓的一個則治圓的一個成為絶對的兩個則亂河圖的五行火氣煊通於上水氣封藏於下木氣疏瀉於左金氣收斂於右各走極端成了直不運動造化遂息而有中央的中氣運化於中中氣如軸四維如輪軸運輪行輪運軸靈使四方各走極端的相反作用成為一個共同相成的作用河圖的表示中央與四維共同維繫一整個圓運動的表示也河圖中央五數之中皆有四維的一二三四四維一二三四之中皆有中央的五數此中國文化所以起源於關於生物生命之宇宙的大氣圓運動而以河圖為則醫學尤其切要者人的個體是圓運動的大氣生的故也佛家謂人生個體是地水火風合成的此乃言其大概醫學原則乃是河圖因宇宙大氣一年的運動金氣的關係太大無金氣之收斂降壓陽熱不能降於水中不惟木氣無從産出一年的溫熱涼寒的圓運動亦不可能成功惟一二三四五的三字尚有疑義三字代單數的陽性則可因先有金氣然後能産生木氣也詳原理上篇裏六氣中河圖為宇宙造化個體的代表乃周易之起源河圖之數五十居中以運四維孔子晚年學易嘗曰假我數年五十以學易可以無大過矣言守中以學易可以無太偏之過也蓋河圖四維的一二三四合而成中宮之五而中宮五數之中即是四維之一二三四故守中以運四維不致偏於一方而成太過也周秦諸子的學説莊子抱朴子劉子老子荀子莊子曰人之生氣之聚也聚則為生散則為死抱朴子曰人在氣中氣在人中劉子曰人受天地之中以生老子曰天地之間其猶橐籥乎又曰道生一一生二二生三三生萬物荀子曰六淫之氣皆出於地於天無關又曰霜降娶女冰泮節房云云氣之聚大氣聚在人身也氣在人中大氣在人身之中人在氣中人在六氣之中有也人受天地之中受天地之中氣也橐籥風箱也風箱之用大氣出入不已天地之間春夏則陽氣出於地上秋冬則陽氣入於地下入而復出出而復入出入不已因成造化也老子之道周流不息無始無終一個圓圈一個圓圈升降起來則生中氣一指圓圈言二指升降言三指中氣言天空一無所有太陽的熱射到地面乃生中氣也霜降宇宙陽氣入內人身下部氣實故可交合冰泮宇宙陽氣出外人身下部氣虛故節少交合所以孔子有云未知生焉知死又云致中合萬物育焉無非本大氣之大自然故曰人身一小宇宙也內經的學説四氣調神論所以中醫內經有曰春三月此為發陳逆之則奉長著少夏為寒變夏三月此為蕃秀逆之則奉收者少秋三月則為容平逆之則奉藏著少冬至病重冬三月此為閉藏逆之則奉生者少又曰天氣清淨光明者也藏德不上故不下也雲霧不精故上應白露不下交通不表萬物命故不施不施則名木多死云云發陳者去年秋收冬藏陳舊的陽氣今年春時由地下的水中而發生於地面萬物發生也逆了春氣便少了夏氣之根故夏病寒也蕃秀者發生於地面的陽熱夏時盛長於地面之上萬物蕃盛而秀實也逆了夏氣便少了秋氣之根也容平者夏時地面上陽熱多地面下陽熱少秋時大氣壓力增加將地面上極多的陽熱收容於地面之下地面上下陽熱平勻均也逆了秋氣則冬氣無根冬氣陽少故病重也閉藏者此收容於地下之陽熱愈收愈深入冬以後此陽熱即藏於地下之水中閉固不泄以為來年春夏生長之根也逆了冬氣則春氣無根也但是水之能藏陽熱全賴冬令寒冷若冬時不寒封藏無力水中所藏的陽熱散漫消亡則地面之下無藏德上升於天天空之間即無雨露下降於地天氣本來清淨光明無雨露無雲霧雨露雲霧皆地下水中所藏的陽熱上升成的上升下降的交通停息成了無中氣的表現中氣乃萬物的生命今造化無中氣以施於萬物極有名之大木必多枯死而況人乎讀內經需擇其事實上有理由者讀之四氣調神論之類是也內經非一人手筆所以有合理處有不合理處內經又曰夫虛者氣出也夫實者氣入也聖人春夏養陽秋冬養陰春夏之時地下水中所藏的陽氣升出地面之上地面之下陽氣減少造化個體與人身個體皆以中下為本今中下陽氣外出故曰虛也秋冬之時地面之上所盛滿的陽熱降入於地面之下的水中陽氣入於水中中下陽足故曰實也聖人知春夏陽虛於下故一切起居飲食皆注意保養中下的陽氣此時不知保養中下陽氣必不免外熱內寒上熱下寒諸危險病也聖人知秋冬陽實於下陽氣是往上浮的雖實於下仍易浮動上來必須陰氣充足方能將陽降而藏於水氣之中故一切起居飲食皆注意保養中上的陰氣此時不注意保養中上的陰氣陰氣不足封藏不住在下的陽氣來年春夏根本虧傷必病極危險的溫病也故春夏以寒藥治病傷損下部的陽氣秋冬以熱藥治病擾動下部的陽氣多壞宇宙大氣圓運動的造化個體的力量地面上得一半地面下得一半而根本則在地面下之一半人之雪兆豐年不知冬令雪大次年豐收乃因雪能封藏地面下的陽氣冬令雪大地下陽足豈止次年禾稼結實特多人身亦加康健也人知冬令鳴雷次年不利不知冬令鳴雷乃地下封藏的陽氣往外消失次年由地下生出地上的大氣成了無根的病氣豈知五穀缺收民病猶不易治因去年是今年的先天今年是明年的先天也南方的井水冬至後一日比冬至前一日溫度減少冬至陽生陽生則升故井水冬至後一日溫度較冬至前一日減少北方的井水冬至前一日比較冬至後一日以致大寒之前溫度並無差別雪大冰厚地下水中封藏氣足陽熱不外泄也所以人在北方居住則身體健康移住南方則覺疲乏大氣中的陽足與不足之分也前人謂五月間井內須防有毒五月不可淘井因五月間地面下陽氣少井內陰盛之故交秋之後居住北方住到春季始往南方一到南方便覺呼吸清快身體舒適交秋之後居住南方住到春季始往北方一到北方便覺身體疲乏精神搖動南方大氣秋冬收藏之力量小北方大氣秋冬收藏之力量大收藏大疏泄亦大收藏小疏泄亦小收藏者入也疏泄者出也入多出少故健美入少出多