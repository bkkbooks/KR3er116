front:
  text: 本書讀法次序先讀原理上篇將二十四節氣太陽射到地面的熱的降沉升浮簡圖認識清楚從降認識起即得著全書整個雛形再將十二經圓運動名詞認識默記即得著中醫學整個綱領整個二字的意義言向來學醫都是枝枝節節去學無有整個的根本學法所以中醫本是易學的事總難學到成功此書是一整個學法所以於最短期間用最少腦力即能了然中醫學的究竟而且能運用其方法次讀古方上篇中醫書籍如無字母無拼法無文法的作文各是其是所是皆非學醫之人終身皆在猜疑摸索之中得不到正確的成就真乃苦事本書原理上篇如字母古方上篇如拼法如文法各篇如作文明瞭此二篇即能得著中醫學整個基礎古方上篇前六方為內傷病的基礎學後十方為外感病的基礎此篇讀至溜熟其餘各篇開卷便成熟書因全書的原則系統名詞文法皆在此篇每日時時刻刻皆在玩味此篇一星期工夫中醫整個的根本學便算畢業如讀不溜熟以下各篇便難深入了原理上篇古方上篇未曾讀好莫行讀別篇按次讀去六個月即能將全書學完古方上篇讀後應讀溫病本氣篇葉天士王孟英溫病大家只有經驗不知原理自從王叔和誤解內經經文錯起以致後人將傷寒溫病麻疹完全學錯枉死甚多不解何故此篇於實在的事實上揭出本氣自病的原理又於經驗的事實上訂出可靠的方法明瞭此篇一切外感皆能明瞭溫病以外的一切發熱病症皆能由自己尋出辦法而少卻多少向來治病的無謂麻煩溫病篇讀後小兒病本氣篇一面能醫治小兒病症知道人身與宇宙一大氣同一大氣的圓運動的意義而加強其往前學習興趣兒病本氣篇讀後應讀時病本氣篇人身與宇宙同一大氣的圓運動顯而易見矣繼讀金匱方解篇古方中篇古方下篇金匱方解是就本方的圓運動釋明其意義古方中篇與古方上篇為對待的學法如上篇當歸生薑羊肉湯治肝經寒證中篇白頭翁湯治肝經熱證相對而詳説其意義之類如此學法應免學中醫先入為主之弊古方下篇則推論上篇中篇所引各方而由此及彼由少及多以收舉一反三之效使學者用極少的思想得到極多的成績
